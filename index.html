  { id: 54, name: "チンギス・ハンの馬具", desc: "モンゴル帝国の騎馬兵が使用。機動力と連続射撃を可能にした革新的装備で、3戦目配置時に絶大な効果を発揮する。", type: "buff_pos", pos: 3, value: 0.35 },
  { id: 55, name: "オリンピアの聖火", desc: "古代ギリシアで灯された神聖な火。ポリス間の休戦をもたらす平和の祭典のシンボル。味方全体の最大HPを上昇させる。", type: "buff_hp", value: 0.2 },
  { id: 56, name: "クレオパトラの装身具", desc: "プトレマイオス朝最後の女王の宝飾品。ローマの有力者を魅了した美貌と知略の象徴であり敵を籠絡して能力低下を引き起こす。", type: "debuff_all", value: 0.15 },
  { id: 57, name: "カエサルの月桂冠", desc: "ローマの独裁官カエサルが愛用した勝利者の冠。数々の戦役での勝利と市民からの圧倒的な支持を象徴し軍事属性を大いに鼓舞。", type: "buff_attr", target: "VALOR", value: 0.25 },
  { id: 58, name: "ローマの水道橋の石", desc: "古代ローマが各都市に水を供給するために築いた土木建造物。アーチ工法による技術力と強大なインフラ力を示し政治属性を強化。", type: "buff_attr", target: "STRATEGY", value: 0.2 },
  { id: 59, name: "ヴァイキングのロングシップ", desc: "ノルマン人が侵略に用いた浅瀬も航行可能な船。神出鬼没の機動力で沿岸部を恐怖に陥れた。4戦目配置時に奇襲効果で歴史力激増。", type: "buff_pos", pos: 4, value: 0.3 },
  { id: 60, name: "マルコ・ポーロの旅行記", desc: "ヴェネツィアの商人が口述したアジアの記録。黄金の国ジパングの記述がヨーロッパ人の探求心を刺激し大航海時代の原動力となった。", type: "buff_attr", target: "CULTURE", value: 0.2 },
  { id: 61, name: "ウルクの円筒印章", desc: "古代メソポタミアのシュメール人が粘土板に転がして所有者を示した印章。神々や英雄の姿が精緻に彫られ、当時の高度な美術水準と交易の広がり、都市国家の複雑な社会構造を伝える遺物。", type: "buff_attr", target: "CULTURE", value: 0.15 },
  { id: 62, name: "ギルガメシュ叙事詩の粘土板", desc: "古代メソポタミアの伝説的なウルク王の冒険を描いた叙事詩が刻まれた粘土板。ノアの箱舟の原型とされる大洪水伝説を含み、古代オリエントの人々の死生観や世界観を伝える最古級の文学作品。", type: "buff_attr", target: "CULTURE", value: 0.2 },
  { id: 63, name: "ネフェルティティの胸像", desc: "古代エジプト新王国第18王朝のアメンホテプ4世（イクナートン）の妃の彩色胸像。アトンの一神教信仰のもとで生まれた、写実的で人間味あふれるアマルナ美術の最高傑作として知られる。", type: "buff_attr", target: "CULTURE", value: 0.25 },
  { id: 64, name: "アマルナの外交書簡", desc: "アメンホテプ4世の都テル・エル・アマルナで発見されたアッカド語の楔形文字粘土板。エジプトとヒッタイト、ミタンニ、バビロニアなどの大国間での複雑な同盟関係や外交交渉の記録。", type: "buff_attr", target: "STRATEGY", value: 0.2 },
  { id: 65, name: "アケメネス朝のダリック金貨", desc: "ダレイオス1世が発行した純度の高い金貨。王の射手姿が刻まれている。広大な帝国全土での税の徴収や東西交易の決済に広く用いられ、オリエント世界の経済的統一を大きく促進した。", type: "buff_all", value: 0.15 },
  { id: 66, name: "ベヒストゥーン碑文の拓本", desc: "ダレイオス1世が即位時の反乱鎮圧の事績を刻ませた巨大な磨崖碑。古ペルシア語など3カ国語の楔形文字で記され、のちにイギリスのローリンソンによる楔形文字解読の決定的な鍵となった。", type: "buff_attr", target: "STRATEGY", value: 0.15 },
  { id: 67, name: "アヴェスターの写本", desc: "善悪二元論と拝火教を特徴とするゾロアスター教の根本聖典。ササン朝時代に集大成された。最後の審判や天国と地獄などの教義は、のちのユダヤ教やキリスト教、イスラーム教に影響を与えた。", type: "heal_round", value: 0.08 },
  { id: 68, name: "十戒の石板", desc: "ヘブライ人の指導者モーセがシナイ山でヤハウェから授かったとされる律法。唯一神信仰と偶像崇拝の禁止などを定め、ユダヤ教の根幹となり、彼らの強固な選民思想と民族的団結を支えた。", type: "damage_cut_all", value: 0.15 },
  { id: 69, name: "アテネの陶片（オストラコン）", desc: "クレイステネスの改革で導入された陶片追放（オストラキスモス）に用いられた素焼きの破片。僭主になる恐れのある政治家の名を刻んで投票し、アテネ民主政を守るための重要な防波堤となった。", type: "debuff_all", value: 0.15 },
  { id: 70, name: "デロス同盟の軍資金", desc: "ペルシアの再来に備えてアテネを盟主に結成された同盟の金庫。のちにアテネがデロス島から自国へ金庫を移し、パルテノン神殿再建などに流用したことで、アテネ帝国主義の象徴となった。", type: "buff_attr", target: "VALOR", value: 0.2 },
  { id: 71, name: "重装歩兵の青銅の兜", desc: "古代ギリシアのポリスの防衛を担った平民の重装歩兵が自費で揃えた兜。密集陣形（ファランクス）を組んで戦う彼らの活躍が、貴族政から民主政への移行を促す最大の原動力となった。", type: "buff_attr", target: "VALOR", value: 0.15 },
  { id: 72, name: "イリアスのパピルス写本", desc: "盲目の詩人ホメロスが編纂したとされる古代ギリシアの長編英雄叙事詩。トロイア戦争を舞台にアキレウスらの活躍を描き、ギリシア人の民族的同胞意識（ヘレネス）を形成する精神的支柱となった。", type: "buff_all", value: 0.1 },
  { id: 73, name: "ムセイオンの天球儀", desc: "エジプトのプトレマイオス朝がアレクサンドリアに建設した王立研究所（ムセイオン）の観測器具。エラトステネスやアリスタルコスらによるヘレニズム時代の高度な自然科学の発達を象徴する。", type: "buff_attr", target: "CULTURE", value: 0.25 },
  { id: 74, name: "アッピア街道の敷石", desc: "前4世紀末に建設が始まったローマ最古の軍道。「すべての道はローマに通ず」の象徴であり、軍隊の迅速な移動や物資の輸送を可能にし、イタリア半島統一と地中海支配の強固な大動脈となった。", type: "buff_pos", pos: 1, value: 0.25 },
  { id: 75, name: "ローマの十二表法", desc: "前5世紀半ばに制定されたローマ最古の成文法。貴族による法の独占を打破し、平民の権利を保護するために慣習法を明文化したもので、後世のローマ法体系のすべての出発点となった。", type: "buff_attr", target: "STRATEGY", value: 0.2 },
  { id: 76, name: "剣闘士の剣と盾", desc: "コロッセウムなどの闘技場で見世物として命をかけて戦わされた奴隷や捕虜の武器。スパルタクスの乱に見られるように、過酷な奴隷制（ラティフンディア）に依存したローマ社会の暗部を示す。", type: "buff_pos", pos: 2, value: 0.3 },
  { id: 77, name: "ガリア戦記の羊皮紙", desc: "カエサルがガリア遠征の記録を簡潔なラテン語名文で記した書物。ケルト人や初期ゲルマン人の社会を知る一級の歴史史料であり、同時にカエサルのローマ市民に対する絶大な自己宣伝の道具でもあった。", type: "buff_attr", target: "VALOR", value: 0.25 },
  { id: 78, name: "デナリウス銀貨", power: 0, hp: 0, attribute: "STRATEGY", desc: "共和政期から帝政期にかけてローマ帝国全土で広く流通した基軸通貨。裏面に神々や皇帝の肖像が刻まれ、パクス・ロマーナの広大な経済圏における安定した交易と徴税を支えた。", type: "buff_all", value: 0.15 },
  { id: 79, name: "アントニヌス勅令の石板", desc: "212年にカラカラ帝が発布し、帝国内の全自由民にローマ市民権を付与した勅令。税収の拡大を狙ったものだが、属州民とローマ市民の区別をなくし、ローマ帝国の均質化と変質を決定づけた。", type: "buff_hp", value: 0.2 },
  { id: 80, name: "モエンジョ・ダーロの印章", desc: "インダス文明の都市遺跡から出土した滑石製の印章。サイや象などの動物と未解読のインダス文字が刻まれ、メソポタミアとの交易の証拠であり、当時の整然とした都市計画と商業の発展を物語る。", type: "buff_attr", target: "CULTURE", value: 0.15 },
  { id: 81, name: "リグ・ヴェーダのヤシの葉写本", desc: "アーリヤ人が自然現象を神格化して編纂した最古の賛歌集。のちのバラモン教の根本聖典となり、ヴァルナ制（身分制度）の成立など、古代インドの宗教と社会構造の基礎を形作った。", type: "heal_round", value: 0.1 },
  { id: 82, name: "アショーカ王の石柱", desc: "マウリヤ朝の第3代王がインド各地に建立した石柱。仏教の教えに基づく「ダルマ（法）」の政治をサンスクリット語などで刻み、武力ではなく慈悲による平和的な帝国統治を宣言した。", type: "damage_cut_all", value: 0.15 },
  { id: 83, name: "ガンダーラの仏像", desc: "クシャーナ朝のカニシカ王の時代に、西北インドで制作された仏像。ギリシア彫刻（ヘレニズム美術）の強い影響を受けた写実的な顔立ちや衣のひだが特徴で、大乗仏教とともに東アジアへ伝播した。", type: "buff_attr", target: "CULTURE", value: 0.25 },
  { id: 84, name: "マヌ法典の写本", desc: "グプタ朝時代に定着した、ヒンドゥー教徒の生活規範やカースト別の義務を定めた法典。バラモンの特権を正当化し、インドの伝統的な社会秩序（カースト制度）を法的に固定化する役割を果たした。", type: "buff_attr", target: "STRATEGY", value: 0.15 },
  { id: 85, name: "ゼロの概念の算木", desc: "古代インドの数学で発見された「無」を表す概念。十進法とともにアラビアへ伝わり、のちの代数学の発展や近代自然科学の計算基盤となる、人類の知の歴史における極めて重大なブレイクスルー。", type: "buff_all", value: 0.2 },
  { id: 86, name: "アジャンター石窟寺院の顔料", desc: "グプタ様式を代表するインド西部の仏教石窟寺院の壁画に用いられた顔料。優美で洗練された純インド的な仏教美術の頂点を示し、その画風は中国の敦煌や日本の法隆寺金堂壁画にも影響を与えた。", type: "buff_attr", target: "CULTURE", value: 0.2 },
  { id: 87, name: "シャクンタラーの戯曲", desc: "グプタ朝の宮廷詩人カーリダーサがサンスクリット語で著した戯曲。王と森の乙女の恋を描き、サンスクリット文学の最高峰として、のちのゲーテらヨーロッパのロマン派文豪たちをも魅了した。", type: "heal_round", value: 0.12 },
  { id: 88, name: "バクティ運動の楽器", desc: "南インドから起こった、ヒンドゥー教の最高神（シヴァやヴィシュヌ）への絶対的な帰依と愛を歌い踊る宗教運動の道具。カーストの身分を超えた平等な救済を説き、民衆の絶大な支持を集めた。", type: "buff_all", value: 0.1 },
  { id: 89, name: "デリー・スルタン朝の銀貨", desc: "奴隷王朝から始まる北インドのイスラーム5王朝が発行した貨幣。ヒンドゥー教社会の上にイスラームの支配層が君臨し、モスクの建設や独自のインド＝イスラーム文化を育む財政的基盤となった。", type: "buff_attr", target: "STRATEGY", value: 0.15 },
  { id: 90, name: "周の編鐘（青銅の楽器）", desc: "西周時代に王や諸侯の儀式で用いられた青銅製の巨大な打楽器群。単なる楽器ではなく、身分秩序（宗法）と礼楽の制度を象徴する権威の証であり、精巧な音階を奏でる高度な鋳造技術の結晶。", type: "buff_pos", pos: 3, value: 0.3 },
  { id: 91, name: "春秋戦国時代の刀銭", desc: "戦国時代の斉や燕などで流通した小刀の形をした青銅貨幣。鉄製農具の普及による農業生産力の向上を背景に、商工業が活発化し、貨幣経済が急速に発展した戦国社会のダイナミズムを象徴する。", type: "buff_attr", target: "STRATEGY", value: 0.15 },
  { id: 92, name: "始皇帝の度量衡の標準器", desc: "秦が中国統一後に発布した、長さ・容積・重さの基準を統一するための青銅製の分銅や升。文字（小篆）や車軌の統一とともに、強固な中央集権国家を構築するための法家的な経済統制の要拠となった。", type: "buff_all", value: 0.15 },
  { id: 93, name: "兵馬俑の陶兵", desc: "秦の始皇帝陵の周囲に埋められた、実物大の兵士や馬の素焼きの像。個々に異なる顔立ちを持ち、当時の軍団の編成や圧倒的な軍事力、そして皇帝の絶対的な権力と来世への欲望を無言で伝える。", type: "buff_hp", value: 0.25 },
  { id: 94, name: "漢の五銖銭", desc: "前漢の武帝が鋳造を独占し、全国に流通させた重量約3グラムの銅銭。経済統制（均輸・平準・塩鉄専売）の一環として発行され、その後唐初まで数百年間にわたって中国貨幣の絶対的な基本となった。", type: "buff_all", value: 0.18 },
  { id: 95, name: "張騫が持ち帰った西域の葡萄", desc: "前漢の武帝の命で大月氏へ派遣された張騫が、西域（中央アジア）から中国にもたらしたとされる作物。シルクロードを通じた東西の文化と物産の直接的な交流（オアシスの道）の幕開けを象徴する。", type: "heal_round", value: 0.10 },
  { id: 96, name: "司馬遷の史記の竹簡", desc: "前漢の武帝時代に完成した、黄帝から武帝までを描いた歴史書。皇帝の記録である「本紀」と臣下の伝記である「列伝」からなる紀伝体のスタイルを確立し、以後の中国正史の絶対的な記述モデルとなった。", type: "buff_attr", target: "CULTURE", value: 0.25 },
  { id: 97, name: "後漢の画像石", desc: "後漢時代の豪族の墓室の壁面にはめ込まれた、人物や神話、車馬の行列などを浮き彫りにした石板。当時の人々の豊かな生活様式や儒教的な道徳観、さらには死後の世界への関心を視覚的に伝える。", type: "buff_attr", target: "CULTURE", value: 0.15 },
  { id: 98, name: "黄巾の乱の頭巾", desc: "後漢末の184年、太平道の張角に率いられた農民反乱軍が目印として頭に巻いた黄色い布。「蒼天已に死す」を掲げて腐敗した宦官政治や豪族の搾取に抗議し、後漢帝国を実質的な崩壊へと導いた。", type: "debuff_all", value: 0.2 },
  { id: 99, name: "九品中正の評定表", desc: "魏の文帝（曹丕）が創設した官吏登用制度の記録。地方の中正官が人材を9等級に評定して中央に推薦したが、結果的に「上品に寒門なく、下品に勢族なし」と揶揄される門閥貴族の形成を促した。", type: "buff_attr", target: "STRATEGY", value: 0.2 },
  { id: 100, name: "均田制の戸籍木簡", desc: "北魏の孝文帝が制定し、隋唐へ受け継がれた土地制度の台帳。農民に土地を割り当てて税（租調庸）や兵役（府兵制）を課すための基礎資料であり、国家が人民を直接支配する東アジア的な律令体制の根幹。", type: "buff_all", value: 0.15 },
  { id: 101, name: "蘭亭序の拓本", desc: "東晋の「書聖」王羲之が書いた行書の最高傑作。名士の宴での詩集の序文であり、流麗で力強い筆致は中国書道史の絶対的な模範とされ、唐の太宗が愛するあまり陵墓に副葬させたという伝説を持つ。", type: "buff_attr", target: "CULTURE", value: 0.3 },
  { id: 102, name: "法顕の仏国記", desc: "東晋の僧・法顕が、陸路でインド（グプタ朝）へ赴き海路で帰国した際の記録。戒律の経典を求めての命がけの旅程と、当時のインドやスリランカの仏教事情、海上交易ルートを知る貴重な地誌史料。", type: "buff_pos", pos: 5, value: 0.3 },
  { id: 103, name: "隋の大運河の測量図", desc: "煬帝が莫大な労働力を動員して完成させた、華北と江南を結ぶ巨大な人工水路の図面。政治の中心である北と、経済の中心である南を連結し、その後の中国帝国を支える経済の大動脈として機能した。", type: "buff_all", value: 0.2 },
  { id: 104, name: "科挙の答案用紙", desc: "隋代に始まり清末まで続いた、儒学の知識を問う官吏登用試験の答案。門閥貴族の世襲を打破し、実力主義による優秀な官僚（士大夫）を登用することで、皇帝の絶対的な君主独裁体制を制度的に支えた。", type: "buff_attr", target: "STRATEGY", value: 0.25 },
  { id: 105, name: "唐三彩の駱駝像", desc: "唐代の貴族の墓に副葬された、緑・黄・白の釉薬で鮮やかに彩られた陶器。西域（シルクロード）から訪れたソグド商人やラクダの姿が写実的に造形されており、国際色豊かな唐の首都・長安の繁栄を象徴する。", type: "buff_attr", target: "CULTURE", value: 0.2 },
  { id: 106, name: "玄奘の大唐西域記", desc: "唐の太宗の時代に陸路でインドのナーランダー僧院へ赴いた玄奘が、帰国後に編纂した見聞録。中央アジアからインドに至る約140カ国の詳細な地誌であり、のちに明代の小説『西遊記』のモチーフとなった。", type: "buff_pos", pos: 1, value: 0.35 },
  { id: 107, name: "開元通宝", desc: "唐の初代皇帝・高祖の時代から鋳造された銅銭。「開元」は元号ではなく「新しい世を開く」の意。東アジア経済圏の基準通貨となり、日本の和同開珎などの銅銭鋳造に直接的なモデルとして大きな影響を与えた。", type: "buff_all", value: 0.2 },
  { id: 108, name: "王維の水墨画", desc: "「詩仏」と呼ばれた唐代の詩人・画家である王維の作品。自然の静寂と禅の精神を墨の濃淡のみで表現する「南宗画」の祖とされ、「詩中に画あり、画中に詩あり」と高く評された士大夫芸術の精髄。", type: "buff_attr", target: "CULTURE", value: 0.25 },
  { id: 109, name: "大秦景教流行中国碑", desc: "唐代の長安に建立された、ネストリウス派キリスト教（景教）の伝来と保護の歴史を刻んだ石碑。太宗の時代の寛容な宗教政策と、シルクロードを通じた東西文化の深い交流を示す第一級の歴史的遺物。", type: "heal_round", value: 0.1 },
  { id: 110, name: "高麗青磁の壺", desc: "10世紀から朝鮮半島の高麗で焼かれた、翡翠のように美しい青緑色の磁器。宋の青磁の技術を取り入れつつ、象嵌（ぞうがん）という独自の繊細な装飾技法を発展させ、東アジア陶磁史の至宝と称される。", type: "buff_attr", target: "CULTURE", value: 0.2 },
  { id: 111, name: "北宋の交子", desc: "11世紀の北宋の四川地方で、鉄銭の重さを避けるために商人が発行した預り証に起源を持つ、世界最古の紙幣。宋代の商業の爆発的な発展と、高度な信用経済システムの確立を示す画期的な金融アイテム。", type: "buff_all", value: 0.2 },
  { id: 112, name: "王安石の青苗法の帳簿", desc: "北宋の神宗の時代、宰相の王安石が富国強兵のために断行した「新法」の記録。春の植え付け期に貧農に資金や穀物を低利で貸し付け、地主の搾取を防ぎつつ国家財政を潤そうとした急進的な改革の証。", type: "buff_attr", target: "STRATEGY", value: 0.25 },
  { id: 113, name: "景徳鎮の白磁", desc: "宋代以降、江西省の景徳鎮で大量に生産された白く透き通るような磁器。イスラーム世界やヨーロッパへ大量に輸出され、「チャイナ」と呼ばれて世界中の王侯貴族を魅了した中国の代表的輸出品。", type: "buff_all", value: 0.15 },
  { id: 114, name: "占城稲の種籾", desc: "北宋時代にベトナムのチャンパー（占城）から導入された、日照りに強く成長の早い早稲（わせ）の品種。江南地方の二期作を可能にし、「蘇湖熟すれば天下足る」と呼ばれる農業大発展の起爆剤となった。", type: "heal_round", value: 0.10 },
  { id: 115, name: "資治通鑑の版本", desc: "北宋の旧法党の領袖である司馬光が編纂した、戦国時代から五代十国までの通史。皇帝の政治の鏡（教訓）とするため、年ごとの出来事を記す「編年体」で叙述され、大義名分を重んじる厳格な史論を展開した。", type: "buff_attr", target: "STRATEGY", value: 0.2 },
  { id: 116, name: "朱子学の四書集注", desc: "南宋の朱熹が『大学』『中庸』『論語』『孟子』に詳細な注釈を加えた書。宇宙の原理（理）と人間の道徳を結びつける壮大な哲学体系を構築し、元・明・清を通じて科挙の絶対的な基準（官学）とされた。", type: "buff_attr", target: "CULTURE", value: 0.3 },
  { id: 117, name: "金の猛安・謀克の割符", desc: "女真族が建てた金王朝の軍事・行政組織を示す証。300戸を1謀克、10謀克を1猛安とし、平時は農耕や狩猟を行い、戦時には兵士を供出させる、北方民族特有の強力な部族動員システムを支えた。", type: "buff_attr", target: "VALOR", value: 0.2 },
  { id: 118, name: "西夏文字の経典", desc: "タングート族が建てた西夏の初代皇帝・李元昊が、漢字の構造を模倣して制定させた極めて複雑な民族文字の仏典。遼の契丹文字などとともに、11〜12世紀の東アジアにおけるナショナリズムの高揚を象徴する。", type: "buff_attr", target: "CULTURE", value: 0.2 },
  { id: 119, name: "モンゴルのゲル（天幕）", desc: "ユーラシア大陸を席巻したモンゴル遊牧民の移動式住居。分解と組み立てが容易でありながら過酷な気候に耐え、圧倒的な機動力をもって大帝国を築き上げた彼らの生活と軍事活動の基盤であった。", type: "damage_cut_all", value: 0.1 },
  { id: 120, name: "ジャムチの牌子", desc: "モンゴル帝国が広大な領土を結ぶために整備した駅伝制（ジャムチ）で、使臣が携帯した金属製の通行証（パイザ）。駅舎で馬や食料の優先的な提供を受ける権利を保障し、「パクス・モンゴリカ」の交通網を支えた。", type: "buff_pos", pos: 2, value: 0.35 },
  { id: 121, name: "染付（青花）の磁器", desc: "元代の景徳鎮で発達した、純白の素地にイスラーム世界からもたらされたコバルト顔料（回青）で鮮やかな青い文様を描いた陶磁器。東西文化の融合の結晶であり、明・清代には世界最大の輸出品となった。", type: "buff_all", value: 0.2 },
  { id: 122, name: "ハギア・ソフィアのモザイク", desc: "ビザンツ帝国のユスティニアヌス大帝が再建した大聖堂を飾る、黄金とガラスのモザイク画。皇帝教皇主義に基づくビザンツ皇帝の絶対的な権威と、正教会の神秘的で荘厳な信仰の世界を圧倒的な輝きで表現している。", type: "buff_attr", target: "CULTURE", value: 0.25 },
  { id: 123, name: "ローマ法大全の写本", desc: "6世紀にビザンツ皇帝ユスティニアヌスが法学者トリボニアヌスに編纂させた法律書の集大成。12世紀ルネサンスで再発見されるとボローニャ大学などで研究され、近代ヨーロッパの大陸法体系の基礎を築いた。", type: "buff_attr", target: "STRATEGY", value: 0.3 },
  { id: 124, name: "キリル文字の福音書", desc: "9世紀にビザンツ帝国の宣教師キュリロスらがスラヴ人布教のために考案したグラゴール文字を基に作られた文字の聖書。正教会の信仰とともに東ヨーロッパに広まり、現在のロシア文字などの原型となった。", type: "buff_attr", target: "CULTURE", value: 0.2 },
  { id: 125, name: "クローヴィスの洗礼盤", desc: "496年、フランク王国の建国者クローヴィスがアタナシウス派（カトリック）に改宗した際に用いられたとされる水盤。ゲルマン諸部族の中でいち早くローマ教会と結びつき、西欧の覇者となる決定的な契機となった。", type: "heal_round", value: 0.1 },
  { id: 126, name: "カール大帝の剣（ジュワユーズ）", desc: "800年に教皇から「西ローマ皇帝」の冠を授けられたフランク王カール大帝が帯びていたとされる伝説の剣。ゲルマン、ローマ、キリスト教の三つの文化要素の融合と、西ヨーロッパ世界の確立を力強く象徴する。", type: "buff_attr", target: "VALOR", value: 0.3 },
  { id: 127, name: "三圃制の重量有輪犂", desc: "中世ヨーロッパの農業革命をもたらした、鉄製の刃と車輪を持つ巨大な犂（すき）。牛や馬に牽かせてアルプス以北の重く湿った粘土質の土壌を深く耕すことを可能にし、三圃制の普及とともに食糧生産を劇的に飛躍させた。", type: "buff_all", value: 0.2 },
  { id: 128, name: "コンポステーラの巡礼の杖", desc: "11世紀以降、イェルサレムやローマと並ぶキリスト教の三大聖地となったスペイン北西部のサンティアゴ・デ・コンポステーラへ向かう巡礼者の杖。中世の人々の熱烈な信仰心と、レコンキスタへの情熱を支えた。", type: "buff_pos", pos: 4, value: 0.3 },
  { id: 129, name: "グレゴリウス7世の破門状", desc: "1076年、聖職叙任権をめぐる争いで、教皇グレゴリウス7世が神聖ローマ皇帝ハインリヒ4世に対して発した破門の宣告文書。カノッサの屈辱を引き起こし、教皇権が世俗の皇帝権を圧倒していく歴史的な転換点となった。", type: "debuff_all", value: 0.25 },
  { id: 130, name: "テンプル騎士団の外套", desc: "第1回十字軍ののち、聖地巡礼者の保護を目的として設立された宗教騎士団の、赤い十字架が描かれた白い外套。金融業で莫大な富を蓄えたが、それを狙ったフランス王フィリップ4世の弾圧により異端として壊滅させられた。", type: "damage_cut_all", value: 0.15 },
  { id: 131, name: "ゴシック建築のステンドグラス", desc: "12世紀の北フランスに始まるゴシック様式の大聖堂の巨大な窓を飾る色ガラス。文字の読めない民衆に聖書の物語を視覚的に伝える「光の聖書」であり、天上の神の国を現世に現出させる圧倒的な神秘空間を創り出した。", type: "buff_attr", target: "CULTURE", value: 0.25 },
  { id: 132, name: "トマス・アクィナスの神学大全", desc: "13世紀のドミニコ会修道士が著したスコラ学の最高峰。アリストテレスの哲学を導入し、人間の理性とキリスト教の信仰を完璧な論理で調和・体系化した、中世カトリック神学の絶対的な金字塔。", type: "buff_attr", target: "STRATEGY", value: 0.3 },
  { id: 133, name: "ハンザ同盟の商館の鍵", desc: "リューベックを盟主とする北ドイツの都市同盟が、ロンドンやノヴゴロドなどの四大商館を拠点に北海・バルト海交易を独占した強大な商業特権の象徴。中世後期の商業革命と都市の自立（自由都市）を物語る。", type: "buff_all", value: 0.15 },
  { id: 134, name: "黒死病医師のマスク", desc: "14世紀半ばにヨーロッパの人口の三分の一を奪ったペスト（黒死病）の治療にあたった医師の、香料を詰めた嘴状のマスク。未曾有の死の恐怖は農村の人口激減をもたらし、結果的に農奴解放と封建社会の崩壊を早めた。", type: "debuff_all", value: 0.2 },
  { id: 135, name: "ジャンヌ・ダルクの甲冑", desc: "百年戦争で滅亡の危機にあったフランスを救ったオルレアンの乙女の鎧。神の啓示を信じて軍を率い、シャルル7世の戴冠を実現させた彼女の姿は、フランス人の国民意識（ナショナリズム）を強烈に覚醒させた。", type: "buff_pos", pos: 1, value: 0.35 },
  { id: 137, name: "ディナール金貨", desc: "8世紀以降、イスラーム帝国の経済的繁栄を背景にバグダードを中心に鋳造された高純度の金貨。インド洋から地中海に至る広大なイスラーム商業圏における国際通貨として、東西交易をダイナミックに牽引した。", type: "buff_all", value: 0.2 },
  { id: 139, name: "医学典範", desc: "11世紀のイラン系学者アヴィケンナ（イブン・シーナー）が、ギリシア・アラビア医学を集大成した膨大な医学百科事典。ラテン語に翻訳されると、中世ヨーロッパの大学で数百年にわたり医学の絶対的権威として君臨した。", type: "heal_round", value: 0.10 },
  { id: 140, name: "アストロラーベ（天体観測儀）", desc: "古代ギリシアで発明され、イスラーム世界で極めて精密に改良された天体観測用の円盤機器。メッカの正確な方角（キブラ）を知るためだけでなく、大航海時代のヨーロッパにおける外洋航海術の発展に決定的な役割を果たした。", type: "buff_all", value: 0.15 },
  { id: 142, name: "イブン・バットゥータの三大陸周遊記", desc: "14世紀のモロッコ出身の大旅行家が、約30年かけてメッカから西アフリカ、中東、インド、さらには元の中国までを旅した口述記録。当時の広大なイスラーム・ネットワークの広がりと繁栄を克明に伝える第一級史料。", type: "buff_pos", pos: 3, value: 0.3 },
  { id: 143, name: "世界史序説", desc: "14世紀のチュニス出身の歴史家が著した歴史哲学書。都市の定住民と砂漠の遊牧民の対立や、連帯意識（アサビーヤ）を軸に王朝の興亡の法則を鋭く分析し、神意を排した近代的な社会学や歴史学の先駆となった。", type: "buff_attr", target: "STRATEGY", value: 0.25 },
  { id: 144, name: "マムルークの曲刀", desc: "9世紀以降、イスラーム諸王朝の軍事力の主力となったトルコ人などの白人奴隷兵士の刀。アイン・ジャールートの戦いでモンゴル軍を撃退し、十字軍をシリアから駆逐した彼らの圧倒的な戦闘力を象徴する。", type: "buff_attr", target: "VALOR", value: 0.2 },
  { id: 145, name: "イェニチェリの軍服", desc: "オスマン帝国のデヴシルメ制度によってキリスト教徒の少年を徴集・改宗させて編成した、スルタン直属の常備歩兵軍団の制服。いち早く火器（鉄砲）を装備し、ビザンツ帝国の滅亡やウィーン包囲など帝国の拡大の先鋒となった。", type: "buff_pos", pos: 1, value: 0.25 },
  { id: 146, name: "スレイマン1世の法典（カーヌーン）", desc: "16世紀のオスマン帝国の最盛期を現出した「立法帝」スレイマンが編纂させた世俗法令集。厳格なシャリーア（イスラーム法）を補完し、広大で多民族・多宗教にまたがる帝国を効率的かつ現実的に統治するための行政基盤。", type: "buff_attr", target: "STRATEGY", value: 0.2 },
  { id: 147, name: "カピチュレーションの特許状", desc: "1569年にオスマン帝国がフランスに対して正式に付与した、領内での居住や通商の自由、治外法権などを認めた恩恵的な特権条約。のちに帝国が衰退すると、列強による経済的搾取や内政干渉の法的な口実へと変質した。", type: "debuff_all", value: 0.15 },
  { id: 148, name: "ペルシア絨毯", desc: "アッバース1世の時代に国営工房などで生産が奨励され、極めて精緻な芸術品へと昇華した絹や羊毛の絨毯。「世界の半分」と称された首都イスファハーンの経済的繁栄と、イラン・イスラーム文化の爛熟を象徴する輸出特産品。", type: "buff_all", value: 0.15 },
  { id: 149, name: "アクバルの寛容令状", desc: "ムガル帝国の第3代皇帝アクバルが、非イスラーム教徒に対する人頭税（ジズヤ）を廃止し、ヒンドゥー教徒（ラージプート族など）との宥和を図った政策の記録。広大なインドを統合するための柔軟で現実的な統治の知恵。", type: "damage_cut_all", value: 0.15 },
  { id: 150, name: "シク教の黄金寺院の装飾", desc: "16世紀にナーナクがカースト制を否定して創始したシク教の総本山（アムリットサール）の金箔装飾。のちにアウラングゼーブ帝の宗教的迫害に対抗して教徒が武装化し、反ムガル帝国の強力な軍事勢力へと変貌していく拠点。", type: "buff_hp", value: 0.2 },
  { id: 151, name: "ダンテの神曲", desc: "14世紀前半、フィレンツェを追放された詩人ダンテがトスカナ方言で著した大叙事詩。地獄・煉獄・天国を巡る魂の遍歴を描き、中世的な世界観を集大成しつつ、人間の感情を生き生きと描いてイタリア・ルネサンスの先駆となった。", type: "buff_attr", target: "CULTURE", value: 0.2 },
  { id: 152, name: "マキァヴェリの君主論", desc: "16世紀初頭、フィレンツェの外交官が著した政治学の書。国家の維持と発展のためには、宗教や道徳から切り離された冷徹で現実的な権力行使（狐の狡猾さと獅子の勇猛さ）が必要不可欠であると説き、近代政治学の扉を開いた。", type: "buff_attr", target: "STRATEGY", value: 0.3 },
  { id: 153, name: "コペルニクスの天球回転論", desc: "16世紀のポーランドの天文学者が死の直前に出版した著作。プトレマイオス以来の天動説を根底から覆し、地球が太陽の周りを回っているとする「地動説」を数学的に提唱。科学革命の巨大なパラダイムシフトを引き起こした。", type: "buff_all", value: 0.2 },
  { id: 154, name: "エラスムスの愚神礼賛", desc: "16世紀最大の人文主義者とされるオランダの思想家の風刺文学。擬人化された「愚神」の口を借りて、腐敗したカトリック教会の免罪符販売や聖職者の偽善を痛烈に批判し、ルターの宗教改革に決定的な思想的土壌を提供した。", type: "debuff_all", value: 0.25 },
  { id: 155, name: "エンリケ航海王子の海図", desc: "15世紀前半、ポルトガルの海外進出の基礎を築いた王子がサグレスの研究所に集めさせた最新の地理情報と航海技術の結晶。未知のアフリカ西海岸探検を推進し、やがて来る大航海時代と世界の一体化の扉を開く原動力となった。", type: "buff_pos", pos: 1, value: 0.3 },
  { id: 156, name: "ヴァスコ・ダ・ガマの香辛料袋", desc: "1498年、喜望峰を回ってインドのカリカットに到達したポルトガルの艦隊が持ち帰ったコショウなどの香料。地中海を経由しない直接のインド航路の開拓は、ヴェネツィアなどの独占を打破し、ヨーロッパの商業革命を引き起こした。", type: "buff_all", value: 0.2 },
  { id: 157, name: "コロンブスの航海日誌", desc: "1492年、スペイン女王イサベルの援助で大西洋を西進し、サンサルバドル島に到達したジェノヴァ人の記録。本人は死ぬまでアジア（インディアス）だと信じていたが、この航海がアメリカ大陸の悲惨な植民地化の幕開けとなった。", type: "buff_pos", pos: 2, value: 0.25 },
  { id: 158, name: "マゼランの世界周航船の帆布", desc: "1519年に出発し、太平洋を横断したスペインの艦隊（ヴィクトリア号）の帆。マゼラン本人はフィリピンのラプ＝ラプとの戦いで戦死したが、部下が1522年に帰還し、地球が球体であることを人類史上初めて実証した。", type: "damage_cut_all", value: 0.15 },
  { id: 159, name: "ポトシ銀山の銀塊", desc: "1545年に現在のボリビアで発見されたアメリカ大陸最大の銀山から採掘された銀。先住民の過酷な強制労働（ミタ制）によって掘り出された大量の銀はヨーロッパに「価格革命」を引き起こし、世界経済を根底から変容させた。", type: "buff_hp", value: 0.25 },
  { id: 160, name: "アシエント（奴隷供給契約）文書", desc: "スペイン政府が外国商人などと結んだ、アメリカ大陸の植民地へ黒人奴隷を独占的に供給する請負契約書。伝染病で激減したインディオに代わる労働力として、大西洋三角貿易という非人道的な搾取システムを制度化した。", type: "debuff_all", value: 0.2 },
  { id: 161, name: "ルターの九十五カ条の論題", desc: "1517年、ヴィッテンベルク大学の神学教授ルターが教会の扉に掲げたとされる、教皇レオ10世による贖宥状（免罪符）販売への抗議文。魂の救済は信仰のみによると主張し、ヨーロッパを二分する宗教改革の巨大な爆心地となった。", type: "buff_attr", target: "CULTURE", value: 0.35 },
  { id: 162, name: "カルヴァンのキリスト教綱要", desc: "1536年、フランス出身の神学者がバーゼルで出版した宗教改革の理論的集大成。「予定説」を唱え、禁欲的な職業労働による蓄財を神の栄光と肯定したことで、新興の商工業者（ブルジョワジー）の絶大な支持を集めた。", type: "buff_attr", target: "STRATEGY", value: 0.25 },
  { id: 163, name: "ヘンリ8世の首長法宣言書", desc: "1534年、スペイン王女との離婚問題からローマ教皇と対立したイギリス国王が発布した法律。国王をイギリス国内の教会の「唯一最高の首長」と定め、修道院の財産を没収して、絶対王政を支えるイギリス国教会を創設した。", type: "buff_attr", target: "STRATEGY", value: 0.2 },
  { id: 164, name: "イエズス会のロザリオ", desc: "1534年にイグナティウス＝ロヨラらが創設したカトリック改革の尖兵である修道会の祈りの道具。教皇への絶対服従と軍隊的な厳格な規律を持ち、プロテスタントの拡大を防ぐとともに、アジアや中南米への積極的な海外布教を展開した。", type: "heal_round", value: 0.08 },
  { id: 165, name: "アウクスブルクの和議の文書", desc: "1555年、神聖ローマ皇帝カール5世と諸侯の間で結ばれた宗教和議。ルター派の信仰を公認したが、「個人の信仰の自由」ではなく「諸侯が自領の宗教を決定する権利（領邦教会制）」を認めたものであり、ドイツの分裂を固定化した。", type: "damage_cut_all", value: 0.1 },
  { id: 166, name: "エリザベス1世の私掠船許可証", desc: "イギリスの「処女王」がドレークなどの海賊（私掠船）に与えた、敵国スペインの船を公然と略奪する許可証。重商主義政策の一環として国庫を潤し、のちのアルマダ海戦での勝利とイギリスの海洋覇権への布石となった。", type: "buff_attr", target: "VALOR", value: 0.25 },
  { id: 167, name: "オランダ東インド会社の株券", desc: "1602年に複数の貿易会社を統合して設立された、世界初の株式会社の証券。強力な特権と軍事力を行使してアジアの香辛料貿易を独占し、17世紀前半のヨーロッパ経済の中心をアムステルダムへと押し上げる原動力となった。", type: "buff_all", value: 0.2 },
  { id: 168, name: "ナントの王令の布告文", desc: "1598年、フランスのブルボン朝初代国王アンリ4世が発布した王令。自身がカトリックに改宗する一方で、プロテスタント（ユグノー）に大幅な信仰の自由と政治的権利を認め、数十年続いた凄惨なユグノー戦争を終結させた。", type: "heal_round", value: 0.08 },
  { id: 169, name: "三十年戦争の傭兵のパイク", desc: "1618年にボヘミアの反乱から始まった、ドイツを舞台とする最後にして最大の宗教戦争で使われた長槍。ヴァレンシュタインらが率いる傭兵部隊による無秩序な略奪と破壊は、ドイツの国土を荒廃させ、人口を激減させた。", type: "debuff_all", value: 0.25 },
  { id: 170, name: "ウェストファリア条約の署名羽ペン", desc: "1648年に締結された三十年戦争の講和条約の署名具。カルヴァン派を公認し、スイス・オランダの独立を承認。さらに神聖ローマ帝国内の各領邦に完全な主権を認めたことで、現代につながる「主権国家体制」をヨーロッパに確立した。", type: "buff_pos", pos: 5, value: 0.4 },
  { id: 171, name: "リシュリューの枢機卿の帽子", desc: "フランス王ルイ13世の冷徹な宰相の権威の象徴。国内では大貴族やユグノーの特権を容赦なく弾圧して絶対王政を固め、対外的にはカトリック国でありながら国益（国家理性）を優先し三十年戦争に新教側で介入して宿敵ハプスブルク家を弱体化させた。", type: "buff_attr", target: "STRATEGY", value: 0.3 },
  { id: 172, name: "コルベールの重商主義の帳簿", desc: "ルイ14世の財務総監として絶対王政の最盛期を支えた政治家の台帳。王立マニュファクチュアを設立して国内産業を保護し、東インド会社を再建して貿易黒字を追求する「重商主義」を徹底し、王の度重なる侵略戦争の莫大な戦費を調達した。", type: "buff_all", value: 0.2 },
  { id: 173, name: "ピューリタンの鉄騎隊の鎧", desc: "イギリスのピューリタン革命において、クロムウェルが熱心な清教徒のジェントリやヨーマンを集めて組織した精鋭騎兵部隊（新型軍）の装備。厳格な規律と狂信的な士気で王党派軍をネイズビーの戦いで完全に粉砕した。", type: "buff_attr", target: "VALOR", value: 0.25 },
  { id: 174, name: "クロムウェルの航海法の文書", desc: "1651年、共和政イギリスの護国卿クロムウェルが発布した重商主義的法令。イギリスとその植民地との貿易から、オランダの中継貿易船を徹底的に排除することを目的とし、結果として３次にわたる英蘭戦争を引き起こした。", type: "buff_attr", target: "STRATEGY", value: 0.2 },
  { id: 175, name: "名誉革命の権利の章典", desc: "1689年、ジェームズ2世を追放して即位したウィリアム3世とメアリ2世が承認した宣言を法制化した文書。国王が議会の同意なしに法を停止したり課税したりすることを禁じ、イギリスにおける「立憲君主制」の基礎を不可逆的に確立した。", type: "damage_cut_all", value: 0.15 },
  { id: 176, name: "ウォルポールの責任内閣制の議事録", desc: "18世紀前半、ドイツから来た英語を解さないジョージ1世のもとで、ホイッグ党のウォルポールが初代首相として確立した政治慣行の記録。内閣が国王ではなく議会（下院の多数派）に対して責任を負う「王は君臨すれども統治せず」の原則を決定づけた。", type: "buff_pos", pos: 3, value: 0.3 },
  { id: 177, name: "ユンカーの領地台帳", desc: "プロイセンなど東ヨーロッパの絶対王政を支えた保守的な地主貴族（ユンカー）の財産記録。彼らは農場領主制（グーツヘルシャフト）によって農奴を強力に支配し穀物を輸出する一方、国家の高級官僚や軍の将校を独占して軍国主義の骨格を成した。", type: "buff_hp", value: 0.2 },
  { id: 178, name: "プロイセンの兵隊王の軍服", desc: "プロイセンの第2代国王フリードリヒ・ヴィルヘルム1世の象徴。国家予算の大半を常備軍の育成に注ぎ込み、「巨人軍」と呼ばれる長身の兵士を集め、極端な軍国主義的官僚国家を作り上げ、次代のフリードリヒ2世（大王）の飛躍の完璧な土台を用意した。", type: "buff_attr", target: "VALOR", value: 0.25 },
  { id: 179, name: "マリア・テレジアの王冠", desc: "1740年にハプスブルク家領を継承したオーストリア女帝の権威。プロイセンのフリードリヒ2世によるシュレジエン奪取（オーストリア継承戦争）という国難に直面しながらも、多民族国家の分裂を防ぎ、近代的な行政・軍事改革を強力に推し進めた。", type: "heal_round", value: 0.1 },
  { id: 180, name: "フリードリヒ2世のフルート", desc: "プロイセンの啓蒙専制君主がサンスーシ宮殿で愛奏した楽器。「君主は国家の第一の下僕」と自称し、ヴォルテールらと親交を結んで宗教的寛容や産業育成に努める一方で、軍事的には極めて冷徹な侵略戦争（七年戦争など）を実行した多面性を示す。", type: "buff_all", value: 0.2 },
  { id: 181, name: "ニュートンのプリンキピア", desc: "1687年に出版された『自然哲学の数学的原理』。万有引力の法則と運動の三法則を提唱し、天体の運行から地上の物体の落下までを同一の簡明な数式で見事に説明した。17世紀の科学革命を完成させ、近代物理学の絶対的な基盤となった。", type: "buff_all", value: 0.2 },
  { id: 182, name: "ガリレオの望遠鏡", desc: "17世紀初頭、イタリアの天才科学者が自作し夜空に向けた観測器具。木星の衛星や月のクレーターを発見し、コペルニクスの地動説が真実であることを実証した。しかし宗教裁判にかけられ、教会の権威によって自説の放棄を強要される悲劇を生んだ。", type: "buff_attr", target: "CULTURE", value: 0.25 },
  { id: 183, name: "ロックの統治二論", desc: "1690年、イギリスの経験論哲学者が名誉革命を正当化するために著した政治学の書。人間が生まれながらに持つ自然権（生命・自由・財産）を保障するために社会契約で政府が作られたとし、政府がこれに違反すれば人民には「抵抗権（革命権）」があると説いた。", type: "buff_attr", target: "STRATEGY", value: 0.3 },
  { id: 184, name: "ホッブズのリヴァイアサン", desc: "ピューリタン革命期のイギリスの思想家が著した政治書。自然状態を「万人の万人に対する闘い」と規定し、その混沌を避けるために人々は自然権を単一の主権者（怪物リヴァイアサン＝国家）に完全に譲渡する契約を結ぶべきだとして、絶対王政を擁護した。", type: "debuff_all", value: 0.25 },
  { id: 185, name: "ディドロの百科全書", desc: "18世紀フランスの啓蒙思想家ディドロとダランベールが、当代の最先端の科学・技術・哲学の知識を集大成して編集した巨大な事典。理性に基づく社会の進歩を信じ、カトリック教会の権威や絶対王政の不合理を批判して、フランス革命への思想的導火線となった。", type: "buff_all", value: 0.2 },
  { id: 186, name: "モンテスキューの法の精神", desc: "1748年、フランスの啓蒙思想家がイギリスの議会政治を研究して著した書物。権力の暴走を防ぎ個人の自由を守るためには、国家権力を立法・行政・司法の三つに分割し、相互に抑制と均衡（チェック・アンド・バランス）を保たせる「三権分立」が不可欠だと主張した。", type: "damage_cut_all", value: 0.15 },
  { id: 187, name: "ルソーの社会契約論", desc: "1762年、フランスの思想家ルソーが「自然に帰れ」という文明批判を背景に著した書物。主権は分割も譲渡もできない「人民」全体にあり、国家は人民の一般意志（公共の利益を目指す普遍的な意志）に基づく契約によってのみ成立すると説き、フランス革命を熱狂的に指導した。", type: "buff_attr", target: "STRATEGY", value: 0.35 },
  { id: 188, name: "アダム・スミスの国富論", desc: "1776年、イギリスの道徳哲学者が著した古典派経済学の聖典（諸国民の富）。富の源泉を労働に求め、重商主義による国家の経済統制を痛烈に批判。個人の利己的な利益追求が「見えざる手」に導かれて結果的に社会全体の富を増大させるとし、自由放任（レッセ・フェール）を提唱した。", type: "buff_all", value: 0.2 },
  { id: 189, name: "レンブラントの油絵具", desc: "17世紀オランダの黄金時代を代表する画家の画材。市民階級の台頭を背景に、「夜警」などの集団肖像画において、劇的な明暗法（キアロスクーロ）と豊かな色彩を用いて人々の内面的な心理や宗教的な深みを驚異的な写実性で描き出した。", type: "buff_attr", target: "CULTURE", value: 0.2 },
  { id: 190, name: "バッハの楽譜", desc: "18世紀ドイツで活躍した「音楽の父」が残した、マタイ受難曲やブランデンブルク協奏曲などの極めて精緻な対位法で構築されたバロック音楽の傑作群。彼の完成させた荘厳な和声と音楽的論理は、のちの西洋近代音楽すべての基礎にして頂点となった。", type: "buff_pos", pos: 4, value: 0.3 },
  { id: 191, name: "李自成の反乱軍の旗", desc: "1644年、飢饉と重税にあえぐ農民を率いて北京を陥落させ、明王朝を滅亡に追いやった反乱指導者の旗印。しかし呉三桂の裏切りによって山海関を越えてきた清の八旗軍にあっけなく敗れ、中国支配の野望は潰えた。", type: "debuff_all", value: 0.2 },
  { id: 192, name: "八旗の鎧", desc: "ヌルハチが創設した、満洲族独自の軍事・行政・社会を一体化した強固な組織「八旗」の兵士の装備。のちにモンゴル八旗、漢軍八旗も加えられ、圧倒的な機動力と団結力で広大な中国大陸と周辺の藩部を征服する清朝の最強の武力基盤となった。", type: "buff_attr", target: "VALOR", value: 0.25 },
  { id: 193, name: "康熙字典", desc: "清の第4代皇帝・康熙帝の勅命によって編纂された、約4万7千字を部首と画数で分類した巨大な漢字字典。優れた漢文化の保護者としての皇帝の威厳を示すとともに、漢人知識人（士大夫）を体制内に懐柔・統合するための大規模な文化事業の象徴。", type: "buff_attr", target: "CULTURE", value: 0.2 },
  { id: 194, name: "雍正帝の軍機処の密書", desc: "清の第5代皇帝・雍正帝が、ジュンガル部討伐を機に設置した軍事機密機関「軍機処」の指令書。少数の軍機大臣が皇帝の意を直接受けて迅速に処理にあたることで、内閣にかわって国政の最高決定機関となり、皇帝の絶対的な専制独裁体制を究極まで強化した。", type: "buff_attr", target: "STRATEGY", value: 0.3 },
  { id: 195, name: "乾隆帝の四庫全書", desc: "清の全盛期を統治した第6代皇帝・乾隆帝の命で、古今の重要な書物を経・史・子・集の四部に分類・網羅した中国史上最大の叢書。文化の集大成であると同時に、編纂の過程で反清的な思想を含む書物を徹底的に検閲し焚書にする思想統制（文字の獄）の巨大な装置でもあった。", type: "debuff_all", value: 0.25 },
  { id: 196, name: "ネルチンスク条約のラテン語文書", desc: "1689年、康熙帝とロシアのピョートル1世との間で結ばれた、アルグン川と外興安嶺（スタノヴォイ山脈）を境界とする国境画定条約。イエズス会宣教師の仲介により、中国王朝がヨーロッパの主権国家と対等な形式で結んだ史上初めての国際条約。", type: "damage_cut_all", value: 0.15 },
  { id: 197, name: "考証学の文献", desc: "明末清初の顧炎武や黄宗羲らに始まり、清代に全盛を迎えた儒学の新しい研究スタイルの産物。朱子学の空理空論を批判し、確実な古文献の客観的・実証的な考証に基づく厳密な学問を追求したが、同時に清朝の厳しい思想統制から逃れるための現実逃避的な側面も持っていた。", type: "buff_pos", pos: 5, value: 0.35 },
  { id: 198, name: "紅楼夢の原稿", desc: "清代に曹雪芹が著した中国古典小説の最高傑作。没落していく名門貴族・賈家の栄枯盛衰を背景に、主人公の賈宝玉と林黛玉らの繊細で悲劇的な恋愛模様を、極めて豊かな人物描写と日常のディテールで描き出し、封建社会の矛盾と虚無感を見事に表現した。", type: "heal_round", value: 0.05 },
  { id: 199, name: "マテオ・リッチの坤輿万国全図", desc: "明代末期にやってきたイタリアのイエズス会宣教師が、知識人・徐光啓らの協力を得て作成した漢訳の世界地図。中国を世界の中心とする伝統的な「中華思想」の世界観に巨大な衝撃を与え、最新の西洋地理学の正確な知識を東アジアにもたらした。", type: "buff_all", value: 0.2 },
  { id: 200, name: "アダム・シャールの崇禎暦書", desc: "明末から清初にかけて活躍したドイツ出身のイエズス会宣教師（湯若望）が、徐光啓らと共に西洋天文学を取り入れて編纂した暦法書。王朝の正統性を示す重要な事業である改暦において、日食や月食を極めて正確に予測する西洋科学の優位性を証明し、清の「時憲暦」として採用された。", type: "buff_attr", target: "CULTURE", value: 0.25 },
  { id: 201, name: "マカオのポルトガル商館の鍵", desc: "1557年、明から居住権を獲得したポルトガル人が広州南方の半島に築いた東アジア交易の拠点の象徴。日本の銀、中国の生糸などを結ぶ中継貿易で莫大な利益を上げ、のちに清の海禁政策が緩和されるまでヨーロッパ勢力の中国進出の唯一の窓口であった。", type: "buff_all", value: 0.15 },
  { id: 202, name: "広州の公行の印鑑", desc: "1757年の乾隆帝の勅令により、ヨーロッパとの海上交易が広州1港に限定された清代において、対外貿易の独占と外国人管理を政府から委任された特権商人組合（公行）の認可印。西洋側（特にイギリス）の自由貿易への要求と激しく対立し、のちのアヘン戦争の火種となった。", type: "buff_attr", target: "STRATEGY", value: 0.2 },
  { id: 203, name: "茶と交換されたアヘンパイプ", desc: "18世紀末以降、中国の茶の大量輸入による貿易赤字に悩むイギリスが、インドで栽培させた麻薬（アヘン）を中国に密輸して銀を回収する「三角貿易」で使用された喫煙具。清の社会を深刻な健康被害と経済的破綻に追い込み、近代のアジア侵略の象徴となった。", type: "debuff_all", value: 0.25 },
  { id: 204, name: "朝鮮通信使の行列図", desc: "豊臣秀吉の朝鮮侵略で断絶した国交を、江戸幕府が修復したのち、将軍の代替わりなどの際に朝鮮王朝から日本へ派遣された外交使節団の記録絵巻。対等な外交関係（交隣）のもと、儒学や漢詩文、医学などの文化交流を深め、両国の平和を約200年間維持した。", type: "heal_round", value: 0.05 },
  { id: 205, name: "両班の笠（カッ）", desc: "高麗から朝鮮王朝にかけて特権的な支配階級を形成した、文班・武班の官僚や郷村の地主層（両班）が被った黒い帽子。科挙による官職の独占や免税特権を享受したが、朱子学の解釈や名分論をめぐる激しい党争（派閥争い）を繰り返し、国政の停滞を招く一因ともなった。", type: "buff_attr", target: "STRATEGY", value: 0.15 },
  { id: 206, name: "ハングルの訓民正音", desc: "15世紀半ば、朝鮮王朝第4代の世宗が、民衆が容易に読み書きできるように学者に命じて創製させた独自の表音文字の解説書。「偉大なる文字」を意味し、漢字の知識を独占する両班の反発を受けながらも、民族固有の文化発展の極めて重要な基盤となった。", type: "buff_attr", target: "CULTURE", value: 0.25 },
  { id: 207, name: "亀甲船の模型", desc: "豊臣秀吉の朝鮮侵略（文禄・慶長の役）に際して、朝鮮水軍の名将・李舜臣が改良・考案したとされる、甲板を鉄板と無数の棘で覆った特殊な軍船の模型。日本水軍の得意とする接舷斬り込み戦法を完全に無効化し、補給路を断ち切って祖国の危機を救った救国の象徴。", type: "damage_cut_all", value: 0.15 },
  { id: 208, name: "ムガル絵画の筆", desc: "アクバルからシャー・ジャハーンの時代にインドで大輪の花を咲かせた、ペルシアの精緻な細密画（ミニアチュール）とインドの伝統的・写実的な表現が見事に融合した宮廷絵画の画材。皇帝の肖像や宮廷行事、花鳥などを極めて鮮やかな色彩で記録した。", type: "buff_attr", target: "CULTURE", value: 0.2 },
  { id: 209, name: "アウラングゼーブのジズヤ徴収簿", desc: "ムガル帝国最大の領土を実現した第6代皇帝が、厳格なスンナ派の信仰からヒンドゥー教徒などの異教徒に対して復活させた人頭税（ジズヤ）の記録。アクバル以来の宗教的寛容策を放棄したこの政策は、ラージプートやマラーターなどの激しい反乱を招き、帝国の衰退を決定づけた。", type: "debuff_all", value: 0.2 },
  { id: 210, name: "マラーター王国の騎兵の剣", desc: "17世紀後半、ヒンドゥー教の指導者シヴァージーがデカン高原でアウラングゼーブの迫害に対抗して建国した王国の武具。強力な軽騎兵による機動戦を得意とし、のちに宰相を中心にマラーター同盟を結成して、ムガル帝国に代わってインドの覇権を握りイギリスの最大の壁となった。", type: "buff_pos", pos: 1, value: 0.3 },
  { id: 211, name: "ボストン茶会事件の紅茶箱", desc: "1773年、イギリス本国が制定した茶法（東インド会社への独占販売権付与）に激怒した「自由の子ら」などの急進派植民地人が、インディアンに扮してボストン港に停泊する船から海に投げ捨てた茶。アメリカ独立戦争への引き金となった決定的な反逆の象徴。", type: "buff_pos", pos: 1, value: 0.35 },
  { id: 212, name: "トマス・ペインのコモン・センス", desc: "1776年1月にイギリス生まれの文筆家がアメリカで出版し、50万部の大ベストセラーとなったパンフレット。イギリス国王（ジョージ3世）の専制を痛烈に批判し、共和国としての独立が理にかなった「常識（コモン・センス）」であると平易な言葉で訴え、独立への世論を一気に形成した。", type: "buff_all", value: 0.2 },
  { id: 213, name: "ワシントンの大陸軍の指揮棒", desc: "アメリカ独立戦争において、各地の民兵の寄せ集めにすぎなかった植民地軍（大陸軍）の総司令官として、圧倒的な統率力と忍耐力で軍をまとめ上げたジョージ・ワシントンの権威。フランスの参戦を引き出し、ヨークタウンでの最終的な大勝利へと導いた。", type: "buff_attr", target: "VALOR", value: 0.3 },
  { id: 214, name: "アメリカ合衆国憲法の原本", desc: "1787年にフィラデルフィア憲法制定会議で採択された、世界初の近代的な成文憲法。モンテスキューの思想に基づく厳格な三権分立（大統領・連邦議会・最高裁判所）と、中央政府の権限を強化しつつ各州の自治を認める連邦主義を規定し、現代まで続くアメリカ政治の骨格を創り上げた。", type: "damage_cut_all", value: 0.1 },
  { id: 215, name: "バスティーユ牢獄の鍵", desc: "1789年7月14日、国王ルイ16世の軍隊集結に怒ったパリ市民が、政治犯が収容されている絶対王政の象徴を襲撃・陥落させた際の鍵。この事件は全国の農村での「大恐怖」を引き起こし、旧体制（アンシャン・レジーム）を打ち破るフランス革命の激動の幕開けとなった。", type: "buff_pos", pos: 2, value: 0.3 },
  { id: 216, name: "人権宣言の石版", desc: "1789年8月26日にフランスの国民議会が採択した、ラ・ファイエットらが起草した宣言の記念碑。人間の自由・平等、人民主権、言論の自由、所有権の神聖不可侵など、近代ブルジョワ社会の普遍的な原理を高らかに謳い上げ、世界の民主主義の絶対的な金字塔となった。", type: "buff_attr", target: "STRATEGY", value: 0.25 },
  { id: 217, name: "ロベスピエールの恐怖政治のギロチン", desc: "フランス革命の急進化の中、ジャコバン派（山岳派）の独裁を主導したロベスピエールが、反対派や王妃マリー・アントワネット、さらには盟友ダントンまでも次々と処刑した断頭台。革命の純粋な理想と引き換えに血で血を洗う粛清の恐怖をフランス全土に植え付けた。", type: "debuff_all", value: 0.25 },
  { id: 218, name: "ナポレオン法典", desc: "1804年、第一統領ナポレオンが制定させた画期的なフランス民法典。「法の前の平等」「個人の自由」「私有財産の不可侵」といったフランス革命の成果を法的・体系的に確定したもので、ナポレオン軍の征服に伴ってヨーロッパ中に伝播し、近代市民法の世界的模範となった。", type: "buff_attr", target: "STRATEGY", value: 0.3 },
  { id: 219, name: "ロゼッタ・ストーンの拓本", desc: "1799年、ナポレオンのエジプト遠征の際に発見された黒玄武岩の石碑の写し。神聖文字（ヒエログリフ）、民衆文字、ギリシア文字の3種が刻まれており、フランスのシャンポリオンによる古代エジプト文字の完全解読という歴史的快挙をもたらし、エジプト学を誕生させた。", type: "buff_attr", target: "CULTURE", value: 0.25 },
  { id: 220, name: "大陸封鎖令の文書", desc: "1806年、トラファルガーの海戦で敗れてイギリス本土上陸を諦めたナポレオンが、ベルリンで発布した勅令。ヨーロッパ大陸諸国に対し、イギリスとの一切の貿易を禁じることで経済的な打撃を与えようとしたが、逆に大陸諸国の経済的困窮と猛反発を招き、自滅（ロシア遠征）への道となった。", type: "debuff_all", value: 0.2 },
  { id: 221, name: "ウィーン会議の舞踏会の仮面", desc: "ナポレオン没落後の1814年から、オーストリア外相メッテルニヒの主導で開かれた国際会議の社交界を象徴する品。「会議は踊る、されど進まず」と揶揄されたように、列強の君主たちがフランス革命以前の「正統主義」と「勢力均衡」に基づく反動的な国境線の引き直しに暗躍した。", type: "buff_pos", pos: 3, value: 0.3 },
  { id: 222, name: "トゥサン・ルヴェルチュールの剣", desc: "フランス領サン・ドマング（ハイチ）で発生した黒人奴隷の反乱を指導し、「黒いジャコバン」と呼ばれた英雄の武器。ナポレオンの軍隊に捕らえられ獄死したが、彼の戦いは1804年のラテンアメリカ初の独立国家（世界初の黒人共和国）誕生へと結実した。", type: "buff_attr", target: "VALOR", value: 0.25 },
  { id: 223, name: "ワットの蒸気機関のピストン", desc: "18世紀後半、イギリスの発明家ジェームズ・ワットがニューコメンの機関を劇的に改良し、動力を回転運動に変えることに成功した機械の心臓部。水力や風力といった自然の制約から生産を完全に解放し、あらゆる工場や交通機関の動力源となって産業革命を決定づけた。", type: "buff_all", value: 0.2 },
  { id: 224, name: "飛び杼（ジョン・ケイ）", desc: "1733年、イギリスのジョン・ケイが発明した、機織りの際に横糸を素早く通すための画期的な装置。織布のスピードが劇的に向上した結果、糸が決定的に不足するようになり、ハーグリーヴズやアークライトらによる次々と連鎖する紡績機械の巨大な発明競争を引き起こした。", type: "buff_attr", target: "CULTURE", value: 0.2 },
  { id: 225, name: "スティーヴンソンの車輪", desc: "1814年に蒸気機関車を実用化し、1825年にロコモーション号で世界初の営業運転を成功させたイギリスの技術者の発明品。大量の石炭や綿製品、そして人々を驚異的な速度で内陸まで運ぶことを可能にし、交通革命によって資本主義経済の血脈を作り上げた。", type: "buff_all", value: 0.2 },
  { id: 226, name: "チャーティスト運動の人民憲章", desc: "1830年代後半から、第1回選挙法改正で選挙権を得られなかったイギリスの都市労働者（プロレタリアート）が掲げた、男性普通選挙や秘密投票など6カ条からなる請願書。議会には拒否されたが、労働者階級が政治的権利を求めて団結した世界初の巨大な大衆運動の記録。", type: "buff_attr", target: "STRATEGY", value: 0.2 },
  { id: 227, name: "アヘン戦争のイギリス軍艦の砲弾", desc: "1840年、アヘンの密輸取締り（林則徐の没収）を口実に、自由貿易の拡大を求めて清へ侵攻したイギリスの近代的な蒸気軍艦ノーメシス号などが放った砲弾。圧倒的な軍事力で清のジャンク船を粉砕し、中華帝国の「眠り」を暴力的に覚ました帝国主義の鉄槌。", type: "damage_cut_all", value: 0.1 },
  { id: 228, name: "南京条約の文書", desc: "1842年、アヘン戦争で敗北した清がイギリスと結ばされた、中国史上最初の不平等条約。香港島の割譲、広州・上海など5港の開港、公行（特権商人）の廃止、さらには追加条約による領事裁判権や関税自主権の喪失を認めさせられ、中国の半植民地化の決定的な第一歩となった。", type: "debuff_all", value: 0.25 },
  { id: 229, name: "太平天国の天朝田畝制度の布告", desc: "1851年に洪秀全が上帝会を率いて蜂起して建てた「太平天国」が発布した理想社会の青写真。男女平等の徹底、纏足の禁止、そして土地を均分して共有財産とする極めて画期的な原始共産制的な制度を掲げ、清朝の腐敗と重税に苦しむ数千万の農民の心を掴んだ。", type: "heal_round", value: 0.1 },
  { id: 230, name: "洋務運動の造船図面", desc: "アロー戦争と太平天国の乱という未曾有の危機（内憂外患）を乗り越えた清朝の漢人官僚（曽国藩や李鴻章ら）が、「中体西用」のスローガンのもとに進めた上からの近代化運動の記録。富国強兵を目指して西洋式の兵器工場や造船所を建設したが、制度の根本改革には至らなかった。", type: "buff_attr", target: "STRATEGY", value: 0.15 },
  { id: 231, name: "クリミア戦争のナイチンゲールのランプ", desc: "1853年からのクリミア戦争において、劣悪な環境にあった野戦病院（スクタリ）で負傷兵の看護に献身的に尽くしたイギリスの看護師の灯り。近代的な看護制度の確立と病院の衛生改革をもたらし、赤十字創設など人道主義的な活動の偉大な先駆となった。", type: "heal_round", value: 0.05 },
  { id: 232, name: "ロシアの農奴解放令の勅書", desc: "クリミア戦争での敗北により後進性を痛感したロシア皇帝アレクサンドル2世が、1861年に発布した「上からの近代化」の象徴。農奴に人格的な自由を認めたが、土地の分与には多額の買い戻し金が必要であり、農民はミール（農村共同体）に縛り付けられる不完全な改革であった。", type: "buff_attr", target: "STRATEGY", value: 0.2 },
  { id: 233, name: "リンカンの奴隷解放宣言", desc: "1863年、南北戦争の最中にアメリカ大統領リンカンが発布した、南部反乱地域の黒人奴隷の即時解放を命じる宣言。北部の戦争目的を「連邦の維持」から「人類の自由の防衛」へと大義名分化し、内外の世論を味方につけて国内外の外交戦と軍事戦を決定的に有利に導いた。", type: "buff_all", value: 0.2 },
  { id: 234, name: "アメリカ大陸横断鉄道の黄金の犬釘", desc: "1869年、ユタ州で東西から敷設された線路が結合した際に打ち込まれた最後の釘。中国人（クーリー）やアイルランド系移民の過酷な労働によって完成し、広大な西部（フロンティア）と東部の工業地帯を血脈のように結びつけ、アメリカの爆発的な経済発展と国民統合を完成させた。", type: "buff_pos", pos: 5, value: 0.35 },
  { id: 235, name: "ビスマルクの鉄と血の演説草稿", desc: "1862年、プロイセンの首相に就任したビスマルクが議会で行った軍備拡張を強行する演説。「ドイツの大問題は言論や多数決ではなく、鉄（兵器）と血（兵士）によってのみ解決される」と宣言し、冷徹な現実主義（リアルポリティクス）によるドイツ統一戦争への決意を示した。", type: "buff_attr", target: "VALOR", value: 0.3 },
  { id: 236, name: "イタリア赤シャツ隊の軍服", desc: "1860年、イタリア統一運動の英雄ガリバルディが率いた千人隊のトレードマーク。シチリアから南イタリアのブルボン家を情熱的な軍事行動で打倒し、征服した広大な領土を無条件でサルデーニャ王ヴィットーリオ・エマヌエーレ2世に献上して、イタリア王国の成立を決定づけた。", type: "buff_pos", pos: 1, value: 0.3 },
  { id: 237, name: "シベリア鉄道のレール", desc: "1891年、ロシア帝国の蔵相ウィッテの推進のもと、フランス資本を導入して建設が開始された世界最長の鉄道の鋼鉄。極東のウラジオストクに至る広大な帝国を連結し、ロシアのアジアへの帝国主義的南下政策（満州や朝鮮への野心）を物理的に強力に後押しした。", type: "buff_attr", target: "STRATEGY", value: 0.2 },
  { id: 238, name: "第1インターナショナルの労働組合旗", desc: "1864年、ロンドンでマルクスらを中心に結成された世界初の国際的な労働者組織のシンボル。各国の労働運動の連帯と社会主義の実現を目指したが、国家の権威を巡るマルクス主義者とバクーニンら無政府主義者（アナーキスト）の激しい路線対立によって解散に追い込まれた。", type: "debuff_all", value: 0.2 },
  { id: 239, name: "マルクスの資本論の初版本", desc: "1867年に第1巻が出版された、カール・マルクスによる資本主義経済の徹底的な解剖書。剰余価値の搾取による階級闘争の必然性と、資本主義の崩壊・社会主義への歴史的移行（唯物史観）を科学的・論理的に解明し、世界の歴史を動かす最大の思想的武器となった。", type: "buff_attr", target: "CULTURE", value: 0.35 },
  { id: 240, name: "スエズ運河会社の株券", desc: "1869年にフランスのレセップスが開通させた地中海と紅海を結ぶ大動脈の利権証書。1875年、イギリスのディズレーリ首相がエジプト政府からこの株を電撃的に買収して運河の支配権を握り、インド帝国への絶対的な交通路を確保してイギリス帝国主義の頂点を示した。", type: "buff_attr", target: "STRATEGY", value: 0.25 },
  { id: 241, name: "ベルリン・コンゴ会議のアフリカ分割地図", desc: "1884年、ビスマルクの主催で列強が集まり、アフリカの「無主の地」は先占権を認めると定めた会議の地図。現地の民族や文化を完全に無視して地図上に直線を引くような帝国主義的な植民地分割をルール化し、アフリカ大陸の悲劇的な運命を決定づけた。", type: "damage_cut_all", value: 0.1 },
  { id: 242, name: "ボーア戦争のダイヤモンド原石", desc: "19世紀末、南アフリカでオランダ系植民者の子孫（ブール人）が建てた国で発見された莫大な富。イギリスの帝国主義者セシル・ローズがこれを独占しようと暗躍し、結果としてイギリス帝国がブール人の2国を武力でねじ伏せる過酷な南アフリカ戦争の最大の原因となった。", type: "buff_all", value: 0.2 },
  { id: 243, name: "ファショダ事件のフランス軍の旗", desc: "1898年、アフリカ縦断政策を進めるイギリス軍（キッチナー）と、横断政策を進めるフランス軍（マルシャン）がスーダンで対峙した際の旗印。一触即発の危機となったが、ドイツの脅威を警戒したフランスが譲歩して撤退し、のちの英仏協商の劇的な和解へと繋がった。", type: "buff_pos", pos: 3, value: 0.25 },
  { id: 245, name: "ミドハト憲法", desc: "1876年、オスマン帝国の宰相ミドハト・パシャの主導で制定された、アジア初の近代的な成文憲法。タンジマート（恩恵的改革）の総決算として二院制議会や信教の自由を定めたが、露土戦争を口実にスルタンのアブデュルハミト2世によって即座に停止された幻の改革。", type: "buff_attr", target: "STRATEGY", value: 0.25 },
  { id: 246, name: "インド大反乱のシパーヒーの銃", desc: "1857年、イギリス東インド会社に雇われていたインド人傭兵（シパーヒー）が、新型ライフルの薬包に牛や豚の脂が塗られているという噂に激怒して蜂起した際の武器。全インド規模の民族的な対英大反乱へと発展し、結果としてムガル帝国の完全な滅亡とイギリスの直接統治を招いた。", type: "buff_attr", target: "VALOR", value: 0.25 },
  { id: 247, name: "エディソンの白熱電球", desc: "1879年、アメリカの発明王トーマス・エジソンが実用化した、竹のフィラメントを用いた持続可能な電球。第2次産業革命における電力技術の飛躍的な進歩を象徴し、人類の夜の生活と工場の24時間稼働を可能にして、近代社会の風景を劇的かつ根底から塗り替えた。", type: "buff_all", value: 0.2 },
  { id: 248, name: "ダーウィンの種の起源", desc: "1859年、イギリスの自然科学者がビーグル号での航海を経て発表した、生物の進化を「自然選択」によって説明する画期的な科学書。キリスト教の神による創造論に支配されていた当時のヨーロッパ社会の価値観に核爆弾級の巨大な衝撃を与え、生命科学の扉を開いた。", type: "buff_attr", target: "CULTURE", value: 0.3 },
  { id: 249, name: "印象派モネのパレット", desc: "19世紀後半、伝統的なアカデミーの古典的で暗い画風に反発し、チューブ入りの絵の具を持って戸外に出たフランスの画家クロード・モネの道具。「印象・日の出」のように、移ろいゆく光と空気の瞬間の美しさを鮮やかな色彩と分割された筆致で捉え、近代絵画の革命を起こした。", type: "heal_round", value: 0.1 },
  { id: 250, name: "日清戦争の下関条約文書", desc: "1895年、日清戦争で勝利した日本（伊藤博文）と清（李鴻章）の間で結ばれた講和条約。清に朝鮮の独立（従属関係の破棄）を認めさせ、台湾・澎湖諸島と遼東半島を割譲させた。日本の帝国主義的膨張の決定的な第一歩であるとともに、清の眠りを覚ます三国干渉を引き起こした。", type: "debuff_all", value: 0.25 },
  { id: 251, name: "義和団の扶清滅洋の旗", desc: "1900年、中国の山東省で発生した排外的な宗教結社が掲げたスローガン。「清を助け、外国（キリスト教）を滅ぼす」と熱狂して北京の各国公使館を包囲したが、8カ国連合軍に惨敗。結果として巨額の賠償金と外国軍の北京駐留を認める辛丑和約（北京議定書）を結ばされた。", type: "buff_pos", pos: 1, value: 0.3 },
  { id: 252, name: "日露戦争のバルチック艦隊の羅針盤", desc: "1905年、ロシアがヨーロッパから地球を半周させて極東に派遣した無敵の巨大艦隊の計器。日本海海戦において、東郷平八郎率いる日本の連合艦隊の丁字戦法により完全に撃滅され、非白人国家による大国ロシアの打倒という、アジア・アフリカ諸民族に衝撃と希望を与えた。", type: "buff_attr", target: "VALOR", value: 0.3 },
  { id: 253, name: "三民主義のパンフレット", desc: "1905年に孫文が東京で中国同盟会を結成した際に機関紙『民報』で発表した、中国革命の根本となる三大指導理念。満洲族の打倒（民族）、共和国の樹立（民権）、土地の平均化（民生）を掲げ、のちの辛亥革命を牽引する絶対的な思想的支柱となった。", type: "buff_attr", target: "STRATEGY", value: 0.25 },
  { id: 254, name: "辛亥革命の武昌起義の弾薬", desc: "1911年10月10日、清朝が強行した幹線鉄道の国有化に激しく反発した四川の暴動をきっかけに、湖北省の武昌で近代化された新軍の兵士たちがついに武装蜂起した際の弾薬。この一発の銃弾が清朝の崩壊を決定づけ、アジア初の共和国である中華民国の誕生をもたらした。", type: "damage_cut_all", value: 0.15 },
  { id: 255, name: "第一次世界大戦の防毒マスク", desc: "1914年から始まった未曾有の総力戦において、塹壕戦の膠着状態を打破するためにドイツ軍などが使用した毒ガスから兵士の命を守るための装備。戦車や飛行機、潜水艦とともに投入された大量破壊兵器の恐怖は、近代科学技術の悪魔的な側面を人類に突きつけた。", type: "debuff_all", value: 0.2 },
  { id: 256, name: "ソンムの戦いの戦車のキャタピラ", desc: "1916年、西部戦線での最大の消耗戦において、イギリス軍が塹壕と鉄条網、機関銃の防衛線を強行突破するために人類史上初めて戦場に投入した秘密兵器（タンク）の部品。初期のものは鈍重で故障が多かったが、その後の戦争の形を機動戦へと根本から変える兵器となった。", type: "buff_attr", target: "VALOR", value: 0.25 },
  { id: 257, name: "レーニンの四月テーゼの草稿", desc: "1917年、二月革命後のロシアにスイスから帰国したボリシェヴィキの指導者が発表した、「すべての権力をソヴィエトへ」を掲げる革命の行動指針。臨時政府との妥協を一切拒否し、プロレタリアートによる社会主義革命（十月革命）への強行突破を宣言した歴史的文書。", type: "buff_pos", pos: 2, value: 0.35 },
  { id: 258, name: "ロシア革命の赤軍の帽子", desc: "1917年の十月革命後、トロツキーが組織し、反革命軍（白軍）や列強の激しい対ソ干渉戦争（シベリア出兵など）を打ち破った、ソヴィエト政権の労働者・農民からなる防衛軍の軍帽。極端な戦時共産主義を支え、のちの強力なソ連軍の基礎となった。", type: "buff_attr", target: "VALOR", value: 0.2 },
  { id: 259, name: "ウィルソンの十四カ条のメモ", desc: "1918年1月、アメリカのウィルソン大統領が発表した、秘密外交の廃止、海洋の自由、民族自決、そして国際平和機構の設立などを掲げた理想主義的な戦後処理の原則。パリ講和会議の基本理念とされたが、実際には戦勝国による過酷な敗戦国への報復（ヴェルサイユ条約）に歪められた。", type: "buff_attr", target: "STRATEGY", value: 0.25 },
  { id: 260, name: "ヴェルサイユ条約の調印ペン", desc: "1919年、パリのヴェルサイユ宮殿「鏡の間」で、ドイツに全植民地の放棄、巨額の賠償金、軍備制限を強制した講和条約の署名具。ドイツ国民に消えない屈辱と復讐心を植え付け、結果的にナチスの台頭と第二次世界大戦の巨大な火種を仕込むこととなった残酷なペンの跡。", type: "debuff_all", value: 0.3 },
  { id: 261, name: "国際連盟のジュネーヴ本部の鍵", desc: "1920年にスイスに設立された、史上初の集団安全保障機構の施設の鍵。ウィルソンの提唱で発足したが、アメリカの上院の反対による不参加、敗戦国ドイツやソ連の初期排除、そして制裁が経済的なものに限定されていたため、侵略行為を止める実力を伴わなかった平和の夢。", type: "heal_round", value: 0.10 },
  { id: 262, name: "塩の行進の塩", desc: "1930年、インド国民会議派のガンディーが、イギリスによる塩の専売法に抗議して海まで歩き、自ら海水を煮詰めて塩を作った非暴力・不服従運動の象徴。イギリスの不当な搾取を全世界に視覚的に訴えかけ、インド独立（プールナ・スワラージ）への巨大なうねりを生み出した。", type: "buff_all", value: 0.2 },
  { id: 263, name: "ローラット法反対デモのビラ", desc: "1919年、第一次大戦で多大な協力を行ったインドに対し、イギリスが自治の約束を裏切って制定した、令状なしの逮捕や投獄を認める弾圧法への抗議のチラシ。アムリットサールでの平和的な集会に対するイギリス軍の大虐殺を引き起こし、インド人の対英感情を完全に絶望させた。", type: "debuff_all", value: 0.2 },
  { id: 264, name: "ワシントン会議の海軍軍縮条約", desc: "1921〜22年、アメリカの提唱で開かれた会議で、米・英・日・仏・伊の主力艦の保有比率（5:5:3:1.67:1.67）を定めた条約の写し。第一次大戦後の建艦競争を一時的に抑え込み、日英同盟の廃棄や中国での九カ国条約とともに、東アジアの新しい国際秩序（ワシントン体制）を形成した。", type: "damage_cut_all", value: 0.15 },
  { id: 265, name: "ケインズの一般理論の書籍", desc: "1936年にイギリスの経済学者が著した『雇用・利子および貨幣の一般理論』。世界恐慌の大量失業に対し、伝統的な自由放任主義を否定し、政府が公共事業などで有効需要を積極的に創出する市場介入（修正資本主義）の必要性を説き、ローズヴェルトのニューディールを理論的に支えた。", type: "buff_attr", target: "STRATEGY", value: 0.3 },
  { id: 266, name: "ウォール街の株価暴落を報じる新聞", desc: "1929年10月24日「暗黒の木曜日」、ニューヨーク株式市場の大暴落を皮切りに、アメリカの未曾有の金融危機が全世界に波及した世界恐慌を伝える紙面。過剰生産と投機のツケは、失業者の群れとファシズムの台頭、そして持てる国によるブロック経済という破滅の連鎖を生み出した。", type: "debuff_all", value: 0.3 },
  { id: 267, name: "ローズヴェルトのTVA建設図面", desc: "1933年に就任したアメリカ大統領が恐慌克服のために断行したニューディール政策の一環である、テネシー川流域開発公社（TVA）の巨大な多目的ダムの設計図。政府による大規模な公共事業によって大量の失業者に雇用と賃金を提供し、購買力を回復させる画期的な経済介入の象徴。", type: "buff_hp", value: 0.25 },
  { id: 269, name: "ファシスト党の黒シャツ", desc: "1922年、ムッソリーニに率いられて「ローマ進軍」を行い、暴力的な威圧によって政権を奪取したイタリアの行動部隊の制服。第一次大戦の「骨折り損」の不満と社会主義革命への恐怖を煽り、議会制民主主義を否定する全体主義（ファシズム）という新たな政治の病理を世界に示した。", type: "buff_attr", target: "VALOR", value: 0.2 },
  { id: 270, name: "五・四運動の学生のプラカード", desc: "1919年5月4日、パリ講和会議での山東省権益の日本への譲渡に激しく抗議して、北京大学の学生らが掲げた「外争国権、内除国賊」の横断幕。このデモは労働者や商人にも波及し、反帝国主義・反軍閥を掲げる近代中国の巨大な大衆的民族運動の歴史的な原点となった。", type: "buff_all", value: 0.2 },
  { id: 271, name: "毛沢東の長征のわらじ", desc: "1934年、蔣介石の国民党軍の猛烈な包囲攻撃を逃れ、瑞金から延安まで1万2千キロにも及ぶ過酷な大移動（長征）を生き抜いた中国共産党の兵士の足跡。この苦難の過程での遵義会議において、毛沢東は党の実権を完全に掌握し、農村を中心とする独自の革命路線を確立した。", type: "heal_round", value: 0.10 },
  { id: 272, name: "ミュンヘン会談の宥和政策の合意書", desc: "1938年、ヒトラーのチェコスロヴァキアのズデーテン地方割譲要求に対し、戦争を極度に恐れた英仏（チェンバレンとダラディエ）が妥協して譲り渡した会議の協定書。独裁者の果てしない野望に餌を与える結果となり、平和を買うつもりが第二次世界大戦を不可避にする痛恨の失敗となった。", type: "debuff_all", value: 0.25 },
  { id: 274, name: "独ソ戦のT-34戦車の砲弾", desc: "1941年にドイツが不可侵条約を破って侵攻したバルバロッサ作戦に対し、ソ連の赤軍が大量生産してドイツ軍の強力な機甲部隊を圧倒した傑作戦車の弾薬。スターリングラードやクルスクの歴史的な大戦車戦において、無敵を誇ったドイツ国防軍の背骨を完全に打ち砕いた反攻の鉄槌。", type: "buff_attr", target: "VALOR", value: 0.3 },
  { id: 275, name: "国際連合憲章", desc: "1945年のサンフランシスコ会議で50カ国が署名し、国際連盟の反省を踏まえて設立された新たな国際平和機構の根本法規。アメリカやソ連も参加し、安全保障理事会の5常任理事国に強大な拒否権を与えることで、大国の一致による強力な軍事的制裁能力を持たせた平和維持の枠組み。", type: "heal_round", value: 0.1 },
  { id: 276, name: "チャーチルの鉄のカーテン演説の原稿", desc: "1946年、イギリスの元首相がアメリカのフルトンで行った、バルト海のシュテッティンからアドリア海のトリエステに至る東欧がソ連の完全な支配下にあると非難した演説。この言葉が、西側資本主義陣営と東側社会主義陣営が厳しく対立する「冷戦」の幕開けの象徴的な合図となった。", type: "debuff_all", value: 0.2 },
  { id: 277, name: "トルーマン・ドクトリンの文書", desc: "1947年、アメリカ大統領がギリシアとトルコの共産化の危機を阻止するために議会で行った宣言。ソ連の勢力拡大を絶対に許さないとする強硬な「封じ込め政策」を明確に打ち出し、マーシャル・プランによる経済援助とNATOによる軍事同盟へと続くアメリカの冷戦戦略の決定的な基軸。", type: "buff_attr", target: "STRATEGY", value: 0.25 },
  { id: 278, name: "キューバ危機の偵察写真", desc: "1962年、アメリカのU2偵察機がカリブ海のキューバにソ連の核ミサイル基地が極秘に建設されている証拠を捉えた写真。ケネディ大統領による海上封鎖と、フルシチョフとの息詰まるギリギリの瀬戸際外交の末に撤去で合意し、人類が核戦争による第三次世界大戦の滅亡に最も近づいた13日間の記録。", type: "buff_pos", pos: 5, value: 0.35 },
  { id: 279, name: "アポロ11号の月の石", desc: "1969年、アメリカの宇宙飛行士アームストロング船長が人類で初めて月に降り立ち地球に持ち帰った岩石。1957年のソ連のスプートニク・ショックに端を発した、冷戦下の米ソによる威信をかけた熾烈な宇宙開発競争において、アメリカが科学技術力で劇的な大逆転を果たした勝利の証。", type: "buff_all", value: 0.2 },
  { id: 280, name: "ベルリンの壁を壊したハンマー", desc: "1989年11月9日、東ドイツの旅行規制緩和の発表を機に、分断の象徴を市民たちが自らの手で叩き壊した際の道具。東西冷戦の物理的な崩壊の瞬間であり、その後の東欧革命のドミノ現象、そして1991年のソヴィエト連邦解体という歴史の巨大なうねりを引き起こした自由の歓喜の音。", type: "buff_hp", value: 0.3 },
  { id: 281, name: "ウル・ナンム法典の粘土板", desc: "紀元前21世紀、ウル第3王朝の創始者ウル・ナンムが制定した、現存する世界最古の法典。ハンムラビ法典の「目には目を」の復讐法とは異なり、損害賠償による金銭的解決を主とする、より穏健で高度な法体系を持っていたことを示す。", type: "buff_attr", target: "STRATEGY", value: 0.2 },
  { id: 282, name: "アッシリアの有翼人面牡牛像", desc: "新アッシリア帝国の宮殿の入り口を守護していた巨大な石像。人間の知恵、鷲の翼、牛の力強さを併せ持ち、オリエントを恐怖で統一したアッシリアの圧倒的な軍事力と専制君主の威圧感を象徴する。", type: "buff_attr", target: "VALOR", value: 0.25 },
  { id: 283, name: "ペルセポリスの謁見の間の柱", desc: "アケメネス朝のダレイオス1世が築いた壮大な祭祀用の都の遺跡。世界中の従属民族がそれぞれの民族衣装で貢物を持って王に謁見する様子が描かれ、多様な文化を包摂した寛容で強大な帝国の統治力を示す。", type: "buff_attr", target: "STRATEGY", value: 0.3 },
  { id: 284, name: "ササン朝の銀製狩猟文皿", desc: "ペルシアの王がライオンやイノシシを狩る勇壮な姿が立体的に打ち出されたササン朝美術の傑作。この躍動的で精緻な金属工芸はシルクロードを経て中国や日本（正倉院の白瑠璃碗など）にも多大な影響を与えた。", type: "buff_attr", target: "CULTURE", value: 0.2 },
  { id: 285, name: "マケドニアのサリッサ（長槍）", desc: "フィリッポス2世が考案し、アレクサンドロス大王が完成させたマケドニア式ファランクスの兵士が用いた、長さ5メートルを超える巨大な槍。従来のギリシア重装歩兵の槍を圧倒し、東方遠征の連戦連勝を支えた最強の武器。", type: "buff_attr", target: "VALOR", value: 0.3 },
  { id: 286, name: "クレオパトラの毒蛇", desc: "プトレマイオス朝最後の女王が、アクティウムの海戦でオクタウィアヌスに敗れた後、自らの胸を噛ませて自害したとされるアスプ蛇。ヘレニズム時代の終焉と、ローマによる地中海世界完全統一の悲劇的なフィナーレを象徴する。", type: "debuff_all", value: 0.2 },
  { id: 287, name: "トラヤヌス帝の記念柱", desc: "五賢帝の二人目、トラヤヌス帝がダキア（現在のルーマニア）征服の戦勝を記念してローマのフォルムに建てた巨大な大理石の円柱。ローマ帝国が歴史上最大の版図を実現した絶頂期の栄光と軍事的な記録が螺旋状の浮き彫りで克明に描かれている。", type: "buff_all", value: 0.2 },
  { id: 288, name: "パンテオンのクーポラ", desc: "ハドリアヌス帝が再建したローマの「万神殿」の巨大なコンクリート製の半球形ドーム。古代ローマの驚異的な土木建築技術の結晶であり、頂上の円窓から差し込む光は、帝国に集うすべての神々と人々の調和を表している。", type: "buff_hp", value: 0.25 },
  { id: 289, name: "ミラノ勅令の羊皮紙", desc: "313年、コンスタンティヌス帝とリキニウス帝が発布した、キリスト教をはじめとするすべての宗教の信仰の自由を公認した勅令。数百年続いた過酷な迫害を終わらせ、キリスト教がローマ帝国の国家権力と結びつく歴史的な大転換点となった。", type: "heal_round", value: 0.1 },
  { id: 290, name: "カルケドン公会議の教義録", desc: "451年、キリストの神性と人性は分離せず混ざり合わないとする「両性説」を正統教義として確定した宗教会議の記録。この決定によりエジプトのコプト教会（単性論）などが異端として分離し、東方キリスト教世界の複雑な分裂を招いた。", type: "buff_attr", target: "STRATEGY", value: 0.15 },
  { id: 291, name: "マハトマ・ガンディーの眼鏡", desc: "非暴力・不服従（サティヤーグラハ）を貫き、イギリスの巨大な帝国主義に丸腰で立ち向かったインド独立の父の遺品。物質的な富や暴力を完全に否定し、精神的な強さと真理への探求のみで世界を動かした彼の高潔な哲学を静かに物語る。", type: "damage_cut_all", value: 0.15 },
  { id: 292, name: "バグダード鉄道の切符", desc: "19世紀末からドイツ帝国（ヴィルヘルム2世）がオスマン帝国から敷設権を得て推進した、ベルリン・ビザンティウム・バグダードを結ぶ「3B政策」の象徴。イギリスの3C政策やロシアの南下政策と中東で激しく衝突し、第一次大戦の火薬庫の一つとなった。", type: "buff_attr", target: "STRATEGY", value: 0.2 },
  { id: 293, name: "サライェヴォの凶弾", desc: "1914年6月28日、ボスニアの州都でセルビア人青年プリンツィプがオーストリア皇太子夫妻を暗殺したピストルの弾丸。「ヨーロッパの火薬庫」と呼ばれたバルカンの民族対立の導火線に火をつけ、何千万人もの命を奪う第一次世界大戦を瞬く間に引き起こした。", type: "fixed_damage", value: 0.25 },
  { id: 294, name: "バルフォア宣言の書簡", desc: "1917年、イギリスの外相がユダヤ系富豪ロスチャイルド宛てに出した、パレスチナにおけるユダヤ人の「民族的郷土」の建設を支持する書簡。アラブ人への独立約束（フセイン・マクマホン協定）と矛盾するこの三枚舌外交が、現代まで続く血みどろの中東問題の元凶となった。", type: "debuff_all", value: 0.25 },
  { id: 295, name: "五カ年計画のトラクター", desc: "1928年からソ連のスターリンが強行した、重工業優先と農業の集団化（コルホーズ）を目指す計画経済の象徴。世界恐慌の嵐をよそに驚異的な工業化を達成したと宣伝されたが、その裏には富農（クラク）の弾圧と数百万人の餓死者という凄惨な犠牲が隠されていた。", type: "buff_all", value: 0.25 },
  { id: 296, name: "スペイン人民戦線のポスター", desc: "1936年に勃発したスペイン内戦において、ファシズムの反乱軍（フランコ将軍）に対抗するために結成された共和国政府側の宣伝画。「ノー・パサラン（奴らを通すな）」を合言葉に、世界中から集まった国際義勇軍の情熱と、英仏の不干渉政策による見殺しの悲劇を示す。", type: "buff_pos", pos: 1, value: 0.3 },
  { id: 297, name: "スターリングラードの瓦礫", desc: "1942年夏から翌冬にかけて、ヴォルガ河畔の工業都市で繰り広げられた独ソ戦の最大の激戦地の破片。建物一つ、部屋一つを奪い合う凄惨な市街戦の末にドイツ第6軍が包囲殲滅され、第二次世界大戦のヨーロッパ戦線における決定的な転換点となった血塗られた石。", type: "damage_cut_all", value: 0.15 },
  { id: 298, name: "マーシャル・プランの小麦粉", desc: "1947年、アメリカの国務長官が提唱したヨーロッパ経済復興援助計画によって西欧諸国に配給された食糧。戦後の疲弊した西欧を共産主義の脅威から守り抜き、同時にアメリカの巨大な輸出市場を確保することで、冷戦下における西側陣営の強固な結束を経済面から決定づけた。", type: "heal_round", value: 0.05 },
  { id: 299, name: "第一回非同盟諸国首脳会議の議事録", desc: "1961年、ユーゴスラヴィアのベオグラードでティトー、ナセル、ネルーらの主導により開催された会議の記録。米ソの激しい冷戦構造に対し、アジア・アフリカ・ラテンアメリカの新興諸国（第三世界）が平和共存と反帝国主義を掲げて第三の極として立ち上がった連帯の証。", type: "buff_all", value: 0.25 },
  { id: 300, name: "パリ五月革命の敷石", desc: "1968年、フランスのパリで学生たちの反体制運動が労働者のゼネストへと波及し、ド・ゴール政権を揺るがした五月危機の際に、バリケードを作るために剥がされた石。ベトナム反戦運動と連動して世界中の若者に広まった、既成の権威や価値観に対するカウンターカルチャーの象徴。", type: "buff_attr", target: "CULTURE", value: 0.3 },
  { id: 301, name: "プラハの春のラジオ", desc: "1968年、チェコスロヴァキアのドプチェク第一書記が掲げた「人間の顔をした社会主義」の民主化運動を支えた自由な放送。しかしその年の夏、ソ連率いるワルシャワ条約機構軍の戦車によって無残に押し潰され、ブレジネフ・ドクトリンの冷酷さを世界に見せつけた。", type: "debuff_all", value: 0.2 },
  { id: 302, name: "ニクソン・ショックのドル紙幣", desc: "1971年、アメリカ大統領が突然発表した金とドルの交換停止宣言の紙幣。ベトナム戦争の莫大な出費によるアメリカの威信の低下を露呈し、戦後の世界経済を安定させていたブレトン・ウッズ体制（固定相場制）を完全に崩壊させた歴史的な紙くずの始まり。", type: "hp_to_one", rate: 0.1 },
  { id: 303, name: "第一回オイルショックの原油樽", desc: "1973年、第4次中東戦争においてアラブ石油輸出国機構（OAPEC）が親イスラエル諸国への禁輸と原油価格の大幅引き上げを行った石油戦略の象徴。先進工業国の高度経済成長を急ブレーキで止め、世界中をインフレと不況のパニックに陥れた資源ナショナリズムの強烈な武器。", type: "debuff_all", value: 0.3 },
  { id: 305, name: "連帯（ソリダルノシチ）のバッジ", desc: "1980年、ポーランドのグダニスク造船所でレフ・ワレサを中心に結成された、東側諸国で初の自主管理労働組合のシンボル。ソ連の圧力と戒厳令による弾圧に耐え抜き、のちに東欧革命の先陣を切って非暴力での体制転換を成し遂げた労働者たちの不屈の勇気。", type: "damage_cut_all", value: 0.15 },
  { id: 306, name: "ゴルバチョフのペレストロイカ宣言書", desc: "1985年に就任したソ連の指導者が、硬直した社会主義体制を根本から立て直すために掲げた「改革」と「グラスノスチ（情報公開）」の指針。しかしこのパンドラの箱を開けたことで、抑圧されていた民族問題や民主化の要求が一気に噴出し、皮肉にもソ連邦そのものの完全な解体を招いた。", type: "buff_attr", target: "STRATEGY", value: 0.4 },
  { id: 308, name: "ネルソン・マンデラの獄中手記", desc: "南アフリカの人種隔離政策（アパルトヘイト）に反対し、27年間もの過酷な投獄生活に耐え抜いた黒人指導者のノート。1990年に釈放された後、報復ではなく「真実と和解」による全人種の融和を説き、同国初の黒人大統領としてノーベル平和賞に輝いた偉大な魂の記録。", type: "heal_round", value: 0.1 },
  { id: 309, name: "マーストリヒト条約の欧州旗", desc: "1992年に調印され、翌年に欧州連合（EU）を正式に発足させた条約の青地に12の星の旗。経済的な共同体から、共通通貨ユーロの導入や共通の外交・安全保障政策を掲げる政治的な超国家統合体へと、ヨーロッパの歴史をかつてない次元へと引き上げた壮大な実験のシンボル。", type: "buff_all", value: 0.2 },
  { id: 311, name: "アッカド王の青銅頭部像", desc: "メソポタミアを初統一したアッカド王国サルゴン王の権威を示す写実的な青銅像。シュメール人の都市国家群を統合し、強力な中央集権によるオリエント初の広大な専制帝国を築いた威厳を今に伝える。", type: "buff_all", value: 0.2 },
  { id: 312, name: "リピト・イシュタル法典", desc: "ウル第3王朝崩壊後にイシン第1王朝の王がシュメール語で発布した法典。「目には目を」の復讐法ではなく、金銭的な損害賠償を基本とする高度な法体系で、法治による公正な社会秩序の維持を目指した。", type: "buff_attr", target: "STRATEGY", value: 0.25 },
  { id: 313, name: "ヒッタイトの鉄製武器", desc: "ボアズキョイを都とするヒッタイト人が世界で初めて本格的に実用化した鉄器。青銅器を凌駕する圧倒的な硬度と威力を誇り、軽戦車（チャリオット）と並んでオリエント世界を席巻した。", type: "buff_attr", target: "VALOR", value: 0.3 },
  { id: 314, name: "フェニキアのアルファベット刻文", desc: "地中海交易で活躍したフェニキア人が、アラム文字とともに生み出した表音文字の記録。のちのギリシア文字やラテン文字の起源となり、地中海全域における商業活動と文化伝播に多大な貢献を果たした。", type: "buff_attr", target: "CULTURE", value: 0.25 },
  { id: 315, name: "イスラエル王国の契約の箱", desc: "ダヴィデ王がイェルサレムに運び込み、ソロモン王の神殿に安置された、モーセの十戒の石板を収めた聖櫃。ユダヤ教の絶対的な信仰の拠り所として、ヘブライ人の強固な民族的団結を精神面から支え続けた。", type: "damage_cut_all", value: 0.1 },
  { id: 316, name: "イシュタル門の瑠璃瓦", desc: "新バビロニアのネブカドネザル2世がバビロンに建設した、鮮やかな青い釉薬煉瓦の城門。龍や雄牛の浮き彫りが色鮮やかに施され、バビロン捕囚を行うなど強勢を誇った帝国の圧倒的な国力を象徴する。", type: "debuff_all", value: 0.2 },
  { id: 317, name: "アラム人のラクダの鞍", desc: "ダマスクスを拠点に内陸の隊商交易を独占したアラム人が用いたラクダの鞍。オリエントの広大な陸路を結びつけ、アラム語が当時の国際商業用語として広く普及する原動力となった。", type: "buff_hp", value: 0.25 },
  { id: 318, name: "リディアのエレクトロン貨", desc: "小アジアのリディア王国で世界で初めて発行された、金と銀の合金による鋳造貨幣。貨幣経済の誕生をもたらし、のちにアケメネス朝やギリシア諸ポリスへと広がる画期的な経済システムの端緒となった。", type: "buff_attr", target: "STRATEGY", value: 0.2 },
  { id: 319, name: "クノッソス宮殿のイルカのフレスコ画", desc: "クレタ文明（ミノア文明）の中心地に描かれた、城壁を持たない平和で海洋的な気風を示す鮮やかな壁画。明るく躍動的で写実的な表現は、エヴァンズによって発掘された壮麗な宮廷社会の豊かな生活様式を物語っている。", type: "buff_attr", target: "CULTURE", value: 0.2 },
  { id: 320, name: "ミケーネの獅子門の石彫", desc: "ギリシア本土に侵入したアカイア人が築いた、堅固な巨石城塞の入り口を守る二頭の獅子の彫刻。小王国の分立と抗争に明け暮れ、のちにトロイア戦争を引き起こすことになる好戦的なミケーネ文明の力強さを象徴する。", type: "buff_attr", target: "VALOR", value: 0.2 },
  { id: 321, name: "プリアモスの財宝", desc: "シュリーマンがホメロスの叙事詩を信じて発掘したトロイア遺跡から出土した黄金の装身具群。ホメロスの叙事詩の歴史性を実証し、古代エーゲ文明における高度な金細工技術と豊かな交易の存在を明らかにした。", type: "heal_round", value: 0.1 },
  { id: 322, name: "リュクルゴスの制の鉄貨", desc: "古代スパルタで、市民の平等を保つため金銀貨を禁じて使用された巨大な鉄銭。鎖国と軍国主義を徹底し、少数の完全市民（スパルティアタイ）が多数の隷属農民を支配するいびつな国家体制を維持した。", type: "damage_cut_all", value: 0.15 },
  { id: 323, name: "ラウレイオン銀山のフクロウ銀貨", desc: "古代アテネがテミストクレスの建言で海軍増強の資金源とし、地中海の基軸通貨となった銀貨。アテナ神の象徴である知恵のフクロウが刻まれ、デロス同盟の支配とともにエーゲ海一帯に流通しアテネの繁栄を支えた。", type: "buff_attr", target: "STRATEGY", value: 0.25 },
  { id: 324, name: "アポロン神託の三脚椅子", desc: "古代ギリシアのデルフォイで、巫女が座って神の啓示を下した神聖な椅子。植民市建設などの重大な決定において、ギリシア全土のポリスから絶対的な権威として仰がれた汎ヘレネス的聖地。", type: "debuff_enemy", value: 0.5 },
  { id: 325, name: "ブケファロスの蹄鉄", desc: "アレクサンドロス大王が東方遠征で幾多の激戦をともに駆け抜けた伝説の愛馬の蹄鉄。大王の圧倒的な機動力と突破力を支え、グラニコス川やガウガメラの戦いにおける電撃的な勝利に貢献した名馬の遺物。", type: "buff_pos", pos: 1, value: 0.35 },
  { id: 326, name: "アレクサンドリア図書館のパピルス", desc: "エジプトのプトレマイオス朝がムセイオンに併設し、ヘレニズム世界のあらゆる知識を集めた古代最大の図書館の蔵書。エラトステネスらが館長を務め、世界中の文献をギリシア語に翻訳・保存してヘレニズム時代の最高学府として君臨した。", type: "buff_attr", target: "CULTURE", value: 0.3 },
  { id: 327, name: "ラオコーン群像", desc: "トロイアの神官ラオコーンが海蛇に絞め殺される苦悶の瞬間を捉えた、ヘレニズム美術の最高傑作。その劇的で激しいパトス（情念）と肉体表現は、古典期の調和から離れたヘレニズム彫刻のダイナミズムを如実に示している。", type: "debuff_all", value: 0.2 },
  { id: 328, name: "カピトリヌスの牝狼像", desc: "ローマの建国者ロムルスとレムスの双子を育てたという牝狼の青銅像。エトルリア人の技術で作られたともされ、小さな都市国家から出発し地中海世界を制覇したローマの不屈の建国神話の象徴。", type: "buff_all", value: 0.2 },
  { id: 329, name: "グラックス兄弟の農地法案", desc: "前2世紀、大土地所有（ラティフンディア）で没落したローマ平民を救うため、護民官の兄弟が提出した公有地再分配の法案。元老院の猛反発と兄弟の暗殺によって挫折し、のちの「内乱の1世紀」と呼ばれる血みどろの政治抗争の幕開けとなった。", type: "buff_attr", target: "STRATEGY", value: 0.25 },
  { id: 330, name: "スパルタクスの兜", desc: "前73年、トラキア出身の剣闘士スパルタクスが奴隷たちを率いてローマ軍と死闘を繰り広げた際にかぶっていた兜。見世物として殺し合わされる境遇に反発して立ち上がった奴隷たちの自由を求める闘志と、古代の過酷な身分制の闇を示す。", type: "buff_attr", target: "VALOR", value: 0.25 },
  { id: 331, name: "ルビコン川のサイコロ", desc: "カエサルが元老院の命令に背いて軍を率いてルビコン川を渡る際、「賽は投げられた」と叫んで投じた運命のサイコロ。元老院の命令に背き、ポンペイウスら閥族派を打倒してローマの終身独裁官へと上り詰める、歴史的な決断の瞬間の証。", type: "buff_pos", pos: 5, value: 0.4 },
  { id: 332, name: "アラ・パキス（平和の祭壇）", desc: "初代皇帝アウグストゥスが、ガリアやヒスパニア平定後にローマの平和の到来を祝って建立した祭壇。内乱の1世紀を終結させ、以降約200年にわたって続く「パクス・ロマーナ（ローマの平和）」の到来を記念する象徴的建造物。", type: "heal_round", value: 0.10 },
  { id: 333, name: "カラカラ浴場のモザイク", desc: "カラカラ帝がローマに建設した巨大な公共浴場の床を飾る、豪華で精緻なモザイク画。「パンと見世物」に代表される、労働を免除されたローマ市民の享楽的で豪奢な日常生活と大衆文化の成熟を現代に伝える。", type: "buff_attr", target: "CULTURE", value: 0.2 },
  { id: 334, name: "最高価格令の石板", desc: "301年、軍人皇帝時代のインフレを抑制するため、ディオクレティアヌス帝が全帝国の物価や賃金の上限を定めた統制経済の法令。「3世紀の危機」による経済的混乱を、専制君主制（ドミナトゥス）の強権的な力によって力技で押さえ込もうとした苦肉の策。", type: "buff_attr", target: "STRATEGY", value: 0.2 },
  { id: 335, name: "イクトゥスの壁画", desc: "ローマ帝国の厳しい迫害のもと、初期キリスト教徒がカタコンベ（地下墓所）に隠れて信仰を守るために用いた魚の暗号。ディオクレティアヌス帝らの苛烈な迫害にも屈することなく、地下で密かに信仰を守り抜いた初期キリスト教徒たちの不屈の証。", type: "damage_cut_all", value: 0.15 },
  { id: 336, name: "死海文書", desc: "紀元前後にエッセネ派などのクムラン教団が洞窟に残した、現存する最古の旧約聖書のヘブライ語写本。パリサイ派の形式主義を批判して荒野で共同生活を送った人々の記録であり、イエス誕生前後のユダヤ教の多様な姿を解き明かす史料。", type: "buff_hp", value: 0.2 },
  { id: 337, name: "ニケーア信条の羊皮紙", desc: "325年のニケーア公会議で、コンスタンティヌス帝の主導により正統とされたアタナシウス派の教義（のちの三位一体説）の文書。アリウス派を異端として追放し、国家権力と結びついた普遍的（カトリック）な教会体制の強固な基盤を確立した歴史的文書。", type: "debuff_all", value: 0.2 },
  { id: 338, name: "景教の十字架", desc: "431年のエフェソス公会議で異端とされたネストリウス派が、ササン朝を経て唐代の中国に伝来し「景教」として保護された際の遺物。ササン朝での庇護を経て唐の長安に至り、太宗から「景教」として公認された、シルクロードを越えた壮大な東西文化交流の証拠。", type: "buff_all", value: 0.2 },
  { id: 339, name: "インダス文明の彩色土器", desc: "モエンジョ・ダーロやハラッパーの都市遺跡から出土した、黒や赤で動植物の文様が描かれた土器。焼煉瓦の家屋や高度な排水施設を持つ厳密な都市計画のもとで暮らした、古代インドの先住民（ドラヴィダ系か）の文化水準の高さを証明する。", type: "buff_attr", target: "CULTURE", value: 0.2 },
  { id: 340, name: "アーリヤ人の鉄製犂", desc: "前1000年頃、アーリヤ人がガンジス川流域の密林を開拓するために用いた鉄製の農具。農業生産力を飛躍的に向上させ、階級分化を促してマガダ国などの古代国家の形成と、強固なカースト制度の成立基盤となった。", type: "buff_hp", value: 0.25 },
  { id: 341, name: "ウパニシャッドのヤシの葉写本", desc: "バラモン教の祭式至上主義への批判から生まれ、宇宙の根本原理（ブラフマン）と個人の本体（アートマン）の同一性（梵我一如）を探求した哲学書。祭式至上主義を排して内面的な解脱を求め、のちの仏教やジャイナ教の誕生、さらにはヒンドゥー教の哲学体系にも決定的な影響を与えた。", type: "debuff_enemy", value: 0.45 },
  { id: 342, name: "アヒンサーの教典", desc: "ヴァルダマーナ（マハーヴィーラ）が開いたジャイナ教の、徹底した不殺生（アヒンサー）と苦行を説いた教典。農業における殺生を避けたため商人層に強く支持され、その厳格な倫理観と苦行主義は現代のインド社会にも深く根付いている。", type: "damage_cut_all", value: 0.15 },
  { id: 343, name: "マウリヤ朝の軍用象の装具", desc: "チャンドラグプタ王がギリシアのセレウコス朝を退けた際などに活躍した、強大なインド戦象部隊の装具。チャンドラグプタ王がギリシアのセレウコス朝を退けた際などに活躍した、強大なインド戦象部隊の装具。北インド初統一の圧倒的な軍事力を象徴する。", type: "buff_attr", target: "VALOR", value: 0.3 },
  { id: 344, name: "カニシカ王の金貨", desc: "クシャーナ朝の最盛期を築いた王が発行した、ギリシアやイラン、インドの神々が共に刻印された金貨。ローマ帝国との季節風（モンスーン）貿易による莫大な富と、ユーラシア大陸の東西を結ぶ交易ネットワークの中心としての繁栄を象徴する。", type: "buff_attr", target: "STRATEGY", value: 0.25 },
  { id: 345, name: "マトゥラーの赤砂岩仏像", desc: "ガンダーラと並ぶ仏像彫刻の中心地マトゥラーで制作された、インドの伝統的な肉体表現の豊かさを持つ仏像。ガンダーラ美術と並んで栄え、インドの伝統的な肉体表現の豊かさを持つ仏像。大乗仏教の菩薩信仰とともに東アジア全域へと広がった。", type: "heal_round", value: 0.10 },
  { id: 346, name: "サールナート仏（グプタ様式）", desc: "グプタ朝時代に完成した、純インド的な仏像の傑作。濡れたような薄い衣と瞑想的な伏し目が特徴の純インド的な仏像の傑作。ヒンドゥー教の台頭の裏で、仏教美術が到達した洗練の極致。", type: "buff_attr", target: "CULTURE", value: 0.35 },
  { id: 347, name: "カイラーサナータ寺院の彫刻", desc: "デカン高原のエローラ石窟において、巨大な岩山を上から彫り下げて造られたヒンドゥー教のシヴァ神の壮大な寺院。デカン高原のエローラ石窟において、巨大な岩山を上から彫り下げて造られたヒンドゥー教のシヴァ神の壮大な寺院。バクティ運動の高まりとヒンドゥー教の隆盛を示す。", type: "buff_pos", pos: 2, value: 0.35 },
  { id: 348, name: "ボロブドゥールのストゥーパ", desc: "8世紀のジャワ島シャイレンドラ朝で建造された、大乗仏教の宇宙観（曼荼羅）を立体化した巨大な石造遺跡。8世紀のジャワ島シャイレンドラ朝で建造された、大乗仏教の宇宙観（曼荼羅）を立体化した巨大な石造遺跡。東南アジアにおけるインド文化（仏教）の受容の結晶。", type: "buff_all", value: 0.2 },
  { id: 349, name: "パガン朝のパゴダ", desc: "11世紀にビルマ人が建国した最初の統一王朝が、スリランカから導入した上座部仏教を信仰して無数に建立した黄金の仏塔。11世紀にビルマ人が建国した最初の統一王朝が、スリランカから導入した上座部仏教を信仰して無数に建立した黄金の仏塔。ビルマの強固な仏教信仰の原点。", type: "damage_cut_all", value: 0.1 },
  { id: 350, name: "シュリーヴィジャヤの海図", desc: "スマトラ島のパレンバンを中心に、マラッカ海峡を制圧して東西の海上交易（海の道）の要衝として栄えたマレー人の国家の海図。スマトラ島のパレンバンを中心に、マラッカ海峡を制圧して東西の海上交易（海の道）の要衝として栄えたマレー人の国家の海図。義浄も滞在した大乗仏教の中心地。", type: "buff_all", value: 0.15 },
  { id: 351, name: "仰韶文化の彩陶", desc: "黄河中流域で前5000年頃から発達した新石器文化の、幾何学模様や魚などの彩色が施された壺。黄河中流域で前5000年頃から発達した新石器文化の、幾何学模様や魚などの彩色が施された壺。アワやキビの栽培を中心とする農耕社会の黎明期の芸術性を象徴する。", type: "buff_attr", target: "CULTURE", value: 0.2 },
  { id: 352, name: "竜山文化の黒陶", desc: "黄河下流域で発達した新石器時代後期の、ろくろを用いて極めて薄く焼き上げられた黒色磨研土器。黄河下流域で発達した新石器時代後期の、ろくろを用いて極めて薄く焼き上げられた黒色磨研土器。高度な専門職人の存在と、初期の階級社会への移行を示す。", type: "buff_attr", target: "STRATEGY", value: 0.2 },
  { id: 353, name: "殷の四足鼎", desc: "殷王朝において、神権政治の儀式で神や祖先を祀るために使用された巨大な青銅製の鼎。殷王朝において、神権政治の儀式で神や祖先を祀るために使用された巨大な青銅製の鼎。複雑な饕餮（とうてつ）文様が刻まれ、王の占卜による絶対的な権威を示す。", type: "debuff_all", value: 0.2 },
  { id: 354, name: "西周の金文", desc: "西周時代、青銅器の表面に鋳込まれた、王から諸侯への領地授与（封建制）や宗法（一族の掟）の記録文字。西周時代、青銅器の表面に鋳込まれた、王から諸侯への領地授与や宗法（一族の掟）の記録文字。血縁関係を基盤とする周代特有の封建制度の存在を裏付ける第一級史料。", type: "damage_cut_all", value: 0.1 },
  { id: 355, name: "戦国時代の青銅貨幣", desc: "春秋戦国時代、鉄製農具の普及による農業と商業の発展に伴い、各国の青銅の農具や小刀を模して作られた刀銭・布銭・蟻鼻銭などの貨幣群。春秋戦国時代、鉄製農具の普及による農業と商業の発展に伴い、各国の青銅の農具や小刀を模して作られた貨幣群。青銅器時代から鉄器時代への移行と経済の飛躍的発展を象徴する。", type: "buff_hp", value: 0.25 },
  { id: 356, name: "春秋左氏伝の竹簡", desc: "孔子が編纂したとされる魯の歴史書『春秋』に対して、左丘明が詳細な事実を補足したとされる歴史書の竹簡。孔子が編纂したとされる魯の歴史書『春秋』に対して、詳細な事実を補足したとされる歴史書の竹簡。大義名分と道徳的評価を重んじる儒家的な歴史観を後世に伝えた。", type: "buff_attr", target: "STRATEGY", value: 0.3 },
  { id: 357, name: "老子の道徳経", desc: "諸子百家の道家の祖とされる老子が、人為的な儒家の礼教を批判し、宇宙の根源である「道（タオ）」に従う「無為自然」の生き方を説いた書。諸子百家の道家の祖とされる老子が、人為的な儒家の礼教を批判し、宇宙の根源である「道（タオ）」に従う「無為自然」の生き方を説いた書。のちの老荘思想の根本となった。", type: "heal_round", value: 0.1 },
  { id: 358, name: "孫子の兵法", desc: "春秋時代の呉の将軍・孫武が著したとされる最古の兵法書。春秋時代の呉の将軍・孫武が著したとされる最古の兵法書。「彼を知り己を知れば百戦殆うからず」と説き、精神論ではなく情報収集と合理的・現実的な軍事戦略の重要性を理論化した。", type: "buff_attr", target: "VALOR", value: 0.35 },
  { id: 359, name: "秦の半両銭", desc: "始皇帝が中国を統一した際、度量衡や文字とともに全国で統一的に使用を強制した、中央に四角い穴の開いた丸い銅銭。始皇帝が中国を統一した際、度量衡や文字（小篆）とともに全国で統一的に使用を強制した銅銭。強力な法家思想に基づく苛烈な中央集権化と経済統制の象徴。", type: "buff_all", value: 0.2 },
  { id: 360, name: "漢の長安城の瓦", desc: "前漢の高祖・劉邦が建てた長安の宮殿で使われた、四神などの美しい文様が刻まれた瓦。前漢の高祖・劉邦が建てた長安の宮殿で使われた、四神などの美しい文様が刻まれた瓦。武帝の時代に人口が密集し、シルクロードの起点として栄えた大帝国の首都の威容を伝える。", type: "buff_pos", pos: 3, value: 0.35 },
  { id: 361, name: "郷挙里選の推挙状", desc: "前漢の武帝時代に始まった、地方長官が優秀な人材を中央に推薦する官吏登用制度の文書。前漢の武帝時代に始まった、地方長官が優秀な人材を中央に推薦する官吏登用制度の文書。儒教的道徳（孝廉）が重視されたが、のちに地方豪族による官僚職の世襲と独占を招く結果となった。", type: "buff_attr", target: "STRATEGY", value: 0.25 },
  { id: 362, name: "張衡の渾天儀", desc: "後漢の科学者・張衡が発明したとされる、天体の運行を模した精巧な天文観測儀や、地震の発生とその方角を感知する地動儀。後漢の科学者・張衡が発明したとされる、天体の運行を模した精巧な天文観測儀や、地震の発生とその方角を感知する地動儀。製紙法の改良と並ぶ、後漢の優れた科学技術の結晶。", type: "buff_attr", target: "CULTURE", value: 0.25 },
  { id: 363, name: "太平道の黄巾", desc: "後漢末期、張角が呪術的な病気治癒で組織した宗教結社の信徒たちが、腐敗した漢王朝の打倒（蒼天已死）を掲げて頭に巻いた黄色い布。後漢末期の184年、張角率いる太平道の信徒たちが、腐敗した宦官政治や豪族の搾取に対して「蒼天已死」を掲げて頭に巻いた黄色い布。後漢帝国を実質的な滅亡へと導いた農民反乱の象徴。", type: "debuff_all", value: 0.25 },
  { id: 364, name: "屯田制の農具", desc: "三国時代の魏の曹操が、戦乱で荒廃した土地と流民を国家の管理下で組織的に農耕させ、軍糧を確保するために用いた農具。三国時代の魏の曹操が、戦乱で荒廃した土地と流民を国家の管理下で組織的に農耕させ、軍糧を確保するために用いた農具。乱世を勝ち抜くための極めて現実的で合理的な富国強兵策。", type: "buff_hp", value: 0.25 },
  { id: 365, name: "九品中正の評定表", desc: "魏の文帝（曹丕）が始めた、地方の中正官が人材を9等級に評定して中央に推薦する制度の記録。魏の文帝（曹丕）が始めた、地方の中正官が人材を9等級に評定して中央に推薦する制度の記録。「上品に寒門なく、下品に勢族なし」と揶揄され、魏晋南北朝時代の門閥貴族社会を形成した。", type: "buff_attr", target: "STRATEGY", value: 0.25 },
  { id: 366, name: "占田・課田法の木簡", desc: "西晋の武帝（司馬炎）が天下統一後に発布した、農民への土地の割り当てと徴税、そして貴族の土地所有の制限を規定したとされる土地制度の記録。西晋の武帝（司馬炎）が天下統一後に発布した、農民への土地の割り当てと徴税、そして貴族の土地所有の制限を規定したとされる土地制度の記録。国家の財政基盤を再建しようとした試み。", type: "damage_cut_all", value: 0.15 },
  { id: 367, name: "均田制の戸籍", desc: "北魏の孝文帝が制定し、隋唐へと受け継がれた、国家が農民に土地を給付し回収する制度の台帳。北魏の孝文帝が制定し、隋唐へと受け継がれた、国家が農民に土地を給付し回収する制度の台帳。大土地所有を抑え、安定した税収と兵役を確保する東アジア特有の律令国家の経済的基盤。", type: "buff_all", value: 0.25 },
  { id: 368, name: "雲崗石窟の大仏", desc: "北魏の平城近郊に造営された、皇帝の顔を模したとされる巨大な石造の仏像。北魏の平城近郊に造営された、皇帝の顔を模したとされる巨大な石造の仏像。西域やガンダーラ美術の影響を色濃く残す力強い造形であり、皇帝＝如来とする国家仏教による圧倒的な権威の象徴。", type: "buff_attr", target: "CULTURE", value: 0.25 },
  { id: 369, name: "竜門石窟の仏像", desc: "北魏の孝文帝の洛陽遷都以降、唐代にかけて造営された石窟寺院の仏像。北魏の孝文帝の洛陽遷都以降、唐代にかけて造営された石窟寺院の仏像。雲崗に比べ、中国固有の柔らかく優美な線描表現へと変化しており、仏教美術の漢化（中国化）の到達点を示す。", type: "heal_round", value: 0.1 },
  { id: 370, name: "顧愷之の女史箴図", desc: "東晋の「画聖」顧愷之が描いたとされる、宮廷の女性の道徳的戒めを題材とした絵巻物の模本。東晋の「画聖」顧愷之が描いたとされる、宮廷の女性の道徳的戒めを題材とした絵巻物の模本。対象の精神をも描き出す「伝神」の技法を確立し、貴族の美意識を反映した六朝文化の白眉。", type: "buff_pos", pos: 4, value: 0.35 },
  { id: 371, name: "王羲之の蘭亭序", desc: "東晋の「書聖」王羲之が、名士たちとの宴で書いた行書の最高傑作の拓本。東晋の「書聖」王羲之が、名士たちとの宴で書いた行書の最高傑作の拓本。流麗で力強いその筆致は、中国のみならず日本の書道史においても絶対的な模範とされ、後世の文人たちに愛された。", type: "buff_attr", target: "CULTURE", value: 0.35 },
  { id: 372, name: "隋の科挙の試験用紙", desc: "隋の文帝（楊堅）が門閥貴族の権力を抑え、皇帝の独裁権力を強化するために導入した、学科試験による官吏登用制度の答案。隋の文帝（楊堅）が門閥貴族の権力を抑え、皇帝の独裁権力を強化するために導入した、学科試験による官吏登用制度の答案。以後、清末まで1300年にわたって中国の官僚体制を支える根幹となった。", type: "buff_attr", target: "STRATEGY", value: 0.3 },
  { id: 373, name: "唐の律令格式の木簡", desc: "唐が完成させた、刑法（律）、行政法（令）、追加法（格）、施行細則（式）からなる精緻な法体系の記録。唐が完成させた、刑法（律）、行政法（令）、追加法（格）、施行細則（式）からなる精緻な法体系の記録。日本（大宝律令など）や渤海など、東アジア諸国の国家建設の絶対的な手本となった。", type: "buff_attr", target: "STRATEGY", value: 0.3 },
  { id: 374, name: "広開土王の碑の拓本", desc: "5世紀初め、高句麗の最盛期を築いた王の武勲を称えて息子（長寿王）が建立した巨大な石碑の文字。5世紀初め、高句麗の最盛期を築いた広開土王の武勲を称えて長寿王が建立した巨大な石碑。百済や新羅、そして海を渡って侵攻してきた倭（日本）の軍勢との激しい戦闘の記録が刻まれている。", type: "buff_attr", target: "VALOR", value: 0.25 },
  { id: 377, name: "知恵の館の天球儀", desc: "アッバース朝のカリフ・マムーンがバグダードに設立した研究所（バイト・アルヒクマ）で用いられた観測儀。アッバース朝のカリフ・マムーンがバグダードに設立した王立研究所（バイト・アルヒクマ）で用いられた観測儀。アリストテレスなどのギリシア語文献がアラビア語に翻訳され、イスラーム科学を飛躍させた。", type: "buff_attr", target: "CULTURE", value: 0.3 },
  { id: 378, name: "メスキータの馬蹄形アーチ", desc: "後ウマイヤ朝が首都コルドバに建設した巨大なモスクの、赤と白の石を交互に組み合わせた幻想的なアーチ。後ウマイヤ朝が首都コルドバに建設した巨大なモスクの、赤と白の石を交互に組み合わせた幻想的なアーチ。アッバース朝に対抗してカリフを称したアンダルス（イベリア半島）のイスラーム文化の精髄。", type: "heal_round", value: 0.1 },
  { id: 380, name: "セルジューク朝のイクターの授与状", desc: "ブワイフ朝に始まりセルジューク朝で広く制度化された、軍人に対して給与の代わりに国有地の徴税権を与える文書。ブワイフ朝に始まりセルジューク朝で広く制度化された、軍人に対して給与（アター）の代わりに国有地の徴税権を与える文書。強力なトルコ系騎馬軍団を維持するための、イスラーム社会特有の軍事封建制度。", type: "buff_attr", target: "VALOR", value: 0.25 },
  { id: 381, name: "ニザーミーヤ学院の神学書", desc: "セルジューク朝の名宰相ニザーム・アルムルクが、スンナ派正統教義を擁護し優秀な官僚（ウラマー）を育成するために各地に創設したマドラサの教科書。セルジューク朝の名宰相ニザーム・アルムルクが、シーア派に対抗してスンナ派正統教義を擁護し、優秀な官僚（ウラマー）を育成するために各地に創設したマドラサ（高等教育機関）の教科書。", type: "buff_attr", target: "STRATEGY", value: 0.25 },
  { id: 383, name: "千夜一夜物語の写本", desc: "インドやイランの説話を起源とし、アッバース朝のバグダードやマムルーク朝のカイロの庶民社会の風俗を取り込みながら集大成されたアラビア語の大説話集。インドやイランの説話を起源とし、アッバース朝のバグダードやマムルーク朝のカイロの商人や庶民の活気あふれる風俗を取り込みながら集大成されたアラビア語の大説話集。イスラーム都市文化の豊かさの結晶。", type: "buff_pos", pos: 5, value: 0.35 },
  { id: 385, name: "イェニチェリの軍楽太鼓", desc: "オスマン帝国の精鋭常備歩兵であるイェニチェリ軍団に随伴した軍楽隊（メフテル）の太鼓。オスマン帝国の精鋭常備歩兵であるイェニチェリ軍団に随伴した軍楽隊（メフテル）の太鼓。その腹の底に響く轟音は、ウィーン包囲などでヨーロッパのキリスト教諸国を恐怖のどん底に陥れた。", type: "debuff_all", value: 0.25 },
  { id: 386, name: "スレイマン・モスクのドーム", desc: "オスマン帝国最盛期のスレイマン1世の命で、天才建築家シナンがイスタンブルに建造した壮麗なモスクの円蓋。オスマン帝国最盛期のスレイマン1世の命で、天才建築家シナンがイスタンブルに建造した壮麗なモスクの円蓋。ハギア・ソフィア大聖堂のビザンツ様式を越えようとした、オスマン・イスラーム建築の最高峰。", type: "buff_attr", target: "CULTURE", value: 0.25 },
  { id: 387, name: "イスファハーンの青いタイル", desc: "サファヴィー朝のアッバース1世が「世界の半分」と称された新都イスファハーンに建造した「王のモスク」を覆う、ペルシアン・ブルーの精緻なアラベスク・タイル。サファヴィー朝のアッバース1世が「世界の半分」と称された新都イスファハーンに建造した「王のモスク」を覆う、ペルシアン・ブルーの精緻なアラベスク・タイル。シーア派を国教とするイラン・イスラーム文化の爛熟の象徴。", type: "heal_round", value: 0.1 },
  { id: 388, name: "ムガル帝国の細密画", desc: "アクバルからシャー・ジャハーンの宮廷で描かれた、イランの伝統とインドの土着の写実性が見事に融合したミニアチュール。アクバルからシャー・ジャハーンの宮廷で描かれた、ペルシアの伝統とインドの土着の写実性が見事に融合したミニアチュール。皇帝の肖像や豪華な宮廷行事、花鳥などを極めて鮮やかな色彩で精緻に描写した。", type: "buff_pos", pos: 1, value: 0.35 },
  { id: 389, name: "シク教の黄金寺院の経典", desc: "16世紀にナーナクがカースト制を否定して創始したシク教の総本山（アムリットサール）に祀られた聖典。16世紀にナーナクがヒンドゥー教とイスラーム教を融合し、カースト制を否定して創始したシク教の総本山（アムリットサール）に祀られた聖典。アウラングゼーブ帝の迫害に対抗して強固な軍事集団へと変貌した。", type: "damage_cut_all", value: 0.1 },
  { id: 390, name: "ウルドゥー語の詩集", desc: "ムガル帝国の軍営（ウルドゥー）で、イスラーム教徒のペルシア語やアラビア語とインドの現地の言葉が混ざり合って成立した言語の詩集。ムガル帝国の軍営（ウルドゥー）で、支配層のペルシア語やアラビア語と、インドの現地の言葉が混ざり合って成立した言語の詩集。現在のパキスタンの国語であり、ヒンドゥーとイスラームの文化融合の象徴。", type: "buff_attr", target: "CULTURE", value: 0.2 },
  { id: 391, name: "大移動の幌馬車", desc: "375年のフン族の西進に押し出され、西ローマ帝国領内に雪崩れ込んでヨーロッパの歴史を根本から変えたゲルマン人たちの移動用馬車。375年のフン族の西進に押し出され、西ローマ帝国領内に雪崩れ込んでヨーロッパの歴史を根本から変えたゲルマン人たちの移動用馬車。古代地中海世界を破壊し、新たな中世ヨーロッパ世界を創り出す歴史の原動力。", type: "buff_all", value: 0.2 },
  { id: 392, name: "フランク王国の鎖帷子", desc: "トゥール・ポワティエ間の戦いなどでイスラーム軍の侵略を防いだ、カール・マルテルらフランク軍の重装騎兵の防具。トゥール・ポワティエ間の戦いなどでイスラーム軍の侵略を防いだ、カール・マルテルらフランク軍の重装騎兵の防具。この高価な装備を維持するために恩貸地制度が結びつき、中世の封建制と騎士階級を誕生させた。", type: "damage_cut_all", value: 0.15 },
  { id: 393, name: "カロリング・ルネサンスの写本", desc: "カール大帝がアルクインらを招き、修道院で古代ローマのラテン語古典文献を書き写させたカロリング小字体の写本。カール大帝がアルクインらを招き、修道院で古代ローマのラテン語古典文献を書き写させたカロリング小字体の写本。暗黒時代に消えかけた古典の叡智を修道院の写字室で保存し、ラテン・キリスト教文化の基礎を守った。", type: "buff_attr", target: "CULTURE", value: 0.25 },
  { id: 394, name: "ヴァイキングのロングシップ", desc: "8世紀末からヨーロッパの海岸や河川を荒らし回ったノルマン人の、浅瀬も航行可能な細長い船。8世紀末からヨーロッパの海岸や河川を荒らし回ったノルマン人の、浅瀬も航行可能な細長い船。機動力を活かした神出鬼没の略奪や交易で西欧社会を恐怖に陥れ、封建制のさらなる発達を外部から強制した。", type: "buff_pos", pos: 2, value: 0.35 },
  { id: 395, name: "バイユーのタペストリー", desc: "1066年、ノルマンディー公ウィリアムによるイングランド征服（ノルマン・コンクェスト）の経緯が、長さ70mの麻布に色糸で刺繍された歴史的記録。1066年、ノルマンディー公ウィリアムによるイングランド征服（ノルマン・コンクェスト）の経緯が、長さ70mの麻布に色糸で刺繍された歴史的記録。ヘースティングズの戦いの激しさと、強力な王権国家誕生の瞬間を伝える。", type: "buff_attr", target: "VALOR", value: 0.25 },
  { id: 396, name: "キリル文字の祈祷書", desc: "9世紀、ビザンツの宣教師キュリロス兄弟がスラヴ人布教のために考案した文字を起源とする正教会の祈祷書。9世紀、ビザンツの宣教師キュリロス兄弟がスラヴ人布教のために考案した文字を起源とする正教会の祈祷書。モラヴィア王国やキエフ公国を通じて東ヨーロッパに広まり、ロシアやバルカン半島の精神的基盤となった。", type: "heal_round", value: 0.08 },
  { id: 397, name: "タタールのくびきの割符", desc: "13世紀、キプチャク・ハン国（バトゥ）がロシアの諸公に対して徴税と服従の証として与えた特許状（ヤルルィク）。13世紀、キプチャク・ハン国のバトゥがロシアの諸侯に対して徴税と服従の証として与えた特許状（ヤルルィク）。約240年に及ぶ「タタールのくびき」と呼ばれるモンゴルの過酷な支配と、ロシアの西欧化の遅れを象徴する。", type: "debuff_all", value: 0.25 },
  { id: 398, name: "クリュニー修道院の戒律書", desc: "10世紀にフランスで設立され、「祈り、働け」の厳格なベネディクトゥスの戒律の復興を目指した修道院の規則。10世紀にフランスで設立され、「祈り、働け」の厳格なベネディクトゥスの戒律の復興を目指した修道院の規則。教皇グレゴリウス7世らを輩出し、世俗権力からの教会の解放を目指す叙任権闘争の強固な精神的支柱となった。", type: "buff_attr", target: "STRATEGY", value: 0.25 },
  { id: 399, name: "ヴォルムス協約の署名文", desc: "1122年、教皇カリストゥス2世と神聖ローマ皇帝ハインリヒ5世との間で結ばれ、長きにわたる聖職叙任権闘争に一応の妥協をもたらした条約文書。1122年、教皇カリストゥス2世と神聖ローマ皇帝ハインリヒ5世との間で結ばれ、長きにわたる聖職叙任権闘争に一応の妥協をもたらした条約文書。皇帝は指輪と杖による霊的権威の授与を放棄し、教皇の優位が確立された。", type: "buff_attr", target: "STRATEGY", value: 0.2 },
  { id: 400, name: "ヴェネツィアのガレー船の櫂", desc: "東方貿易（レヴァント貿易）で巨富を築き、「アドリア海の女王」と称されたヴェネツィア共和国の交易と戦闘を兼ねた船のオール。東方貿易（レヴァント貿易）で巨富を築き、「アドリア海の女王」と称されたヴェネツィア共和国の交易と戦闘を兼ねた船のオール。第4回十字軍を借金漬けにしてコンスタンティノープルに向けさせた冷徹な商業的野心の象徴。", type: "buff_all", value: 0.2 },
  { id: 401, name: "シャンパーニュの定期市の秤", desc: "12〜13世紀、地中海商業圏と北海・バルト海商業圏を結ぶフランス内陸部の交通の要衝で開かれた大定期市で、為替手形や香辛料、毛織物を計量した秤。12〜13世紀、地中海商業圏と北海・バルト海商業圏を結ぶフランス内陸部の交通の要衝で開かれた大定期市で、為替手形や香辛料、毛織物を計量した秤。十字軍後の商業革命と、内陸交易ネットワークの絶頂期を示す。", type: "buff_hp", value: 0.25 },
  { id: 402, name: "ハンザ同盟のコグ船", desc: "リューベックを盟主とする北ドイツの都市同盟が、バルト海・北海交易を独占するために用いた積載量の大きい帆船。リューベックを盟主とする北ドイツの都市同盟が、バルト海・北海交易を独占するために用いた積載量の大きい帆船。木材や海産物などの生活必需品を運び、北ヨーロッパに国王をも凌ぐ強大な経済圏と軍事力を築き上げた。", type: "buff_attr", target: "STRATEGY", value: 0.25 },
  { id: 403, name: "フィレンツェのフローリン金貨", desc: "13世紀半ばからフィレンツェ共和国で鋳造され、ヨーロッパの基軸通貨となった高純度の金貨。13世紀半ばからフィレンツェ共和国で鋳造され、ヨーロッパの基軸通貨となった高純度の金貨。毛織物業とメディチ家などの金融業による莫大な富の蓄積を示し、のちのイタリア・ルネサンスにおけるパトロン活動の資金源となった。", type: "buff_all", value: 0.2 },
  { id: 404, name: "ロンバルディア同盟の盟約書", desc: "12世紀、神聖ローマ皇帝（フリードリヒ1世）のイタリア政策（南下政策）に対抗するため、ミラノを中心に北イタリアの自治都市（コムーネ）が結成した軍事同盟の誓約書。12世紀、神聖ローマ皇帝（フリードリヒ1世）のイタリア政策（南下政策）に対抗するため、ミラノを中心に北イタリアの自治都市（コムーネ）が結成した軍事同盟の誓約書。教皇党（ゲルフ）と結んで皇帝軍をレニャーノの戦いで破った。", type: "debuff_all", value: 0.2 },
  { id: 405, name: "ツンフトの親方の看板", desc: "中世都市において、商人ギルドに対抗して市政参加を求めた手工業者たちの同業組合（同職ギルド）の看板。中世都市において、大商人たちの商人ギルドの市政独占に対抗して（ツンフト闘争）、手工業者たちが結成した同業組合の看板。技術の独占と品質維持、厳しい徒弟制度を敷き、自由競争を完全に制限して組合員の生活を保護した。", type: "damage_cut_all", value: 0.15 },
  { id: 406, name: "徒弟制度の契約書", desc: "中世の手工業ギルドにおいて、職人や親方になるために数年間の無給の住み込み修行を義務付けた契約書。中世の手工業ギルドにおいて、職人や親方になるために数年間の無給の住み込み修行を義務付けた契約書。技術伝承と品質保持の厳格なシステムであったが、のちの自由な資本主義やマニュファクチュア発展の巨大な障害となった。", type: "debuff_enemy", value: 0.45 },
  { id: 407, name: "ボローニャ大学の法学テキスト", desc: "11世紀末に設立された世界最古の大学で、ユスティニアヌスの『ローマ法大全』を研究する註釈学派が用いたテキスト。11世紀末に設立された世界最古の大学で、ユスティニアヌスの『ローマ法大全』を研究する註釈学派が用いたテキスト。古代の法理を普遍的なルールとして再解釈し、12世紀ルネサンスの中核としてヨーロッパ法学を飛躍的に発展させた。", type: "buff_attr", target: "STRATEGY", value: 0.3 },
  { id: 408, name: "パリ大学の神学講義録", desc: "12世紀半ばに設立され、ヨーロッパ神学の最高権威となった大学のノート。12世紀半ばに教員組合を起源として設立され、ヨーロッパ神学の最高権威となった大学のノート。アベラールやトマス・アクィナスらがアリストテレス哲学とキリスト教信仰の調和を巡って白熱した普遍論争（スコラ学）を展開した知の殿堂。", type: "buff_attr", target: "CULTURE", value: 0.3 },
  { id: 409, name: "ロマネスク建築の半円アーチ", desc: "11〜12世紀の西欧で流行した、ピサ大聖堂などに代表される、分厚い石壁と小さな窓、そしてローマ風の半円アーチを特徴とする重厚な教会建築様式。11〜12世紀の西欧で流行した、ピサ大聖堂などに代表される、分厚い石壁と小さな窓、そしてローマ風の半円アーチを特徴とする重厚な教会建築様式。修道院の発展やサンティアゴ・デ・コンポステーラなどへの聖地巡礼の熱狂を背景に建設された。", type: "damage_cut_all", value: 0.15 },
  { id: 410, name: "フライング・バットレス（飛梁）", desc: "12世紀以降のゴシック建築（ノートルダム大聖堂など）を可能にした、外壁を支えるアーチ状の梁。12世紀以降のゴシック建築（ノートルダム大聖堂など）を可能にした、外壁を外側から支えるアーチ状の梁。壁を極限まで薄くし、巨大なステンドグラスの窓と天にそびえる尖頭アーチという、神へ近づくための壮麗な空間を実現した。", type: "buff_attr", target: "CULTURE", value: 0.25 },
  { id: 411, name: "アーサー王物語の羊皮紙", desc: "ケルト人の伝説的な英雄と円卓の騎士たちの冒険を描き、中世ヨーロッパの宮廷で愛読された騎士道物語。ケルト人の伝説的な英雄と円卓の騎士たちの冒険を描き、中世ヨーロッパの宮廷で広く愛読された騎士道物語。キリスト教的な道徳と、ロマンチックな恋愛（宮廷の愛）や武勇の理想像が混ざり合い、中世騎士階級の精神を形作った。", type: "buff_pos", pos: 3, value: 0.35 },
  { id: 412, name: "トゥルバドゥールのリュート", desc: "南フランスを中心に活躍した吟遊詩人たちが、宮廷の貴婦人への献身的な恋愛（宮廷の愛）を南仏語（オック語）で弾き語った楽器。南フランスを中心に活躍した吟遊詩人（トゥルバドゥール）たちが、十字軍を背景に、宮廷の貴婦人への献身的な恋愛を南仏語（オック語）で弾き語った楽器。武骨な戦士であった騎士たちを洗練された貴族へと教化する役割を果たした。", type: "buff_attr", target: "CULTURE", value: 0.2 },
  { id: 413, name: "模範議会の召集状", desc: "1295年、イギリス王エドワード1世がスコットランドやフランスとの戦費調達のために、大貴族や高位聖職者に加え、各州の騎士や各都市の市民の代表も集めた議会の文書。1295年、イギリス王エドワード1世がスコットランドやフランスとの戦費調達のために、大貴族や高位聖職者に加え、各州の騎士や各都市の市民の代表も集めた議会の文書。課税には身分制議会の承認が必要であるというイギリス議会政治の出発点となった。", type: "buff_attr", target: "STRATEGY", value: 0.25 },
  { id: 414, name: "フランスの三部会の記録", desc: "1302年、フランス王フィリップ4世が教皇ボニファティウス8世との聖職者課税問題での対立を乗り切るため、聖職者・貴族・平民の代表を招集した身分制議会の文書。1302年、フランス王フィリップ4世が教皇ボニファティウス8世との聖職者課税問題での対立を乗り切るため、聖職者・貴族・平民の代表を招集した身分制議会の文書。教皇権の没落（アナーニ事件）を決定づけ、フランス絶対王政への道を拓いた。", type: "buff_attr", target: "STRATEGY", value: 0.25 },
  { id: 415, name: "ロングボウ（長弓）", desc: "百年戦争初期のクレシーの戦いなどで、イギリスの農民歩兵（ヨーマン）が使用した強力な弓。百年戦争初期のクレシーの戦いなどで、イギリスの独立自営農民（ヨーマン）からなる歩兵部隊が使用した強力な弓。フランスの誇る重装騎士の突撃を遠距離から次々と粉砕し、中世的な戦術の終焉と騎士階級の没落を決定づけた革新的な兵器。", type: "buff_attr", target: "VALOR", value: 0.35 },
  { id: 416, name: "ジャンヌ・ダルクの白百合の軍旗", desc: "百年戦争の末期、イギリス軍に包囲され滅亡の危機にあったオルレアンを救った農民の少女が掲げた旗。百年戦争の末期、イギリス軍に包囲され滅亡の危機にあったオルレアンを救った農民の少女が掲げた旗。神の啓示を信じる彼女の純粋な姿は、フランス軍の士気を奇跡的に復活させ、バラバラだったフランス人の国民意識（ナショナリズム）を強く覚醒させた。", type: "heal_round", value: 0.1 },
  { id: 417, name: "デカメロンの羊皮紙", desc: "14世紀のフィレンツェでペストの難を逃れた男女が語り合う、ボッカッチョの近代小説の先駆的作品。14世紀のフィレンツェでペストの難を逃れた男女が語り合う、ボッカッチョの近代小説の先駆的作品。教会の権威が揺らぐ中、人間の欲望や聖職者の偽善を赤裸々に描き、中世の禁欲主義を打破したルネサンスの人間賛歌の傑作。", type: "debuff_all", value: 0.2 },
  { id: 418, name: "サンタ・マリア・デル・フィオーレの設計図", desc: "初期ルネサンスの天才ブルネレスキが、フィレンツェ大聖堂に足場なしで巨大な八角形のドーム（クーポラ）を架けた際の設計図。初期ルネサンスの天才ブルネレスキが、フィレンツェ大聖堂に足場なしで巨大な八角形のドーム（クーポラ）を架けた際の設計図。古代ローマ建築（パンテオンなど）の深い研究と高度な数学的計算の結晶であり、ルネサンス建築の幕開けを告げる記念碑。", type: "buff_hp", value: 0.3 },
  { id: 419, name: "ヴィーナスの誕生のキャンバス", desc: "ボッティチェリがメディチ家の保護のもと、キリスト教の題材ではなくギリシア神話の異教的な女神の裸体を優美で神秘的に描いたルネサンスの傑作。ボッティチェリがメディチ家の保護のもと、中世ではタブーであったギリシア神話の異教的な女神の全裸像を優美で神秘的に描いたルネサンスの傑作。フィレンツェで流行した新プラトン主義における、精神的な愛と美のイデアの体現とされる。", type: "buff_attr", target: "CULTURE", value: 0.3 },
  { id: 420, name: "ダヴィデ像の大理石の欠片", desc: "ミケランジェロが巨大な大理石から彫り出した、ゴリアテに立ち向かう若き英雄の等身大の全裸彫刻。ミケランジェロが巨大な大理石から彫り出した、巨人ゴリアテに立ち向かう直前の若き英雄の等身大の全裸彫刻。ルネサンスの完成された解剖学的な肉体美と、強国に囲まれたフィレンツェ共和国の自由と独立を守る強烈な意志が込められている。", type: "buff_all", value: 0.2 },
  { id: 421, name: "最後の晩餐のテンペラ画材", desc: "「万能人」レオナルド・ダ・ヴィンチがミラノの修道院の壁に、完璧な遠近法と解剖学的知識を駆使して描いた傑作の画材。「万能人」レオナルド・ダ・ヴィンチがミラノの修道院の食堂の壁に、完璧な一点透視図法と解剖学的知識を駆使して描いた傑作の画材。ユダの裏切りを告げられた直後の使徒たちの驚きと劇的な心理描写を、冷徹な科学の眼と芸術を統合して描き切った。", type: "debuff_enemy", value: 0.5 },
  { id: 422, name: "ルターのドイツ語聖書", desc: "教皇から破門されたルターが、ヴァルトブルク城に匿われている間に原典のギリシア語から翻訳した新約聖書。教皇から破門されたルターが、ザクセン選帝侯の庇護下でヴァルトブルク城に匿われている間に、原典のギリシア語から翻訳した新約聖書。グーテンベルクの活版印刷によって民衆に広く普及し、万人祭司主義を裏付けるとともに近代ドイツ語の基礎を確立した。", type: "buff_attr", target: "CULTURE", value: 0.35 },
  { id: 423, name: "トリエント公会議の決議書", desc: "1545年からカトリック教会がプロテスタントの攻勢に対抗するため（対抗宗教改革）に開いた会議の文書。1545年から、カトリック教会がプロテスタントの攻勢に対抗するため（対抗宗教改革）に開いた公会議の文書。プロテスタントとの妥協を一切拒否し、教皇の至上権と旧来の教義の正統性を再確認して、異端審問や禁書目録による厳しい内部統制を図った。", type: "damage_cut_all", value: 0.15 },
  { id: 424, name: "無敵艦隊（アルマダ）のガレオン船", desc: "1588年、スペイン王フェリペ2世がイギリスのエリザベス1世を打倒するために派遣した巨大艦隊。1588年、スペイン王フェリペ2世が、オランダ独立を支援し私掠船で自国を脅かすイギリス（エリザベス1世）を打倒するために派遣した巨大艦隊。しかしドレークらの火船攻撃と暴風雨によりアルマダ海戦で壊滅し、スペイン没落の決定的な転換点となった。", type: "buff_attr", target: "VALOR", value: 0.25 },
  { id: 425, name: "イギリス東インド会社の特許状", desc: "1600年、エリザベス1世がロンドンの商人に与えた、喜望峰からマゼラン海峡に至るアジアの貿易独占権を認める文書。1600年、エリザベス1世がロンドンの商人に与えた、喜望峰からマゼラン海峡に至るアジアの貿易独占権を認める文書。のちにインドのプラッシーの戦いなどを経て、単なる特権的商業組織から、広大なインド帝国を直接統治する巨大な国家機関へと変貌した。", type: "buff_attr", target: "STRATEGY", value: 0.3 },
  { id: 426, name: "鉄騎隊（アイアンサイズ）の甲冑", desc: "ピューリタン革命において、クロムウェルが熱烈な信仰を持つ独立派の農民（ヨーマン）を中心に組織した新型軍の装備。ピューリタン革命において、クロムウェルが熱烈な信仰を持つ独立派の農民（ヨーマン）を中心に組織した新型軍の装備。酒や賭博を禁じる厳格な規律と狂信的な士気で王党派の騎兵をネイズビーの戦いで完全に粉砕し、絶対王政を崩壊させた。", type: "buff_attr", target: "VALOR", value: 0.35 },
  { id: 427, name: "リシュリューの赤い帽子", desc: "フランス王ルイ13世に仕え、大貴族やユグノーの特権を冷酷に奪って絶対王政の基礎を固めた枢機卿の象徴。フランス王ルイ13世に仕え、大貴族やユグノーの特権を冷酷に奪って絶対王政の基礎を固めた枢機卿の象徴。三十年戦争ではカトリック国でありながら、ハプスブルク家打倒という「国家理性（国益）」を最優先して新教側で参戦した冷徹な政治家。", type: "buff_attr", target: "STRATEGY", value: 0.35 },
  { id: 428, name: "王立マニュファクチュアのタペストリー", desc: "ルイ14世の財務総監コルベールが、極端な重商主義政策の一環として設立した国立ゴブラン織物工場の製品。ルイ14世の財務総監コルベールが、極端な重商主義政策の一環として設立した国立ゴブラン織物工場の製品。国内産業を保護・育成して輸出を振興し、王の度重なる自然国境説に基づく侵略戦争と、ヴェルサイユ宮殿造営のための莫大な資金源を調達した。", type: "buff_all", value: 0.2 },
  { id: 429, name: "ヴェルサイユの鏡の間のシャンデリア", desc: "太陽王ルイ14世が莫大な国費を投じて建造したバロック様式の宮殿の中心部を飾る装飾。太陽王ルイ14世が莫大な国費と重税を投じて建造したバロック様式の宮殿の中心部を飾る装飾。1871年には普仏戦争に勝利したドイツ帝国の戴冠式が、1919年には第一次大戦の過酷な講和条約が結ばれた、ヨーロッパ近代史の栄光と屈辱の究極の舞台。", type: "buff_hp", value: 0.3 },
  { id: 430, name: "巨人兵団の軍服", desc: "プロイセンの「兵隊王」フリードリヒ・ヴィルヘルム1世が、ヨーロッパ中から長身の男を金で買い集めて編成した近衛連隊の軍服。プロイセンの「兵隊王」フリードリヒ・ヴィルヘルム1世が、ヨーロッパ中から長身の男を金で買い集めて編成した近衛連隊の軍服。国家予算の大部分を常備軍に注ぎ込み、次代のフリードリヒ2世の飛躍の基礎となる徹底した軍国主義的絶対王政の象徴。", type: "buff_attr", target: "VALOR", value: 0.25 },
  { id: 431, name: "ピョートル1世の髭税のメダル", desc: "ロシアの近代化と西欧化を急ぐ大帝が、伝統的な長い髭を切り落とすことを拒否した保守的な貴族（ボヤール）たちから強制的に徴収した税の領収証。ロシアの近代化と西欧化を急ぐピョートル大帝が、伝統的な長い髭を切り落とすことを拒否した保守的な貴族（ボヤール）たちから強制的に徴収した税の領収証。反対派を容赦なく弾圧する、強引な「上からの改革」による絶対王政確立の凄まじい執念を示す。", type: "debuff_all", value: 0.2 },
  { id: 432, name: "エカチェリーナ2世の書簡", desc: "ロシアの女帝がヴォルテールやディドロなどのフランス啓蒙思想家と交わした手紙。ロシアの女帝がヴォルテールやディドロなどのフランス啓蒙思想家と交わした手紙。啓蒙専制君主を演じつつ、プガチョフの乱後は農奴制を一層強化し、ポーランド分割やオスマン帝国からのクリミア半島奪取など、極めて冷徹な帝国主義的拡張を行った。", type: "buff_attr", target: "STRATEGY", value: 0.3 },
  { id: 433, name: "賦役黄冊", desc: "明の洪武帝（朱元璋）が作成させた、全国の戸籍と租税の台帳。明の洪武帝（朱元璋）が全国の戸籍と租税を把握するために作成させた、黄色い表紙の台帳。里甲制と結びつき、農民を土地に縛り付けて厳密に徴税と労役を課すことで、皇帝の絶対的な専制独裁体制と農村の末端支配を根底から支えた強固なシステム。", type: "buff_all", value: 0.2 },
  { id: 434, name: "里甲制の村の掟（六諭）", desc: "明の洪武帝が農村の教化のために発布した六カ条の道徳的教訓。明の洪武帝が農村の教化と治安維持のために発布した六カ条の道徳的教訓。「親に孝順にせよ」など儒教的な身分秩序を里老人を通じて民衆に徹底させることで、法律や刑罰だけでなく思想面からも極めて強固な社会統制を図ろうとした。", type: "damage_cut_all", value: 0.15 },
  { id: 435, name: "紫禁城の瑠璃瓦", desc: "明の永楽帝が北京への遷都に伴って造営を開始した、皇帝の絶対的な権威を示す巨大な宮殿の屋根を葺く黄色い瓦。明の永楽帝が北京への遷都に伴って造営を開始した、皇帝の絶対的な権威を示す巨大な宮殿の屋根を葺く黄色い瓦。明・清両王朝の約500年にわたり、中華帝国の世界の中心としての絶大な威圧感と、皇帝の隔絶された神秘性を放ち続けた。", type: "buff_hp", value: 0.3 },
  { id: 436, name: "鄭和の宝船の羅針盤", desc: "明の永楽帝の命で、イスラーム教徒の宦官・鄭和が東南アジアからアフリカ東岸まで7度の大遠征を行った際に、巨大な艦隊を導いた羅針盤。明の永楽帝の命で、イスラーム教徒の宦官・鄭和が東南アジアからアフリカ東岸まで7度の大遠征を行った際に、巨大な宝船（ほうせん）の艦隊を導いた羅針盤。中華帝国の威信を南海に誇示し、東南アジア諸国の朝貢を促した偉大な航海技術の結晶。", type: "buff_pos", pos: 5, value: 0.35 },
  { id: 437, name: "景徳鎮の赤絵の壺", desc: "明代の江西省・景徳鎮の官窯で焼かれた、白磁の上に赤や緑の鮮やかな上絵付けを施した陶磁器。明代の江西省・景徳鎮の官窯で焼かれた、白磁の上に赤や緑の鮮やかな上絵付けを施した陶磁器。大航海時代以降、ヨーロッパの王侯貴族を熱狂させ、「シノワズリ（中国趣味）」の流行と莫大な銀の中国への流入を引き起こした圧倒的な工芸の力。", type: "buff_attr", target: "CULTURE", value: 0.25 },
  { id: 438, name: "山西商人の為替手形（会票）", desc: "明清時代、塩の専売などで巨富を築き、中国全土の金融や流通を支配した特権的な商人（政商）が用いた手形。明清時代、塩の専売などの特権で巨富を築き、中国全土の金融や流通を支配した特権的な山西商人（政商）が用いた手形。徽州商人（新安商人）とともに、同郷の結束（会館・公所）を武器に、全国規模の巨大な商業ネットワークと信用取引を構築した。", type: "buff_attr", target: "STRATEGY", value: 0.25 },
  { id: 439, name: "八旗の軍旗", desc: "清の太祖ヌルハチが満洲族を編成して創設した、軍事・行政・社会が一体となった組織の旗。清の太祖ヌルハチが満洲族を編成して創設した、軍事・行政・社会が一体となった組織の旗。黄・白・紅・藍の四色を基本とし、のちにモンゴル八旗や漢軍八旗も加えられ、明を滅ぼして広大な中国大陸を征服する清朝の最強の武力・統治基盤となった。", type: "buff_attr", target: "VALOR", value: 0.3 },
  { id: 440, name: "辮髪の勅令", desc: "清朝が北京入城後、漢人の男性に対して満洲族の風習である頭の前半分の毛を剃り後ろを長く編み込む髪型を強制した命令。清朝が北京入城後、漢人の男性に対して満洲族の風習である頭の前半分の毛を剃り後ろを長く編み込む髪型を強制した命令。「頭を留める者は髪を留めず」と徹底弾圧し、太平天国や辛亥革命で切り落とされるまで、異民族支配への屈従を視覚的に強要し続けた。", type: "debuff_all", value: 0.25 },
  { id: 441, name: "ミュール紡績機", desc: "1779年、イギリスのクロンプトンがジェニー紡績機と水力紡績機の長所を組み合わせて発明した機械。1779年、イギリスのクロンプトンがハーグリーヴズのジェニー紡績機とアークライトの水力紡績機の長所を組み合わせて発明した機械。細くて丈夫な綿糸の大量生産を可能にし、産業革命の主力産業であるイギリス綿工業を飛躍的に発展させ、世界の衣料を変えた。", type: "buff_all", value: 0.2 },
  { id: 442, name: "ホイットニーの綿繰り機", desc: "1793年、アメリカで発明された綿の種子を繊維から機械的に分離する装置。1793年、アメリカで発明された綿の種子を繊維から機械的に分離する装置。イギリス綿工業の爆発的な原料需要に応えてアメリカ南部の綿花プランテーションを急拡大させ、結果的に衰退しつつあった黒人奴隷制を再び固定化・拡大させて南北戦争の遠因を作った。", type: "buff_attr", target: "STRATEGY", value: 0.2 },
  { id: 443, name: "トラファルガーの信号旗", desc: "1805年、ネルソン提督がフランス・スペイン連合艦隊を撃滅した海戦において、旗艦ヴィクトリー号に掲げた「英国は各員がその義務を尽くすことを期待する」という信号旗。1805年、ネルソン提督がフランス・スペイン連合艦隊を撃滅した海戦において、旗艦ヴィクトリー号に掲げた「英国は各員がその義務を尽くすことを期待する」という信号旗。ナポレオンのイギリス上陸の野望を永遠に葬り去り、イギリスの絶対的な制海権を確立した。", type: "buff_attr", target: "VALOR", value: 0.3 },
  { id: 444, name: "ライプツィヒの戦いの軍旗", desc: "1813年、ロシア遠征に失敗したナポレオンに対し、プロイセン・ロシア・オーストリアなどの連合軍が立ち上がり、「諸国民の戦い」でフランス軍を大破した際の旗。1813年、ロシア遠征に失敗したナポレオンに対し、プロイセン・ロシア・オーストリアなどの連合軍が立ち上がり、「諸国民の戦い」でフランス軍を大破した際の旗。フランス革命の理念が逆説的に生み出したドイツ・ナショナリズムの解放と、ナポレオン没落の象徴。", type: "buff_pos", pos: 4, value: 0.35 },
  { id: 445, name: "ウェリントンの軍服", desc: "1815年のワーテルローの戦いで、エルバ島を脱出して復活したナポレオン（百日天下）をプロイセン軍のブリュッヘルとともに完全に打ち破った「鉄の公爵」の軍服。1815年のワーテルローの戦いで、エルバ島を脱出して復活したナポレオン（百日天下）を、プロイセン軍のブリュッヘルとともに完全に打ち破った「鉄の公爵」の軍服。四半世紀に及ぶ激動のフランス革命とナポレオン戦争に最終的な終止符を打った。", type: "damage_cut_all", value: 0.15 },
  { id: 446, name: "ジャックリーの鎌", desc: "1358年、百年戦争とペストの混乱の中、領主の過酷な搾取（封建反動）に耐えかねてフランス北部の農民たちが蜂起した際に手にした農具。1358年、百年戦争の敗北とペストの混乱の中、領主の過酷な搾取（封建反動）に耐えかねてフランス北部の農民たちが蜂起した際に手にした農具。傭兵崩れによる略奪への怒りが爆発した、中世ヨーロッパにおける最初の大規模な農民反乱の悲惨な記録。", type: "debuff_enemy", value: 0.5 },
  { id: 447, name: "ワット・タイラーのプラカード", desc: "1381年、イギリスで人頭税に反対して起きた農民反乱で、「アダムが耕しイヴが紡いだ時、誰が貴族であったか」というジョン・ボールの平等思想を掲げた板。1381年、イギリスで百年戦争の戦費調達のための人頭税に反対して起きた農民反乱で、「アダムが耕しイヴが紡いだ時、誰が貴族であったか」というジョン・ボールの平等思想を掲げた板。農奴制の崩壊と独立自営農民（ヨーマン）台頭の時代の声を力強く伝える。", type: "debuff_all", value: 0.2 },
  { id: 448, name: "アウステルリッツの軍配", desc: "1805年、ナポレオンがロシアのアレクサンドル1世とオーストリアのフランツ1世の連合軍を完破した「三帝会戦」で振るった采配。1805年、ナポレオンがロシアのアレクサンドル1世とオーストリアのフランツ1世の連合軍を完破した「三帝会戦」で振るった采配。この歴史的勝利によりライン同盟が結成されて神聖ローマ帝国は事実上解体され、フランス第一帝政の軍事的栄光は絶頂に達した。", type: "buff_pos", pos: 1, value: 0.4 },
  { id: 449, name: "カルボナリのシンボル", desc: "19世紀初頭、ナポリ王国などで結成され、イタリアの統一と自由主義的憲法の制定を目指して武装蜂起した秘密結社（炭焼党）の紋章。19世紀初頭、ナポリ王国などで結成され、イタリアの統一と自由主義的憲法の制定を目指して武装蜂起した秘密結社（炭焼党）の紋章。ウィーン体制の保守反動的な政治に対する民衆の抵抗の火種となり、弾圧されたのちもマッツィーニの青年イタリアに引き継がれた。", type: "buff_attr", target: "STRATEGY", value: 0.25 },
  { id: 450, name: "青年イタリアの宣誓書", desc: "1831年、カルボナリの失敗を反省したマッツィーニがマルセイユで結成した、共和政によるイタリア統一を目指す結社の誓約書。1831年、カルボナリの失敗を反省したマッツィーニがマルセイユで結成した、共和政によるイタリア統一を目指す結社の誓約書。秘密結社ではなく大衆への公然とした宣伝活動を行い、1848年の「ローマ共和国」樹立などの急進的でロマン主義的な運動を主導した。", type: "buff_all", value: 0.2 },
  { id: 451, name: "第二共和政の投票箱", desc: "1848年のフランス二月革命後、七月王政を打倒して成立した臨時政府が、世界で初めて実施した男子普通選挙の投票箱。1848年のフランス二月革命後、七月王政を打倒して成立した臨時政府が、世界で初めて実施した男子普通選挙の投票箱。しかしこの選挙で社会主義者のルイ・ブランらが大敗したことは、保守的な農民が急進的な変革（土地財産の没収）を激しく恐れたことを如実に示す。", type: "buff_attr", target: "STRATEGY", value: 0.3 },
  { id: 452, name: "クルップ社の大砲", desc: "1870年の普仏戦争において、ビスマルク率いるプロイセン軍がナポレオン3世のフランス軍をスダンで包囲降伏させた際に威力を発揮した、ドイツ最大の鉄鋼コンツェルンが製造した最新鋭の後装式鋼鉄製大砲。1870年の普仏戦争において、ビスマルク率いるプロイセン軍がナポレオン3世のフランス軍をスダンで包囲・降伏させた際に圧倒的な威力を発揮した、ドイツ最大の鉄鋼コンツェルンが製造した最新鋭の後装式鋼鉄製大砲。重化学工業を主体とする第二次産業革命の軍事力の象徴。", type: "buff_attr", target: "VALOR", value: 0.3 },
  { id: 453, name: "ドイツ関税同盟の協定書", desc: "1834年、プロイセンを中心に、オーストリアを排除して結成された経済的な同盟の文書。1834年、プロイセンを中心に、多民族国家であるオーストリアを排除して結成された経済的な同盟の文書。ドイツ領邦間の関税を撤廃し、リストが提唱した保護貿易主義によって国内産業を育成。政治的なドイツ統一（小ドイツ主義）に先駆けて、経済的な統一を実質的に成し遂げた。", type: "buff_all", value: 0.2 },
  { id: 454, name: "社会主義者鎮圧法の条文", desc: "1878年、皇帝狙撃事件を口実に、ビスマルクがドイツ社会民主党などの活動を非合法化し弾圧した法律。1878年、皇帝狙撃事件を口実に、ビスマルクがドイツ社会民主党などの活動を非合法化し徹底的に弾圧した法律。一方で「アメ」の政策として疾病保険などの世界初の社会政策を導入し、労働者を国家に統合しようとする「アメとムチ」のビスマルク体制の象徴。", type: "debuff_all", value: 0.25 },

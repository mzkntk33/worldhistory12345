  { id: 455, name: "デカブリストの軍刀", desc: "1825年、ナポレオン戦争で西欧の自由主義思想に触れたロシアの青年貴族士官（十二月党員）たちが、ニコライ1世の即位に際して憲法制定や農奴制廃止を求めてペテルブルクで起こした反乱の武器。1825年、ナポレオン戦争で西欧の自由主義思想に触れたロシアの青年貴族士官（十二月党員）たちが、ニコライ1世の即位に際して憲法制定や農奴制廃止を求めてペテルブルクで起こした反乱の武器。ロシアにおける最初の近代的な革命運動であったが、ツァーリズムの前に無残に鎮圧された。", type: "debuff_enemy", value: 0.4 },
  { id: 456, name: "ドン・キホーテの初版本", desc: "17世紀初頭、レパントの海戦で負傷したスペインの作家セルバンテスが著した近代小説の傑作。17世紀初頭、レパントの海戦で負傷したスペインの作家セルバンテスが著した近代小説の傑作。時代遅れの騎士道物語に夢中になったドン・キホーテの滑稽な冒険を通して、無敵艦隊敗北後の斜陽に向かうスペイン社会の厳しい現実と人間の哀愁を鋭く風刺した。", type: "buff_attr", target: "CULTURE", value: 0.3 },
  { id: 457, name: "ガリヴァー旅行記の初版本", desc: "18世紀前半、アイルランド出身の聖職者スウィフトが著した風刺文学。18世紀前半、アイルランド出身の聖職者スウィフトが著した風刺文学。小人国や巨人国などの奇想天外な冒険の形を借りて、当時のイギリスのホイッグ党とトーリ党の不毛な政争や、科学万能主義の傲慢さ、そして人間の本質的な愚かさを徹底的かつ痛烈に批判した。", type: "debuff_enemy", value: 0.25 },
  { id: 458, name: "ビーグル号の航海日誌", desc: "19世紀、イギリスの自然科学者ダーウィンが南米やガラパゴス諸島などを測量船で探検した際の記録。19世紀、イギリスの自然科学者ダーウィンが南米やガラパゴス諸島などを測量船で長期間探検した際の記録。このガラパゴスフィンチなどの膨大な観察データが、のちに『種の起源』における自然選択説（進化論）という、人類の自然観と宗教観を根本から覆す大発見の基礎となった。", type: "buff_attr", target: "CULTURE", value: 0.3 },
  { id: 459, name: "モールス信号機", desc: "19世紀半ば、アメリカのモースが発明した有線電信機。19世紀半ば、アメリカのモースが発明した有線電信機。海底ケーブルの敷設とともに瞬時に情報を世界中に伝達することを可能にし、帝国主義諸国による植民地支配の効率的なネットワーク化や、グローバルな金融・商業取引を劇的に加速させた、19世紀の巨大な情報革命の利器。", type: "buff_all", value: 0.2 },
  { id: 460, name: "ダイナマイト", desc: "19世紀後半、スウェーデンの化学者ノーベルが発明した安全な高性能爆薬。19世紀後半、スウェーデンの化学者ノーベルが発明した安全な高性能爆薬。土木工事や鉱山開発を飛躍的に効率化したが、同時に戦争の殺戮と破壊の力を桁違いに増大させた。その莫大な特許収入の遺産は、皮肉にも平和や科学の発展を称えるノーベル賞の創設資金となった。", type: "debuff_all", value: 0.25 },
  { id: 461, name: "ベルの電話機", desc: "1876年、アメリカのベルが発明した音声通信機器。1876年、アメリカのベルが発明した音声通信機器。モールス信号の点と線による無機質な通信から、人間の肉声そのものを遠隔地へ瞬時に届けることを可能にし、第二次産業革命期における都市の大企業ビジネスや市民生活のコミュニケーションを根本から変革した。", type: "heal_round", value: 0.1 },
  { id: 462, name: "ダイムラーのガソリンエンジン", desc: "19世紀末、ドイツのダイムラーらが発明した小型で高出力な内燃機関。19世紀末、ドイツのダイムラーやベンツらが発明した小型で高出力な内燃機関。重くて巨大な蒸気機関に代わる新たな動力源として自動車の発明をもたらし、20世紀の石油エネルギー文明とモータリゼーション、そしてアメリカのフォードによる大量生産社会の扉を開いた。", type: "buff_hp", value: 0.25 },
  { id: 463, name: "ライト兄弟のプロペラ", desc: "1903年、アメリカの自転車屋の兄弟がキティホークで人類初の動力飛行機による有人飛行に成功した際の部品。1903年、アメリカの自転車屋の兄弟がキティホークで人類初の動力飛行機による有人飛行に成功した際の部品。地球の空間的距離を極限まで縮縮し、のちのグローバルな大量輸送時代と、空軍による無差別爆撃という新たな戦争の恐怖の歴史を同時に開始した画期的な発明。", type: "buff_pos", pos: 2, value: 0.35 },
  { id: 464, name: "スタンリーの羅針盤", desc: "19世紀後半、行方不明となったリヴィングストンを救出し、さらにベルギー王レオポルド2世の援助でコンゴ川流域を探検したジャーナリストの道具。19世紀後半、行方不明となったリヴィングストンを救出し、さらにベルギー王レオポルド2世の援助でコンゴ川流域を強引に探検したジャーナリストの道具。この探検が列強の「暗黒大陸」への帝国主義的な欲望を刺激し、ベルリン・コンゴ会議における過酷なアフリカ分割の引き金となった。", type: "buff_attr", target: "STRATEGY", value: 0.25 },
  { id: 465, name: "パナマ運河の建設図面", desc: "1914年、アメリカのセオドア・ローズヴェルト大統領の「棍棒外交」によってコロンビアから独立させたパナマ共和国で完成させた、大西洋と太平洋を結ぶ巨大な運河の設計図。1914年、アメリカのセオドア・ローズヴェルト大統領の「棍棒外交」によってコロンビアから強引に独立させたパナマ共和国で完成させた、大西洋と太平洋を結ぶ巨大な運河の設計図。アメリカ海軍の二洋艦隊構想の実現と、カリブ海における絶対的な覇権（ドル外交）を決定づけた。", type: "buff_all", value: 0.2 },
  { id: 466, name: "門戸開放宣言の書簡", desc: "1899年と1900年、アメリカの国務長官ジョン・ヘイが、列強による中国の半植民地化（勢力圏分割）に乗り遅れた焦りから発表した三原則（門戸開放、機会均等、領土保全）。1899年と1900年、アメリカの国務長官ジョン・ヘイが、列強による中国の半植民地化（勢力圏分割）に乗り遅れた焦りから発表した三原則（門戸開放、機会均等、領土保全）。武力ではなく経済力で中国市場を制覇しようとする、アメリカの新たな帝国主義的進出を正当化する外交カード。", type: "buff_attr", target: "STRATEGY", value: 0.3 },
  { id: 467, name: "ポーツマス条約の調印ペン", desc: "1905年、アメリカのセオドア・ローズヴェルトの仲介で日本とロシアが結んだ日露戦争の講和条約の署名具。1905年、アメリカのセオドア・ローズヴェルトの仲介で日本とロシアが結んだ日露戦争の講和条約の署名具。日本に韓国の保護権や南満洲の鉄道利権、樺太南半を認めさせ、アジアの非白人国家が大国ロシアを打ち破ったという事実は、世界中の被抑圧民族の独立運動を激しく刺激した。", type: "damage_cut_all", value: 0.1 },
  { id: 468, name: "ガポン神父の十字架", desc: "1905年1月、日露戦争の苦しい生活の中、ロシアの首都ペテルブルクで皇帝ニコライ2世に平和的な請願デモを行った民衆の先頭に立った聖職者の十字架。1905年1月、日露戦争の苦しい生活の中、ロシアの首都ペテルブルクで皇帝ニコライ2世に平和的な請願デモを行った民衆の先頭に立った聖職者の十字架。丸腰の群衆に対する近衛軍の一斉射撃（血の日曜日事件）によりツァーリへの素朴な信仰は完全に打ち砕かれ、第1次ロシア革命が爆発した。", type: "debuff_all", value: 0.25 },
  { id: 469, name: "ボリシェヴィキの機関紙「プラウダ」", desc: "ロシア社会民主労働党から分裂し、レーニンが率いた少数の職業革命家による急進派集団が発行した新聞。ロシア社会民主労働党から分裂し、レーニンが率いた少数の職業革命家による急進派集団（ボリシェヴィキ）が発行した機関紙。「真理」を意味し、第一次大戦の継続を批判して「すべての権力をソヴィエトへ（四月テーゼ）」と煽動し、十月革命による世界初の社会主義国家の樹立を導いた。", type: "buff_attr", target: "STRATEGY", value: 0.3 },
  { id: 470, name: "プリンツィプの拳銃", desc: "1914年6月28日、オーストリアの皇太子夫妻がボスニアの州都サライェヴォを訪問した際、大セルビア主義を抱くセルビア人青年が放った暗殺の銃弾。1914年6月28日、オーストリアの皇太子夫妻がボスニアの州都サライェヴォを訪問した際、大セルビア主義を抱く秘密組織の青年が放った暗殺の銃弾。「ヨーロッパの火薬庫」と呼ばれたバルカン半島の複雑な民族対立の導火線に火をつけ、何千万人もの命を奪う第一次世界大戦を瞬く間に引き起こした。", type: "debuff_enemy", value: 0.45 },
  { id: 471, name: "ヒンデンブルクの軍刀", desc: "1914年8月、第一次大戦の東部戦線・タンネンベルクの戦いにおいて、侵攻してきたロシアの大軍を広大な包囲網で完全に殲滅し、ドイツの東部防衛を救った名将の剣。1914年8月、第一次大戦の東部戦線・タンネンベルクの戦いにおいて、侵攻してきたロシアの大軍をルーデンドルフらと共に広大な包囲網で完全に殲滅し、ドイツの東部防衛を救った国民的英雄の剣。彼はのちにヴァイマル共和国の大統領となり、皮肉にもヒトラーを首相に任命することになる。", type: "buff_attr", target: "VALOR", value: 0.3 },
  { id: 472, name: "Uボートの魚雷", desc: "1917年、膠着する第一次大戦の戦局を打開するため、ドイツが中立国を含む全ての敵側航行船を警告なしで撃沈する「無制限潜水艦作戦」で使用した兵器。1917年、膠着する第一次大戦の戦局を打開するため、ドイツが中立国を含む全ての敵側への航行船を警告なしで無差別に撃沈する「無制限潜水艦作戦」で使用した兵器。結果的にルシタニア号事件などで反独感情を高めていたアメリカ（ウィルソン大統領）の参戦を招き、ドイツの敗北を決定づけた。", type: "debuff_enemy", value: 0.5 },
  { id: 473, name: "平和に関する布告のビラ", desc: "1917年11月の十月革命直後、レーニン率いるソヴィエト政権が全交戦国に向けて発表した「無併合・無償金・民族自決」の講和の原則。1917年11月の十月革命直後、レーニン率いるソヴィエト政権が全交戦国に向けて発表した「無併合・無償金・民族自決」の講和の原則。帝政ロシア時代の帝国主義的な秘密外交（サイクス・ピコ協定など）を暴露し、のちのウィルソンの理想主義的な「十四カ条」発表を強く引き出した歴史的文書。", type: "heal_round", value: 0.05 },
  { id: 474, name: "九カ国条約の文書", desc: "1922年、ワシントン会議においてアメリカの主導で調印された、中国の主権尊重・領土保全・門戸開放・機会均等を定めた条約。1922年、ワシントン会議においてアメリカの主導で調印された、中国の主権尊重・領土保全・門戸開放・機会均等を定めた条約。石井・ランシング協定を破棄して日本の山東半島権益を返還させ、日英同盟の廃棄とともに、東アジアにおけるアメリカ主導の新たな国際秩序（ワシントン体制）を構築した。", type: "damage_cut_all", value: 0.15 },
  { id: 475, name: "不戦条約の署名ペン", desc: "1928年、アメリカ国務長官ケロッグとフランス外相ブリアンが主導して15カ国で結ばれた条約のペン。1928年、アメリカ国務長官ケロッグとフランス外相ブリアンが主導して15カ国で結ばれた条約のペン。国家の政策の手段としての戦争（侵略戦争）を史上初めて国際法として違法化し、ヨーロッパの安全保障を固めたロカルノ条約とともに、1920年代の「国際協調（ジュネーヴの精神）」の絶頂期を象徴する。", type: "buff_all", value: 0.2 },
  { id: 476, name: "ロンドン軍縮会議の協定書", desc: "1930年、ワシントン会議で合意できなかった巡洋艦などの補助艦の保有比率を米・英・日で定めた軍縮条約。1930年、ワシントン会議で合意できなかった巡洋艦・駆逐艦・潜水艦などの補助艦の保有比率を米・英・日で定めた軍縮条約。軍拡競争を抑えたが、日本国内では海軍軍令部の同意を得ずに浜口雄幸内閣が調印したとして激しい「統帥権干犯問題」が起き、のちの軍部暴走と政党内閣崩壊の重大な火種となった。", type: "buff_attr", target: "STRATEGY", value: 0.25 },
  { id: 477, name: "ローマ進軍の黒シャツ", desc: "1922年、第一次大戦の「骨折り損」の不満と社会主義への恐怖を背景に、ムッソリーニ率いるファシスト党の武装行動隊が首都へ進軍し、国王を恫喝して政権を奪取した際の制服。1922年、第一次大戦の「骨折り損」の不満と社会主義革命への恐怖を背景に、ムッソリーニ率いるファシスト党の武装行動隊が首都へ進軍し、国王を恫喝して合法的に政権を奪取した際の黒い制服。議会制民主主義を暴力と煽動で破壊する全体主義（ファシズム）の病理が世界で初めて具現化した。", type: "buff_pos", pos: 1, value: 0.35 },
  { id: 478, name: "全権委任法の可決議事録", desc: "1933年3月、国会議事堂放火事件を利用して共産党を弾圧したヒトラーが、議会に提出して可決させた法律（授権法）の記録。1933年3月、国会議事堂放火事件を利用して共産党を弾圧したヒトラーが、議会を威圧して可決させた法律（授権法）の記録。政府（ヒトラー内閣）に議会を通さずに憲法に違反する法律すら制定できる絶対的な権限を与え、当時世界で最も民主的とされたヴァイマル共和国の民主主義を、合法的な手続きによって完全に自殺させた。", type: "debuff_all", value: 0.3 },
  { id: 479, name: "第一次五カ年計画のポスター", desc: "1928年からスターリンがソ連で強行した、ネップ（新経済政策）を廃止して重工業の急激な発展と農業の集団化（コルホーズ）を目指した計画経済の宣伝画。1928年からスターリンがソ連で強行した、ネップ（新経済政策）を廃止して重工業の急激な発展と農業の集団化（コルホーズ）を目指した計画経済の宣伝画。世界恐慌の嵐をよそに驚異的な工業化を達成したと宣伝されたが、その裏では富農（クラク）の弾圧と数百万の農民の餓死、そして大粛清が進行していた。", type: "buff_hp", value: 0.3 },
  { id: 480, name: "国際義勇軍の旗", desc: "1936年に勃発したスペイン内戦において、ファシストのフランコ将軍と彼を支援する独伊に対抗するため、コミンテルンの呼びかけや反ファシズムの信念で世界中から集まった若者たち（ヘミングウェーやオーウェルら）が掲げた人民戦線側の旗。1936年に勃発したスペイン内戦において、ファシストのフランコ将軍と彼を軍事支援する独伊に対抗するため、コミンテルンの呼びかけや反ファシズムの強い信念で世界中から集まった若者たち（ヘミングウェーやオーウェルら）が人民戦線政府側に立って掲げた旗。「奴らを通すな（ノー・パサラン）」の合言葉。", type: "buff_attr", target: "CULTURE", value: 0.35 },
  { id: 481, name: "宥和政策の合意書", desc: "1938年のミュンヘン会談において、ヒトラーのチェコスロヴァキアのズデーテン地方割譲要求に対し、戦争を恐れる英仏が屈服して署名した紙切れ。1938年のミュンヘン会談において、ヒトラーのチェコスロヴァキアのズデーテン地方割譲要求に対し、新たな戦争を極度に恐れる英仏（チェンバレンとダラディエ）がチェコを見捨てて屈服・署名した紙切れ。その場しのぎの平和を買ったと歓喜されたが、結果として独裁者の果てしない侵略の野望を増長させ、第二次世界大戦を不可避にした最悪の宥和政策。", type: "debuff_enemy", value: 0.5 },
  { id: 482, name: "独ソ不可侵条約の署名文", desc: "1939年8月、犬猿の仲であったはずのナチス・ドイツとソ連が電撃的に結んだ条約。西ヨーロッパ諸国を恐怖のどん底に陥れた。1939年8月、不倶戴天の敵同士であったはずのナチス・ドイツとソ連が電撃的に結んだ条約。西欧諸国を恐怖のどん底に陥れた。秘密議定書でポーランドの分割とバルト三国のソ連による併合を取り決め、ヒトラーの東部戦線における背後の憂いを絶って、直後のポーランド侵攻（第二次世界大戦）の直接の引き金となった。", type: "buff_pos", pos: 5, value: 0.45 },
  { id: 483, name: "アイゼンハワーの指令書", desc: "1944年6月6日（Dデー）、連合国軍最高司令官アイゼンハワーが発した、史上最大の水陸両用作戦であるノルマンディー上陸作戦の決行指令。1944年6月6日（Dデー）、連合国軍最高司令官アイゼンハワーが発した、史上最大の水陸両用作戦であるノルマンディー上陸作戦の決行指令。ドイツ軍の要塞線「大西洋の壁」を甚大な犠牲を払って突破し、ヨーロッパ大陸にソ連が強く求めていた第二戦線を形成。ナチス・ドイツを東西から挟み撃ちにして降伏へと追い詰めた。", type: "buff_attr", target: "VALOR", value: 0.35 },
  { id: 484, name: "ヤルタ会談の秘密協定の議事録", desc: "1945年2月、クリミア半島の保養地で米英ソの首脳（ローズヴェルト・チャーチル・スターリン）がドイツの戦後処理を協議した会議の記録。1945年2月、クリミア半島の保養地で米英ソの首脳（ローズヴェルト・チャーチル・スターリン）がドイツの戦後処理などを密かに協議した会議の記録。ソ連の対日参戦と引き換えに南樺太・千島列島の引き渡しを密約し、東欧におけるソ連の強い影響力（勢力圏）を事実上認めたことで、戦後の厳しい冷戦構造（ヤルタ体制）の枠組みを決定づけた。", type: "damage_cut_all", value: 0.15 },
  { id: 485, name: "サンフランシスコ会議の調印ペン", desc: "1945年、国際連盟の無力さを反省し、50カ国の代表が集まって新たな国際平和機構である「国際連合」の憲章に署名した際のペン。1945年、国際連盟の無力さを反省し、50カ国の代表が集まって新たな国際平和機構である「国際連合」の憲章に署名した際のペン。五大国（米英仏ソ中）に強大な拒否権を持たせた安全保障理事会を中心に、武力行使を含む強力な軍事的制裁措置（国連軍）の権限を与え、大国の一致によって世界の平和を維持しようとする体制を構築した。", type: "heal_round", value: 0.1 },
  { id: 486, name: "IMF設立合意書（ブレトン・ウッズ）", desc: "1944年、戦後の国際経済の安定を図るため、連合国がアメリカで開催した会議の文書。1944年、戦後の国際経済の安定と自由貿易の促進を図るため、連合国44カ国がアメリカで開催した会議の文書。圧倒的な金準備を持つドルを基軸通貨とする固定相場制（金・ドル本位制）を確立し、国際通貨基金（IMF）と世界銀行（IBRD）を設立して、1970年代のニクソン・ショックまで戦後資本主義の黄金時代を支えるブレトン・ウッズ体制を構築した。", type: "buff_all", value: 0.25 },
  { id: 487, name: "GATTの文書", desc: "1947年に調印された「関税と貿易に関する一般協定」。1947年にジュネーヴで調印された「関税と貿易に関する一般協定」。1930年代の排他的なブロック経済が第二次大戦を招いた深い反省から、自由・無差別・多角的な貿易の推進を基本原則とし、ラウンドと呼ばれる交渉で関税の大幅な引き下げを行って、戦後の世界貿易の飛躍的な拡大と経済成長を制度面から強力に後押しした。", type: "buff_attr", target: "STRATEGY", value: 0.25 },
  { id: 488, name: "ベルリン空輸のパラシュート", desc: "1948年、西側による通貨改革に反発したソ連が西ベルリンの陸上交通を完全遮断（ベルリン封鎖）した際、アメリカ軍などが約1年間にわたって食料や石炭などの全物資を空から投下し続けた空輸作戦の象徴。1948年、西側による独自の通貨改革に反発したソ連が、西ベルリンの陸上交通と水路を完全遮断（ベルリン封鎖）して孤立させた際、アメリカ軍などが約1年間にわたって約200万人の市民のために食料や石炭などの全物資を空から投下し続けた空輸作戦の象徴。冷戦の最前線における西側陣営の強固な防衛の意志と圧倒的な物量を見せつけた。", type: "heal_round", value: 0.1 },
  { id: 489, name: "NATOの条約文", desc: "1949年、ソ連など東側社会主義陣営の軍事的脅威に対抗するため、アメリカ・カナダと西欧諸国が結成した集団防衛組織（北大西洋条約機構）の設立文書。1949年、チェコスロヴァキアのクーデターやベルリン封鎖など、ソ連をはじめとする東側社会主義陣営の軍事的脅威に対抗するため、アメリカ・カナダと西欧諸国が結成した集団防衛組織（北大西洋条約機構）の設立文書。「一国への武力攻撃は全加盟国への攻撃とみなす」と定め、アメリカの核の傘と軍事力のもとに西側世界を強固に結束させた。", type: "damage_cut_all", value: 0.15 },
  { id: 490, name: "ワルシャワ条約機構の設立文書", desc: "1955年、西ドイツの再軍備とNATO加盟に強く反発したソ連が、東欧の社会主義諸国（ソ連、ポーランド、東ドイツなど）を集めて結成した東側の軍事同盟（WTO）の文書。1955年、西ドイツの主権回復・再軍備とNATO加盟に強く反発し、脅威を感じたソ連が、東欧の社会主義諸国（ソ連、ポーランド、東ドイツなど8カ国）を集めて結成した東側の軍事同盟（ワルシャワ条約機構：WTO）の文書。これにより、ヨーロッパを物理的・軍事的に完全に二分する、冷戦の「鉄のカーテン」による対立構造が固定化された。", type: "buff_attr", target: "VALOR", value: 0.25 },
  { id: 491, name: "バンドン会議の平和十原則の宣言", desc: "1955年、インドネシアのバンドンにアジア・アフリカの29カ国が集結し、反植民地主義と平和共存を掲げて採択した宣言。1955年、インドネシアのバンドンに、かつて植民地支配を受けたアジア・アフリカの29カ国の代表が集結し、反植民地主義と平和共存を掲げて採択した宣言。インドのネルーや中国の周恩来が主導し、米ソの東西冷戦構造に組み込まれない新興独立国家群「第三世界（第三勢力）」の巨大な連帯と自立を高らかに世界にアピールした歴史的転換点。", type: "buff_attr", target: "STRATEGY", value: 0.35 },
  { id: 492, name: "スエズ運河国有化宣言のラジオ", desc: "1956年、エジプトのナセル大統領がアスワン・ハイ・ダム建設資金の調達のため、英仏が所有するスエズ運河会社の接収をラジオで激しく演説した。1956年、エジプトのナセル大統領が、アメリカやイギリスからのアスワン・ハイ・ダム建設資金の融資打ち切りに対する報復として、英仏の巨大な権益であるスエズ運河会社の完全な国有化をラジオで激しく宣言した。これが英仏とイスラエルによる軍事介入（第2次中東戦争）を引き起こすが、米ソの反対で英仏は撤退を余儀なくされ、古い帝国主義の没落とアラブ民族主義の勝利を決定づけた。", type: "debuff_all", value: 0.3 },
  { id: 493, name: "ECSCのパリ条約文書", desc: "1951年、フランス外相シューマンの提案に基づき、仏・西独など6カ国が調印したヨーロッパ石炭鉄鋼共同体（ECSC）の設立文書。1951年、フランス外相シューマンの画期的な提案（シューマン・プラン）に基づき、フランス・西ドイツ・イタリア・ベネルクス3国の計6カ国が調印したヨーロッパ石炭鉄鋼共同体（ECSC）の設立文書。戦争の火種であり兵器の根本となる重工業資源を国家を超えて共同管理することで独仏の歴史的怨念を和解させ、現在の巨大なヨーロッパ連合（EU）へと続く統合の偉大な第一歩となった。", type: "buff_all", value: 0.2 },
  { id: 494, name: "エヴィアン協定の署名ペン", desc: "1962年、フランスのド・ゴール大統領が、泥沼化した過酷なアルジェリア戦争を終結させ、アルジェリア（FLN）の完全な独立を承認した休戦協定のペン。1962年、フランス第五共和政のド・ゴール大統領が、8年にも及び泥沼化してフランス社会を引き裂いた過酷なアルジェリア戦争を終結させ、アルジェリア民族解放戦線（FLN）の完全な独立を承認した休戦協定のペン。フランス国内の極右軍人による秘密軍事組織（OAS）の反乱や度重なる暗殺テロの危機を乗り越え、誇り高き植民地帝国の解体を決断した歴史的英断。", type: "heal_round", value: 0.1 },
  { id: 495, name: "部分的核実験禁止条約（PTBT）", desc: "1963年、キューバ危機で核戦争の恐怖に直面した米英ソがモスクワで調印した、大気圏・宇宙空間・水中での核爆発を伴う実験を禁止した条約。1963年、キューバ危機で全面的な核戦争と人類滅亡の恐怖に直面したアメリカ・イギリス・ソ連がモスクワで調印した、大気圏・宇宙空間・水中での核爆発を伴う実験を禁止した条約。地下核実験は残されたものの、放射性降下物（死の灰）による地球規模の環境汚染を防ぐとともに、果てしない核軍拡競争に対する米ソの初めての具体的な緊張緩和（デタント）の歩み寄りとなった。", type: "damage_cut_all", value: 0.15 },
  { id: 496, name: "OAPECの石油戦略発動文書", desc: "1973年の第4次中東戦争において、アラブ石油輸出国機構（OAPEC）が親イスラエル諸国に対する石油の禁輸と段階的減産を決定した宣言。1973年の第4次中東戦争において、アラブ石油輸出国機構（OAPEC）が、イスラエルを支援するアメリカなどの親イスラエル諸国に対する石油の全面禁輸と、毎月の段階的減産を決定した宣言。原油価格の歴史的な暴騰（第1次オイルショック）を引き起こし、安価なエネルギーに依存していた先進工業国の高度経済成長を完全に終わらせた強烈な資源ナショナリズムの武器。", type: "debuff_all", value: 0.3 },
  { id: 497, name: "マルタ会談の冷戦終結宣言", desc: "1989年12月、地中海のマルタ島沖の艦上で、アメリカのブッシュ（父）大統領とソ連のゴルバチョフ書記長が行った歴史的な首脳会談の記録。1989年12月、激しい嵐が吹く地中海のマルタ島沖のソ連客船の艦上で、アメリカのブッシュ（父）大統領とソ連のゴルバチョフ書記長が行った歴史的な首脳会談の記録。ベルリンの壁崩壊と怒涛のような東欧の民主化（東欧革命）を背景に、第二次世界大戦後40年以上にわたって世界を二分し、核戦争の恐怖で覆っていた東西冷戦の完全な終結を世界に向けて宣言した。", type: "buff_pos", pos: 5, value: 0.4 },
  { id: 498, name: "東西ドイツ基本条約の地図", desc: "1972年、西ドイツのブラント首相が進めた「東方外交」の結実として、東西ドイツが互いの主権と現状の国境線（オーデル・ナイセ線など）を相互に承認した条約の地図。1972年、西ドイツのブラント首相が進めた、東側陣営との関係正常化を目指す「東方外交」の最大の結実として、東西ドイツが互いの主権と現状の国境線（オーデル・ナイセ線など）を相互に承認し、武力不行使を誓った条約の地図。ヨーロッパにおける冷戦の最大の火薬庫であった分断ドイツ問題の緊張を劇的に緩和させ、翌年の両国の国連同時加盟と、ヘルシンキ宣言（CSCE）への道を拓いた。", type: "buff_attr", target: "STRATEGY", value: 0.3 },
  { id: 499, name: "マーストリヒト条約の設立文書", desc: "1992年に調印され、翌年に欧州連合（EU）を正式に発足させた条約。1992年にオランダで調印され、翌年に欧州連合（EU）を正式に発足させた画期的な条約（欧州連合条約）。これまでの単なる経済統合（EC）にとどまらず、共通通貨ユーロの導入という経済通貨同盟、さらには共通の外交・安全保障政策、司法・内務協力の三本柱を打ち立て、ヨーロッパを国民国家の枠組みを超える前人未到の超国家的な政治統合へと導いた。", type: "buff_all", value: 0.2 },
  { id: 500, name: "マラケシュ協定の文書", desc: "1994年、ウルグアイ・ラウンドの困難な多角的貿易交渉の妥結を以て、GATTに代わるより強力な世界貿易機関（WTO）の設立を定めたモロッコでの協定。1994年、数年に及ぶウルグアイ・ラウンドの困難な多角的貿易交渉の最終的な妥結を以て、これまでのGATT体制に代わる、より強制的で強力な紛争解決能力を持つ世界貿易機関（WTO）の設立を定めたモロッコでの協定。モノの貿易だけでなく、サービス貿易や知的財産権の保護をも新たなルールとして対象とし、現代の巨大な経済のグローバリゼーションを法的に完全に規定した。", type: "buff_attr", target: "STRATEGY", value: 0.25 }
];
const CHARACTERS = [
  { id: 1, name: "アレクサンドロス大王", power: 123, hp: 77, attribute: "VALOR", desc: "マケドニア王。ペルシアを滅ぼし大帝国を建設。東方遠征によってヘレニズム文化と呼ばれる新たな時代を切り開いた戦術の天才。", skill: { name: "東方遠征", desc: "自身の歴史力+30%", type: "buff_self", value: 0.3, rate: 0.7 } },

  { id: 5, name: "織田信長", power: 139, hp: 61, attribute: "VALOR", desc: "「天下布武」を掲げ室町幕府を滅ぼした戦国武将。長篠の戦いでの鉄砲運用や、楽市・楽座など中世的権威を破壊する革新的な政策を推進した。", skill: { name: "三段撃ち", desc: "相手に最大HPの20%固定ダメージ", type: "fixed_damage", value: 0.2, rate: 0.5 } },

  { id: 8, name: "李舜臣", power: 113, hp: 87, attribute: "VALOR", desc: "朝鮮王朝の救国の英雄である水軍提督。豊臣秀吉の朝鮮出兵において、亀甲船を駆使した巧みな海戦術で日本水軍の補給路を断ち戦局を覆した。", skill: { name: "亀甲船の護り", desc: "被ダメージを80%軽減", type: "damage_cut", value: 0.8, rate: 0.5 } },
  { id: 9, name: "ワシントン", power: 95, hp: 105, attribute: "VALOR", desc: "アメリカ独立戦争における大陸軍の総司令官。ヨークタウンの戦いで勝利し初代大統領に就任。三選を辞退し民主主義における権力移譲の先例を築いた。", skill: { name: "独立の父", desc: "1戦目配置時、歴史力+50%", type: "cond_pos_buff", pos: 1, value: 0.5, rate: 0.9 } },
  { id: 10, name: "グスタフ・アドルフ", power: 112, hp: 88, attribute: "VALOR", desc: "スウェーデンを強国に押し上げた「北方の獅子」。三十年戦争に介入し、三兵戦術など近代的な軍事革新を行いリュッツェンの戦いで戦死するまで無敗を誇った。", skill: { name: "獅子の咆哮", desc: "相手から最大HPの10%を吸収", type: "absorb_hp", value: 0.1, rate: 0.4 } },
  { id: 11, name: "アウグストゥス", power: 105, hp: 95, attribute: "STRATEGY", desc: "アクティウムの海戦でアントニウスらを破り内乱を終結させたローマ帝国初代皇帝。約200年続く「パクス・ロマーナ」の礎を築いた。", skill: { name: "パクス・ロマーナ", desc: "味方全員の歴史力+20%", type: "buff_all", value: 0.2, rate: 0.5 } },
  { id: 12, name: "始皇帝", power: 122, hp: 78, attribute: "STRATEGY", desc: "中国史上初めて全土を統一した秦の王。郡県制による中央集権体制を確立し、万里の長城修築など強力な政策を推し進めたが厳格な統治は反乱を招いた。", skill: { name: "焚書坑儒", desc: "敵全員の歴史力-20%", type: "debuff_all", value: 0.2, rate: 0.5 } },
  { id: 13, name: "ビスマルク", power: 116, hp: 84, attribute: "STRATEGY", desc: "プロイセンの首相。鉄血政策を推進し、デンマーク、オーストリア、フランスとの戦争に勝利してドイツ帝国統一という悲願を成し遂げた。", skill: { name: "鉄血政策", desc: "HP20%消費して歴史力+80%", type: "sacrifice_buff", cost: 0.2, value: 0.8, rate: 0.7 } },
  { id: 14, name: "エリザベス1世", power: 98, hp: 102, attribute: "STRATEGY", desc: "イギリス女王。国教会を確立し、海賊を支援してスペイン無敵艦隊を撃破。東インド会社の設立など重商主義を推進し絶対王政の黄金時代を現出した。", skill: { name: "海賊の支援", desc: "相手から最大HPの15%を吸収", type: "absorb_hp", value: 0.15, rate: 0.3 } },

  { id: 16, name: "リンカン", power: 92, hp: 108, attribute: "STRATEGY", desc: "アメリカ第16代大統領。南北戦争において北軍を指導し奴隷解放宣言を発表。「人民の、人民による、人民のための政治」の言葉で有名。", skill: { name: "奴隷解放", desc: "自軍HP半分以下なら自身の歴史力+70%", type: "cond_pinch_buff", value: 0.7, rate: 0.9 } },
  { id: 17, name: "ソクラテス", power: 75, hp: 125, attribute: "CULTURE", desc: "古代アテネの哲学者。問答法によって「無知の知」を自覚させ真理と徳を追求したが、青年を堕落させた罪で告発され毒杯を仰いだ。", skill: { name: "無知の知", desc: "相手の歴史力を-40%", type: "debuff_enemy", value: 0.4, rate: 0.6 } },

  { id: 19, name: "シェークスピア", power: 78, hp: 122, attribute: "CULTURE", desc: "イギリスの劇作家。『ハムレット』『マクベス』など人間の複雑な内面を深い洞察と美しい言語表現で描き出し世界文学の最高峰に位置づけられる。", skill: { name: "悲劇の幕開け", desc: "相手に最大HPの25%ダメージ", type: "fixed_damage", value: 0.25, rate: 0.4 } },
  { id: 20, name: "孔子", power: 88, hp: 112, attribute: "CULTURE", desc: "中国・春秋時代の思想家。「仁」と「礼」を重視し、君主の道徳的感化による徳治主義を理想とした。その教えは儒教として絶大な影響を残す。", skill: { name: "徳治主義", desc: "自軍のHPを最大HPの25%回復", type: "heal_hp", value: 0.25, rate: 0.4 } },
  { id: 21, name: "ニュートン", power: 105, hp: 95, attribute: "CULTURE", desc: "イギリスの物理学者。万有引力の法則と運動の3法則を発表し、近代科学のパラダイムを決定づけた巨星。", skill: { name: "万有引力", desc: "相手が【軍事】なら自身の歴史力+60%", type: "cond_buff_self", target: "VALOR", value: 0.6, rate: 1 } },
  { id: 22, name: "ガンディー", power: 60, hp: 140, attribute: "STRATEGY", desc: "インド独立運動の精神的指導者。非暴力・不服従を貫き塩の行進などを指導。その平和的手法は後の公民権運動などに世界的な影響を与えた。", skill: { name: "非暴力不服従", desc: "被ダメージを90%カット", type: "damage_cut", value: 0.9, rate: 0.4 } },
  { id: 23, name: "カント", power: 70, hp: 130, attribute: "CULTURE", desc: "ドイツの哲学者。『純粋理性批判』でドイツ観念論の祖となり、『永遠平和のために』では国際平和機構の構想をいち早く提唱した。", skill: { name: "永遠平和", desc: "5戦目配置時、負け数\xD730%歴史力UP", type: "cond_pos_revenge", pos: 5, value: 0.3, rate: 1 } },
  { id: 24, name: "ピタゴラス", power: 65, hp: 135, attribute: "CULTURE", desc: "古代ギリシアの数学者。「万物の根源は数である」と唱えピタゴラスの定理を発見し、西洋数学と神秘思想の源流を築いた。", skill: { name: "万物は数なり", desc: "超低確率(10%)で相手のHPを1にする", type: "hp_to_one", rate: 0.1 } },
  { id: 25, name: "諸葛亮", power: 114, hp: 86, attribute: "STRATEGY", desc: "三国時代の蜀漢の丞相。「天下三分の計」を進言し建国を補佐。神算鬼謀の軍師として知られ絶対的な忠義は後世に語り継がれる。", skill: { name: "神算鬼謀", desc: "3戦目配置時、自身の歴史力+60%", type: "cond_pos_buff", pos: 3, value: 0.6, rate: 0.9 } },
  { id: 26, name: "マリー・アントワネット", power: 72, hp: 128, attribute: "STRATEGY", desc: "フランス国王ルイ16世の王妃。浪費などで民衆の憎悪の的となり、フランス革命の波に飲まれ断頭台の露と消えた悲劇の象徴。", skill: { name: "パンがなければ", desc: "HP10%消費して相手を30%弱体化", type: "sacrifice_debuff", cost: 0.1, value: 0.3, rate: 0.8 } },
  { id: 27, name: "コロンブス", power: 102, hp: 98, attribute: "VALOR", desc: "ジェノヴァの航海者。スペインの援助で大西洋を西に進みサンサルバドル島に到達。ヨーロッパによるアメリカ大陸植民地化の端緒となった。", skill: { name: "新大陸発見", desc: "味方全体の歴史力+25%", type: "buff_all", value: 0.25, rate: 0.4 } },
  { id: 28, name: "クレオパトラ", power: 68, hp: 132, attribute: "STRATEGY", desc: "プトレマイオス朝最後の女王。カエサルやアントニウスを魅了してエジプトの独立維持を図った。敗北後、毒蛇に胸を噛ませて自害したと伝わる。", skill: { name: "絶世の美女", desc: "相手から最大HPの20%を吸収", type: "absorb_hp", value: 0.2, rate: 0.35 } },
  { id: 29, name: "マルクス", power: 96, hp: 104, attribute: "CULTURE", desc: "ドイツの哲学者。『資本論』で資本主義の矛盾を分析し労働者階級の革命による社会主義社会の到来を説き、世界の歴史に多大な影響を及ぼした。", skill: { name: "万国の労働者", desc: "自軍HP半分以下なら敵全体-40%", type: "cond_pinch_debuff_all", value: 0.4, rate: 0.9 } },
  { id: 30, name: "ベートーヴェン", power: 84, hp: 116, attribute: "CULTURE", desc: "ドイツの作曲家。聴覚の喪失を乗り越え『運命』などの傑作を生み出し、音楽を個人の感情表現の芸術へと昇華させたロマン派音楽の開拓者。", skill: { name: "運命の交響曲", desc: "次の味方の歴史力を+50%強化", type: "inherit_buff", value: 0.5, rate: 0.7 } },
  { id: 31, name: "スレイマン1世", power: 118, hp: 82, attribute: "VALOR", desc: "オスマン帝国の「壮麗帝」。ハンガリーを征服しウィーン包囲を行うなどヨーロッパを震撼させ、帝国を最大領域・最盛期へと導いた名君。", skill: { name: "壮麗なる遠征", desc: "味方全体の歴史力+20%", type: "buff_all", value: 0.2, rate: 0.5 } },
  { id: 32, name: "サラディン", power: 122, hp: 78, attribute: "VALOR", desc: "アイユーブ朝の創始者。十字軍を打ち破りエルサレムを奪還。リチャード1世との激闘と寛容な態度は西欧からも騎士道の鑑と称賛された。", skill: { name: "聖地奪還", desc: "相手の歴史力を-30%", type: "debuff_enemy", value: 0.3, rate: 0.7 } },
  { id: 33, name: "リチャード1世", power: 115, hp: 85, attribute: "VALOR", desc: "イングランドの「獅子心王」。第3回十字軍の中心としてサラディンと名勝負を繰り広げた。在位のほとんどを戦場で過ごした根っからの戦士。", skill: { name: "獅子の心", desc: "自身の歴史力+40%", type: "buff_self", value: 0.4, rate: 0.8 } },
  { id: 34, name: "ピョートル1世", power: 108, hp: 92, attribute: "STRATEGY", desc: "ロシアの「大帝」。西欧の技術を吸収し北方戦争で覇権を握り、新首都サンクトペテルブルクを建設してロシアの近代化を強引に推し進めた。", skill: { name: "西欧化政策", desc: "次の味方の歴史力を+30%強化", type: "inherit_buff", value: 0.3, rate: 0.6 } },
  { id: 35, name: "フリードリヒ2世", power: 110, hp: 90, attribute: "STRATEGY", desc: "プロイセン国王。「君主は国家の第一の下僕」と自称し、啓蒙専制君主の典型として産業育成や司法改革に努め国をヨーロッパの強国に押し上げた。", skill: { name: "国家の第一の下僕", desc: "相手が【政治】なら自身の歴史力+40%", type: "cond_buff_self", target: "STRATEGY", value: 0.4, rate: 0.8 } },
  { id: 36, name: "マリア・テレジア", power: 95, hp: 105, attribute: "STRATEGY", desc: "オーストリアの女帝。家督相続の戦争を耐え抜き帝国の分裂を防いだ。行政改革や義務教育を導入し「国母」として敬愛された。", skill: { name: "ハプスブルクの国母", desc: "自軍のHPを最大HPの20%回復", type: "heal_hp", value: 0.2, rate: 0.5 } },
  { id: 37, name: "ロベスピエール", power: 100, hp: 100, attribute: "STRATEGY", desc: "フランス革命の急進派指導者。革新的な政策を実行する一方で反革命派を処刑する「恐怖政治」を敷き、自らもクーデターで処刑された。", skill: { name: "恐怖政治", desc: "HP15%消費して敵全体を-25%弱体化", type: "sacrifice_debuff", cost: 0.15, value: 0.25, rate: 0.7 } },
  { id: 38, name: "レーニン", power: 105, hp: 95, attribute: "STRATEGY", desc: "ロシアの革命家。十月革命を成功させ世界初の社会主義政権を樹立。帝国主義戦争からの離脱と土地の国有化を断行したソ連建国の父。", skill: { name: "十月革命", desc: "味方全体の歴史力+25%", type: "buff_all", value: 0.25, rate: 0.5 } },
  { id: 39, name: "アタテュルク", power: 102, hp: 98, attribute: "STRATEGY", desc: "オスマン帝国の解体を防ぎトルコ革命を指導。カリフ制廃止やローマ字採用など徹底した世俗化・近代化を断行した「父なるトルコ人」。", skill: { name: "世俗化改革", desc: "相手の歴史力を-30%", type: "debuff_enemy", value: 0.3, rate: 0.6 } },
  { id: 40, name: "ホー・チ・ミン", power: 98, hp: 102, attribute: "STRATEGY", desc: "ベトナムの民族解放運動指導者。独立同盟を結成し民主共和国を宣言。ゲリラ戦で大国に屈しない姿勢を貫いた。", skill: { name: "不屈のゲリラ戦", desc: "被ダメージを80%カット", type: "damage_cut", value: 0.8, rate: 0.5 } },
  { id: 41, name: "スパルタクス", power: 106, hp: 94, attribute: "VALOR", desc: "古代ローマの剣闘士。殺し合いの境遇に反発し反乱を起こした。奴隷や貧農を吸収し数万の軍勢でローマ正規軍を破り続けた反逆の象徴。", skill: { name: "奴隷の反乱", desc: "自軍HP半分以下なら自身の歴史力+60%", type: "cond_pinch_buff", value: 0.6, rate: 0.8 } },
  { id: 42, name: "トラヤヌス", power: 110, hp: 90, attribute: "VALOR", desc: "五賢帝の一人で初の属州出身の皇帝。ダキア遠征などを成功させ帝国領土を史上最大に広げた至高の皇帝（オプティムス・プリンケプス）。", skill: { name: "帝国最大領域", desc: "味方全体の歴史力+15%", type: "buff_all", value: 0.15, rate: 0.6 } },
  { id: 43, name: "ネルソン", power: 114, hp: 86, attribute: "VALOR", desc: "イギリス海軍の英雄。トラファルガーの海戦で連合艦隊を壊滅させ、ナポレオンの本土上陸の野望を打ち砕いたが自らは戦死した。", skill: { name: "トラファルガーの勝利", desc: "相手が【政治】なら自身の歴史力+50%", type: "cond_buff_self", target: "STRATEGY", value: 0.5, rate: 0.8 } },
  { id: 44, name: "ガリバルディ", power: 105, hp: 95, attribute: "VALOR", desc: "イタリア統一運動の英雄。赤シャツ隊を率いて南イタリアを打倒。征服した領土をサルデーニャ王に献上した無私の愛国者。", skill: { name: "赤シャツ隊の進軍", desc: "1戦目配置時、歴史力+40%", type: "cond_pos_buff", pos: 1, value: 0.4, rate: 0.8 } },
  { id: 45, name: "ペリクレス", power: 90, hp: 110, attribute: "STRATEGY", desc: "古代アテネ全盛期の政治家。徹底した直接民主政を完成させ、パルテノン神殿再建など学芸を保護しアテネを文化の中心にした。", skill: { name: "アテネ民主政", desc: "味方全体の歴史力+20%", type: "buff_all", value: 0.2, rate: 0.5 } },
  { id: 46, name: "メッテルニヒ", power: 92, hp: 108, attribute: "STRATEGY", desc: "オーストリアの宰相。ウィーン会議を主導し「正統主義」を掲げ、自由主義運動を徹底的に弾圧するウィーン体制を構築し保守的安定を図った。", skill: { name: "ウィーン体制", desc: "相手の歴史力を-30%", type: "debuff_enemy", value: 0.3, rate: 0.7 } },
  { id: 47, name: "王安石", power: 88, hp: 112, attribute: "STRATEGY", desc: "北宋の政治家。財政難に対処するため「新法」と呼ばれる富国強兵策を断行したが、保守派の激しい反発に遭い政争を引き起こした。", skill: { name: "新法の実行", desc: "HP10%消費して歴史力+60%", type: "sacrifice_buff", cost: 0.1, value: 0.6, rate: 0.7 } },
  { id: 48, name: "アショーカ王", power: 95, hp: 105, attribute: "STRATEGY", desc: "マウリヤ朝の王。征服の殺戮を悔い仏教に帰依。武力支配を放棄しダルマに基づく平和的統治を宣言し仏教を伝播させた慈悲の王。", skill: { name: "ダルマの統治", desc: "自軍のHPを最大HPの20%回復", type: "heal_hp", value: 0.2, rate: 0.6 } },
  { id: 49, name: "プラトン", power: 85, hp: 115, attribute: "CULTURE", desc: "古代アテネの哲学者。永遠不変の真理である「イデア」の世界が存在すると説き、哲人政治を理想として学園アカデメイアを創設。", skill: { name: "イデア論", desc: "次のラウンドの相手を-30%弱体化", type: "inherit_debuff", value: 0.3, rate: 0.6 } },
  { id: 50, name: "アリストテレス", power: 92, hp: 108, attribute: "CULTURE", desc: "古代ギリシアの哲学者。「万学の祖」と呼ばれあらゆる学問体系を分類。師のイデア論を批判し現実の事物に本質が存在すると主張した。", skill: { name: "万学の祖", desc: "相手が【軍事】なら自身の歴史力+50%", type: "cond_buff_self", target: "VALOR", value: 0.5, rate: 0.9 } },
  { id: 51, name: "ミケランジェロ", power: 80, hp: 120, attribute: "CULTURE", desc: "ルネサンスの巨匠。『ダヴィデ像』などで躍動感あふれる肉体美を表現。システィーナ礼拝堂の天井画『創世記』は圧倒的な迫力を持つ。", skill: { name: "神のごとき芸術", desc: "自身の歴史力+40%", type: "buff_self", value: 0.4, rate: 0.7 } },
  { id: 52, name: "コペルニクス", power: 75, hp: 125, attribute: "CULTURE", desc: "ポーランドの天文学者。地球が宇宙の中心である天動説を覆し、太陽を中心に地球が回っている「地動説」を提唱し科学革命の口火を切った。", skill: { name: "地動説", desc: "次のラウンドの相手を-30%弱体化", type: "inherit_debuff", value: 0.3, rate: 0.6 } },
  { id: 53, name: "ガリレオ・ガリレイ", power: 82, hp: 118, attribute: "CULTURE", desc: "イタリアの物理学者。自作望遠鏡での観測から地動説を確信したが、異端問問所にかけられ放棄を強要された。「それでも地球は回っている」で有名。", skill: { name: "近代科学の父", desc: "相手に最大HPの20%ダメージ", type: "fixed_damage", value: 0.2, rate: 0.5 } },
  { id: 54, name: "ダーウィン", power: 78, hp: 122, attribute: "CULTURE", desc: "イギリスの自然科学者。『種の起源』を発表し「自然選択」による生物の進化論を体系化。当時のキリスト教的価値観に衝撃を与えた。", skill: { name: "自然選択説", desc: "自軍HP半分以下なら自身の歴史力+60%", type: "cond_pinch_buff", value: 0.6, rate: 0.8 } },
  { id: 55, name: "アインシュタイン", power: 78, hp: 122, attribute: "CULTURE", desc: "20世紀最大の物理学者。相対性理論を発表し時間と空間が絶対的でないことを示しニュートン力学の常識を覆した。平和主義者としても知られる。", skill: { name: "相対性理論", desc: "次の味方の歴史力を+40%強化", type: "inherit_buff", value: 0.4, rate: 0.7 } },
  { id: 56, name: "ゲーテ", power: 72, hp: 128, attribute: "CULTURE", desc: "ドイツの文豪。『若きウェルテルの悩み』で名声を確立。生涯をかけて完成させた悲劇『ファウスト』は世界文学の最高峰とされる。", skill: { name: "ファウストの探求", desc: "相手から最大HPの15%を吸収", type: "absorb_hp", value: 0.15, rate: 0.5 } },
  { id: 57, name: "ダンテ", power: 70, hp: 130, attribute: "CULTURE", desc: "ルネサンスの先駆とされるイタリアの詩人。放浪生活の中で大叙事詩『神曲』を執筆し、現代イタリア語の基礎となった。", skill: { name: "神曲の導き", desc: "味方全体の歴史力+15%", type: "buff_all", value: 0.15, rate: 0.6 } },
  { id: 58, name: "李白", power: 85, hp: 115, attribute: "CULTURE", desc: "盛唐を代表する「詩仙」。自由奔放な性格で酒と月を愛し、型にはまらないスケールの大きな詩を数多く残し諸国を放浪した。", skill: { name: "詩仙の酒", desc: "5戦目配置時、負け数\xD740%歴史力UP", type: "cond_pos_revenge", pos: 5, value: 0.4, rate: 0.8 } },
  { id: 59, name: "杜甫", power: 82, hp: 118, attribute: "CULTURE", desc: "盛唐を代表する「詩聖」。国家の混乱や社会の矛盾を厳格な形式で詠んだ。「国破れて山河あり」の句で知られる『春望』が有名。", skill: { name: "詩聖の憂国", desc: "敵全員の歴史力-15%", type: "debuff_all", value: 0.15, rate: 0.6 } },
  { id: 60, name: "フビライ・ハン", power: 116, hp: 84, attribute: "VALOR", desc: "モンゴル帝国第5代皇帝。南宋を滅ぼし国号を元と定めた。日本や東南アジアへの遠征も行い東西交易路を整備してユーラシアの結びつきを強めた。", skill: { name: "大元ウルスの覇権", desc: "相手の歴史力を-30%", type: "debuff_enemy", value: 0.3, rate: 0.7 } },
  { id: 61, name: "キュロス2世", power: 105, hp: 95, attribute: "VALOR", desc: "アケメネス朝の創始者。メディア、リディア、新バビロニアなどを次々と征服し、オリエントを統一。被征服民族に寛容な政策をとり、バビロン捕囚のユダヤ人を解放して神殿再建を許した寛大な帝王。", skill: { name: "寛容の精神", desc: "自軍のHPを最大HPの20%回復", type: "heal_hp", value: 0.2, rate: 0.6 } },
  { id: 62, name: "ダレイオス1世", power: 112, hp: 88, attribute: "VALOR", desc: "アケメネス朝第3代の王。全国を20の州（サトラピー）に分け知事（サトラップ）を置き、「王の目」「王の耳」と呼ばれる監察官を派遣。「王の道」を整備して駅伝制を設け、帝国最盛期を現出した。", skill: { name: "王の道", desc: "味方全体の歴史力+15%", type: "buff_all", value: 0.15, rate: 0.6 } },
  { id: 63, name: "大スキピオ", power: 138, hp: 62, attribute: "VALOR", desc: "共和政ローマの将軍。第二次ポエニ戦争において、本国から離れたカルタゴ軍の背後を突くため北アフリカへ侵攻。ザマの戦いで名将ハンニバルを打ち破り、ローマに最終的な勝利をもたらした救国の英雄。", skill: { name: "アフリカヌス", desc: "相手が【政治】なら自身の歴史力+50%", type: "cond_buff_self", target: "STRATEGY", value: 0.5, rate: 0.9 } },
  { id: 64, name: "項羽", power: 125, hp: 75, attribute: "VALOR", desc: "秦末の動乱期に決起した楚の武将。鉅鹿の戦いで秦の主力軍を打ち破り、圧倒的な武勇で「西楚の覇王」を名乗った。しかし、論功行賞の不満から諸将の離反を招き、垓下の戦いで劉邦に敗れ自刃した。", skill: { name: "四面楚歌の突破", desc: "HP20%消費して自身の歴史力+90%", type: "sacrifice_buff", cost: 0.2, value: 0.9, rate: 0.7 } },
  { id: 65, name: "冒頓単于", power: 120, hp: 80, attribute: "VALOR", desc: "遊牧民である匈奴の最盛期を築いた君主。強力な騎馬軍団を率いて東胡や月氏を破り、モンゴル高原を統一。前漢の創始者である劉邦を白登山の戦いで完全に包囲し、漢側に屈辱的な和約を結ばせた。", skill: { name: "鳴鏑の包囲", desc: "敵全員の歴史力-20%", type: "debuff_all", value: 0.2, rate: 0.5 } },
  { id: 66, name: "トトメス3世", power: 123, hp: 77, attribute: "VALOR", desc: "古代エジプト新王国第18王朝のファラオ。治世中にシリアやヌビアへ幾度も大規模な軍事遠征を行い、古代エジプト史上最大の版図を築き上げた。その輝かしい軍事的功績から「古代のナポレオン」とも評される。", skill: { name: "古代のナポレオン", desc: "相手から最大HPの15%を吸収", type: "absorb_hp", value: 0.15, rate: 0.5 } },
  { id: 67, name: "カール大帝", power: 115, hp: 85, attribute: "VALOR", desc: "フランク王国カロリング朝の最盛期の国王。アヴァール人やランゴバルド王国を討ち、西ヨーロッパの大半を統一。800年に教皇レオ3世からローマ皇帝の冠を授けられ、古代ローマ、キリスト教、ゲルマンの融合を象徴した。", skill: { name: "西ローマ皇帝戴冠", desc: "味方全体の歴史力+20%", type: "buff_all", value: 0.2, rate: 0.5 } },
  { id: 68, name: "ティムール", power: 122, hp: 78, attribute: "VALOR", desc: "西チャガタイ・ハン国から台頭し、ティムール朝を建国した征服者。サマルカンドを都とし、イルハン国やキプチャク・ハン国を打破。アンカラの戦いでオスマン帝国を破り皇帝バヤジット1世を捕虜にするなど無敗を誇った。", skill: { name: "サマルカンドの覇者", desc: "相手の歴史力を-40%", type: "debuff_enemy", value: 0.4, rate: 0.6 } },
  { id: 69, name: "永楽帝", power: 112, hp: 88, attribute: "VALOR", desc: "明の第3代皇帝。靖難の役で建文帝から帝位を奪い、都を北京へ遷した。モンゴル高原への5度にわたる親征を実施し、鄭和に南海の大遠征を命じて朝貢体制を拡大するなど、明の最盛期を築いた積極君主。", skill: { name: "鄭和の大遠征", desc: "次の味方の歴史力を+30%強化", type: "inherit_buff", value: 0.3, rate: 0.6 } },
  { id: 70, name: "アクバル", power: 108, hp: 92, attribute: "VALOR", desc: "ムガル帝国の第3代皇帝。ラージプート族などヒンドゥー教徒との融和を図り、非イスラーム教徒への人頭税（ジズヤ）を廃止。北・中部インドの大半を征服し、中央集権的な統治体制であるマンサブダール制を確立した。", skill: { name: "ジズヤの廃止", desc: "被ダメージを70%カット", type: "damage_cut", value: 0.7, rate: 0.6 } },
  { id: 71, name: "アウラングゼーブ", power: 114, hp: 86, attribute: "VALOR", desc: "ムガル帝国の第6代皇帝。デカン高原や南インドへ絶え間ない外征を行い、帝国史上最大の領土を築き上げた。しかし、熱烈なスンナ派信仰からジズヤを復活させ、シク教徒やマラーター同盟の激しい反乱を招いた。", skill: { name: "最大領土の代償", desc: "HP10%消費して自身の歴史力+60%", type: "sacrifice_buff", cost: 0.1, value: 0.6, rate: 0.8 } },
  { id: 72, name: "カール12世", power: 106, hp: 94, attribute: "VALOR", desc: "17世紀末からのスウェーデン国王。「北方の流星」と呼ばれ、大北方戦争においてロシア・ポーランド・デンマークの同盟軍と激闘を展開。ナルヴァの戦いでピョートル1世の軍を大破するも、ポルタヴァで致命的な敗北を喫した。", skill: { name: "北方の流星", desc: "1戦目配置時、歴史力+40%", type: "cond_pos_buff", pos: 1, value: 0.4, rate: 0.8 } },
  { id: 73, name: "クライヴ", power: 98, hp: 102, attribute: "VALOR", desc: "イギリス東インド会社の軍人。1757年のプラッシーの戦いにおいて、フランス・ベンガル太守の連合軍を少数の兵と謀略で撃破。これによりイギリスによるインドの覇権と植民地化が決定づけられた。", skill: { name: "プラッシーの猛進", desc: "相手に最大HPの20%ダメージ", type: "fixed_damage", value: 0.2, rate: 0.6 } },
  { id: 74, name: "ウェリントン", power: 110, hp: 90, attribute: "VALOR", desc: "イギリスの将軍・政治家。イベリア半島戦争でフランス軍と粘り強く戦い、1815年のワーテルローの戦いではプロイセン軍と協力してナポレオンの軍勢を完全に打ち破った。「鉄の公爵」と称されるイギリスの英雄。", skill: { name: "鉄の公爵", desc: "自軍HP半分以下なら自身の歴史力+70%", type: "cond_pinch_buff", value: 0.7, rate: 0.9 } },
  { id: 75, name: "エルナン・コルテス", power: 104, hp: 96, attribute: "VALOR", desc: "スペインのコンキスタドール（征服者）。わずか数百の兵力と火器・馬・先住民の反乱勢力を巧みに利用し、1521年にメキシコのアステカ帝国を滅亡させた。中南米におけるスペイン植民地帝国の基礎を冷酷に築いた。", skill: { name: "アステカの征服", desc: "相手を-25%弱体化し、自身を+25%強化", type: "debuff_enemy", value: 0.25, rate: 0.8 } },
  { id: 76, name: "フランシスコ・ピサロ", power: 102, hp: 98, attribute: "VALOR", desc: "スペインのコンキスタドール。少数の兵を率いてアンデス山脈に侵入し、内戦で疲弊していたインカ帝国を急襲。皇帝アタワルパをカハマルカで騙し討ちにして処刑し、1533年に黄金の帝国を滅ぼした。", skill: { name: "インカの滅亡", desc: "次のラウンドの相手を-30%弱体化", type: "inherit_debuff", value: 0.3, rate: 0.6 } },
  { id: 77, name: "アタワルパ", power: 85, hp: 115, attribute: "VALOR", desc: "インカ帝国最後の皇帝。内戦を制して帝位に就いた直後、ピサロ率いるスペイン軍と遭遇し捕縛された。部屋を満たすほどの莫大な金銀を身代金として提供したにもかかわらず、異端審問の末に絞首刑にされた悲劇の王。", skill: { name: "黄金の身代金", desc: "自軍のHPを最大HPの20%回復", type: "heal_hp", value: 0.2, rate: 0.6 } },
  { id: 78, name: "岳飛", power: 138, hp: 62, attribute: "VALOR", desc: "中国・南宋の武将。金軍の激しい侵攻に対して「岳家軍」と呼ばれる軍団を率いて連戦連勝し、失地回復を目指した救国の英雄。しかし、和平派の宰相・秦檜の策謀により無実の罪で投獄・処刑され、悲劇の将として祀られた。", skill: { name: "尽忠報国", desc: "被ダメージを80%軽減", type: "damage_cut", value: 0.8, rate: 0.5 } },
  { id: 79, name: "メフメト2世", power: 118, hp: 82, attribute: "VALOR", desc: "オスマン帝国の第7代スルタン。1453年、難攻不落とされたコンスタンティノープルをウルバン砲や艦隊の陸越えを駆使して陥落させ、千年の歴史を持つビザンツ帝国を滅亡させた「征服者」。都市をイスタンブールと改称。", skill: { name: "艦隊の山越え", desc: "相手が【政治】なら相手を-50%弱体化", type: "cond_debuff_enemy", target: "STRATEGY", value: 0.5, rate: 0.9 } },
  { id: 81, name: "シモン・ボリバル", power: 105, hp: 95, attribute: "VALOR", desc: "南アメリカ北部を中心とする独立運動を指導した「解放者」。優れた戦術でスペイン軍を打ち破り、大コロンビア（現在のベネズエラ、コロンビアなど）の独立を達成。ラテンアメリカ諸国の連帯（パン・アメリカン会議）を提唱した。", skill: { name: "解放者の進軍", desc: "味方全体の歴史力+20%", type: "buff_all", value: 0.2, rate: 0.5 } },
  { id: 82, name: "サン・マルティン", power: 90, hp: 110, attribute: "VALOR", desc: "南アメリカ南部の独立運動の指導者。アンデス山脈を越える過酷な行軍でスペイン軍の虚を突き、チリやペルーの独立に決定的な貢献を果たした。ボリバルとのグアヤキル会談ののち、潔く全権を譲り引退した無私の英雄。", skill: { name: "アンデス越え", desc: "3戦目配置時、歴史力+50%", type: "cond_pos_buff", pos: 3, value: 0.5, rate: 0.8 } },
  { id: 83, name: "チェ・ゲバラ", power: 112, hp: 88, attribute: "VALOR", desc: "アルゼンチン出身の革命家・医師。フィデル・カストロと共にゲリラ戦を展開し、1959年のキューバ革命を成功に導いた。その後も第三世界の抑圧からの解放を目指してボリビアで戦い、処刑されたが革命のイコンとなった。", skill: { name: "ゲリラ戦術", desc: "相手に最大HPの20%ダメージ", type: "fixed_damage", value: 0.2, rate: 0.6 } },
  { id: 84, name: "ジューコフ", power: 116, hp: 84, attribute: "VALOR", desc: "ソビエト連邦の最高勲章を多数受章した元帥。第二次世界大戦の独ソ戦において、モスクワ防衛、スターリングラード攻防戦など数々の決戦でソ連軍を指揮して勝利に導き、最終的にベルリンを陥落させた救国の軍人。", skill: { name: "大祖国戦争の盾", desc: "被ダメージを90%カット", type: "damage_cut", value: 0.9, rate: 0.4 } },
  { id: 85, name: "ウォーレス", power: 104, hp: 96, attribute: "VALOR", desc: "スコットランドの独立の英雄。13世紀末、イングランド王エドワード1世の過酷な支配に対して民衆を率いて蜂起。スターリング・ブリッジの戦いで大勝し、処刑されたのちもスコットランドの国民的アイデンティティの象徴となった。", skill: { name: "独立の叫び", desc: "自軍HP半分以下なら敵全体-30%", type: "cond_pinch_debuff_all", value: 0.3, rate: 0.8 } },
  { id: 86, name: "カニシカ王", power: 108, hp: 92, attribute: "VALOR", desc: "クシャーナ朝の最盛期の国王。プルシャプラを都とし、中央アジアから北インドにかけての大帝国を統治した。仏教を熱心に保護し、ガンダーラ美術が栄え、大乗仏教が東アジアへ伝播する重要な契機を作った。", skill: { name: "クシャーナの保護", desc: "次の味方の歴史力を+30%強化", type: "inherit_buff", value: 0.3, rate: 0.6 } },
  { id: 87, name: "ユスティニアヌス", power: 114, hp: 86, attribute: "VALOR", desc: "ビザンツ帝国（東ローマ帝国）の皇帝。将軍ベリサリウスらを派遣しヴァンダル王国や東ゴート王国を滅ぼし、旧ローマ帝国の西半分の領土を回復。『ローマ法大全』の編纂やハギア・ソフィア大聖堂の建立など偉大な業績を残した。", skill: { name: "帝国再建の遠征", desc: "味方全体の歴史力+15%", type: "buff_all", value: 0.15, rate: 0.6 } },
  { id: 88, name: "サルゴン", power: 110, hp: 90, attribute: "VALOR", desc: "アッカド人の王。紀元前24世紀頃、シュメール人の都市国家群を次々と征服し、メソポタミア史上初となる広大な統一帝国（アッカド帝国）を建設。常備軍を組織し、度量衡の統一など中央集権的な統治の先駆けとなった。", skill: { name: "史上初の帝国", desc: "相手の歴史力を-30%", type: "debuff_enemy", value: 0.3, rate: 0.7 } },
  { id: 89, name: "フリードリヒ・ヴィルヘルム1世", power: 102, hp: 98, attribute: "VALOR", desc: "プロイセンの第2代国王。「軍人王」と呼ばれる。国家予算の大半を軍事に注ぎ込み、厳しい規律を持つヨーロッパ屈指の強力な常備軍（巨人兵団など）を育成。絶対的な軍国主義体制を敷き、プロイセン強国化の基盤を完成させた。", skill: { name: "軍国主義の完成", desc: "自身の歴史力+40%", type: "buff_self", value: 0.4, rate: 0.8 } },
  { id: 90, name: "クトゥズ", power: 106, hp: 94, attribute: "VALOR", desc: "エジプト・マムルーク朝の第3代スルタン。1260年のアイン・ジャールートの戦いにおいて、無敵を誇ったモンゴル軍（フレグの別働隊）をバイバルスと共に打ち破り、イスラーム世界を西進するモンゴルの脅威から救い出した。", skill: { name: "モンゴル撃退", desc: "相手が【文化】なら自身の歴史力+60%", type: "cond_buff_self", target: "CULTURE", value: 0.6, rate: 0.9 } },
  { id: 91, name: "ハンムラビ王", power: 118, hp: 82, attribute: "STRATEGY", desc: "古バビロニア王国（バビロン第1王朝）の第6代の王。全メソポタミアを統一し、運河の建設や中央集権化を推進した。「目には目を」の復讐法と身分法を厳格に規定した『ハンムラビ法典』を発布し、法による統治を確立した。", skill: { name: "復讐法の裁き", desc: "相手に最大HPの20%ダメージ", type: "fixed_damage", value: 0.2, rate: 0.6 } },
  { id: 92, name: "アメンホテプ4世", power: 85, hp: 115, attribute: "STRATEGY", desc: "古代エジプト新王国のファラオ。強大化したアモン神官団の権力を排斥するため、唯一神アトンへの信仰を強制する「アマルナ革命」を断行。自らをイクナートンと改名し、都をテル・エル・アマルナに遷して古い伝統を打破した。", skill: { name: "アマルナ革命", desc: "HP15%消費して相手を30%弱体化", type: "sacrifice_debuff", cost: 0.15, value: 0.3, rate: 0.8 } },
  { id: 93, name: "ソロン", power: 95, hp: 105, attribute: "STRATEGY", desc: "古代アテネの政治家。貴族と平民の激しい対立を調停するため、財産額に応じて市民を4等級に分け、参政権と兵役の義務を定める「財産政治」を実施。また、負債の帳消しや債務奴隷の禁止を定め、アテネ民主政の基礎を築いた。", skill: { name: "財産政治の調停", desc: "自軍のHPを最大HPの20%回復", type: "heal_hp", value: 0.2, rate: 0.5 } },
  { id: 94, name: "クレイステネス", power: 98, hp: 102, attribute: "STRATEGY", desc: "古代アテネの政治家。血縁的な4部族制を解体し、地縁的な10部族制へと再編して貴族の権力基盤を崩した。僭主の出現を防ぐためのオストラキスモス（陶片追放）の制度を創設し、アテネ民主政の体制を確固たるものにした。", skill: { name: "陶片追放", desc: "相手の歴史力を-30%", type: "debuff_enemy", value: 0.3, rate: 0.7 } },
  { id: 95, name: "漢の武帝", power: 120, hp: 80, attribute: "STRATEGY", desc: "前漢の第7代皇帝。董仲舒の建言による儒学の官学化を行い中央集権体制を強化。張騫を派遣して西域ルートを開拓し、衛青らを派遣して匈奴を討ち、さらに塩・鉄・酒の専売制で財政を潤すなど、前漢の最大版図と最盛期を築いた。", skill: { name: "専売制の富", desc: "味方全体の歴史力+20%", type: "buff_all", value: 0.2, rate: 0.6 } },
  { id: 96, name: "光武帝", power: 110, hp: 90, attribute: "STRATEGY", desc: "王莽による新の悪政による混乱（赤眉の乱など）を収拾し、漢王朝を再興（後漢）した初代皇帝の劉秀。洛陽を都とし、奴隷の解放や田租の軽減など内政の安定に尽力した。日本の奴国に「漢委奴国王」の金印を授与したとされる。", skill: { name: "後漢の再興", desc: "自軍HP半分以下なら自身の歴史力+60%", type: "cond_pinch_buff", value: 0.6, rate: 0.8 } },
  { id: 97, name: "曹操", power: 118, hp: 82, attribute: "STRATEGY", desc: "後漢末期の動乱を制し、華北を統一した三国時代の魏の基礎を築いた政治家・武将。屯田制を実施して農業生産を回復させ、能力主義による人材登用（のちの九品中正に繋がる）を行った。建安文学を代表する優れた詩人でもある。", skill: { name: "屯田の計", desc: "相手から最大HPの15%を吸収", type: "absorb_hp", value: 0.15, rate: 0.5 } },
  { id: 98, name: "楊堅", power: 114, hp: 86, attribute: "STRATEGY", desc: "魏晋南北朝時代の長きにわたる分裂を終結させ、589年に中国を統一した隋の初代皇帝（文帝）。均田制・租庸調制・府兵制の確立や、門閥貴族を抑えるための科挙の創設など、後の唐帝国に引き継がれる強固な制度を整備した。", skill: { name: "科挙の創設", desc: "次の味方の歴史力を+40%強化", type: "inherit_buff", value: 0.4, rate: 0.7 } },
  { id: 99, name: "李世民", power: 122, hp: 78, attribute: "STRATEGY", desc: "唐の第2代皇帝（太宗）。群雄を平定して中国統一を完成させ、突厥を討って西域を支配下に置いた。律令体制を完成させ、広く有能な人材を登用したその治世は「貞観の治」と称賛され、中国史上最高の明君の一とされる。", skill: { name: "貞観の治", desc: "味方全体の歴史力+25%", type: "buff_all", value: 0.25, rate: 0.5 } },
  { id: 100, name: "則天武后", power: 116, hp: 84, attribute: "STRATEGY", desc: "唐の高宗の皇后となり、病弱な皇帝に代わって実権を掌握。国号を「周（武周）」と改めて中国史上唯一の女帝となった。旧来の門閥貴族を徹底的に弾圧し、科挙を通じた新興官僚を重用して政権の安定を図り、のちの開元の治の礎を築いた。", skill: { name: "武周の恐怖", desc: "敵全員の歴史力-20%", type: "debuff_all", value: 0.2, rate: 0.6 } },
  { id: 101, name: "玄宗", power: 100, hp: 100, attribute: "STRATEGY", desc: "唐の第6代皇帝。即位直後は有能な宰相を任用して政治を引き締め、唐の文化・経済が絶頂に達する「開元の治」を現出した。しかし晩年は楊貴妃を寵愛して政治を怠り、節度使による安史の乱を招いて帝国衰退の致命的な原因を作った。", skill: { name: "開元の繁栄", desc: "相手が【文化】なら自身の歴史力+50%", type: "cond_buff_self", target: "CULTURE", value: 0.5, rate: 0.9 } },
  { id: 102, name: "クローヴィス", power: 105, hp: 95, attribute: "STRATEGY", desc: "メロヴィング朝フランク王国の建国者。ガリア地方を統一し、ゲルマン民族の多くが信仰していたアリウス派から、カトリック（アタナシウス派）へと改宗した。これによりローマ系住民や教皇の支持を得て国家権力を強固に安定させた。", skill: { name: "カトリック改宗", desc: "自軍のHPを最大HPの20%回復", type: "heal_hp", value: 0.2, rate: 0.5 } },
  { id: 103, name: "フィリップ2世", power: 108, hp: 92, attribute: "STRATEGY", desc: "フランス・カペー朝の尊厳王。第3回十字軍に参加後、イギリス王ジョンと戦ってノルマンディーなどフランス国内のイギリス領の大半を武力で奪い返した。官僚制を整備し、弱体だったフランス王権の強化と中央集権化を飛躍的に推進した。", skill: { name: "尊厳王の奪還", desc: "相手の歴史力を-30%", type: "debuff_enemy", value: 0.3, rate: 0.7 } },
  { id: 104, name: "フィリップ4世", power: 111, hp: 89, attribute: "STRATEGY", desc: "フランス・カペー朝の端麗王。財政難から聖職者への課税を強行し、教皇ボニファティウス8世と激しく対立（アナーニ事件）。初の三部会を招集して国民の支持を集め、教皇庁をアヴィニョンに移す「教皇のバビロン捕囚」を行い教皇権を圧倒した。", skill: { name: "アナーニ事件", desc: "相手が【文化】なら敵の歴史力-50%", type: "cond_debuff_enemy", target: "CULTURE", value: 0.5, rate: 0.9 } },
  { id: 105, name: "ルイ14世", power: 80, hp: 120, attribute: "STRATEGY", desc: "フランス・ブルボン朝の最盛期を現出した「太陽王」。「朕は国家なり」と称し絶対王政の極致を示した。コルベールを登用して重商主義を強力に推進し、豪華なヴェルサイユ宮殿を造営するが、度重なる侵略戦争で国家財政を逼迫させた。", skill: { name: "太陽王の威光", desc: "味方全体の歴史力+20%", type: "buff_all", value: 0.2, rate: 0.5 } },
  { id: 106, name: "大ピット", power: 102, hp: 98, attribute: "STRATEGY", desc: "18世紀イギリスの指導的な政治家・首相。七年戦争において強力な指導力を発揮し、プロイセンに資金援助を行いながら、北米のフレンチ・インディアン戦争やインドのプラッシーの戦いでフランスを圧倒し、広大な大英帝国の基礎を築いた。", skill: { name: "重商主義の勝利", desc: "次の味方の歴史力を+30%強化", type: "inherit_buff", value: 0.3, rate: 0.6 } },
  { id: 107, name: "ディズレーリ", power: 105, hp: 95, attribute: "STRATEGY", desc: "19世紀イギリスの保守党を代表する首相。スエズ運河株の買収やヴィクトリア女王のインド女帝即位を実現させるなど、帝国主義的な外交政策（積極外交）を力強く推し進め、大英帝国の黄金時代を華やかに演出した政治家。", skill: { name: "帝国主義外交", desc: "5戦目配置時、これまでの負け数\xD735%歴史力UP", type: "cond_pos_revenge", pos: 5, value: 0.35, rate: 1 } },
  { id: 108, name: "グラッドストン", power: 104, hp: 96, attribute: "STRATEGY", desc: "19世紀イギリスの自由党を代表する首相。労働組合の合法化や第3回選挙法改正による参政権の拡大、アイルランドの土地法・自治法案の提出など、内政の自由主義的改革と平和的な協調外交を重んじた。ディズレーリの最大のライバル。", skill: { name: "自由党の改革", desc: "被ダメージを70%カット", type: "damage_cut", value: 0.7, rate: 0.6 } },
  { id: 109, name: "フランクリン・ローズヴェルト", power: 112, hp: 88, attribute: "STRATEGY", desc: "アメリカ第32代大統領。世界恐慌に対し、TVA（テネシー川流域開発公社）の設立やワグナー法の制定など、政府が経済に積極的に介入する「ニューディール政策」を実施。第二次大戦でも巧みな指導力を発揮し、アメリカを勝利に導いた。", skill: { name: "ニューディール", desc: "自軍HP半分以下なら味方全体+30%", type: "cond_pinch_buff", value: 0.3, rate: 0.9 } },
  { id: 110, name: "ウィルソン", power: 106, hp: 94, attribute: "STRATEGY", desc: "アメリカ第28代大統領。第一次世界大戦の講和に向けて「十四カ条の平和原則」を発表し、秘密外交の廃止や民族自決、国際連盟の設立を提唱し新しい国際秩序を模索した。しかし国内の孤立主義によりアメリカ自身は連盟に不参加となった。", skill: { name: "十四カ条の原則", desc: "次のラウンドの相手を-30%弱体化", type: "inherit_debuff", value: 0.3, rate: 0.7 } },
  { id: 112, name: "大院君", power: 88, hp: 112, attribute: "STRATEGY", desc: "朝鮮王朝末期の政治家。幼い高宗の父として摂政となり、書院の整理や税制改革など強力な内政改革を行う一方で、徹底した鎖国・排外政策（衛正斥邪）を頑なに推進。フランスやアメリカの艦隊の襲撃を撃退し、開国を拒み続けた。", skill: { name: "衛正斥邪", desc: "相手が【文化】なら自身の歴史力+50%", type: "cond_buff_self", target: "CULTURE", value: 0.5, rate: 0.8 } },
  { id: 113, name: "康有為", power: 95, hp: 105, attribute: "STRATEGY", desc: "清末の思想家・政治家。日清戦争の敗北に衝撃を受け、光緒帝の信任を得て日本の明治維新をモデルとした上からの近代化改革（戊戌の変法）を断行。しかし西太后ら保守派の猛反発によるクーデター（戊戌の政変）に遭い、日本へ亡命した。", skill: { name: "戊戌の変法", desc: "1戦目配置時、歴史力+40%", type: "cond_pos_buff", pos: 1, value: 0.4, rate: 0.8 } },
  { id: 114, name: "孫文", power: 115, hp: 85, attribute: "STRATEGY", desc: "清末から民国初期の思想家・革命家。ハワイで興中会を組織し、のちに中国同盟会を結成。辛亥革命に際して中華民国の初代臨時大総統に推戴された。「三民主義（民族・民権・民生）」を唱え、中国近代化の国父として現在も広く敬愛される。", skill: { name: "三民主義", desc: "味方全体の歴史力+20%", type: "buff_all", value: 0.2, rate: 0.6 } },
  { id: 115, name: "スカルノ", power: 105, hp: 95, attribute: "STRATEGY", desc: "インドネシアの独立運動指導者。オランダの過酷な植民地支配に抵抗し、インドネシア国民党を結成。第二次大戦後の1945年に独立を宣言し初代大統領に就任。バンドン会議を開催し、第三世界（非同盟諸国）の連帯を主導した。", skill: { name: "第三世界の連帯", desc: "自軍のHPを最大HPの20%回復", type: "heal_hp", value: 0.2, rate: 0.5 } },
  { id: 116, name: "マハティール", power: 110, hp: 90, attribute: "STRATEGY", desc: "マレーシアの元首相。欧米ではなく、経済成長を遂げた日本や韓国の労働倫理をモデルとする「ルック・イースト政策」を提唱。積極的な工業化政策とインフラ整備によって、マレーシアを東南アジア屈指の経済成長国へと押し上げた指導者。", skill: { name: "ルック・イースト", desc: "次の味方の歴史力を+35%強化", type: "inherit_buff", value: 0.35, rate: 0.7 } },
  { id: 117, name: "ナセル", power: 108, hp: 92, attribute: "STRATEGY", desc: "エジプトの政治家・大統領。自由将校団を率いてエジプト革命を起こし腐敗した王政を打倒。アスワン・ハイ・ダム建設のためスエズ運河の国有化を断行して第2次中東戦争で英仏を退け、パン・アラブ主義の英雄としてアラブ世界の中心となった。", skill: { name: "運河の国有化", desc: "相手に最大HPの20%ダメージ", type: "fixed_damage", value: 0.2, rate: 0.6 } },
  { id: 118, name: "ネルソン・マンデラ", power: 100, hp: 100, attribute: "STRATEGY", desc: "南アフリカ共和国の政治家。白人政権のアパルトヘイト（人種隔離政策）に抗議し、国家反逆罪で27年間投獄されながらも不屈の闘争を継続。釈放後に全人種参加の選挙で初の黒人大統領となり、報復ではなく真実と和解による人種融和に尽力した。", skill: { name: "真実と和解", desc: "被ダメージを80%カット", type: "damage_cut", value: 0.8, rate: 0.5 } },
  { id: 119, name: "ゴルバチョフ", power: 98, hp: 102, attribute: "STRATEGY", desc: "ソ連の最後の最高指導者。停滞するソ連体制を立て直すため、ペレストロイカ（改革）とグラスノスチ（情報公開）を断行。外交では新思考外交を展開し、マルタ会談でブッシュと冷戦の終結を宣言したが、結果的にソ連邦の解体を招くこととなった。", skill: { name: "ペレストロイカ", desc: "自軍HP半分以下なら敵全体-30%", type: "cond_pinch_debuff_all", value: 0.3, rate: 0.8 } },
  { id: 120, name: "カストロ", power: 104, hp: 96, attribute: "STRATEGY", desc: "キューバの革命家・政治家。チェ・ゲバラらと共に親米のバティスタ独裁政権を打倒するキューバ革命を成功させた。その後社会主義を宣言し、ソ連に接近してキューバ危機を引き起こすなど、半世紀以上にわたり反米の姿勢を貫き国を指導した。", skill: { name: "キューバ革命", desc: "相手から最大HPの15%を吸収", type: "absorb_hp", value: 0.15, rate: 0.6 } },
  { id: 121, name: "ホメロス", power: 85, hp: 115, attribute: "CULTURE", desc: "古代ギリシアの盲目の吟遊詩人とされる人物。トロイア戦争の英雄アキレウスの怒りを描いた『イリアス』や、知将の帰国譚『オデュッセイア』という二大叙事詩を編纂。ギリシア神話と文学の基礎を築き、後世の西洋文化に多大な影響を与えた。", skill: { name: "叙事詩の源流", desc: "味方全体の歴史力+15%", type: "buff_all", value: 0.15, rate: 0.6 } },
  { id: 122, name: "ヘロドトス", power: 90, hp: 110, attribute: "CULTURE", desc: "古代ギリシアの歴史家。「歴史の父」と呼ばれる。ペルシア戦争を主題とする『歴史』を著し、オリエント各地を旅して得た豊富な伝聞や風俗を記録。物語風の生き生きとした記述が特徴で、「エジプトはナイルのたまもの」の言葉で有名。", skill: { name: "歴史の父", desc: "次の味方の歴史力を+30%強化", type: "inherit_buff", value: 0.3, rate: 0.7 } },
  { id: 123, name: "トゥキディデス", power: 92, hp: 108, attribute: "CULTURE", desc: "古代ギリシアの歴史家。アテネとスパルタの覇権争いであるペロポネソス戦争の従軍経験を持ち、『歴史』を著した。神話や伝承などの超自然的な要因を排し、史料の批判的吟味と因果関係の客観的な分析を行う「科学的歴史記述の祖」とされる。", skill: { name: "客観的史観", desc: "相手の歴史力を-30%", type: "debuff_enemy", value: 0.3, rate: 0.7 } },
  { id: 124, name: "アイスキュロス", power: 88, hp: 112, attribute: "CULTURE", desc: "古代アテネの三大悲劇詩人の一人。『アガメムノン』などに代表される悲劇を創作。マラトンの戦いなどペルシア戦争で戦った実体験に基づく重厚な作品も多く、神々の絶対的な摂理と人間の運命の葛藤を壮大なスケールと荘厳な言葉で描き出した。", skill: { name: "荘厳なる悲劇", desc: "相手に最大HPの20%ダメージ", type: "fixed_damage", value: 0.2, rate: 0.5 } },
  { id: 125, name: "司馬遷", power: 70, hp: 130, attribute: "CULTURE", desc: "中国・前漢の歴史家。武帝の怒りに触れ宮刑という屈辱を受けながらも、父の遺志を継いで太古から武帝の時代までの歴史書『史記』を完成させた。皇帝の事績（本紀）と臣下の伝記（列伝）を中心とする「紀伝体」の形式は、その後の中国正史の絶対的な模範となった。", skill: { name: "紀伝体の完成", desc: "次のラウンドの相手を-30%弱体化", type: "inherit_debuff", value: 0.3, rate: 0.6 } },
  { id: 126, name: "蔡倫", power: 95, hp: 105, attribute: "CULTURE", desc: "中国・後漢時代の宦官。樹皮や麻くず、ぼろ布などを原料とした実用的な「製紙法（蔡侯紙）」を改良・確立した。重い木簡や竹簡に代わって紙が普及したことで、書物の大量生産と文化の伝播が飛躍的に進み、世界史的な情報革命をもたらした。", skill: { name: "製紙法の確立", desc: "味方全体の歴史力+20%", type: "buff_all", value: 0.2, rate: 0.5 } },
  { id: 127, name: "陶淵明", power: 82, hp: 118, attribute: "CULTURE", desc: "中国・六朝時代（東晋）の自然詩人。官僚生活の束縛を嫌い、「帰去来の辞」を残して田園生活に隠遁した。自然との調和や酒を愛する自由な精神を平易な言葉で詠み、『桃花源記』などで知られる隠遁文学の最高峰として後世の文人に深い影響を与えた。", skill: { name: "帰去来の辞", desc: "自軍のHPを最大HPの25%回復", type: "heal_hp", value: 0.25, rate: 0.5 } },
  { id: 128, name: "顧愷之", power: 86, hp: 114, attribute: "CULTURE", desc: "中国・六朝時代（東晋）の画家。「画聖」と称される。『女史箴図』（模本が伝存）などに代表されるように、対象の精神や内面をも描き出す「伝神」の画風を確立した。詩や書にも優れ、中国の伝統的な文人画の偉大な源流に位置づけられる芸術家。", skill: { name: "画聖の伝神", desc: "相手が【軍事】なら敵の歴史力-40%", type: "cond_debuff_enemy", target: "VALOR", value: 0.4, rate: 1 } },
  { id: 129, name: "王羲之", power: 90, hp: 110, attribute: "CULTURE", desc: "中国・六朝時代（東晋）の書家。「書聖」と仰がれる。行書・草書を実用から芸術的な域へと高め、『蘭亭序』などの傑作を残した。力強さと優美さを兼ね備えたその書風は、中国のみならず日本の書道史においても絶対的な模範として継承された。", skill: { name: "書聖の筆致", desc: "自身の歴史力+40%", type: "buff_self", value: 0.4, rate: 0.7 } },
  { id: 130, name: "朱熹", power: 105, hp: 95, attribute: "CULTURE", desc: "中国・南宋の儒学者。北宋の周敦頤らの学説を大成し、宇宙の原理（理）と人間の道徳を統合する「朱子学」を体系化した。四書の重視や「大義名分論」を説き、その学説は元・明・清を通じて官学とされ、江戸時代の日本にも伝わり社会規範となった。", skill: { name: "朱子学の大成", desc: "相手が【政治】なら自身の歴史力+50%", type: "cond_buff_self", target: "STRATEGY", value: 0.5, rate: 0.9 } },
  { id: 131, name: "イブン・スィーナー", power: 98, hp: 102, attribute: "CULTURE", desc: "イスラーム世界を代表するイラン系の哲学者・医学者。ラテン語名はアヴィケンナ。アリストテレス哲学をネオプラトニズムで解釈。主著『医学典範』は臨床と理論を体系化し、中世ヨーロッパの大学で数百年にわたり医学の基本権威とされた。", skill: { name: "医学典範", desc: "自軍のHPを最大HPの20%回復", type: "heal_hp", value: 0.2, rate: 0.6 } },
  { id: 132, name: "イブン・ルシュド", power: 96, hp: 104, attribute: "CULTURE", desc: "コルドバ生まれのイスラーム哲学者・医学者。ラテン語名はアヴェロエス。アリストテレスの著作に対する詳細な注釈を行い、理性と信仰の調和を説いた。その思想は翻訳されてヨーロッパに伝わり、トマス・アクィナスらのスコラ哲学に絶大な影響を与えた。", skill: { name: "理性の注釈", desc: "次のラウンドの相手を-30%弱体化", type: "inherit_debuff", value: 0.3, rate: 0.6 } },
  { id: 133, name: "イブン・バットゥータ", power: 92, hp: 108, attribute: "CULTURE", desc: "モロッコ出身のイスラームの大旅行家。約30年にわたり、メッカ巡礼を皮切りに西アフリカ、中東、インド、さらには中国まで広大なユーラシア大陸を周遊。口述筆記された『三大陸周遊記』は、14世紀のイスラーム世界の広がりを伝える一級の歴史史料。", skill: { name: "三大陸周遊", desc: "1戦目配置時、歴史力+40%", type: "cond_pos_buff", pos: 1, value: 0.4, rate: 0.8 } },
  { id: 134, name: "イブン・ハルドゥーン", power: 104, hp: 96, attribute: "CULTURE", desc: "チュニス出身のイスラームの歴史家・思想家。著書『世界史序説』において、都市の定住民と砂漠の遊牧民の対立と、血縁的な連帯意識（アサビーヤ）の強弱を軸にして、イスラーム王朝の興亡の法則を独自の優れた歴史哲学として見事に分析した。", skill: { name: "王朝興亡の法則", desc: "相手の歴史力を-30%", type: "debuff_enemy", value: 0.3, rate: 0.7 } },
  { id: 135, name: "エラスムス", power: 102, hp: 98, attribute: "CULTURE", desc: "ネーデルラント（オランダ）出身の最大の人文主義者（ヒューマニスト）。『愚神礼賛』を著して腐敗したカトリック教会や聖職者の偽善を鋭い風刺で痛烈に批判。ルターの宗教改革に思想的な影響を与えたが、人間の自由意志を巡りのちに論争し決別した。", skill: { name: "愚神礼賛", desc: "相手から最大HPの15%を吸収", type: "absorb_hp", value: 0.15, rate: 0.6 } },
  { id: 136, name: "トマス・モア", power: 94, hp: 106, attribute: "CULTURE", desc: "イギリス・ルネサンス期の人文主義者・政治家。エラスムスと親交を結ぶ。著書『ユートピア』で「羊が人間を食い殺す」とエンクロージャー（囲い込み）を批判し、財産共有の平等な理想社会を描いた。ヘンリ8世の離婚と国教会設立に反対して処刑された。", skill: { name: "ユートピアの夢", desc: "被ダメージを70%カット", type: "damage_cut", value: 0.7, rate: 0.6 } },
  { id: 137, name: "セルバンテス", power: 88, hp: 112, attribute: "CULTURE", desc: "スペイン・ルネサンス期を代表する国民的作家。レパントの海戦に従軍し負傷して左腕の自由を失う。主著『ドン・キホーテ』は、時代遅れの騎士道物語を読みふけって狂気におちいった郷士の遍歴を通し、没落する当時のスペイン社会を鮮やかに風刺した。", skill: { name: "ドン・キホーテ", desc: "HP10%消費して自身の歴史力+50%", type: "sacrifice_buff", cost: 0.1, value: 0.5, rate: 0.8 } },
  { id: 138, name: "ボッカッチョ", power: 84, hp: 116, attribute: "CULTURE", desc: "イタリア・ルネサンス期の詩人・散文家。ペスト（黒死病）の難を逃れてフィレンツェ郊外の邸宅に集まった男女が織りなす100の物語『デカメロン（十日物語）』を著した。聖職者の堕落や人間の欲望や本音を赤裸々に描いた近代小説の先駆とされる。", skill: { name: "デカメロン", desc: "相手に最大HPの20%ダメージ", type: "fixed_damage", value: 0.2, rate: 0.6 } },
  { id: 139, name: "ラファエロ", power: 90, hp: 110, attribute: "CULTURE", desc: "イタリア・ルネサンスを代表する画家・建築家。レオナルドとミケランジェロの技法を融合し、優美で調和のとれた古典様式を完成させた。『アテネの学堂』や数多くの美しく慈愛に満ちた聖母子像（『小椅子の聖母』など）でルネサンスの頂点を極めた。", skill: { name: "ルネサンスの調和", desc: "味方全体の歴史力+15%", type: "buff_all", value: 0.15, rate: 0.6 } },
  { id: 140, name: "ヴォルテール", power: 108, hp: 92, attribute: "CULTURE", desc: "フランスの啓蒙思想家。イギリスに滞在してその自由な政治体制に感銘を受け、『哲学書簡』でフランス絶対王政の不寛容やカトリック教会の権威主義を痛烈に批判。理性に基づく社会の進歩を信じ、フリードリヒ2世やエカチェリーナ2世とも交流した。", skill: { name: "寛容と理性", desc: "次の味方の歴史力を+30%強化", type: "inherit_buff", value: 0.3, rate: 0.7 } },
  { id: 141, name: "ルソー", power: 110, hp: 90, attribute: "CULTURE", desc: "フランスの啓蒙思想家。「自然に帰れ」と唱え、理性偏重の文明社会を批判。主著『社会契約論』で人民主権論を主張し、フランス革命の急進派に決定的な思想的根拠を与えた。また『エミール』で近代的な児童中心の教育論を展開した異端の思想家。", skill: { name: "人民主権論", desc: "自軍HP半分以下なら敵全体-30%", type: "cond_pinch_debuff_all", value: 0.3, rate: 0.9 } },
  { id: 142, name: "モンテスキュー", power: 104, hp: 96, attribute: "CULTURE", desc: "フランスの啓蒙思想家・法学者。イギリスの議会政治を研究し、主著『法の精神』において、専制政治を防ぎ市民の自由を守るために国家権力を立法・行政・司法の三つに分割して相互に牽制させる「三権分立」を主張。のちのアメリカ合衆国憲法などに多大な影響を与えた。", skill: { name: "三権分立", desc: "相手が【政治】なら自身の歴史力+60%", type: "cond_buff_self", target: "STRATEGY", value: 0.6, rate: 0.8 } },
  { id: 143, name: "ディドロ", power: 98, hp: 102, attribute: "CULTURE", desc: "フランスの啓蒙思想家。ダランベールらと共に、当時の最先端の科学・技術・哲学の知識を集大成した『百科全書』の編纂を中心となって推進した。絶対王政やカトリック教会の検閲や度重なる弾圧を受けながらも出版を続け、啓蒙思想の普及に多大な貢献をした。", skill: { name: "百科全書", desc: "味方全体の歴史力+20%", type: "buff_all", value: 0.2, rate: 0.5 } },
  { id: 144, name: "ゴヤ", power: 86, hp: 114, attribute: "CULTURE", desc: "スペインのロマン派を代表する宮廷画家。華やかな王族の肖像画（『カルロス4世の家族』）を描く一方で、『マドリード、1808年5月3日』ではナポレオン軍による市民虐殺の惨劇を告発し、人間の狂気や社会の暗部をえぐり出した不気味な黒い絵も残した。", skill: { name: "戦禍の告発", desc: "相手の歴史力を-30%", type: "debuff_enemy", value: 0.3, rate: 0.7 } },
  { id: 145, name: "ドラクロワ", power: 92, hp: 108, attribute: "CULTURE", desc: "フランス・ロマン派絵画の巨匠。新古典主義の厳格なデッサンに対し、色彩の豊かさと激しい感情表現を重んじた。『民衆を導く自由の女神』は1830年の七月革命に取材し、自由を求める民衆のエネルギーを劇的かつ力強く描き出し、ロマン派絵画の金字塔とされる。", skill: { name: "民衆を導く色彩", desc: "5戦目配置時、負け数\xD730%歴史力UP", type: "cond_pos_revenge", pos: 5, value: 0.3, rate: 0.9 } },
  { id: 146, name: "ヴィクトル・ユゴー", power: 95, hp: 105, attribute: "CULTURE", desc: "フランス・ロマン派を代表する大詩人・小説家。社会の底辺に生きる人々の苦悩と魂の救済を描いた大河小説『レ・ミゼラブル』などで世界的名声を博した。政治的にも熱心な共和派として活動し、ナポレオン3世の帝政に激しく反対して長年の亡命生活を送った。", skill: { name: "レ・ミゼラブル", desc: "自軍のHPを最大HPの25%回復", type: "heal_hp", value: 0.25, rate: 0.6 } },
  { id: 147, name: "マルケス", power: 80, hp: 120, attribute: "CULTURE", desc: "コロンビアの小説家。1960年代以降のラテンアメリカ文学の世界的ブームを牽引した。代表作『百年の孤独』は、マコンドという架空の村を舞台に、現実と幻想が入り交じる「魔術的リアリズム」の手法で一族の数奇な歴史を描き切り、ノーベル文学賞を受賞した。", skill: { name: "魔術的リアリズム", desc: "超低確率(10%)で相手のHPを1にする", type: "hp_to_one", rate: 0.1 } },
  { id: 148, name: "トルストイ", power: 106, hp: 94, attribute: "CULTURE", desc: "19世紀ロシアを代表する写実主義の文豪・思想家。ナポレオン戦争を舞台にロシア社会の群像を描いた壮大な歴史小説『戦争と平和』や『アンナ・カレーニナ』を発表。のちに国家や私有財産を否定し、独自のキリスト教的ヒューマニズムと非暴力主義に傾倒した。", skill: { name: "戦争と平和", desc: "被ダメージを80%カット", type: "damage_cut", value: 0.8, rate: 0.5 } },
  { id: 149, name: "ドストエフスキー", power: 112, hp: 88, attribute: "CULTURE", desc: "19世紀ロシアの文豪。空想的社会主義に関わりシベリア流刑となる過酷な体験を経て、『罪と罰』『カラマーゾフの兄弟』などの傑作を発表。人間の魂の深淵、神と信仰、ロシア社会の矛盾といった根源的なテーマを、登場人物が独立して語る多声的な手法で描き切った。", skill: { name: "罪と罰の深淵", desc: "相手に最大HPの25%ダメージ", type: "fixed_damage", value: 0.25, rate: 0.6 } },
  { id: 150, name: "サルトル", power: 62, hp: 138, attribute: "CULTURE", desc: "20世紀フランスを代表する哲学者・作家。「実存は本質に先立つ」と主張し、人間は自らの行動で自己を創り上げねばならないとする無神論的実存主義を提唱。『存在と無』などの哲学書のほか、アンガジュマン（社会参加）を掲げて政治的発言でも多大な影響力を持った。", skill: { name: "アンガジュマン", desc: "次のラウンドの相手を-30%弱体化", type: "inherit_debuff", value: 0.3, rate: 0.7 } },
  { id: 151, name: "テミストクレス", power: 110, hp: 90, attribute: "VALOR", desc: "古代アテネの政治家・将軍。ラウレイオン銀山の収益で三段櫂船を建造し海軍を強化。サラミスの海戦では巧みな戦術で巨大なペルシア艦隊を撃破し、ギリシアの独立を守り抜いた。", skill: { name: "サラミスの海戦", desc: "次の味方の歴史力を+30%強化", type: "inherit_buff", value: 0.3, rate: 0.7 } },
  { id: 152, name: "エパメイノンダス", power: 108, hp: 92, attribute: "VALOR", desc: "テーベの将軍。レウクトラの戦いにおいて、従来均等だった重装歩兵の陣形を片翼に厚く配置する「斜線陣」を考案。無敵を誇ったスパルタ軍を打ち破り、テーベの一時的な覇権を築いた。", skill: { name: "斜線陣の考案", desc: "味方全体の歴史力+20%", type: "buff_all", value: 0.2, rate: 0.6 } },
  { id: 153, name: "マリウス", power: 105, hp: 95, attribute: "VALOR", desc: "共和政ローマの平民派の将軍。中小農民の没落による軍団の弱体化を防ぐため、無産市民を志願兵として募集し武器を支給する「職業軍人制」を導入し軍制改革を行ったが、軍閥化を招いた。", skill: { name: "職業軍人制", desc: "HP20%消費して自身の歴史力+80%", type: "sacrifice_buff", cost: 0.2, value: 0.8, rate: 0.7 } },
  { id: 154, name: "スッラ", power: 112, hp: 88, attribute: "VALOR", desc: "共和政ローマの閥族派の将軍。同盟市戦争を鎮圧し、ミトリダテス戦争で活躍。政敵マリウス派を破ってローマへ進軍し、終身独裁官に就任して元老院主導の保守的な体制復古を強行した。", skill: { name: "ローマ進軍", desc: "敵全員の歴史力-20%", type: "debuff_all", value: 0.2, rate: 0.6 } },
  { id: 155, name: "ポンペイウス", power: 115, hp: 85, attribute: "VALOR", desc: "共和政ローマの将軍。スパルタクスの乱の鎮圧や地中海の海賊平定で圧倒的な名声を得る。カエサル、クラッススと第1回三頭政治を結成したが、のちに元老院と結んでカエサルと対立し敗死した。", skill: { name: "海賊の平定", desc: "相手の歴史力を-30%", type: "debuff_enemy", value: 0.3, rate: 0.7 } },
  { id: 156, name: "アントニウス", power: 104, hp: 96, attribute: "VALOR", desc: "カエサルの有力な部将。オクタウィアヌスらと第2回三頭政治を結成。東方遠征の際にプトレマイオス朝のクレオパトラと結びローマの支配から離反しようとしたが、アクティウムの海戦で敗北。", skill: { name: "東方の野心", desc: "自軍HP半分以下なら自身の歴史力+60%", type: "cond_pinch_buff", value: 0.6, rate: 0.8 } },
  { id: 157, name: "孫武", power: 95, hp: 105, attribute: "VALOR", desc: "中国・春秋時代の呉の将軍。最古の優れた兵法書『孫子』の著者とされる。「彼を知り己を知れば百戦危うからず」と説き、情報収集と謀略を重んじる非戦・全勝の合理的な軍事思想を体系化した。", skill: { name: "兵法「孫子」", desc: "相手が【政治】なら相手を-40%弱体化", type: "cond_debuff_enemy", target: "STRATEGY", value: 0.4, rate: 1 } },
  { id: 158, name: "呉起", power: 98, hp: 102, attribute: "VALOR", desc: "中国・戦国時代の兵法家。孫武と並び「孫呉」と称され『呉子』を残した。魏において武侯に仕え、のちに楚で宰相として富国強兵の改革（変法）を断行したが、旧貴族の恨みを買い暗殺された。", skill: { name: "変法と兵略", desc: "相手に最大HPの20%ダメージ", type: "fixed_damage", value: 0.2, rate: 0.6 } },
  { id: 159, name: "白起", power: 114, hp: 86, attribute: "VALOR", desc: "中国・戦国時代の秦の冷酷な名将。数々の戦いで敵軍を殲滅。特に紀元前260年の長平の戦いでは、降伏した趙の兵士40万人を生き埋め（坑殺）にしたとされ、圧倒的な恐怖で六国を震え上がらせた。", skill: { name: "長平の坑殺", desc: "超低確率(10%)で相手のHPを1にする", type: "hp_to_one", rate: 0.1 } },
  { id: 160, name: "韓信", power: 116, hp: 84, attribute: "VALOR", desc: "漢の高祖（劉邦）の天下統一を決定づけた不世出の天才武将。「背水の陣」などの奇策で趙・斉などを次々と平定し、垓下の戦いで項羽を破る。しかしその功績と才能を劉邦に警戒され、のちに粛清された。", skill: { name: "背水の陣", desc: "5戦目配置時、歴史力+50%", type: "cond_pos_buff", pos: 5, value: 0.5, rate: 0.9 } },
  { id: 161, name: "衛青", power: 118, hp: 82, attribute: "VALOR", desc: "中国・前漢の武将。武帝の命を受け、長年漢を脅かしていた北方遊牧民の匈奴に対する大規模な討伐軍を指揮。幾度も大勝を収め、オルドス地方の回復など漢の版図拡大に決定的な貢献を果たした。", skill: { name: "匈奴討伐", desc: "味方全体の歴史力+15%", type: "buff_all", value: 0.15, rate: 0.7 } },
  { id: 162, name: "霍去病", power: 122, hp: 78, attribute: "VALOR", desc: "中国・前漢の若き武将。衛青の甥。驃騎将軍として匈奴討伐に赴き、機動力を活かした電撃戦で河西回廊から匈奴を完全に駆逐した。シルクロードの要衝である河西四郡設置の立役者。", skill: { name: "電撃の驃騎", desc: "相手が【文化】なら自身の歴史力+50%", type: "cond_buff_self", target: "CULTURE", value: 0.5, rate: 0.8 } },
  { id: 163, name: "班超", power: 112, hp: 88, attribute: "VALOR", desc: "中国・後漢の武将・外交官。班固の弟。「虎穴に入らずんば虎子を得ず」と西域に赴き、数十年かけて西域50余国を服属させ西域都護となった。部下の甘英を大秦国（ローマ帝国）へ派遣しようと試みた。", skill: { name: "西域都護の計", desc: "次のラウンドの相手を-25%弱体化", type: "inherit_debuff", value: 0.25, rate: 0.8 } },
  { id: 164, name: "カール・マルテル", power: 110, hp: 90, attribute: "VALOR", desc: "フランク王国メロヴィング朝の宮宰。事実上の支配者として実権を握る。732年のトゥール・ポワティエ間の戦いでイベリア半島から侵攻してきたウマイヤ朝のイスラーム軍を撃退し、西欧キリスト教世界を防衛した。", skill: { name: "鉄鎚の防衛", desc: "被ダメージを70%カット", type: "damage_cut", value: 0.7, rate: 0.6 } },
  { id: 165, name: "オットー1世", power: 114, hp: 86, attribute: "VALOR", desc: "東フランク王国（ドイツ）の国王。955年のレヒフェルトの戦いでマジャール人を撃退。帝国教会政策で国内を固め、イタリアに遠征して962年に教皇から皇帝の冠を受け、神聖ローマ帝国の起源となった。", skill: { name: "レヒフェルトの勝利", desc: "自軍のHPを最大HPの20%回復", type: "heal_hp", value: 0.2, rate: 0.6 } },
  { id: 166, name: "ルッジェーロ2世", power: 106, hp: 94, attribute: "VALOR", desc: "ノルマン人の騎士。イスラーム教徒を駆逐して南イタリアとシチリア島を征服し、1130年に両シチリア王国（ルッジェーロ朝）を建国。ラテン、ギリシア、イスラームの文化が融合する国際的な国家を築いた。", skill: { name: "ノルマンの征服", desc: "相手から最大HPの15%を吸収", type: "absorb_hp", value: 0.15, rate: 0.6 } },
  { id: 167, name: "ウィリアム1世", power: 115, hp: 85, attribute: "VALOR", desc: "ノルマンディー公。1066年のヘースティングズの戦いでイングランド王ハロルドを破り、イングランドを征服（ノルマン・コンクエスト）。ノルマン朝を開き、『ドゥームズデイ・ブック』を作成して王権を強化した。", skill: { name: "征服王の鉄槌", desc: "HP15%消費して相手を30%弱体化", type: "sacrifice_debuff", cost: 0.15, value: 0.3, rate: 0.7 } },
  { id: 168, name: "エドワード黒太子", power: 128, hp: 72, attribute: "VALOR", desc: "百年戦争初期のイングランド軍の優れた指揮官。黒い鎧を纏ったとされる。クレシーの戦いやポワティエの戦いにおいて、長弓隊を巧みに指揮してフランスの重装騎士軍を壊滅させ、国王ジャン2世を捕虜にした。", skill: { name: "長弓隊の斉射", desc: "相手に最大HPの25%ダメージ", type: "fixed_damage", value: 0.25, rate: 0.6 } },
  { id: 169, name: "ベルトラン・デュ・ゲクラン", power: 108, hp: 92, attribute: "VALOR", desc: "百年戦争中期に活躍したフランスの軍司令官（大元帥）。イングランド軍との直接の野戦を避け、焦土作戦やゲリラ戦術を駆使して疲弊させ、シャルル5世のもとで奪われたフランス領土の大半を見事に奪還した。", skill: { name: "不屈のゲリラ戦", desc: "被ダメージを80%カット", type: "damage_cut", value: 0.8, rate: 0.5 } },
  { id: 170, name: "セリム1世", power: 112, hp: 88, attribute: "VALOR", desc: "オスマン帝国の第9代スルタン。「冷酷帝」と呼ばれる。チャルディラーンの戦いでサファヴィー朝を破り、1517年にマムルーク朝を滅ぼしてエジプトを併合。メッカとメディナの保護権を獲得し、帝国の覇権を確立した。", skill: { name: "冷酷帝の威圧", desc: "自軍HP半分以下なら敵全体-30%", type: "cond_pinch_debuff_all", value: 0.3, rate: 0.8 } },
  { id: 171, name: "バヤジット1世", power: 135, hp: 65, attribute: "VALOR", desc: "オスマン帝国の第4代スルタン。「雷帝」と呼ばれる。ニコポリスの戦いでハンガリー王ジギスムント率いるヨーロッパ十字軍を大破したが、1402年のアンカラの戦いでティムール軍に敗れ、捕虜のまま病死した。", skill: { name: "雷帝の進撃", desc: "自身の歴史力+35%", type: "buff_self", value: 0.35, rate: 0.7 } },
  { id: 172, name: "バーブル", power: 105, hp: 95, attribute: "VALOR", desc: "ティムールの子孫。中央アジアを追われアフガニスタンを拠点とし、1526年のパーニーパットの戦いでロディー朝を破り、北インドにムガル帝国を建国した。火砲を効果的に使用した戦術と、優れた文人としての顔も持つ。", skill: { name: "ムガルの建国", desc: "3戦目配置時、これまでの負け数\xD740%歴史力UP", type: "cond_pos_revenge", pos: 3, value: 0.4, rate: 0.9 } },
  { id: 173, name: "バイバルス", power: 138, hp: 62, attribute: "VALOR", desc: "エジプト・マムルーク朝の実質的な建国者（第5代スルタン）。アイン・ジャールートの戦いでモンゴル軍を破った英雄。さらにシリアに残る十字軍の拠点を次々と攻略し、アッバース朝のカリフをカイロに擁立して権威を高めた。", skill: { name: "マムルークの猛撃", desc: "敵全員の歴史力-15%", type: "debuff_all", value: 0.15, rate: 0.6 } },
  { id: 174, name: "イヴァン4世", power: 112, hp: 88, attribute: "VALOR", desc: "ロシア史上初めて「ツァーリ（皇帝）」を正式に名乗った君主。「雷帝」と恐れられた。大貴族を弾圧し絶対的な専制政治を確立。対外的にはカザン・ハン国などを征服し、コサックのイェルマークにシベリア探検を命じた。", skill: { name: "雷帝の粛清", desc: "HP15%消費して相手を30%弱体化", type: "sacrifice_debuff", cost: 0.15, value: 0.3, rate: 0.7 } },
  { id: 175, name: "ワレンシュタイン", power: 108, hp: 92, attribute: "VALOR", desc: "三十年戦争における神聖ローマ皇帝側の凄腕の傭兵隊長。デンマーク王クリスチャン4世の介入軍を圧倒し皇帝軍に勝利をもたらした。しかし強大な軍事力と野心を皇帝や旧教諸侯から警戒され、のちに暗殺された。", skill: { name: "傭兵の略奪", desc: "相手から最大HPの15%を吸収", type: "absorb_hp", value: 0.15, rate: 0.6 } },
  { id: 176, name: "クロムウェル", power: 110, hp: 90, attribute: "VALOR", desc: "イギリスのピューリタン革命の指導者。熱烈な信仰と規律を持つ「鉄騎隊」を編成し、ネイズビーの戦いで王党派を撃破。国王チャールズ1世を処刑して共和政を樹立し、アイルランドを冷酷に征服後、護国卿として独裁を敷いた。", skill: { name: "鉄騎隊の規律", desc: "次の味方の歴史力を+30%強化", type: "inherit_buff", value: 0.3, rate: 0.7 } },
  { id: 177, name: "クアウテモック", power: 95, hp: 105, attribute: "VALOR", desc: "メキシコ・アステカ帝国の最後の皇帝（トラトアニ）。首都テノチティトランを包囲したコルテス率いるスペイン軍に対し、絶望的な状況下で数ヶ月にわたり勇猛な市街戦を展開。降伏後に拷問され処刑された抵抗の英雄。", skill: { name: "最後の抵抗", desc: "自軍HP半分以下なら自身の歴史力+60%", type: "cond_pinch_buff", value: 0.6, rate: 0.8 } },
  { id: 178, name: "ラファイエット", power: 98, hp: 102, attribute: "VALOR", desc: "フランスの自由主義貴族。義勇兵としてアメリカ独立戦争に参加しワシントンを助ける。帰国後、フランス革命では国民軍司令官を務め「人権宣言」を起草。七月革命でも活躍し「両大陸の英雄」と称された。", skill: { name: "両大陸の英雄", desc: "次のラウンドの相手を-25%弱体化", type: "inherit_debuff", value: 0.25, rate: 0.8 } },
  { id: 179, name: "ロバート・リー", power: 114, hp: 86, attribute: "VALOR", desc: "アメリカ南北戦争における南軍（連合国）の優れた総司令官。工業力や兵力で圧倒的に勝る北軍に対し、巧みな機動戦と戦術で長きにわたり善戦した。ゲティスバーグの戦いでの敗北後、アポマトックスで潔く降伏した名将。", skill: { name: "名将の指揮", desc: "自軍のHPを最大HPの25%回復", type: "heal_hp", value: 0.25, rate: 0.5 } },
  { id: 180, name: "マウリッツ", power: 106, hp: 94, attribute: "VALOR", desc: "オランダ独立戦争を指導したオラニエ公。古代ローマの兵法を研究し、マスケット銃兵による一斉射撃と絶え間ない行軍訓練を徹底する「軍事革命」を断行。無敵を誇ったスペインのテルシオ（スペイン方陣）を打ち破った。", skill: { name: "軍事革命", desc: "3戦目配置時、歴史力+45%", type: "cond_pos_buff", pos: 3, value: 0.45, rate: 0.8 } },
  { id: 181, name: "ハトシェプスト", power: 95, hp: 105, attribute: "STRATEGY", desc: "エジプト新王国第18王朝の女王。エジプト史上初の本格的な女性ファラオ。戦争を避けて平和外交と内政の充実に努め、プント（現在のソマリア付近）へ大規模な交易船団を派遣して香料などを輸入し繁栄をもたらした。", skill: { name: "プント交易", desc: "自軍のHPを最大HPの25%回復", type: "heal_hp", value: 0.25, rate: 0.5 } },
  { id: 182, name: "ラメス2世", power: 115, hp: 85, attribute: "STRATEGY", desc: "エジプト新王国第19王朝のファラオ。カデシュの戦いでヒッタイトのムワタリ王と激突し、のちに世界最古とされる平和条約を締結。アブ・シンベル神殿など数多くの巨大建築物を造営し、新王国時代の絶頂期を現出した。", skill: { name: "最古の平和条約", desc: "被ダメージを75%カット", type: "damage_cut", value: 0.75, rate: 0.55 } },
  { id: 183, name: "ペイシストラトス", power: 98, hp: 102, attribute: "STRATEGY", desc: "古代アテネの僭主。武力で政権を奪ったが、貴族の大土地を没収して貧農に分配し、商工業や文化を保護・奨励。結果的に中小農民の没落を防ぎ、後世のアテネ民主政の基盤となる豊かな市民層を育成した。", skill: { name: "僭主の保護", desc: "味方全体の歴史力+20%", type: "buff_all", value: 0.2, rate: 0.5 } },
  { id: 184, name: "エフィアルテス", power: 92, hp: 108, attribute: "STRATEGY", desc: "古代アテネの急進的民主派の政治家。貴族の牙城であり保守的な権力機関であったアレオパゴス会議の権限を大幅に剥奪。この改革により、ペリクレスによる完全な直接民主政への道が決定的に開かれたが、暗殺された。", skill: { name: "アレオパゴス改革", desc: "相手の歴史力を-30%", type: "debuff_enemy", value: 0.3, rate: 0.7 } },
  { id: 185, name: "デモステネス", power: 96, hp: 104, attribute: "STRATEGY", desc: "古代アテネの政治家・雄弁家。南下政策を進めるマケドニアのフィリッポス2世の脅威をいち早く見抜き、アテネ市民の愛国心に訴える激しい反マケドニア演説（フィリッピカ）を行い、カイロネイアの戦いで抗戦を主導した。", skill: { name: "反マケドニア演説", desc: "HP10%消費して歴史力+60%", type: "sacrifice_buff", cost: 0.1, value: 0.6, rate: 0.8 } },
  { id: 186, name: "ティベリウス・グラックス", power: 90, hp: 110, attribute: "STRATEGY", desc: "ローマの護民官。大土地所有（ラティフンディア）の進展による中小農民の没落を防ぐため、リキニウス・セクスティウス法を復活させ公有地の占有制限と土地分配を目指す改革案を提出したが、元首階級により暗殺された。", skill: { name: "農地改革の挫折", desc: "自軍HP半分以下なら敵全体-30%", type: "cond_pinch_debuff_all", value: 0.3, rate: 0.8 } },
  { id: 187, name: "コンスタンティヌス", power: 115, hp: 85, attribute: "STRATEGY", desc: "ローマ皇帝。ミラノ勅令を発布してキリスト教を公認し、ニケーア公会議を開催。都をビザンティウム（コンスタンティノープル）に遷都し、小作人（コロヌス）を土地に縛り付ける勅令を出し中世的社会の端緒を作った。", skill: { name: "ミラノ勅令", desc: "自身の歴史力+40%", type: "buff_self", value: 0.4, rate: 0.7 } },
  { id: 188, name: "ディオクレティアヌス", power: 112, hp: 88, attribute: "STRATEGY", desc: "ローマ皇帝。3世紀の危機の混乱を収拾するため、広大な帝国を4人で分割統治するテトラルキアを導入。元首政（プリンキパトゥス）を廃し、オリエント的な専制君主制（ドミナトゥス）を確立。キリスト教の大迫害も行った。", skill: { name: "専制君主制", desc: "敵全員の歴史力-20%", type: "debuff_all", value: 0.2, rate: 0.6 } },
  { id: 189, name: "李斯", power: 108, hp: 92, attribute: "STRATEGY", desc: "秦の始皇帝に仕えた丞相。法家思想に基づき、全国的な郡県制の断行、文字（小篆）や度量衡・車軌の統一、さらに実用書以外の書物を焼き儒者を生き埋めにする「焚書坑儒」を建言し、徹底した中央集権化を設計した。", skill: { name: "法家の統治", desc: "相手が【文化】なら敵の歴史力-45%", type: "cond_debuff_enemy", target: "CULTURE", value: 0.45, rate: 0.9 } },
  { id: 190, name: "蕭何", power: 104, hp: 96, attribute: "STRATEGY", desc: "前漢の高祖（劉邦）の丞相。項羽との楚漢戦争において、関中における後方支援、兵站物資の補給、そして新兵の徴募を完璧にこなし、戦場に出ずして漢の天下統一を根底から支えた最大の功臣。", skill: { name: "関中の補給", desc: "次の味方の歴史力を+35%強化", type: "inherit_buff", value: 0.35, rate: 0.8 } },
  { id: 191, name: "張良", power: 110, hp: 90, attribute: "STRATEGY", desc: "前漢の高祖（劉邦）の軍師。もとは韓の貴族。始皇帝暗殺未遂の後、劉邦に従う。「幕舎の中に座して千里の外の勝利を決した」と評される数々の奇策と外交工作で項羽を孤立させ、垓下の戦いでの勝利へと導いた最高の頭脳。", skill: { name: "神算の軍師", desc: "2戦目配置時、歴史力+45%", type: "cond_pos_buff", pos: 2, value: 0.45, rate: 0.9 } },
  { id: 192, name: "桑弘羊", power: 96, hp: 104, attribute: "STRATEGY", desc: "前漢の武帝に仕えた財政家。均輸法（物資の転売）と平準法（物価調整）を実施し、塩・鉄・酒の専売制や新貨幣（五銖銭）の鋳造を推進。国家が商業統制を行うことで、度重なる匈奴討伐などの外征のための莫大な財源を確保した。", skill: { name: "均輸・平準", desc: "相手から最大HPの15%を吸収", type: "absorb_hp", value: 0.15, rate: 0.6 } },
  { id: 193, name: "王莽", power: 92, hp: 108, attribute: "STRATEGY", desc: "前漢末期の外戚。幼帝を廃して自ら皇帝となり国号を「新」とした。周代の政治を理想とする極端な復古主義的政策（土地の国有化、奴隷売買の禁止など）を強行したが、現実離れした改革は社会を混乱させ赤眉の乱を招き滅亡した。", skill: { name: "復古の妄想", desc: "超低確率(10%)で相手のHPを1にする", type: "hp_to_one", rate: 0.1 } },
  { id: 194, name: "司馬懿", power: 118, hp: 82, attribute: "STRATEGY", desc: "三国時代の魏の軍師・政治家。諸葛亮の度重なる北伐（五丈原の戦いなど）を持久戦で完全に防ぎきり、蜀の侵攻を頓挫させた。のちにクーデターを起こして魏の実権を完全に掌握し、孫の司馬炎による晋王朝の基礎を築いた。", skill: { name: "専守防衛の計", desc: "相手に最大HPの20%ダメージ", type: "fixed_damage", value: 0.2, rate: 0.6 } },
  { id: 195, name: "房玄齢", power: 100, hp: 100, attribute: "STRATEGY", desc: "唐の太宗（李世民）に仕えた名宰相。杜如晦と共に太宗を補佐し、三省六部制や律令体制の整備、歴史書の編纂に尽力。「貞観の治」と呼ばれる唐代で最も安定した太平の世の立役者となった優れた行政官。", skill: { name: "律令の整備", desc: "次のラウンドの相手を-25%弱体化", type: "inherit_debuff", value: 0.25, rate: 0.8 } },
  { id: 196, name: "魏徴", power: 98, hp: 102, attribute: "STRATEGY", desc: "唐の太宗に仕えた政治家。もとは敵対勢力にいたが太宗に才能を愛された。恐れを知らぬ直言と200回以上にも及ぶ諫言（君主の過ちを正すこと）を行い、太宗の政治を正しい方向へ導いた。『貞観政要』にその名問答が残る。", skill: { name: "直言の諫め", desc: "相手が【軍事】なら自身の歴史力+50%", type: "cond_buff_self", target: "VALOR", value: 0.5, rate: 0.8 } },
  { id: 197, name: "司馬光", power: 95, hp: 105, attribute: "STRATEGY", desc: "北宋の政治家・歴史家。地主や大商人を支持基盤とする「旧法党」の領袖として、王安石の急進的な新法に激しく反対し、政権を握ると新法を全廃した。編年体の優れた歴史書『資治通鑑』の編纂者としても極めて名高い。", skill: { name: "旧法党の反動", desc: "自軍のHPを最大HPの25%回復", type: "heal_hp", value: 0.25, rate: 0.5 } },
  { id: 198, name: "張居正", power: 106, hp: 94, attribute: "STRATEGY", desc: "明の万暦帝の初期の宰相（内閣大学士）。全国的な検地（丈量）を厳格に実施し、複雑化した税や徭役を銀納に一本化する「一条鞭法」を全国に普及させて財政を再建。さらにモンゴルとの和議を結ぶなど手腕を発揮した。", skill: { name: "一条鞭法", desc: "HP15%消費して相手を30%弱体化", type: "sacrifice_debuff", cost: 0.15, value: 0.3, rate: 0.7 } },
  { id: 199, name: "リシュリュー", power: 110, hp: 90, attribute: "STRATEGY", desc: "フランス王ルイ13世の宰相・枢機卿。国内では新教徒（ユグノー）や大貴族の特権を奪って王権を強化。対外的にはカトリック国でありながら、ハプスブルク家打倒のために三十年戦争に新教側で介入する冷徹な国家理性（国益）を貫いた。", skill: { name: "国家理性の外交", desc: "相手の歴史力を-35%", type: "debuff_enemy", value: 0.35, rate: 0.7 } },
  { id: 200, name: "マザラン", power: 105, hp: 95, attribute: "STRATEGY", desc: "フランス王ルイ14世の幼少期の宰相。リシュリューの政策を継承し、三十年戦争の講和であるウェストファリア条約を結んでアルザス地方などを獲得。王権強化への反発から起きたフロンドの乱を見事に鎮圧し絶対王政を確立した。", skill: { name: "フロンド鎮圧", desc: "被ダメージを75%カット", type: "damage_cut", value: 0.75, rate: 0.55 } },
  { id: 201, name: "コルベール", power: 108, hp: 92, attribute: "STRATEGY", desc: "フランス王ルイ14世の財務総監。王立の特権マニュファクチュア（王立ゴブラン織物工場など）の設立や、東インド会社の再建など、典型的な重商主義（コルベール主義）を強力に推進し、度重なる戦争のための莫大な財源を供給した。", skill: { name: "重商主義政策", desc: "味方全体の歴史力+20%", type: "buff_all", value: 0.2, rate: 0.6 } },
  { id: 202, name: "ウォルポール", power: 102, hp: 98, attribute: "STRATEGY", desc: "イギリスのホイッグ党の政治家。初代首相とされる。英語を解さないハノーヴァー朝の国王ジョージ1世のもとで内閣を率い、「王は君臨すれども統治せず」の責任内閣制の基礎を確立。南海泡沫事件の処理と平和外交に努めた。", skill: { name: "責任内閣制", desc: "4戦目配置時、これまでの負け数\xD740%歴史力UP", type: "cond_pos_revenge", pos: 4, value: 0.4, rate: 0.8 } },
  { id: 203, name: "ピット（小）", power: 112, hp: 88, attribute: "STRATEGY", desc: "イギリスの首相。24歳の若さで就任。フランス革命の波及を強く警戒し、第1回〜第3回の対仏大同盟を組織してナポレオン帝国と激しく対立した。また、反乱を防ぐためアイルランドをグレートブリテン王国に併合した。", skill: { name: "対仏大同盟", desc: "自軍HP半分以下なら自身の歴史力+60%", type: "cond_pinch_buff", value: 0.6, rate: 0.8 } },
  { id: 204, name: "タレーラン", power: 115, hp: 85, attribute: "STRATEGY", desc: "フランスの老練な外交官。ナポレオン没落後のウィーン会議において、フランス革命以前の君主や領土に戻すという「正統主義」を巧みに提唱。列強の対立を利用し、敗戦国フランスの領土分割を完璧に防いだ希代の策士。", skill: { name: "正統主義の謀略", desc: "相手から最大HPの20%を吸収", type: "absorb_hp", value: 0.2, rate: 0.7 } },
  { id: 205, name: "アレクサンドル2世", power: 106, hp: 94, attribute: "STRATEGY", desc: "ロシア皇帝。クリミア戦争の敗北により後進性を痛感し、1861年に農奴解放令を発布するなど「上からの近代化」を推進。しかし土地の買い戻し金が高額な不徹底な改革にインテリゲンツィアは不満を持ち、ナロードニキにより暗殺された。", skill: { name: "農奴解放令", desc: "次の味方の歴史力を+35%強化", type: "inherit_buff", value: 0.35, rate: 0.7 } },
  { id: 206, name: "カヴール", power: 114, hp: 86, attribute: "STRATEGY", desc: "サルデーニャ王国の首相。卓越した外交手腕でクリミア戦争に参戦して英仏の支持を得る。さらにプロンビエール密約でフランスのナポレオン3世と結び、イタリア統一戦争を引き起こして統一国家樹立への道をこじ開けた。", skill: { name: "プロンビエール密約", desc: "HP10%消費して歴史力+70%", type: "sacrifice_buff", cost: 0.1, value: 0.7, rate: 0.8 } },
  { id: 207, name: "トマス・ジェファソン", power: 110, hp: 90, attribute: "STRATEGY", desc: "アメリカ第3代大統領。ロックの自然法思想に基づきアメリカ独立宣言を起草。反連邦派（リパブリカン党）の指導者として州の権限と農民の利益を重視し、ナポレオンからミシシッピ川以西のルイジアナを安価で買収した。", skill: { name: "独立宣言の起草", desc: "自身の歴史力+35%", type: "buff_self", value: 0.35, rate: 0.7 } },
  { id: 208, name: "フアレス", power: 104, hp: 96, attribute: "STRATEGY", desc: "メキシコ初の先住民（インディオ）出身の大統領。教会財産の没収など自由主義的な改革（レフォルマ）を推進。ナポレオン3世によるフランスのメキシコ干渉戦争に対し、徹底抗戦してマクシミリアン皇帝を処刑し国家の独立を守り抜いた。", skill: { name: "レフォルマの完遂", desc: "5戦目配置時、歴史力+45%", type: "cond_pos_buff", pos: 5, value: 0.45, rate: 0.8 } },
  { id: 209, name: "袁世凱", power: 108, hp: 92, attribute: "STRATEGY", desc: "清末の北洋軍閥の指導者。辛亥革命の際、圧倒的な軍事力を背景に清の宣統帝（溥儀）を退位させることを条件に、孫文から中華民国の臨時大総統の地位を譲り受けた。のちに帝政復活を企て自ら皇帝に即位したが、猛反発を受け憤死した。", skill: { name: "北洋軍閥の威圧", desc: "敵全員の歴史力-15%", type: "debuff_all", value: 0.15, rate: 0.6 } },
  { id: 211, name: "タレス", power: 85, hp: 115, attribute: "CULTURE", desc: "古代ギリシアのイオニア学派（ミレトス学派）の祖。「万物の根源（アルケー）は水である」とし、世界の成り立ちを神話的説明（ミュトス）ではなく、理性に基づく合理的な説明（ロゴス）で探求する自然哲学の最初の扉を開いた。", skill: { name: "万物の根源", desc: "自軍のHPを最大HPの25%回復", type: "heal_hp", value: 0.25, rate: 0.6 } },
  { id: 212, name: "ヘラクレイトス", power: 88, hp: 112, attribute: "CULTURE", desc: "古代ギリシア・エフェソスの哲学者。「万物は流転する（パンタ・レイ）」と説き、世界は絶え間ない変化と対立の連続であると主張。その変化を生み出す世界の根源（アルケー）を、常に燃え盛る「火」であるとした。", skill: { name: "万物は流転す", desc: "相手に最大HPの25%ダメージ", type: "fixed_damage", value: 0.25, rate: 0.5 } },
  { id: 213, name: "デモクリトス", power: 90, hp: 110, attribute: "CULTURE", desc: "古代ギリシアの哲学者。万物はそれ以上分割不可能な無数の目に見えない「原子（アトム）」の空間における運動と結合・分離によって構成されているとする唯物論的な原子論を確立し、近代科学の源流となる思想を提唱した。", skill: { name: "原子論の提唱", desc: "超低確率(10%)で相手のHPを1にする", type: "hp_to_one", rate: 0.1 } },
  { id: 214, name: "エウリピデス", power: 86, hp: 114, attribute: "CULTURE", desc: "古代アテネ三大悲劇詩人の一人。『メディア』『トロイアの女』などの作品で、神々の意志よりも、人間の愛憎や心理的葛藤、女性の情念、さらには戦争や社会の不条理を極めて写実的かつ劇的に描き出した近代的な劇作家。", skill: { name: "情念の悲劇", desc: "HP10%消費して相手を30%弱体化", type: "sacrifice_debuff", cost: 0.1, value: 0.3, rate: 0.7 } },
  { id: 215, name: "ソフォクレス", power: 92, hp: 108, attribute: "CULTURE", desc: "古代アテネ三大悲劇詩人の一人。ペリクレスと親交があった。代表作『オイディプス王』や『アンティゴネ』において、逃れられない過酷な運命に翻弄されながらも、人間の尊厳を保とうとする姿を格調高く描き、悲劇の完成者とされる。", skill: { name: "オイディプスの運命", desc: "自軍HP半分以下なら敵全体-35%", type: "cond_pinch_debuff_all", value: 0.35, rate: 0.8 } },
  { id: 216, name: "アリストファネス", power: 84, hp: 116, attribute: "CULTURE", desc: "古代ギリシアを代表する喜劇作家。ペロポネソス戦争の最中、女性たちがセックスストライキで戦争をやめさせる『女の平和』や、ソクラテスをソフィストとして痛烈に風刺した『雲』など、当時のアテネの政治や社会を鋭く批判した。", skill: { name: "喜劇の風刺", desc: "敵全員の歴史力-15%", type: "debuff_all", value: 0.15, rate: 0.6 } },
  { id: 217, name: "エラトステネス", power: 98, hp: 102, attribute: "CULTURE", desc: "ヘレニズム時代の天文学者・地理学者。エジプトのアレクサンドリアにある王立研究所（ムセイオン）の館長を務め、シエネとアレクサンドリアの夏至の太陽の南中高度の違いを利用して、地球の周囲の長さを極めて正確に計測した。", skill: { name: "地球の測量", desc: "次の味方の歴史力を+35%強化", type: "inherit_buff", value: 0.35, rate: 0.8 } },
  { id: 218, name: "アリスタルコス", power: 96, hp: 104, attribute: "CULTURE", desc: "ヘレニズム時代の天文学者。コペルニクスより遥か以前に、太陽が宇宙の中心であり、地球が自転しながら太陽の周りを公転しているという太陽中心説（地動説）を提唱した「古代のコペルニクス」。", skill: { name: "古代の地動説", desc: "味方全体の歴史力+20%", type: "buff_all", value: 0.2, rate: 0.6 } },
  { id: 219, name: "アルキメデス", power: 110, hp: 90, attribute: "CULTURE", desc: "ヘレニズム時代のシラクサ出身の数学者・物理学者。「エウレカ」で知られる浮体の力学（アルキメデスの原理）や円周率の計算、てこの原理を発見。第2次ポエニ戦争の際、数々の新兵器を考案してローマ軍を防いだが殺害された。", skill: { name: "防衛の新兵器", desc: "相手が【軍事】なら敵の歴史力-45%", type: "cond_debuff_enemy", target: "VALOR", value: 0.45, rate: 0.9 } },
  { id: 220, name: "エウクレイデス", power: 105, hp: 95, attribute: "CULTURE", desc: "ヘレニズム時代の数学者。英語名はユークリッド。当時の幾何学の知識を公理と定理によって論理的に集大成した著書『幾何学原本』は、その後のヨーロッパのみならず世界の数学教育における絶対的な基準として長く用いられた。", skill: { name: "幾何学原本", desc: "被ダメージを80%カット", type: "damage_cut", value: 0.8, rate: 0.5 } },
  { id: 221, name: "ガレノス", power: 94, hp: 106, attribute: "CULTURE", desc: "ローマ帝国時代に活躍したギリシア人医師。マルクス・アウレリウスの侍医を務め、動物の解剖に基づきヒポクラテス以来の古代医学を体系化した。その学説は中世のヨーロッパとイスラーム世界で1000年以上にわたり絶対の権威とされた。", skill: { name: "古代医学の体系化", desc: "自軍のHPを最大HPの30%回復", type: "heal_hp", value: 0.3, rate: 0.5 } },
  { id: 222, name: "キケロ", power: 108, hp: 92, attribute: "CULTURE", desc: "共和政末期ローマを代表する文筆家・政治家。カティリナの陰謀を弾劾し「国家の父」と呼ばれる。カエサル暗殺後、共和政を守るためアントニウスを激しく非難（フィリッピカ）したため暗殺された。その流麗なラテン語散文は後世の模範となった。", skill: { name: "共和政の雄弁", desc: "自軍HP半分以下なら自身の歴史力+70%", type: "cond_pinch_buff", value: 0.7, rate: 0.9 } },
  { id: 223, name: "ウェルギリウス", power: 100, hp: 100, attribute: "CULTURE", desc: "アウグストゥス時代のローマ最大の詩人。ホメロスの影響を受け、トロイア戦争の英雄アイネイアスがイタリアに逃れローマ建国の祖となるまでの冒険を描いた大叙事詩『アエネイス』を著し、ローマ帝国の偉大な栄光を神話的に讃えた。", skill: { name: "アエネイスの栄光", desc: "自身の歴史力+35%", type: "buff_self", value: 0.35, rate: 0.7 } },
  { id: 224, name: "ホラティウス", power: 88, hp: 112, attribute: "CULTURE", desc: "アウグストゥス時代の叙情詩人。マエケナスの保護を受け、ギリシア詩の韻律を見事にラテン語に移し替えた『叙情詩集』を残す。人生の短さを嘆き「今を楽しめ（カルペ・ディエム）」と詠んだその詩は、ルネサンス期以降に愛読された。", skill: { name: "カルペ・ディエム", desc: "1戦目配置時、歴史力+45%", type: "cond_pos_buff", pos: 1, value: 0.45, rate: 0.9 } },
  { id: 225, name: "オウィディウス", power: 92, hp: 108, attribute: "CULTURE", desc: "ローマの詩人。ギリシア・ローマ神話に登場する変身譚を美しい韻律で集めた『転身譜（メタモルフォセス）』を著す。また恋愛詩『恋の技法』が、風紀粛正を図るアウグストゥスの怒りに触れ、黒海沿岸に追放され客死した。", skill: { name: "転身の幻惑", desc: "相手から最大HPの15%を吸収", type: "absorb_hp", value: 0.15, rate: 0.6 } },
  { id: 226, name: "ポリビオス", power: 102, hp: 98, attribute: "CULTURE", desc: "ギリシア人の歴史家。ピュドナの戦い後に人質としてローマに送られ、小スキピオと親交を結ぶ。著書『歴史』において、ローマ発展の理由は君主政・貴族政・民主政が均衡を保つ混合政体にあるとし、政体循環史観を唱えた。", skill: { name: "政体循環史観", desc: "次のラウンドの相手を-30%弱体化", type: "inherit_debuff", value: 0.3, rate: 0.7 } },
  { id: 227, name: "リウィウス", power: 98, hp: 102, attribute: "CULTURE", desc: "初代皇帝アウグストゥスの命を受けて、伝説的なローマ建国から同時代までの歴史を壮大なスケールで描いた『ローマ建国史』を著述。事実の客観性よりも、初期共和政時代の美徳や愛国心を称揚する文学的な性格が強い。", skill: { name: "ローマ建国史", desc: "HP15%消費して自身の歴史力+60%", type: "sacrifice_buff", cost: 0.15, value: 0.6, rate: 0.8 } },
  { id: 228, name: "タキトゥス", power: 106, hp: 94, attribute: "CULTURE", desc: "帝政期ローマの歴史家。『ゲルマニア』においてゲルマン人の純朴な風俗を記し、退廃する当時のローマ社会を痛烈に批判。『年代記』ではアウグストゥス死後からネロに至る初期帝政の暗部や専制政治の悪を厳しく客観的に描いた。", skill: { name: "帝政の暗部告発", desc: "相手の歴史力を-35%", type: "debuff_enemy", value: 0.35, rate: 0.8 } },
  { id: 229, name: "プルタルコス", power: 95, hp: 105, attribute: "CULTURE", desc: "ローマ帝国時代のギリシアの伝記作家。ギリシアとローマの優れた英雄や政治家を2人ずつ対比させてその道徳や性格を描いた『対比列伝（英雄伝）』を著し、ルネサンス期以降のヨーロッパ知識人の必読書としてシェークスピアらにも影響を与えた。", skill: { name: "英雄の対比", desc: "3戦目配置時、これまでの負け数\xD735%歴史力UP", type: "cond_pos_revenge", pos: 3, value: 0.35, rate: 0.9 } },
  { id: 230, name: "ストラボン", power: 90, hp: 110, attribute: "CULTURE", desc: "ローマ帝国時代初期のギリシアの地理学者・歴史家。地中海沿岸など各地を広く自ら旅し、気候や地勢だけでなく当時のヨーロッパ・アジア・アフリカに関する歴史や風俗の詳細な知識を集大成した全17巻の『地理誌』を著した。", skill: { name: "地理の集大成", desc: "次の味方の歴史力を+30%強化", type: "inherit_buff", value: 0.3, rate: 0.7 } },
  { id: 231, name: "プリニウス", power: 96, hp: 104, attribute: "CULTURE", desc: "ローマ帝国の軍人・博物学者。天文学、地理、動植物、鉱物など、当時のあらゆる自然科学の知識を膨大な文献から網羅した百科事典『博物誌』全37巻を著述。79年のヴェスヴィオ火山の噴火の際、調査と被災者救助に向かいガスに巻かれ殉職した。", skill: { name: "博物誌の探求", desc: "相手に最大HPの20%ダメージ", type: "fixed_damage", value: 0.2, rate: 0.6 } },
  { id: 232, name: "プトレマイオス", power: 108, hp: 92, attribute: "CULTURE", desc: "ローマ帝国時代のアレクサンドリアで活躍した天文学者・地理学者。地球が宇宙の中心であるとする天動説を数学的に体系化した著書『天文学大全（アルマゲスト）』は、コペルニクスの登場までヨーロッパやイスラームの宇宙観を絶対的に支配した。", skill: { name: "天動説の体系", desc: "相手が【政治】なら自身の歴史力+50%", type: "cond_buff_self", target: "STRATEGY", value: 0.5, rate: 0.9 } },
  { id: 233, name: "セネカ", power: 102, hp: 98, attribute: "CULTURE", desc: "ローマ帝国のストア派哲学者・悲劇作家。若き暴君ネロの家庭教師・補佐役を務め国政を指導したが、のちに謀反の疑いをかけられ自殺を命じられた。『幸福な生活について』などで、運命に動じない禁欲と精神の平安（アパテイア）を説いた。", skill: { name: "精神の平安", desc: "被ダメージを85%カット", type: "damage_cut", value: 0.85, rate: 0.45 } },
  { id: 234, name: "エピクテトス", power: 88, hp: 112, attribute: "CULTURE", desc: "ローマ帝国時代のストア派哲学者。もとは小アジア出身の奴隷で足が不自由であった。人間の力ではどうにもならない運命を受け入れ、自分自身の内面的な精神の自由と道徳的克己をひたすら追求する実践的な哲学（『語録』）を説いた。", skill: { name: "克己の哲学", desc: "自軍のHPを最大HPの25%回復", type: "heal_hp", value: 0.25, rate: 0.5 } },
  { id: 235, name: "マルクス・アウレリウス・アントニヌス", power: 115, hp: 85, attribute: "CULTURE", desc: "五賢帝最後の皇帝であり、ストア派哲学を信奉した「哲人皇帝」。パルティアやゲルマン人との絶え間ない厳しい戦線の陣中において、ギリシア語で内省的な『自省録』を執筆し、皇帝としての重い義務と理性に従って生きることを説いた。", skill: { name: "自省録", desc: "味方全体の歴史力+25%", type: "buff_all", value: 0.25, rate: 0.6 } },
  { id: 236, name: "ルクレティウス", power: 92, hp: 108, attribute: "CULTURE", desc: "共和政末期ローマの哲学者・詩人。エピクロス派の唯物論や、万物は原子からなるとするギリシアの原子論の思想を、ラテン語の長編教訓詩の形で表現した『事物の本性について』を著し、神々や死の恐怖からの精神の解放を説いた。", skill: { name: "唯物論の詩", desc: "敵全員の歴史力-20%", type: "debuff_all", value: 0.2, rate: 0.6 } },
  { id: 237, name: "ペトラルカ", power: 104, hp: 96, attribute: "CULTURE", desc: "イタリア・ルネサンスの先駆者となる人文主義者。ラテン語の古典文芸の収集と研究に努め、人間の感情を肯定。永遠の恋人ラウラへの思いをトスカーナ方言で美しく詠んだ『叙情詩集』を残し、ヨーロッパの詩作に多大な影響を与えた。", skill: { name: "人文主義の先駆", desc: "相手から最大HPの15%を吸収", type: "absorb_hp", value: 0.15, rate: 0.7 } },
  { id: 238, name: "グイッチァルディーニ", power: 110, hp: 90, attribute: "CULTURE", desc: "ルネサンス期イタリアの政治家・歴史家。マキャヴェリの友人であり、教皇やフィレンツェ政府に仕えた。外交や内政の豊富な経験と冷静な政治的観察に基づき『イタリア史』を著し、神意を排した近代的な科学的歴史学の先駆となった。", skill: { name: "科学的歴史学", desc: "次のラウンドの相手を-30%弱体化", type: "inherit_debuff", value: 0.3, rate: 0.8 } },
  { id: 239, name: "チョーサー", power: 96, hp: 104, attribute: "CULTURE", desc: "イギリス・ルネサンスの先駆となる詩人。ボッカッチョの『デカメロン』の影響を受け、様々な階層の巡礼者たちが語り合う『カンタベリ物語』を当時の英語（中英語）で執筆し、イギリス社会を生き生きと描いた「英文学の父」。", skill: { name: "カンタベリ物語", desc: "HP15%消費して相手を30%弱体化", type: "sacrifice_debuff", cost: 0.15, value: 0.3, rate: 0.7 } },
  { id: 240, name: "エドマンド・スペンサー", power: 100, hp: 100, attribute: "CULTURE", desc: "ルネサンス期イギリスの詩人。女王エリザベス1世に捧げた、アーサー王伝説をモチーフとした壮大な寓意（アレゴリー）叙事詩『妖精の女王』を著した。優美な詩形を創始し、イギリス・ルネサンス文学の黄金期を華やかに彩った。", skill: { name: "妖精の女王", desc: "自軍HP半分以下なら敵全体-35%", type: "cond_pinch_debuff_all", value: 0.35, rate: 0.8 } },
  { id: 241, name: "アッシュールバニパル", power: 115, hp: 85, attribute: "VALOR", desc: "アッシリア帝国の最盛期の王。エジプトを征服し、オリエントに史上最大の版図を築き上げた。また、首都ニネヴェに大図書館を建設し、ギルガメシュ叙事詩などの膨大な楔形文字の粘土板を収集・保存したことでも知られ、文武両道に秀でた専制君主。", skill: { name: "オリエントの覇権", desc: "味方全体の歴史力+20%", type: "buff_all", value: 0.2, rate: 0.6 } },
  { id: 242, name: "フィリッポス2世", power: 110, hp: 90, attribute: "VALOR", desc: "マケドニアの国王。アレクサンドロス大王の父。長槍を持つ重装歩兵の密集陣形（ファランクス）を改良し強力な軍隊を育成。カイロネイアの戦いでアテネ・テーベの連合軍を破り、コリントス同盟を結成して全ギリシアの覇権を握ったが暗殺された。", skill: { name: "マケドニアの重装陣", desc: "敵全員の歴史力-20%", type: "debuff_all", value: 0.2, rate: 0.6 } },
  { id: 243, name: "アッティラ", power: 119, hp: 81, attribute: "VALOR", desc: "フン族の最盛期の王。「神の鞭」と恐れられ、パンノニア（ハンガリー）を拠点に東ローマ帝国やガリア（カタラウヌムの戦い）、さらには北イタリアにまで侵攻し、ゲルマン民族の大移動を引き起こして西ローマ帝国を滅亡の淵へと追いやった大征服者。", skill: { name: "神の鞭", desc: "自身の歴史力+40%", type: "buff_self", value: 0.4, rate: 0.7 } },
  { id: 244, name: "ガイセリック", power: 105, hp: 95, attribute: "VALOR", desc: "ゲルマン系のヴァンダル族の王。イベリア半島からジブラルタル海峡を渡って北アフリカへ侵攻し、カルタゴを都とするヴァンダル王国を建国。強力な海軍を組織して地中海を荒らし回り、455年にはローマ市を略奪し帝国に大打撃を与えた。", skill: { name: "地中海の略奪", desc: "相手の歴史力を-30%", type: "debuff_enemy", value: 0.3, rate: 0.7 } },
  { id: 245, name: "ロロ", power: 132, hp: 68, attribute: "VALOR", desc: "ノルマン人（ヴァイキング）の首領。部族を率いて北フランスのセーヌ川河口に侵入を繰り返し、西フランク王シャルル単純王からキリスト教への改宗と防衛を条件に領土を授与され、ノルマンディー公国を建国。後のイングランド征服の源流となった。", skill: { name: "北欧の海賊", desc: "相手が【政治】なら自身の歴史力+50%", type: "cond_buff_self", target: "STRATEGY", value: 0.5, rate: 0.8 } },
  { id: 246, name: "アレクサンドル・ネフスキー", power: 108, hp: 92, attribute: "VALOR", desc: "ノヴゴロド公。13世紀のロシアにおいて、スウェーデン軍をネヴァ河畔で打ち破り、さらに氷結したチュド湖の戦いでドイツ騎士団を壊滅させてロシアの正教信仰と国土を防衛した。キプチャク・ハン国の支配（タタールのくびき）には従順に服し存続を図った。", skill: { name: "氷上の決戦", desc: "相手が【文化】なら相手を-40%弱体化", type: "cond_debuff_enemy", target: "CULTURE", value: 0.4, rate: 0.9 } },
  { id: 247, name: "ボレスワフ1世", power: 104, hp: 96, attribute: "VALOR", desc: "ポーランド王国ピアスト朝の建国者。「勇敢王」と呼ばれる。神聖ローマ帝国から独立を保ちつつ、キエフ大公国に遠征して領土を拡大。カトリックを受容してグニェズノに大司教座を置き、死の直前にポーランド史上初の国王としての戴冠を果たした。", skill: { name: "勇敢王の独立", desc: "自軍のHPを最大HPの20%回復", type: "heal_hp", value: 0.2, rate: 0.6 } },
  { id: 248, name: "クヌート", power: 122, hp: 78, attribute: "VALOR", desc: "デーン人（ノルマン人）の王。11世紀初頭にイングランドを征服し、さらにデンマーク王、ノルウェー王も兼任して北海を囲む広大な「北海帝国」を築き上げた。キリスト教を熱心に保護し、イングランドの法や制度を尊重した統治を行った。", skill: { name: "北海帝国の形成", desc: "2戦目配置時、歴史力+45%", type: "cond_pos_buff", pos: 2, value: 0.45, rate: 0.8 } },
  { id: 249, name: "劉邦", power: 100, hp: 100, attribute: "VALOR", desc: "前漢の初代皇帝（高祖）。農民出身の亭長から身を起こし、秦末の動乱で項羽との激しい楚漢戦争に勝利して天下を統一した。郡県制と封建制を併用する郡国制を採用し、優れた家臣（張良・韓信・蕭何など）の才能を適材適所で活かして王朝の基礎を固めた。", skill: { name: "高祖の天命", desc: "5戦目配置時、負け数\xD735%歴史力UP", type: "cond_pos_revenge", pos: 5, value: 0.35, rate: 0.9 } },

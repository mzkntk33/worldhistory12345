  { id: 811, name: "老子", power: 62, hp: 138, attribute: "CULTURE", desc: "春秋戦国時代の中国の思想家。道家の祖とされる。儒家の人為的な礼や道徳を批判し、宇宙の根源である「道（タオ）」に従って生きる「無為自然」を説いた。その思想はのちに荘子によって発展し、民間信仰と結びついて道教の源流となった。", skill: { name: "無為自然の道", desc: "自軍のHPを最大HPの25%回復", type: "heal_hp", value: 0.25, rate: 0.6 } },
  { id: 812, name: "トマス・マン", power: 98, hp: 102, attribute: "CULTURE", desc: "20世紀ドイツを代表する小説家。市民階級の没落を描いた『ブッデンブローク家の人々』でノーベル文学賞を受賞。スイスのサナトリウムを舞台にヨーロッパの精神的危機を描いた『魔の山』を著し、ナチス台頭後はアメリカへ亡命して反ファシズムを訴えた。", skill: { name: "魔の山の苦悩", desc: "次のラウンドの相手を-30%弱体化", type: "inherit_debuff", value: 0.3, rate: 0.7 } },

  { text: "太陽の下に新しいものはない。", author: "コヘレトの言葉" },

  { text: "自由とは責任である。だから多くの人は自由を恐れる。", author: "ジョージ・バーナード・ショー" },
  { text: "革命は食事のように穏やかなものではない。", author: "毛沢東" },
  { text: "長征とは宣言書であり、プロパガンダ部隊であり、種まき機である。", author: "毛沢東" },
  { text: "鉄は熱いうちに打て。", author: "ことわざ" },
  { text: "知ることは疑うことから始まる。", author: "アベラール" },
  { text: "慈悲なき力と、力なき慈悲は、ともに無用である。", author: "ブッダ" },
  { text: "信仰なき知識は虚ろであり、知識なき信仰は盲目である。", author: "アル＝ガザーリー" },
  { text: "歴史は哲学が教えることを、具体的な例によって教える。", author: "ディオニュシオス・ハリカルナッソス" },
  { text: "国民のために、国民によって、国民の政府。", author: "アブラハム・リンカーン" },
  { text: "銃は文明を作らない。文明は銃を凌駕する。", author: "マーク・トウェイン" },
  { text: "強者は勇気を持つが、賢者はそれを必要とする時だけ使う。", author: "フランク・ハーバート" },
  { text: "帝国は武力では建てられない。精神によって建てられる。", author: "ジョン・スチュアート・ミル" },
  { text: "歴史の審判を恐れよ。", author: "トーマス・マン" },
  { text: "抵抗なくして自由はない。", author: "ネルソン・マンデラ" },
  { text: "無知を認めることが知恵の始まりである。", author: "ソクラテス" },
  { text: "すべての偉大な旅は一歩から始まる。", author: "老子" },
  { text: "道に正しさを見出す者は多くの仲間を得る。正しくない者は少ない。", author: "孔子" },
  { text: "己の欲せざるところを人に施すことなかれ。", author: "孔子" },
  { text: "学びて思わざれば則ち罔し。思いて学ばざれば則ち殆し。", author: "孔子" },
  { text: "過ちて改めざる、是を過ちという。", author: "孔子" },
  { text: "知者は惑わず、仁者は憂えず、勇者は懼れず。", author: "孔子" },
  { text: "千里の道も一歩から。", author: "老子" },
  { text: "上善は水の如し。", author: "老子" },
  { text: "知人者は智、自知者は明。", author: "老子" },
  { text: "柔よく剛を制す。", author: "老子" },
  { text: "勝つことを知りて負けることを知らざれば、害その身に至る。", author: "孫子" },
  { text: "彼を知り己を知れば百戦殆うからず。", author: "孫子" },
  { text: "兵は詭道なり。", author: "孫子" },
  { text: "速やかなること風の如く、静かなること林の如く、侵略すること火の如く、動かざること山の如し。", author: "孫子" },
  { text: "歴史は我々が忘れているときに繰り返す。", author: "ジョージ・サンタヤーナ" },
  { text: "国境は地図の上にのみ存在する。人の心の中ではなく。", author: "マハトマ・ガンジー" },
  { text: "非暴力は弱者の武器ではなく、強者の武器である。", author: "マハトマ・ガンジー" },
  { text: "目には目を、歯には歯をでは、全世界が盲目になってしまう。", author: "マハトマ・ガンジー" },
  { text: "あなたが世界に見たいと思う変化に、あなた自身がなりなさい。", author: "マハトマ・ガンジー" },
  { text: "自由とは他者を同等に自由であると認めることを意味する。", author: "ハーバート・スペンサー" },
  { text: "革命家は生まれるのではなく、作られる。", author: "チェ・ゲバラ" },
  { text: "ラテンアメリカよ、統一されよ！", author: "シモン・ボリバル" },
  { text: "自分の命より自由の方が大切だ。", author: "パトリック・ヘンリー" },
  { text: "教育は最強の武器だ。それを使えば世界を変えることができる。", author: "ネルソン・マンデラ" },
  { text: "真の勇気とは、正しいことのために立ち上がることである。", author: "ジョン・F・ケネディ" },
  { text: "人類は戦争の方法を変えたが、戦争そのものは変えていない。", author: "フレデリック・ザ・グレート" },
  { text: "民族の記憶が消えるとき、その民族も消える。", author: "ヘンリク・シェンキェヴィチ" },
  { text: "忘れることは人間にとって自然なことだが、忘れてはいけないことがある。", author: "エリ・ウィーゼル" },
  { text: "われわれは過去から学ばなければならない。でなければ同じ過ちを繰り返す。", author: "ウィンストン・チャーチル" },
  { text: "世界の歴史は偉大な人物たちの伝記にすぎない。", author: "トーマス・カーライル" },
  { text: "歴史上で最も重要な出来事は、まだ起きていない。", author: "カール・ポパー" },
  { text: "戦争は政治の別の手段による継続である。", author: "カール・フォン・クラウゼヴィッツ" },
  { text: "条約はいつも廃棄される運命にある。", author: "オットー・フォン・ビスマルク" },
  { text: "血と鉄こそが問題を解決する。", author: "オットー・フォン・ビスマルク" },
  { text: "政治は可能性の芸術である。", author: "オットー・フォン・ビスマルク" },
  { text: "国家は市民のためにあり、市民は国家のためにあるのではない。", author: "トマス・ジェファーソン" },
  { text: "自由の木は時に愛国者と専制者の血によって潤わなければならない。", author: "トマス・ジェファーソン" },
  { text: "政府を信頼する者は愚か者だ。しかし信頼しない者は危険人物だ。", author: "ベンジャミン・フランクリン" },
  { text: "三人寄れば文殊の知恵。", author: "日本のことわざ" },
  { text: "石の上にも三年。", author: "日本のことわざ" },
  { text: "七転び八起き。", author: "日本のことわざ" },
  { text: "禍を転じて福となす。", author: "日本のことわざ" },
  { text: "遠くの親戚より近くの他人。", author: "日本のことわざ" },
  { text: "備えあれば憂いなし。", author: "日本のことわざ" },
  { text: "勝って兜の緒を締めよ。", author: "徳川家康" },
  { text: "人の一生は重荷を負うて遠き道を行くがごとし。急ぐべからず。", author: "徳川家康" },
  { text: "鳴かぬなら鳴くまで待とうホトトギス。", author: "徳川家康" },
  { text: "鳴かぬなら殺してしまえホトトギス。", author: "織田信長" },
  { text: "鳴かぬなら鳴かせてみようホトトギス。", author: "豊臣秀吉" },
  { text: "為せば成る、為さねば成らぬ何事も、成らぬは人の為さぬなりけり。", author: "上杉鷹山" },
  { text: "死して不朽の見込みあらば、いつでも死すべし。", author: "吉田松陰" },
  { text: "至誠にして動かざる者は未だこれあらざるなり。", author: "吉田松陰" },
  { text: "天は人の上に人を造らず、人の下に人を造らず。", author: "福沢諭吉" },
  { text: "学問のすすめ。独立自尊。", author: "福沢諭吉" },
  { text: "一身独立して一国独立する。", author: "福沢諭吉" },
  { text: "世の中に不要な人間などというものはない。", author: "坂本龍馬" },
  { text: "日本を今一度せんたくいたし申し候。", author: "坂本龍馬" },
  { text: "己を捨てよ、天下は必ず我に帰す。", author: "西郷隆盛" },
  { text: "命もいらず、名もいらず、官位も金もいらぬ人は始末に困るものなり。", author: "西郷隆盛" },
  { text: "人は負けることを知りて人より勝れり。", author: "武田信玄" },
  { text: "一生懸命だと知恵が出る、中途半端だと愚痴が出る、いい加減だと言い訳が出る。", author: "武田信玄" },
  { text: "眠れる獅子を起こすな。", author: "ナポレオン（日本評して）" },
  { text: "ローマは一日にして成らず。", author: "西洋のことわざ" },
  { text: "アレアー・イアクタ・エスト（賽は投げられた）。", author: "ユリウス・カエサル" },
  { text: "ブルータス、お前もか。", author: "ユリウス・カエサル" },
  { text: "私はローマの市民である。", author: "キケロ" },
  { text: "歴史は哲学者の最良の教師である。", author: "キケロ" },
  { text: "勝利によって人は生き、敗北によって人は学ぶ。", author: "アレクサンドロス大王" },
  { text: "もっと多くの世界があれば征服したのに。", author: "アレクサンドロス大王" },
  { text: "私は世界市民だ。", author: "ディオゲネス" },
  { text: "アルキメデスの点を与えよ、地球を動かしてみせよう。", author: "アルキメデス" },
  { text: "数学なき科学はない。", author: "ロジャー・ベーコン" },
  { text: "それでも地球は動く。", author: "ガリレオ・ガリレイ" },
  { text: "自然は数学の言語で書かれている。", author: "ガリレオ・ガリレイ" },
  { text: "リンゴが木から落ちるのを見て万有引力を思いついた。", author: "アイザック・ニュートン" },
  { text: "私は巨人の肩の上に乗っているにすぎない。", author: "アイザック・ニュートン" },
  { text: "E = mc²。エネルギーは質量と光速の二乗の積に等しい。", author: "アルベルト・アインシュタイン" },
  { text: "想像力は知識より重要である。", author: "アルベルト・アインシュタイン" },
  { text: "同じことを繰り返して異なる結果を期待することを狂気という。", author: "アルベルト・アインシュタイン" },
  { text: "宗教なき科学は不完全であり、科学なき宗教は盲目である。", author: "アルベルト・アインシュタイン" },
  { text: "私は失敗したのではない。うまくいかない1万通りの方法を見つけたのだ。", author: "トーマス・エジソン" },
  { text: "明日死ぬかのように生きよ。永遠に生きるかのように学べ。", author: "マハトマ・ガンジー" },
  { text: "弱者は許すことができない。許すことは強者の特権だ。", author: "マハトマ・ガンジー" },
  { text: "信じることは行動の土台である。", author: "アブラハム・リンカーン" },
  { text: "すべての人を一時的に騙すことはできる。すべての人をいつまでも騙すことはできない。", author: "アブラハム・リンカーン" },
  { text: "アメリカに生まれた者はすべて平等である。", author: "アブラハム・リンカーン" },
  { text: "恐れるべきは恐怖そのものだけだ。", author: "フランクリン・D・ルーズベルト" },
  { text: "国があなたのために何をしてくれるかではなく、あなたが国のために何ができるかを問え。", author: "ジョン・F・ケネディ" },
  { text: "人類は平和のうちに共存するか、愚か者として滅びるかのいずれかだ。", author: "バートランド・ラッセル" },
  { text: "生きることは考えることである。", author: "キケロ" },
  { text: "勇気とは、恐怖心を持ちながらも前進することだ。", author: "マーク・トウェイン" },
  { text: "歴史は単純化することによってのみ理解できる。", author: "アーノルド・トインビー" },
  { text: "文明の衝突が21世紀の主要な紛争になるだろう。", author: "サミュエル・ハンティントン" },
  { text: "歴史の終わり——自由民主主義は人類の最終的な政治形態だ。", author: "フランシス・フクヤマ" },
  { text: "権力は廊下で行使される。", author: "ジョージ・オーウェル" },
  { text: "すべての動物は平等だが、ある動物はほかよりもっと平等だ。", author: "ジョージ・オーウェル" },
  { text: "戦争は平和なり。自由は隷従なり。無知は力なり。", author: "ジョージ・オーウェル（1984）" },
  { text: "我思う、ゆえに我あり。しかし我は何者か？", author: "ジョン・ロック" },
  { text: "人間は自然状態では孤独で、貧しく、野蛮で、短命だ。", author: "トマス・ホッブズ" },
  { text: "社会契約は人々が互いに協力するための合意だ。", author: "ジャン＝ジャック・ルソー" },
  { text: "自然に帰れ。", author: "ジャン＝ジャック・ルソー" },
  { text: "理性の働かないところに道徳はない。", author: "イマヌエル・カント" },
  { text: "汝の行為の格律が普遍的法則となることを欲しうるような行為のみをせよ。", author: "イマヌエル・カント" },
  { text: "人を手段としてのみ扱ってはならず、常に目的として扱え。", author: "イマヌエル・カント" },
  { text: "現実的なものは理性的であり、理性的なものは現実的である。", author: "ヘーゲル" },
  { text: "量は質に転化する。", author: "ヘーゲル" },
  { text: "資本主義は必然的に崩壊する。", author: "カール・マルクス" },
  { text: "万国の労働者よ、団結せよ！", author: "カール・マルクス" },
  { text: "存在するとは知覚されることである。", author: "ジョージ・バークリー" },
  { text: "人間は葦の中で最も弱い生き物だ。だが思考する葦である。", author: "ブレーズ・パスカル" },
  { text: "哲学のすべての問題は言語の混乱から生じる。", author: "ルートヴィヒ・ウィトゲンシュタイン" },
  { text: "語りえぬことについては沈黙しなければならない。", author: "ルートヴィヒ・ウィトゲンシュタイン" },
  { text: "我々は皆、肩の上に過去を背負って歩いている。", author: "フョードル・ドストエフスキー" },
  { text: "美しいものは、それが善いからではなく、美しいから善いのだ。", author: "レフ・トルストイ" },
  { text: "歴史は繰り返さない。しかし韻を踏む。", author: "マーク・トウェイン" },
  { text: "言葉は武器だ。使い方を誤れば人を傷つける。", author: "ウィリアム・シェイクスピア" },
  { text: "生きるか死ぬか、それが問題だ。", author: "ウィリアム・シェイクスピア（ハムレット）" },
  { text: "すべての世界は舞台だ。すべての男と女は役者にすぎない。", author: "ウィリアム・シェイクスピア" },
  { text: "花は散るゆえに美しい。", author: "日本の美意識" },
  { text: "万里の長城も一夜では築けない。", author: "中国のことわざ" },
  { text: "木を植えるのに最適な時は20年前だ。次に最適なのは今だ。", author: "中国のことわざ" },
  { text: "魚を与えるより釣り方を教えよ。", author: "老子（伝）" },
  { text: "一期一会。この出会いは二度と来ない。", author: "茶道の精神" },
  { text: "侘び寂びに美しさを見る目を持て。", author: "千利休" },
  { text: "不完全なものの中に美を見出すことが成熟した精神である。", author: "千利休" },
  { text: "武士道とは死ぬことと見つけたり。", author: "葉隠" },
  { text: "文明はその最良の産物を常に少数の人間から生み出す。", author: "アレクシス・ド・トクヴィル" },
  { text: "民主主義は最良の政府ではないかもしれないが、他のすべてよりはましだ。", author: "アレクシス・ド・トクヴィル" },
  { text: "帝国主義は資本主義の最高段階である。", author: "レーニン" },
  { text: "権力は鉄砲の銃口から生まれる。", author: "毛沢東" },
  { text: "百年の計は人を植えるにあり。", author: "管仲" },
  { text: "治国平天下。国を治めて天下を平らかにする。", author: "大学（儒教経典）" },
  { text: "和を以って貴しと為す。", author: "聖徳太子" },
  { text: "飛鳥時代の日本は東アジアとの交流で大きく成長した。", author: "歴史の教訓" },
  { text: "知行合一。知ることと行うことは一体だ。", author: "王陽明" },
  { text: "君子は和して同ぜず、小人は同じて和せず。", author: "孔子" },
  { text: "文明の歴史は道具の歴史である。", author: "ルイス・マンフォード" },
  { text: "世界を変えることが哲学の課題だ。これまで哲学者たちは世界を解釈するだけだった。", author: "カール・マルクス" },
  { text: "歴史のない民族は根のない木のようなものだ。", author: "マーカス・ガーヴィー" },
  { text: "征服者は武力で支配し、統治者は法で支配し、指導者は心で支配する。", author: "ダンテ・アリギエーリ" },
  { text: "哲学するとは死ぬことを学ぶことである。", author: "モンテーニュ" },
  { text: "人間は道徳的存在として自由でなければならない。", author: "イマヌエル・カント" },
  { text: "行為せよ、ただし結果を求めるな。", author: "バガヴァッド・ギーター" },
  { text: "世界史は世界法廷である。", author: "フリードリヒ・シラー" },
  { text: "全体主義とは孤立した個人を組織する体制である。", author: "ハンナ・アーレント" },
  { text: "悪の凡庸さ。", author: "ハンナ・アーレント" },
  { text: "国家は人民のためにあり、人民が国家のためにあるのではない。", author: "ジョン・スチュアート・ミル" },
  { text: "自由な社会では言論の自由が第一の自由である。", author: "ジョン・スチュアート・ミル" },
  { text: "人は孤島ではない。", author: "ジョン・ダン" },
  { text: "歴史上最も危険な人物は夢を持つ者である。", author: "フィオドル・ドストエフスキー" },
  { text: "偉大な文明は外側から破壊されることはない。内側から崩れ落ちる。", author: "ウィル・デュラント" },
  { text: "文化とは、危機的状況の中で人間が何を選ぶかで決まる。", author: "ルース・ベネディクト" },
  { text: "過去を支配する者は未来を支配する。現在を支配する者は過去を支配する。", author: "ジョージ・オーウェル" },
  { text: "すべての動物は平等だ。しかしある動物はほかよりもっと平等だ。", author: "ジョージ・オーウェル" },
  { text: "ローマは一日にして成らず。", author: "ことわざ" },
  { text: "来た、見た、勝った。", author: "ユリウス・カエサル" },
  { text: "友よ、汝もか。", author: "ユリウス・カエサル" },
  { text: "カルタゴは滅ぼされねばならない。", author: "大カトー" },
  { text: "歴史は哲学の教師である。", author: "キケロ" },
  { text: "法の下では王も乞食も平等である。", author: "キケロ" },
  { text: "平和の中に戦争の種がある。", author: "タキトゥス" },
  { text: "十字軍は信仰と貪欲の混合物であった。", author: "エドワード・ギボン" },
  { text: "歴史家は預言者を後向きに見る者である。", author: "フリードリヒ・シュレーゲル" },
  { text: "帝国は建てるより崩れるほうが速い。", author: "アダム・スミス" },
  { text: "市場は神の見えざる手によって導かれる。", author: "アダム・スミス" },
  { text: "分業は富の源泉である。", author: "アダム・スミス" },
  { text: "政府は最小であるほど最良である。", author: "トマス・ペイン" },
  { text: "暴君に服従することは自由な人間の恥である。", author: "トマス・ペイン" },
  { text: "歴史は哲学の実験室である。", author: "ジョン・デューイ" },

  { id: 250, name: "耶律阿保機", power: 126, hp: 74, attribute: "VALOR", desc: "モンゴル系とされる契丹族の指導者。諸部族を統一して916年に遼（契丹帝国）を建国した。渤海国を滅ぼして満州地方を支配下に収め、遊牧民特有の部族制と、農耕民を統治する州県制を併用する二重統治体制の基礎を築き、東アジアの勢力図を変えた。", skill: { name: "契丹の建国", desc: "自軍HP半分以下なら自身の歴史力+60%", type: "cond_pinch_buff", value: 0.6, rate: 0.8 } },
  { id: 251, name: "完顔阿骨打", power: 138, hp: 62, attribute: "VALOR", desc: "ツングース系女真族の首長。遼の過酷な支配に反発して諸部族を統一し、1115年に金王朝を建国。宋（北宋）と海上の盟を結んで強国・遼を挟撃して滅亡に追い込み、独自の猛安・謀克制と呼ばれる軍事・行政の組織制度を用いて強力な国家を創り上げた。", skill: { name: "猛安・謀克の突撃", desc: "自軍HP半分以下なら敵全体-35%", type: "cond_pinch_debuff_all", value: 0.35, rate: 0.8 } },
  { id: 252, name: "トゥグリル・ベク", power: 110, hp: 90, attribute: "VALOR", desc: "トルコ系遊牧民セルジューク朝の初代君主。イラン高原から西進してブワイフ朝を打倒し、1055年にバグダードに入城。アッバース朝のカリフから「スルタン」の称号を公式に授与され、イスラーム世界における世俗の最高権力者としての正当性を確立した。", skill: { name: "スルタンの権威", desc: "HP15%消費して自身の歴史力+60%", type: "sacrifice_buff", cost: 0.15, value: 0.6, rate: 0.8 } },
  { id: 253, name: "アルプ・アルスラーン", power: 114, hp: 86, attribute: "VALOR", desc: "セルジューク朝の第2代スルタン。宰相ニザーム・アルムルクを重用して国家体制を固めた。1071年のマンジケルトの戦いでビザンツ帝国の皇帝を捕虜にする大勝を収め、小アジア（アナトリア）へのトルコ人の進出とイスラーム化を決定づけた。", skill: { name: "マンジケルトの勝者", desc: "HP15%消費して相手を30%弱体化", type: "sacrifice_debuff", cost: 0.15, value: 0.3, rate: 0.8 } },
  { id: 254, name: "バトゥ", power: 133, hp: 67, attribute: "VALOR", desc: "モンゴル帝国の初代皇帝チンギス・ハンの孫。ヨーロッパ遠征軍の総司令官としてルーシ（ロシア）の諸公国を次々と征服し、ワールシュタットの戦いでポーランド・ドイツの連合騎士軍を壊滅させた。その後ヴォルガ河畔のサライにキプチャク・ハン国を建てた。", skill: { name: "ワールシュタットの嵐", desc: "相手に最大HPの20%ダメージ", type: "fixed_damage", value: 0.2, rate: 0.6 } },
  { id: 255, name: "スボタイ", power: 116, hp: 84, attribute: "VALOR", desc: "チンギス・ハンからオゴデイの時代にかけて仕えたモンゴル帝国の最強の軍略家。バトゥのヨーロッパ遠征では実質的な総指揮を執り、ロシア平原から東欧に至る広大な地域での電撃的な機動戦と情報戦を指揮し、行く先々で敵軍を粉砕した百戦錬磨の将軍。", skill: { name: "神速の機動戦", desc: "相手から最大HPの15%を吸収", type: "absorb_hp", value: 0.15, rate: 0.6 } },
  { id: 256, name: "ヌルハチ", power: 139, hp: 61, attribute: "VALOR", desc: "中国東北部の女真族を統一し、1616年に後金を建国して清王朝の基礎を築いた太祖。明の弱体化に乗じてサルフの戦いで大勝。独自の軍事・社会組織である八旗（はっき）制度と、満州文字を創設し、強力な騎馬軍団と独立した文化基盤を作り上げた。", skill: { name: "八旗の創設", desc: "次の味方の歴史力を+30%強化", type: "inherit_buff", value: 0.3, rate: 0.7 } },
  { id: 257, name: "ホンタイジ", power: 108, hp: 92, attribute: "VALOR", desc: "後金の第2代皇帝（清の太宗）。内モンゴルのチャハル部を平定して大元ウルスから伝わる玉璽を獲得し、国号を「大清」と改めた。朝鮮を服属させて後顧の憂いを絶ち、明への本格的な侵攻準備を整え、満州族・モンゴル族・漢人の複合国家の体制を固めた。", skill: { name: "大清の成立", desc: "次のラウンドの相手を-30%弱体化", type: "inherit_debuff", value: 0.3, rate: 0.7 } },
  { id: 258, name: "シャイバーニー・ハン", power: 104, hp: 96, attribute: "VALOR", desc: "16世紀初頭、ウズベク族を率いて中央アジアにシャイバーニー朝を建国した征服者。ティムール朝の首都サマルカンドやヘラートを攻略して同朝を完全に滅亡させ、のちのムガル帝国の始祖バーブルをインド方面へ追いやる原因を作った猛将。", skill: { name: "ウズベクの突風", desc: "被ダメージを75%カット", type: "damage_cut", value: 0.75, rate: 0.55 } },
  { id: 259, name: "ベリサリウス", power: 115, hp: 85, attribute: "VALOR", desc: "ビザンツ帝国（ユスティニアヌス帝）の最も偉大な将軍。ササン朝ペルシアとの戦いで武功を挙げ、北アフリカのヴァンダル王国、イタリア半島の東ゴート王国を次々と滅ぼして旧西ローマ帝国の領土を奪還。帝国の再建に多大な軍事的貢献を果たした。", skill: { name: "帝国再建の剣", desc: "超低確率(10%)で相手のHPを1にする", type: "hp_to_one", rate: 0.1 } },
  { id: 260, name: "ナルセス", power: 105, hp: 95, attribute: "VALOR", desc: "ビザンツ帝国の宦官でありながら、優れた軍事司令官としてユスティニアヌス帝に仕えた。ベリサリウスの後任としてイタリアへ遠征し、タギネの戦いで東ゴート王国の残存勢力を完全に壊滅させ、長きにわたるゴート戦争を最終的に終結させた。", skill: { name: "ゴート戦争終結", desc: "味方全体の歴史力+15%", type: "buff_all", value: 0.15, rate: 0.6 } },
  { id: 261, name: "アウレリアヌス", power: 106, hp: 94, attribute: "VALOR", desc: "3世紀の危機の時代に活躍した軍人出身のローマ皇帝。帝国内に分立していたガリア帝国や、ゼノビアが率いる東方のパルミラ王国を力で討伐し、帝国の再統一を果たした「世界の修復者」。またローマ市に強固な城壁（アウレリアヌス城壁）を築いた。", skill: { name: "世界の修復者", desc: "敵全員の歴史力-15%", type: "debuff_all", value: 0.15, rate: 0.6 } },
  { id: 262, name: "ミルティアデス", power: 102, hp: 98, attribute: "VALOR", desc: "古代アテネの将軍。第2回ペルシア戦争において、マラトンの戦いでアテネの重装歩兵軍を指揮。圧倒的な大軍で押し寄せるダレイオス1世のペルシア軍に対し、密集陣形の突撃を用いて奇跡的な勝利を収め、ギリシアの危機を救った。", skill: { name: "マラトンの勝利", desc: "自身の歴史力+35%", type: "buff_self", value: 0.35, rate: 0.7 } },
  { id: 263, name: "レオニダス", power: 110, hp: 90, attribute: "VALOR", desc: "古代スパルタの王。ペルシア戦争のテルモピュライの戦いにおいて、クセルクセス1世率いるペルシアの超大軍に対し、わずか300名のスパルタ精鋭部隊と共に狭い峠で決死の防衛戦を展開。全滅するまで戦い抜き、ギリシア人の抗戦の精神的象徴となった。", skill: { name: "テルモピュライの盾", desc: "相手の歴史力を-25%", type: "debuff_enemy", value: 0.25, rate: 0.7 } },
  { id: 264, name: "パウサニアス", power: 98, hp: 102, attribute: "VALOR", desc: "古代スパルタの将軍。レオニダスの甥。プラタイアの戦いにおいて、ギリシア連合軍の総司令官としてペルシア軍の主力を完全に打ち破り、ペルシア戦争におけるギリシア側の最終的な勝利を決定づけた。しかし後にペルシアと内通した嫌疑で餓死させられた。", skill: { name: "プラタイアの決戦", desc: "相手が【政治】なら自身の歴史力+40%", type: "cond_buff_self", target: "STRATEGY", value: 0.4, rate: 1 } },
  { id: 265, name: "リュサンドロス", power: 104, hp: 96, attribute: "VALOR", desc: "ペロポネソス戦争末期のスパルタの提督・将軍。ペルシアの援助を引き出して強力な海軍を建設し、アイゴスポタモイの海戦でアテネ海軍を完全に壊滅させ、アテネを降伏に追い込んで長きにわたる戦争を終結させた。", skill: { name: "アテネの降伏", desc: "相手が【文化】なら相手を-40%弱体化", type: "cond_debuff_enemy", target: "CULTURE", value: 0.4, rate: 0.8 } },
  { id: 266, name: "アグリッパ", power: 106, hp: 94, attribute: "VALOR", desc: "ローマの将軍・政治家。初代皇帝アウグストゥスの最も信頼する無二の親友にして軍事的右腕。アクティウムの海戦において艦隊の総指揮を執り、アントニウスとクレオパトラの連合軍を見事に撃破し、帝政ローマの基盤を軍事面から支えた。", skill: { name: "アクティウムの采配", desc: "自軍のHPを最大HPの20%回復", type: "heal_hp", value: 0.2, rate: 0.6 } },
  { id: 267, name: "ロシャンボー", power: 96, hp: 104, attribute: "VALOR", desc: "フランスの伯爵・将軍。アメリカ独立戦争において、フランスが派遣した陸軍の遠征軍司令官。ワシントン率いる大陸軍と合流して綿密な作戦を練り、ヨークタウンの戦いにおいてイギリス軍のコーンウォリス将軍を包囲・降伏させた立役者。", skill: { name: "ヨークタウンの包囲", desc: "4戦目配置時、歴史力+45%", type: "cond_pos_buff", pos: 4, value: 0.45, rate: 0.8 } },
  { id: 268, name: "デュプレクス", power: 94, hp: 106, attribute: "VALOR", desc: "18世紀フランスのインド総督。インドにおけるフランスの植民地勢力拡大を図り、土候の対立を利用して巧みに勢力を広げたが、プラッシーの戦いなどを経てイギリスのクライヴに敗北し、フランスのインド支配の夢は挫折した。", skill: { name: "インド経営の野望", desc: "3戦目配置時、負け数\xD735%歴史力UP", type: "cond_pos_revenge", pos: 3, value: 0.35, rate: 0.9 } },
  { id: 269, name: "ゴードン", power: 123, hp: 77, attribute: "VALOR", desc: "イギリスの軍人。太平天国の乱の鎮圧に際し、外国人の傭兵部隊である「常勝軍」を指揮して清朝を支援。のちにエジプト総督としてスーダンに赴くが、反英独立運動であるマフディーの反乱軍にハルツームで包囲され、孤立無援の中で戦死した。", skill: { name: "常勝軍の指揮", desc: "自軍HP半分以下なら自身の歴史力+60%", type: "cond_pinch_buff", value: 0.6, rate: 0.8 } },
  { id: 270, name: "キッチナー", power: 105, hp: 95, attribute: "VALOR", desc: "イギリスの帝国主義を支えた軍人。スーダンにおけるマフディー軍をオムドゥルマンの戦いで機関銃などの近代兵器を用いて壊滅させ、ファショダ事件でもフランスのマルシャンを退けた。南アフリカ戦争（ボーア戦争）でも過酷な焦土作戦を指揮した。", skill: { name: "帝国主義の弾圧", desc: "自軍HP半分以下なら敵全体-35%", type: "cond_pinch_debuff_all", value: 0.35, rate: 0.8 } },
  { id: 271, name: "趙匡胤", power: 108, hp: 92, attribute: "STRATEGY", desc: "中国・宋（北宋）の建国者（太祖）。五代十国時代の武断政治の弊害を反省し、軍人の力を削ぎ、科挙官僚（文人）による君主独裁の「文治主義」を徹底させた。殿試の導入によって皇帝と官僚の直接的な結びつきを強化し、長期的な内政安定の基礎を築いた。", skill: { name: "文治主義の徹底", desc: "HP15%消費して自身の歴史力+60%", type: "sacrifice_buff", cost: 0.15, value: 0.6, rate: 0.8 } },
  { id: 272, name: "朱元璋", power: 110, hp: 90, attribute: "STRATEGY", desc: "明王朝の建国者（洪武帝）。貧農の出身から紅巾の乱に参加し、モンゴル人政権の元を北へ追いやって漢民族の王朝を復興。中書省を廃止して六部を皇帝直属とし、六諭の頒布や里甲制、賦役黄冊の作成など、徹底した農村統制と皇帝独裁体制を構築した。", skill: { name: "洪武帝の独裁", desc: "HP15%消費して相手を30%弱体化", type: "sacrifice_debuff", cost: 0.15, value: 0.3, rate: 0.8 } },
  { id: 273, name: "康熙帝", power: 120, hp: 80, attribute: "STRATEGY", desc: "清の第4代皇帝。中国史上最長となる61年の治世で清の全盛期の基礎を築いた。三藩の乱を鎮圧し、台湾の鄭氏政権を平定。ロシアとネルチンスク条約を結んで国境を確定させ、典礼問題ではイエズス会以外の布教を禁じるなど、卓越した内政・外交手腕を発揮した。", skill: { name: "三藩の平定", desc: "相手に最大HPの20%ダメージ", type: "fixed_damage", value: 0.2, rate: 0.6 } },
  { id: 274, name: "雍正帝", power: 112, hp: 88, attribute: "STRATEGY", desc: "清の第5代皇帝。君主独裁体制を極限まで強化し、軍事・機密を扱う軍機処を設置。キリスト教の全面布教禁止や、思想統制（文字の獄）を厳しく行った。また、丁税（人頭税）を地税に組み込む「地丁銀制」を全国に普及させ、税制を近代化した。", skill: { name: "軍機処の密旨", desc: "相手から最大HPの15%を吸収", type: "absorb_hp", value: 0.15, rate: 0.6 } },
  { id: 275, name: "乾隆帝", power: 65, hp: 135, attribute: "STRATEGY", desc: "清の第6代皇帝。ジュンガル部やウイグル、チベットを平定して「新疆」と名付け、清の最大版図を現出させた。また『四庫全書』の大編纂事業を行って漢民族の学者を優遇しつつ、反清的な思想を徹底的に検閲するというアメとムチの統治を行った。", skill: { name: "十全武功と四庫全書", desc: "次の味方の歴史力を+30%強化", type: "inherit_buff", value: 0.3, rate: 0.7 } },
  { id: 276, name: "ネブカドネザル2世", power: 124, hp: 76, attribute: "STRATEGY", desc: "新バビロニア（カルデア）の最盛期の王。エルサレムを陥落させ、ユダヤ人をバビロンに強制連行した「バビロン捕囚」で知られる。また、妻のために建造したとされる「空中庭園」や、バベルの塔のモデルとなった巨大なジッグラトを造営した。", skill: { name: "バビロン捕囚", desc: "次のラウンドの相手を-30%弱体化", type: "inherit_debuff", value: 0.3, rate: 0.7 } },
  { id: 277, name: "カウティリヤ", power: 96, hp: 104, attribute: "STRATEGY", desc: "古代インド・マウリヤ朝の建国者チャンドラグプタに仕えたとされる宰相。冷徹な政治・外交術やスパイの活用などを説いた『実利論（アルタ・シャーストラ）』の著者とされ、「インドのマキャヴェリ」とも評される古代の卓越した政治思想家。", skill: { name: "実利論の謀略", desc: "被ダメージを75%カット", type: "damage_cut", value: 0.75, rate: 0.55 } },
  { id: 278, name: "ゼノビア", power: 98, hp: 102, attribute: "STRATEGY", desc: "3世紀後半、ローマ帝国の混乱に乗じてシリアで自立したパルミラ王国の女王。ササン朝ペルシアを撃退し、エジプトや小アジアまで勢力を拡大してローマに反旗を翻したが、最終的にアウレリアヌス帝の討伐軍に敗れ、ローマへ連行された。", skill: { name: "パルミラの独立", desc: "味方全体の歴史力+20%", type: "buff_all", value: 0.2, rate: 0.5 } },
  { id: 279, name: "ヨーゼフ2世", power: 92, hp: 108, attribute: "STRATEGY", desc: "神聖ローマ皇帝であり、母マリア・テレジアと共にオーストリアを統治した啓蒙専制君主。農奴解放や宗教寛容令の発布など、理性に基く急進的な近代化改革（上からの改革）を強行したが、貴族やカトリック教会の猛反発に遭い、志半ばで挫折した。", skill: { name: "啓蒙と寛容", desc: "自身の歴史力+40%", type: "buff_self", value: 0.4, rate: 0.7 } },
  { id: 280, name: "イヴァン3世", power: 106, hp: 94, attribute: "STRATEGY", desc: "モスクワ大公国の君主。「大帝」と称される。ビザンツ帝国の最後の皇女ソフィアと結婚して双頭の鷲の紋章を引き継ぎ、「第3のローマ」としての権威を主張。1480年にキプチャク・ハン国からの完全な独立を果たし、ツァーリの称号を初めて使用した。", skill: { name: "タタールのくびき脱却", desc: "相手の歴史力を-30%", type: "debuff_enemy", value: 0.3, rate: 0.7 } },
  { id: 281, name: "エカチェリーナ2世", power: 110, hp: 90, attribute: "STRATEGY", desc: "ロシアの女帝。啓蒙専制君主としてヴォルテールらと文通し、法典編纂などを進めるが、プガチョフの農民反乱を契機に反動化して農奴制を強化。対外的にはポーランド分割を主導し、オスマン帝国と戦ってクリミア半島を獲得し南下政策を推し進めた。", skill: { name: "南下政策と分割", desc: "相手が【軍事】なら自身の歴史力+50%", type: "cond_buff_self", target: "VALOR", value: 0.5, rate: 0.8 } },
  { id: 282, name: "ルイ13世", power: 88, hp: 112, attribute: "STRATEGY", desc: "フランス・ブルボン朝の国王。有能な宰相リシュリューに国政を委ね、三部会の召集を停止して王権の強化を図った。対外的には三十年戦争に新教側で介入して宿敵ハプスブルク家の弱体化を狙い、フランス絶対王政の強固な基礎を築き上げた。", skill: { name: "王権の強化", desc: "相手が【文化】なら相手を-40%弱体化", type: "cond_debuff_enemy", target: "CULTURE", value: 0.4, rate: 0.8 } },
  { id: 283, name: "テュルゴー", power: 85, hp: 115, attribute: "STRATEGY", desc: "フランス王ルイ16世の財務総監。重農主義（フィジオクラシー）の経済学者であり、深刻な財政危機を打開するため、特権階級（免税特権を持つ貴族や聖職者）への課税やギルドの廃止など自由主義的な改革を試みたが、特権身分の猛反発で罷免された。", skill: { name: "重農主義の改革", desc: "自軍のHPを最大HPの20%回復", type: "heal_hp", value: 0.2, rate: 0.5 } },
  { id: 284, name: "ネッケル", power: 90, hp: 110, attribute: "STRATEGY", desc: "フランス王ルイ16世の財務長官。スイス出身の銀行家。テュルゴーの後任として財政再建を任され、特権階級への課税を主張して三部会の召集を提案。民衆から絶大な人気を集めたが、保守派により罷免されたことが、バスティーユ牢獄襲撃の直接の引き金となった。", skill: { name: "三部会の召集", desc: "2戦目配置時、歴史力+45%", type: "cond_pos_buff", pos: 2, value: 0.45, rate: 0.8 } },
  { id: 285, name: "アレクサンダー・ハミルトン", power: 98, hp: 102, attribute: "STRATEGY", desc: "アメリカ建国の父の一人。初代財務長官。強い中央政府の権限と商工業の発展を重視する連邦派（フェデラリスト）の指導者として、国立銀行の設立や保護関税政策を推進。ジェファソンらの反連邦派（州権尊重・農業重視）と激しく対立した。", skill: { name: "連邦政府の創設", desc: "5戦目配置時、負け数\xD735%歴史力UP", type: "cond_pos_revenge", pos: 5, value: 0.35, rate: 0.9 } },
  { id: 286, name: "アンドリュー・ジャクソン", power: 100, hp: 100, attribute: "STRATEGY", desc: "アメリカ第7代大統領。初の西部出身。白人成年男子の普通選挙を確立し「ジャクソニアン・デモクラシー」と呼ばれる大衆民主主義を推進した。一方で、「涙の踏み跡」に代表される先住民インディオの過酷な強制移住法を強行した白人至上主義的な側面を持つ。", skill: { name: "ジャクソニアン・デモクラシー", desc: "自軍HP半分以下なら自身の歴史力+60%", type: "cond_pinch_buff", value: 0.6, rate: 0.8 } },
  { id: 287, name: "セオドア・ローズヴェルト", power: 105, hp: 95, attribute: "STRATEGY", desc: "アメリカ第26代大統領。カリブ海政策において武力を背景とする「棍棒外交」を展開し、パナマ運河の建設権を獲得。日露戦争の講和（ポーツマス条約）を調停してノーベル平和賞を受賞。内政では反トラスト法の適用など革新主義（プログレッシヴィズム）を推進。", skill: { name: "棍棒外交", desc: "自軍HP半分以下なら敵全体-35%", type: "cond_pinch_debuff_all", value: 0.35, rate: 0.8 } },
  { id: 288, name: "ヴィクトリア女王", power: 112, hp: 88, attribute: "STRATEGY", desc: "19世紀イギリスの象徴。「太陽の沈まない国」と呼ばれた大英帝国の絶頂期を治めた女王。自由貿易を推進して「世界の工場」としての繁栄を享受し、インド大反乱後にはムガル帝国を滅ぼして自らインド女帝に即位し、直接統治を確立した。", skill: { name: "パクス・ブリタニカ", desc: "HP15%消費して自身の歴史力+60%", type: "sacrifice_buff", cost: 0.15, value: 0.6, rate: 0.8 } },
  { id: 289, name: "パーマストン", power: 95, hp: 105, attribute: "STRATEGY", desc: "19世紀半ばのイギリスの自由党の政治家。外相や首相を歴任。「強固な砲艦外交」を展開し、アヘン戦争やアロー戦争で清を屈服させ、クリミア戦争でロシアの南下を阻止するなど、自由貿易の拡大と大英帝国の国益（パクス・ブリタニカ）を強引に推し進めた。", skill: { name: "砲艦外交", desc: "HP15%消費して相手を30%弱体化", type: "sacrifice_debuff", cost: 0.15, value: 0.3, rate: 0.8 } },
  { id: 290, name: "ヴィルヘルム1世", power: 104, hp: 96, attribute: "STRATEGY", desc: "プロイセン国王。ビスマルクを首相に登用して軍制改革を断行し、三度の戦争（対デンマーク、オーストリア、フランス）に勝利して、1871年にヴェルサイユ宮殿の鏡の間で初代ドイツ帝国皇帝に即位した。ビスマルクの政策を堅実に支えた君主。", skill: { name: "ドイツ帝国戴冠", desc: "相手に最大HPの20%ダメージ", type: "fixed_damage", value: 0.2, rate: 0.6 } },
  { id: 291, name: "ヴィルヘルム2世", power: 98, hp: 102, attribute: "STRATEGY", desc: "ドイツ帝国の第3代皇帝。ビスマルクを引退させ、自ら親政を開始。「世界政策（新航路）」を掲げて帝国主義的な膨張政策に転換し、3B政策や建艦競争を推進してイギリスやロシアとの対立を激化させた。これが第一次世界大戦の最大の要因となった。", skill: { name: "世界政策の野望", desc: "相手から最大HPの15%を吸収", type: "absorb_hp", value: 0.15, rate: 0.6 } },
  { id: 292, name: "リリウオカラニ", power: 85, hp: 115, attribute: "STRATEGY", desc: "ハワイ王国最後の女王。「アロハ・オエ」の作曲者としても知られる。アメリカ系移民（サトウキビ・パイナップル農園主）による王権制限と併合の動きに対し、ハワイ人の権利回復を目指して新憲法を制定しようとしたが、クーデターにより退位させられた。", skill: { name: "アロハ・オエ", desc: "次の味方の歴史力を+30%強化", type: "inherit_buff", value: 0.3, rate: 0.7 } },
  { id: 293, name: "チュラロンコン", power: 96, hp: 104, attribute: "STRATEGY", desc: "タイのチャクリ朝の第5代国王（ラーマ5世）。英仏の強大な帝国主義的圧力が迫る中、巧みな緩衝国（バッファーステート）外交を展開。同時に、奴隷制の廃止や近代的な法典整備・鉄道建設など「チャクリ改革」と呼ばれる上からの近代化を進め独立を維持した。", skill: { name: "チャクリ改革と独立", desc: "次のラウンドの相手を-30%弱体化", type: "inherit_debuff", value: 0.3, rate: 0.7 } },
  { id: 294, name: "イスメト・イノニュ", power: 92, hp: 108, attribute: "STRATEGY", desc: "トルコ共和国の第2代大統領。アタテュルクの右腕としてローザンヌ条約の交渉を担い、不平等条約（セーヴル条約）の撤廃と領土回復に成功。第二次世界大戦では巧みな中立政策を維持し、戦後は多党制への移行を実現させたトルコ建国の功臣。", skill: { name: "ローザンヌ条約の交渉", desc: "被ダメージを75%カット", type: "damage_cut", value: 0.75, rate: 0.55 } },
  { id: 295, name: "トルーマン", power: 102, hp: 98, attribute: "STRATEGY", desc: "アメリカ第33代大統領。ローズヴェルトの急死により就任し、日本への原爆投下を決定。戦後は「トルーマン・ドクトリン」を発表してソ連の封じ込め（冷戦）を明確にし、マーシャル・プランやNATOの設立を主導して西側陣営の防衛体制を構築した。", skill: { name: "封じ込め政策", desc: "味方全体の歴史力+15%", type: "buff_all", value: 0.15, rate: 0.6 } },
  { id: 296, name: "ソロモン王", power: 100, hp: 100, attribute: "STRATEGY", desc: "古代イスラエル王国の第3代国王。ダヴィデの子。紅海や地中海での交易により莫大な富を築き、首都エルサレムに壮麗なヤハウェの神殿（第一神殿）を建設。王国の最盛期を現出させたが、重税や賦役により死後王国は南北に分裂した。", skill: { name: "エルサレム神殿の富", desc: "敵全員の歴史力-15%", type: "debuff_all", value: 0.15, rate: 0.6 } },
  { id: 297, name: "高宗", power: 105, hp: 95, attribute: "STRATEGY", desc: "唐の第3代皇帝。太宗（李世民）の跡を継ぎ、百済・高句麗を滅ぼして（白村江の戦い含む）朝鮮半島を制圧し、さらに西突厥を討って唐の歴史上最大の版図を実現した。晩年は病弱となり、皇后である武則天（則天武后）に実権を握られた。", skill: { name: "唐の最大版図", desc: "自身の歴史力+35%", type: "buff_self", value: 0.35, rate: 0.7 } },
  { id: 298, name: "范仲淹", power: 90, hp: 110, attribute: "STRATEGY", desc: "北宋の政治家・文人。「天下の憂いに先だって憂い、天下の楽しみに後れて楽しむ（先憂後楽）」の言葉で知られる士大夫の理想像。西夏に対する防衛で功績を挙げ、王安石の「新法」に先駆けて政治改革（慶暦の改革）を試みたが保守派の反対で挫折した。", skill: { name: "先憂後楽", desc: "相手の歴史力を-25%", type: "debuff_enemy", value: 0.25, rate: 0.7 } },
  { id: 301, name: "ゼノン", power: 85, hp: 115, attribute: "CULTURE", desc: "ヘレニズム時代の哲学者で、ストア派の創始者。アテネの彩色柱廊（ストア・ポイキレ）で講義を行った。人間の感情や欲望（パトス）を理性の力で抑え込み、禁欲によっていかなる運命にも動じない精神の平安（アパテイア）に至ることを理想とした。", skill: { name: "アパテイア（無情念）", desc: "自軍のHPを最大HPの20%回復", type: "heal_hp", value: 0.2, rate: 0.6 } },
  { id: 302, name: "エピクロス", power: 86, hp: 114, attribute: "CULTURE", desc: "ヘレニズム時代の哲学者で、エピクロス派の創始者。「隠れて生きよ」と説き、政治や公共の煩わしさから離れた。肉体的な快楽ではなく、精神的な苦痛の無い状態（アタラクシア）こそが真の快楽であるとする快楽主義（エピキュリアン）を提唱した。", skill: { name: "アタラクシア（魂の平静）", desc: "4戦目配置時、歴史力+45%", type: "cond_pos_buff", pos: 4, value: 0.45, rate: 0.8 } },
  { id: 303, name: "クセノフォン", power: 92, hp: 108, attribute: "CULTURE", desc: "古代ギリシアの軍人・著述家。ソクラテスの弟子。ペルシアの王位継承争い（クナクサの戦い）にギリシア人傭兵として参加し、敗戦後に過酷な撤退戦を指揮して生還。その見事な逃避行を記録した『アナバシス』は、古代ギリシア文学の傑作である。", skill: { name: "アナバシス（内陸への旅）", desc: "3戦目配置時、負け数\xD735%歴史力UP", type: "cond_pos_revenge", pos: 3, value: 0.35, rate: 0.9 } },
  { id: 304, name: "カーリダーサ", power: 88, hp: 112, attribute: "CULTURE", desc: "インド・グプタ朝（チャンドラグプタ2世の宮廷）で活躍したサンスクリット文学の最大の詩人・劇作家。王と森の乙女の数奇なロマンスを描いた代表的な戯曲『シャクンタラー』は、インド古典文学の最高峰として近代のゲーテなどにも絶賛された。", skill: { name: "シャクンタラーの恋", desc: "自軍HP半分以下なら自身の歴史力+60%", type: "cond_pinch_buff", value: 0.6, rate: 0.8 } },
  { id: 305, name: "董仲舒", power: 98, hp: 102, attribute: "CULTURE", desc: "前漢の武帝に仕えた儒学者。「天人相関説」を唱えて皇帝の権威を天意と結びつけ、五経博士を設置させて儒学（儒教）を国家の正統な学問（官学）とするよう建言した。これにより、儒教は中国の歴代王朝を支える絶対的な統治イデオロギーとなった。", skill: { name: "儒教の官学化", desc: "自軍HP半分以下なら敵全体-35%", type: "cond_pinch_debuff_all", value: 0.35, rate: 0.8 } },
  { id: 306, name: "班固", power: 95, hp: 105, attribute: "CULTURE", desc: "後漢の歴史家。西域都護・班超の兄。司馬遷の『史記』の「紀伝体」の形式を受け継ぎ、前漢一代の歴史のみを断代史としてまとめた『漢書』を完成させた。以後の中国の正史（歴代王朝の公認歴史書）は、すべてこの断代史のスタイルを踏襲することになる。", skill: { name: "漢書（断代史）", desc: "HP15%消費して自身の歴史力+60%", type: "sacrifice_buff", cost: 0.15, value: 0.6, rate: 0.8 } },
  { id: 307, name: "王維", power: 84, hp: 116, attribute: "CULTURE", desc: "中国・盛唐の時代の詩人・画家。熱心な仏教徒であったため「詩仏」と称される。自然の静寂や禅の境地を詠んだ美しい山水詩を得意とし、同時に水墨画（南宗画）の祖ともされ、「詩中に画あり、画中に詩あり」と高く評された多才な文人。", skill: { name: "詩仏の山水", desc: "HP15%消費して相手を30%弱体化", type: "sacrifice_debuff", cost: 0.15, value: 0.3, rate: 0.8 } },
  { id: 308, name: "白居易", power: 90, hp: 110, attribute: "CULTURE", desc: "中国・中唐の詩人。字は楽天。玄宗皇帝と楊貴妃の悲恋を詠んだ長編の叙事詩『長恨歌』や、左遷された自らの不遇を琵琶の音に託した『琵琶行』で広く知られる。平易で親しみやすい詩風は日本にも伝わり、平安文学（源氏物語など）に絶大な影響を与えた。", skill: { name: "長恨歌の哀哀", desc: "相手に最大HPの20%ダメージ", type: "fixed_damage", value: 0.2, rate: 0.6 } },
  { id: 309, name: "韓愈", power: 92, hp: 108, attribute: "CULTURE", desc: "中国・中唐の文学者・思想家。六朝時代以来の形式に偏った華美な「四六駢儷体」を批判し、漢代以前の質実剛健で力強い散文である「古文」の復興を柳宗元と共に提唱した。また仏教を厳しく排斥し、儒教の正統性を再確立しようと努めた。", skill: { name: "古文復興運動", desc: "相手から最大HPの15%を吸収", type: "absorb_hp", value: 0.15, rate: 0.6 } },
  { id: 310, name: "柳宗元", power: 88, hp: 112, attribute: "CULTURE", desc: "中国・中唐の文学者。韓愈と共に「古文復興運動」を強力に推し進め、唐宋八大家の一人に数えられる。政争に敗れて僻地へ左遷される不遇な人生を送ったが、その自然や風土を優れた紀行文などで描き出し、中国散文の新たな境地を開拓した。", skill: { name: "唐宋の散文", desc: "次の味方の歴史力を+30%強化", type: "inherit_buff", value: 0.3, rate: 0.7 } },
  { id: 311, name: "欧陽脩", power: 96, hp: 104, attribute: "CULTURE", desc: "北宋の代表的な政治家・学者。唐宋八大家の一人。王安石の改革（新法）には反対の立場をとった保守派。歴史家としては『新唐書』『新五代史』を編纂し、大義名分（正統論）を重んじる厳格な史論を展開して、後の朱子学に大きな思想的影響を与えた。", skill: { name: "大義名分の史論", desc: "次のラウンドの相手を-30%弱体化", type: "inherit_debuff", value: 0.3, rate: 0.7 } },
  { id: 312, name: "蘇軾", power: 94, hp: 106, attribute: "CULTURE", desc: "北宋の最高の詩人・書家・画家。号は東坡（蘇東坡）。唐宋八大家の一人。政争（新法・旧法の争い）に巻き込まれ黄州などに左遷されたが、その地で詠んだ『赤壁の賦』は中国文学の最高傑作とされる。豪放磊落な性格で、宋代の士大夫文化を代表する人物。", skill: { name: "赤壁の賦", desc: "被ダメージを75%カット", type: "damage_cut", value: 0.75, rate: 0.55 } },
  { id: 313, name: "陸九淵", power: 86, hp: 114, attribute: "CULTURE", desc: "南宋の儒学者。同時代の朱熹（朱子学）が提唱した「性即理（人間の本性は理である）」を批判し、人間の心そのものが宇宙の真理であるとする「心即理」を主張した。読書などの外的な知識よりも、内面的な心の修養を重んじ、後の明代の陽明学の源流となった。", skill: { name: "心即理", desc: "超低確率(10%)で相手のHPを1にする", type: "hp_to_one", rate: 0.1 } },
  { id: 314, name: "王陽明", power: 105, hp: 95, attribute: "CULTURE", desc: "明代の儒学者。南宋の陸九淵の「心即理」をさらに徹底・発展させ、認識（知）と実践（行）は一体不可分であるとする「知行合一」や、誰もが持つ正しい心の働きである「致良知」を説き、「陽明学」を確立。その実践的教えは幕末の日本の志士にも影響を与えた。", skill: { name: "知行合一", desc: "味方全体の歴史力+20%", type: "buff_all", value: 0.2, rate: 0.6 } },
  { id: 315, name: "黄宗羲", power: 98, hp: 102, attribute: "CULTURE", desc: "明末清初の思想家・陽明学者。明の滅亡後、清への仕官を拒否して学問に専念（考証学の先駆）。著書『明夷待訪録』において、天下の害の根本は皇帝の絶対的な独裁にあると痛烈な「君主専制批判」を展開し、のちの清末の革命思想家たちに発掘され評価された。", skill: { name: "君主専制の批判", desc: "敵全員の歴史力-20%", type: "debuff_all", value: 0.2, rate: 0.6 } },
  { id: 316, name: "マテオ・リッチ", power: 100, hp: 100, attribute: "CULTURE", desc: "イタリア出身のイエズス会宣教師。明の万暦帝の時代に中国へ渡る。西洋の進んだ科学知識を利用して知識人（徐光啓ら）と交流し、中国語で『天主実義』を著し、さらに精緻な世界地図『坤輿万国全図』を作成して、中国人の伝統的な中華思想的な世界観を打ち破った。", skill: { name: "坤輿万国全図", desc: "自身の歴史力+40%", type: "buff_self", value: 0.4, rate: 0.7 } },
  { id: 317, name: "アダム・シャール", power: 95, hp: 105, attribute: "CULTURE", desc: "ドイツ出身のイエズス会宣教師。中国名は湯若望。明末に徐光啓を助けて『崇禎暦書』の作成に参加し、明滅亡後も清の初代・順治帝に仕えて天文台長（欽天監監正）として「時憲暦」を制定。王朝の交代を生き抜き、西洋天文学の正確さを中国に定着させた。", skill: { name: "時憲暦の制定", desc: "相手の歴史力を-30%", type: "debuff_enemy", value: 0.3, rate: 0.7 } },
  { id: 318, name: "フェルビースト", power: 92, hp: 108, attribute: "CULTURE", desc: "フランドル（ベルギー）出身のイエズス会宣教師。中国名は南懐仁。清の康熙帝の厚い信任を受け、大砲の鋳造や天文台の観測機器の改修など技術面で活躍し、三藩の乱の鎮圧にも貢献。世界地図『坤輿全図』を制作した。", skill: { name: "大砲鋳造と暦学", desc: "相手が【軍事】なら自身の歴史力+50%", type: "cond_buff_self", target: "VALOR", value: 0.5, rate: 0.8 } },
  { id: 319, name: "カスティリオーネ", power: 94, hp: 106, attribute: "CULTURE", desc: "イタリア出身のイエズス会宣教師・画家。中国名は郎世寧。清の康熙・雍正・乾隆の三代の皇帝に宮廷画家として仕えた。西洋の遠近法や陰影法と中国の伝統的な画法を融合させた独自の画風を確立し、さらに円明園（西洋風の離宮）の設計にも大きく関わった。", skill: { name: "円明園の設計", desc: "相手が【政治】なら相手を-40%弱体化", type: "cond_debuff_enemy", target: "STRATEGY", value: 0.4, rate: 0.8 } },
  { id: 320, name: "ブーヴェ", power: 90, hp: 110, attribute: "CULTURE", desc: "フランス出身のイエズス会宣教師。中国名は白進。ルイ14世の命で清へ派遣され、康熙帝に幾何学などを教授。他の宣教師と共に中国初の実測全図である『皇輿全覧図』を完成させ、帰国後は康熙帝の偉大さをヨーロッパへ伝えた。", skill: { name: "皇輿全覧図の測量", desc: "自軍のHPを最大HPの20%回復", type: "heal_hp", value: 0.2, rate: 0.6 } },
  { id: 321, name: "トマス・アクィナス", power: 106, hp: 94, attribute: "CULTURE", desc: "中世ヨーロッパを代表する神学者。アリストテレス哲学を取り入れて、キリスト教の信仰と理性の見事な調和を目指したスコラ学の集大成である『神学大全』を著述。その思想はカトリック教会の公式な教義の基礎として絶対的な権威を持った。", skill: { name: "神学大全（スコラ学）", desc: "2戦目配置時、歴史力+45%", type: "cond_pos_buff", pos: 2, value: 0.45, rate: 0.8 } },
  { id: 322, name: "ウィリアム・オブ・オッカム", power: 98, hp: 102, attribute: "CULTURE", desc: "14世紀イギリスのスコラ学者。普遍（神や概念）は実在せず、個別の事物のみが実在し、普遍は単なる「名前」にすぎないとする「唯名論」を徹底して主張。信仰と理性を分離するこの思想は、近代的な経験論や科学的思考の発展への道を準備した。", skill: { name: "唯名論（オッカムの剃刀）", desc: "5戦目配置時、負け数\xD735%歴史力UP", type: "cond_pos_revenge", pos: 5, value: 0.35, rate: 0.9 } },
  { id: 323, name: "ロジャー・ベーコン", power: 95, hp: 105, attribute: "CULTURE", desc: "13世紀イギリスのスコラ学者・フランシスコ会修道士。神学的な権威に盲従するのではなく、実験と観察に基づく帰納法的な自然科学の研究をいち早く提唱した「驚異の博士」。イスラームの科学知識をヨーロッパに紹介した近代科学の先駆者の一人。", skill: { name: "実験と観察", desc: "自軍HP半分以下なら自身の歴史力+60%", type: "cond_pinch_buff", value: 0.6, rate: 0.8 } },
  { id: 324, name: "モンテーニュ", power: 100, hp: 100, attribute: "CULTURE", desc: "フランス・ルネサンス期のモラリスト。ユグノー戦争という凄惨な宗教対立を目の当たりにし、「ク・セ・ジュ？（私は何を知っているか）」と自問して人間の知の不完全さを自覚（懐疑主義）。寛容と自己探求の精神を綴った随筆集『エセー』を残した。", skill: { name: "ク・セ・ジュ？（懐疑主義）", desc: "自軍HP半分以下なら敵全体-35%", type: "cond_pinch_debuff_all", value: 0.35, rate: 0.8 } },
  { id: 325, name: "パスカル", power: 105, hp: 95, attribute: "CULTURE", desc: "17世紀フランスの天才的な数学者・物理学者・思想家。気圧の発見や計算機の発明など科学史に貢献する一方、宗教的な回心を経てキリスト教の護教論である『パンセ』を執筆。「人間は考える葦である」と、人間の偉大さと悲惨さを見事に表現した。", skill: { name: "人間は考える葦である", desc: "HP15%消費して自身の歴史力+60%", type: "sacrifice_buff", cost: 0.15, value: 0.6, rate: 0.8 } },
  { id: 326, name: "デカルト", power: 110, hp: 90, attribute: "CULTURE", desc: "17世紀フランスの哲学者・数学者。「近代哲学の父」。すべての知識を疑い尽くす方法的懐疑の末に、疑っている「私」の存在だけは疑えないとする「われ思う、ゆえにわれあり」の真理に到達し、演繹法による大陸合理論の確固たる基礎を築いた。", skill: { name: "われ思う、ゆえにわれあり", desc: "HP15%消費して相手を30%弱体化", type: "sacrifice_debuff", cost: 0.15, value: 0.3, rate: 0.8 } },
  { id: 327, name: "スピノザ", power: 102, hp: 98, attribute: "CULTURE", desc: "オランダの哲学者。ユダヤ教社会から破門されながらも独自の思想を貫いた。主著『エチカ』において、神とは自然や宇宙の法則そのものであるとする「汎神論」を主張。デカルトの二元論を克服し、すべてを幾何学的な論理で証明しようと試みた。", skill: { name: "汎神論の哲学", desc: "相手に最大HPの20%ダメージ", type: "fixed_damage", value: 0.2, rate: 0.6 } },
  { id: 328, name: "カンパネッラ", power: 85, hp: 115, attribute: "CULTURE", desc: "イタリア・ルネサンス末期の哲学者・修道士。スペインの支配からのナポリ解放を企てて発覚し、約30年間投獄された。獄中で執筆した『太陽の都』において、私有財産がなく、知識人である司祭が理知的に治める完全な共産主義的なユートピアを描いた。", skill: { name: "太陽の都", desc: "相手から最大HPの15%を吸収", type: "absorb_hp", value: 0.15, rate: 0.5 } },
  { id: 329, name: "ライプニッツ", power: 108, hp: 92, attribute: "CULTURE", desc: "17世紀ドイツの哲学者・数学者。ニュートンと独立に微積分法を発見。世界は分割不可能な精神的実体である無数の「単子（モナド）」から成り立ち、それらは神の定めた「予定調和」によって秩序づけられているという壮大な形而上学を構築した。", skill: { name: "モナドと予定調和", desc: "次の味方の歴史力を+30%強化", type: "inherit_buff", value: 0.3, rate: 0.7 } },
  { id: 330, name: "ボシュエ", power: 90, hp: 110, attribute: "CULTURE", desc: "17世紀フランスの神学者・司教。ルイ14世の宮廷説教官を務め、著書『政治学』において、国王の権力は神から直接授けられた神聖かつ絶対的なものであるとする「王権神授説」を強固に理論化し、フランス絶対王政を思想面から支え正当化した。", skill: { name: "王権神授説", desc: "次のラウンドの相手を-30%弱体化", type: "inherit_debuff", value: 0.3, rate: 0.7 } },
  { id: 331, name: "サルマナセル3世", power: 110, hp: 90, attribute: "VALOR", desc: "アッシリアの王。シリア方面へ遠征し、ダマスカスやイスラエルを屈服させオリエントの覇権を拡大。鉄製武器や騎兵・戦車を用いた強力な軍事力を背景に、残酷な征服と強制移住を行い周辺諸民族に恐れられた。", skill: { name: "鉄兵の威圧", desc: "自身の歴史力+35%", type: "buff_self", value: 0.35, rate: 0.7 } },
  { id: 332, name: "ピュロス", power: 114, hp: 86, attribute: "VALOR", desc: "古代ギリシア・エピロス王。ヘレニズム時代の優れた戦術家。ローマの南下に対し、タレントゥムを支援して出兵。象部隊を駆使してローマ軍を破るが、自軍も甚大な被害を出した「ピュロスの勝利」で知られる。", skill: { name: "犠牲の勝利", desc: "HP15%消費して相手を30%弱体化", type: "sacrifice_debuff", cost: 0.15, value: 0.3, rate: 0.8 } },
  { id: 333, name: "セプティミウス・セウェルス", power: 128, hp: 72, attribute: "VALOR", desc: "ローマ皇帝。五賢帝後の混乱期（内乱の年）を制してセウェルス朝を開く。軍事力を権力の基盤とし、軍団兵の給与引き上げや属州民からの兵士登用を推進。元老院を抑圧する軍人皇帝時代の先駆けとなった。", skill: { name: "軍団の重用", desc: "4戦目配置時、歴史力+45%", type: "cond_pos_buff", pos: 4, value: 0.45, rate: 0.8 } },
  { id: 334, name: "蒙恬", power: 137, hp: 63, attribute: "VALOR", desc: "秦の始皇帝に仕えた将軍。北方遊牧民の匈奴をオルドス地方から駆逐し、戦国諸国が築いていた長城を修築・連結して「万里の長城」を形成した。また、筆の改良者とも伝えられるが、始皇帝の死後に自刃に追い込まれた。", skill: { name: "長城の防衛", desc: "被ダメージを80%カット", type: "damage_cut", value: 0.8, rate: 0.5 } },
  { id: 335, name: "孫臏", power: 112, hp: 88, attribute: "VALOR", desc: "戦国時代の斉の兵法家・軍師。魏の龐涓の陰謀で両足を切断される刑を受けるが、斉に逃れて軍師となる。桂陵の戦いや馬陵の戦いで魏軍を大破し、著書『孫臏兵法』で数々の奇策を記した軍略の天才。", skill: { name: "馬陵の奇策", desc: "次のラウンドの相手を-30%弱体化", type: "inherit_debuff", value: 0.3, rate: 0.7 } },
  { id: 336, name: "竇憲", power: 100, hp: 100, attribute: "VALOR", desc: "後漢の武将。外戚として権力を握る。北匈奴に対する大規模な遠征軍を指揮し、アルタイ山脈を越えて大打撃を与えた。これにより北匈奴は西走し、後のヨーロッパにおけるゲルマン民族の大移動の遠因を作ったとされる。", skill: { name: "北匈奴の討伐", desc: "味方全体の歴史力+15%", type: "buff_all", value: 0.15, rate: 0.6 } },
  { id: 337, name: "郭子儀", power: 115, hp: 85, attribute: "VALOR", desc: "唐の中期の卓越した将軍。安史の乱において、ウイグルの援軍を引き出して長安と洛陽を奪還し、王朝の危機を救った最大の功臣。その後も吐蕃などの異民族の侵入を幾度も撃退し、四代の皇帝に仕え「中興の祖」と称えられた。", skill: { name: "中興の軍配", desc: "自軍のHPを最大HPの20%回復", type: "heal_hp", value: 0.2, rate: 0.6 } },
  { id: 338, name: "ジェベ", power: 118, hp: 82, attribute: "VALOR", desc: "モンゴル帝国のチンギス・ハンに仕えた猛将。もとは敵対部族であったが、その弓の腕を認められ「矢（ジェベ）」の名を与えられた。西遼（カラ・キタイ）を単独で滅ぼし、スボタイと共にカスピ海まで及ぶ大遠征を指揮した。", skill: { name: "必殺の矢", desc: "次の味方の歴史力を+35%強化", type: "inherit_buff", value: 0.35, rate: 0.8 } },
  { id: 339, name: "耶律大石", power: 106, hp: 94, attribute: "VALOR", desc: "遼（契丹）の皇族。金によって遼が滅ぼされたのち、残存勢力を率いて中央アジアへ逃れ、トルキスタンに西遼（カラ・キタイ）を建国。カトワーンの戦いでセルジューク朝を大破し、東西交易路を支配した。", skill: { name: "西遼の建国", desc: "自軍HP半分以下なら自身の歴史力+60%", type: "cond_pinch_buff", value: 0.6, rate: 0.8 } },
  { id: 340, name: "チャンドラグプタ", power: 105, hp: 95, attribute: "VALOR", desc: "古代インド・マウリヤ朝の建国者。アレクサンドロス大王の撤退後の混乱に乗じてナンダ朝を打倒し、北インドを統一。インダス川流域でセレウコス朝の軍を退け、強固な官僚制と常備軍を持つインド初の大帝国を築いた。", skill: { name: "マウリヤの統一", desc: "相手から最大HPの15%を吸収", type: "absorb_hp", value: 0.15, rate: 0.5 } },
  { id: 341, name: "マフムード", power: 122, hp: 78, attribute: "VALOR", desc: "ガズナ朝の最盛期の君主。熱烈なスンナ派信仰を持ち、北インドへ17回にも及ぶ大規模な略奪遠征を繰り返した。ヒンドゥー教の寺院を破壊して莫大な財宝を奪い、インドへのイスラーム教定着の端緒を開いた。", skill: { name: "偶像破壊の遠征", desc: "相手の歴史力を-30%", type: "debuff_enemy", value: 0.3, rate: 0.7 } },
  { id: 342, name: "シハーブッディーン", power: 110, hp: 90, attribute: "VALOR", desc: "ゴール朝の君主。ガズナ朝を滅ぼしてアフガニスタンを統一後、北インドへ本格的に侵攻。タラーインの戦いでラージプート族の連合軍を破り、デリーを占領。のちのデリー・スルタン朝成立の決定的な基礎を築いた。", skill: { name: "デリー制圧", desc: "敵全員の歴史力-15%", type: "debuff_all", value: 0.15, rate: 0.6 } },
  { id: 343, name: "ナーディル・シャー", power: 116, hp: 84, attribute: "VALOR", desc: "アフシャール朝の建国者。サファヴィー朝滅亡後のイランの混乱を収め、「第二のアレクサンドロス」と呼ばれた。ムガル帝国のデリーを略奪して孔雀の玉座を奪うなど、中東からインドにまたがる大覇権を一時的に築いた。", skill: { name: "孔雀の玉座略奪", desc: "相手に最大HPの25%ダメージ", type: "fixed_damage", value: 0.25, rate: 0.7 } },
  { id: 344, name: "フリードリヒ1世", power: 108, hp: 92, attribute: "VALOR", desc: "神聖ローマ皇帝。「赤髭王（バルバロッサ）」と呼ばれる。イタリア政策を推進してロンバルディア同盟や教皇と激しく抗争した。第3回十字軍の総司令官として出征したが、小アジアの河川で不慮の溺死を遂げた。", skill: { name: "赤髭王の進軍", desc: "相手が【政治】なら自身の歴史力+45%", type: "cond_buff_self", target: "STRATEGY", value: 0.45, rate: 0.8 } },
  { id: 345, name: "エドワード3世", power: 102, hp: 98, attribute: "VALOR", desc: "イギリス国王。フランス王位継承権を主張し、フランドル地方の羊毛支配を巡る対立も絡んで百年戦争を開始した。クレシーの戦いなどで自ら軍を指揮し、長弓隊を駆使して初期の戦局を優位に進めた。", skill: { name: "百年戦争開戦", desc: "HP10%消費して自身の歴史力+50%", type: "sacrifice_buff", cost: 0.1, value: 0.5, rate: 0.7 } },
  { id: 346, name: "アルバ公", power: 106, hp: 94, attribute: "VALOR", desc: "16世紀スペインの冷酷な将軍・政治家。フェリペ2世の命を受け、ネーデルラントへ総督として赴任。「血の審議会」を設置してエグモント伯ら新教徒を徹底的に弾圧し、オランダ独立戦争の引き金となった。", skill: { name: "血の審議会", desc: "相手が【文化】なら相手を-40%弱体化", type: "cond_debuff_enemy", target: "CULTURE", value: 0.4, rate: 1 } },
  { id: 347, name: "フアン・デ・アウストリア", power: 114, hp: 86, attribute: "VALOR", desc: "スペイン国王カルロス1世の庶子。1571年のレパントの海戦において、神聖同盟艦隊の総司令官を務め、無敵とされたオスマン帝国海軍を撃破し、地中海の制海権を守り抜いたキリスト教世界の英雄。", skill: { name: "レパントの勝利", desc: "自軍HP半分以下なら敵全体-35%", type: "cond_pinch_debuff_all", value: 0.35, rate: 0.9 } },
  { id: 348, name: "プリンツ・オイゲン", power: 115, hp: 85, attribute: "VALOR", desc: "フランス出身ながらオーストリアに仕えた天才的軍人。ゼンタの戦いでオスマン軍に大勝しカルロヴィッツ条約を引き出す。スペイン継承戦争でもマールバラ公と共にフランス軍を破り、ハプスブルク帝国を救った。", skill: { name: "帝国防衛の盾", desc: "5戦目配置時、これまでの負け数\xD735%歴史力UP", type: "cond_pos_revenge", pos: 5, value: 0.35, rate: 0.9 } },
  { id: 349, name: "クトゥーゾフ", power: 122, hp: 78, attribute: "VALOR", desc: "19世紀ロシアの老練な将軍。ナポレオンのロシア遠征において総司令官を務める。モスクワを明け渡す焦土作戦と冬将軍（厳冬）を利用した巧みな遅滞戦術で、無敵を誇ったフランスの大軍を完全に壊滅させた。", skill: { name: "冬将軍の到来", desc: "超低確率(10%)で相手のHPを1にする", type: "hp_to_one", rate: 0.1 } },
  { id: 350, name: "ブリュッヘル", power: 105, hp: 95, attribute: "VALOR", desc: "プロイセンの将軍。ナポレオン戦争で活躍し「前進元帥」と渾名された。ライプツィヒの戦いでの勝利に貢献し、ワーテルローの戦いでは、ウェリントンのイギリス軍の危機に駆けつけナポレオンに引導を渡した。", skill: { name: "前進元帥", desc: "味方全体の歴史力+20%", type: "buff_all", value: 0.2, rate: 0.5 } },
  { id: 351, name: "モルトケ", power: 118, hp: 82, attribute: "VALOR", desc: "19世紀プロイセンの参謀総長。「大モルトケ」。参謀本部を確立し、鉄道による迅速な部隊展開と電信を用いた近代的な軍事ドクトリンを創出。普墺戦争や普仏戦争で圧倒的な勝利を収めドイツ統一に貢献した。", skill: { name: "参謀本部の指揮", desc: "次の味方の歴史力を+40%強化", type: "inherit_buff", value: 0.4, rate: 0.8 } },
  { id: 352, name: "グラント", power: 110, hp: 90, attribute: "VALOR", desc: "アメリカ南北戦争における北軍の総司令官。ヴィックスバーグを陥落させてミシシッピ川を制圧し、のちにリー将軍率いる南軍を消耗戦で追い詰めアポマトックスで降伏させた。戦後は第18代大統領となった。", skill: { name: "消耗戦の完遂", desc: "自軍のHPを最大HPの25%回復", type: "heal_hp", value: 0.25, rate: 0.6 } },
  { id: 353, name: "スークレ", power: 102, hp: 98, attribute: "VALOR", desc: "南米独立運動の指導者。シモン・ボリバルの最も信頼する右腕。アヤクチョの戦いでスペイン軍を完全に打ち破り、ペルーの独立を決定づけた。のちに独立したアルト・ペルーはボリビアと命名され、初代大統領となった。", skill: { name: "アヤクチョの決戦", desc: "相手の歴史力を-25%", type: "debuff_enemy", value: 0.25, rate: 0.7 } },
  { id: 354, name: "コーンウォリス", power: 98, hp: 102, attribute: "VALOR", desc: "イギリスの将軍・政治家。アメリカ独立戦争においてイギリス南部軍を指揮したが、ヨークタウンの戦いで米仏連合軍に包囲されて降伏した。のちにインド総督に就任し、ザミンダール制の導入など植民地統治を立て直した。", skill: { name: "要塞防衛戦", desc: "被ダメージを80%カット", type: "damage_cut", value: 0.8, rate: 0.5 } },
  { id: 355, name: "マルシャン", power: 95, hp: 105, attribute: "VALOR", desc: "フランスの軍人。アフリカ横断政策を推し進め、1898年にスーダンのファショダに到達。縦断政策をとるイギリスのキッチナー軍と衝突した（ファショダ事件）。本国の指示で譲歩し撤退したが、英仏協商の契機となった。", skill: { name: "アフリカ横断", desc: "3戦目配置時、歴史力+50%", type: "cond_pos_buff", pos: 3, value: 0.5, rate: 0.8 } },
  { id: 356, name: "ルーデンドルフ", power: 112, hp: 88, attribute: "VALOR", desc: "第一次大戦のドイツの軍人。ヒンデンブルクと共にタンネンベルクの戦いでロシア軍を包囲殲滅。大戦後半は軍事独裁体制を敷き、無制限潜水艦作戦や春季大攻勢を強行したが敗北。戦後はミュンヘン一揆に参加した。", skill: { name: "総力戦の重圧", desc: "敵全員の歴史力-20%", type: "debuff_all", value: 0.2, rate: 0.6 } },
  { id: 357, name: "フォッシュ", power: 106, hp: 94, attribute: "VALOR", desc: "第一次大戦のフランスの元帥。大戦末期に連合国軍総司令官に就任。ドイツ軍の最後の大攻勢を阻止し、反撃を成功させてドイツを降伏に追い込んだ。戦後、ヴェルサイユ条約の甘さを「これは平和ではない」と批判した。", skill: { name: "反攻の司令官", desc: "相手から最大HPの20%を吸収", type: "absorb_hp", value: 0.2, rate: 0.6 } },
  { id: 358, name: "ペタン", power: 100, hp: 100, attribute: "VALOR", desc: "フランスの軍人。第一次大戦のヴェルダン要塞攻防戦で徹底抗戦しドイツ軍を防いだ英雄。しかし第二次大戦でドイツに降伏すると、ヴィシー政権の国家元首として対独協力を推進し、戦後は反逆罪で裁かれた。", skill: { name: "ヴェルダンの盾", desc: "HP20%消費して自身の歴史力+80%", type: "sacrifice_buff", cost: 0.2, value: 0.8, rate: 0.8 } },
  { id: 359, name: "ニミッツ", power: 115, hp: 85, attribute: "VALOR", desc: "第二次世界大戦におけるアメリカ太平洋艦隊司令長官。ミッドウェー海戦において暗号解読を駆使して日本海軍の主力空母4隻を撃沈し、戦局を完全に逆転させた。飛び石作戦を展開し、優れた戦略で日本本土に迫った。", skill: { name: "暗号解読の奇襲", desc: "相手に最大HPの25%ダメージ", type: "fixed_damage", value: 0.25, rate: 0.7 } },
  { id: 360, name: "マッカーサー", power: 120, hp: 80, attribute: "VALOR", desc: "アメリカの軍人。太平洋戦争でフィリピンを奪還。戦後はGHQの最高司令官として日本の非軍事化・民主化改革を主導したが、朝鮮戦争で中国への核攻撃を主張して大統領トルーマンと対立し解任された。", skill: { name: "GHQの司令", desc: "味方全体の歴史力+25%", type: "buff_all", value: 0.25, rate: 0.6 } },
  { id: 361, name: "リュクルゴス", power: 98, hp: 102, attribute: "STRATEGY", desc: "古代スパルタの伝説的な立法者。完全な軍国主義的規律を定めた「リュクルゴスの制」を確立したとされる。市民の平等な土地分配、厳格な共同集食などを規定し、少数の市民が多数の奴隷を支配する強固な国家体制を作った。", skill: { name: "スパルタの掟", desc: "HP10%消費して相手を25%弱体化", type: "sacrifice_debuff", cost: 0.1, value: 0.25, rate: 0.8 } },
  { id: 362, name: "ネルウァ", power: 90, hp: 110, attribute: "STRATEGY", desc: "ローマ帝国の五賢帝の最初の皇帝。元老院から推挙されて即位。ドミティアヌス暗殺後の混乱を収め、貧困層への食糧支援など穏健な政策を行った。自身の血筋にこだわらず優秀な将軍を養子にする素晴らしい先例を作った。", skill: { name: "養子帝の先例", desc: "自軍のHPを最大HPの20%回復", type: "heal_hp", value: 0.2, rate: 0.5 } },
  { id: 363, name: "ハドリアヌス", power: 62, hp: 138, attribute: "STRATEGY", desc: "ローマ帝国の五賢帝の3人目。帝国の拡大方針を放棄し、防衛と内政の充実に転換。ブリタニアに長大な「ハドリアヌスの長城」を築いた。また、法学者のユリアヌスに命じて『永久告示録』を編纂させた。", skill: { name: "防衛線の構築", desc: "被ダメージを80%カット", type: "damage_cut", value: 0.8, rate: 0.5 } },
  { id: 364, name: "アントニヌス・ピウス", power: 95, hp: 105, attribute: "STRATEGY", desc: "ローマ帝国の五賢帝の4人目。「ピウス（敬虔な人）」と呼ばれた。対外戦争を避け、元老院との協調を重んじて帝国に長きにわたる平和をもたらした。その治世は「パクス・ロマーナ」の最も幸福な絶頂期とされる。", skill: { name: "敬虔なる平和", desc: "味方全体の歴史力+15%", type: "buff_all", value: 0.15, rate: 0.5 } },
  { id: 365, name: "商鞅", power: 112, hp: 88, attribute: "STRATEGY", desc: "戦国時代の秦の孝公に仕えた法家。什伍の制の導入、度量衡の統一、軍功に応じた爵位の授与など、徹底した富国強兵の改革（変法）を断行。秦が天下統一するための強固な基盤を構築したが、恨みを買い車裂きの刑に処された。", skill: { name: "変法の断行", desc: "HP20%消費して自身の歴史力+80%", type: "sacrifice_buff", cost: 0.2, value: 0.8, rate: 0.8 } },
  { id: 366, name: "管仲", power: 108, hp: 92, attribute: "STRATEGY", desc: "春秋時代の斉の桓公に仕えた名宰相。製塩や鉄の生産を保護し、物価統制によって国力を高めた。「尊王攘夷」の旗印を掲げて諸侯をまとめ上げ、桓公を春秋時代で最初の覇者へと押し上げた。「管鮑の交わり」で有名。", skill: { name: "尊王攘夷の覇業", desc: "次の味方の歴史力を+35%強化", type: "inherit_buff", value: 0.35, rate: 0.7 } },
  { id: 367, name: "蘇秦", power: 104, hp: 96, attribute: "STRATEGY", desc: "戦国時代の縦横家。西方の強国・秦の脅威に対抗するため、東方の六国が同盟を結んで秦を封じ込める「合従（がっしょう）」の策を説いた。六国の宰相を兼任して秦の東進を長年防いだが、のちに暗殺された。", skill: { name: "合従の同盟", desc: "相手が【軍事】なら相手を-45%弱体化", type: "cond_debuff_enemy", target: "VALOR", value: 0.45, rate: 0.8 } },
  { id: 368, name: "張儀", power: 106, hp: 94, attribute: "STRATEGY", desc: "戦国時代の縦横家。秦に仕え、六国それぞれと秦が個別に同盟を結ぶことで、六国間の分断を図る「連衡（れんこう）」の策を成功させた。これにより秦は各個撃破の態勢を整え、天下統一への道筋を確実にした。", skill: { name: "連衡の分断", desc: "次のラウンドの相手を-30%弱体化", type: "inherit_debuff", value: 0.3, rate: 0.7 } },
  { id: 369, name: "賈誼", power: 92, hp: 108, attribute: "STRATEGY", desc: "前漢の文帝に仕えた政治家・思想家。諸侯王の領土を分割して権力を削ぐことや、匈奴に対する強硬策を建言し、中央集権体制の強化を目指した。彼の政策は後の武帝の時代に「推恩の令」として結実することになる。", skill: { name: "推恩の提言", desc: "自軍HP半分以下なら自身の歴史力+60%", type: "cond_pinch_buff", value: 0.6, rate: 0.8 } },
  { id: 370, name: "桓温", power: 110, hp: 90, attribute: "STRATEGY", desc: "東晋の政治家・将軍。成漢を滅ぼして蜀を平定し、華北へ三度の北伐を行って長安を一時奪還するなど大功を立てた。その軍事力を背景に朝廷を牛耳り、皇帝の廃立まで行って簒奪を企てたが、病に倒れ果たせなかった。", skill: { name: "北伐の野心", desc: "自身の歴史力+40%", type: "buff_self", value: 0.4, rate: 0.7 } },
  { id: 371, name: "孝文帝", power: 114, hp: 86, attribute: "STRATEGY", desc: "北魏の第6代皇帝。鮮卑の国家を漢人社会に適応させるため、均田制や三長制を実施して税収を安定化。さらに都を洛陽へ遷し、鮮卑の言語や服装を禁じる徹底した「漢化政策」を断行し、中華王朝としての権威を確立した。", skill: { name: "漢化政策", desc: "敵全員の歴史力-20%", type: "debuff_all", value: 0.2, rate: 0.6 } },
  { id: 372, name: "耶律楚材", power: 102, hp: 98, attribute: "STRATEGY", desc: "モンゴル帝国に仕えた契丹族の宰相。遊牧民による農地の牧草地化や虐殺を諫め、中国の伝統的な徴税制度や農耕社会の保護をチンギス・ハンやオゴデイに説得。帝国が定住民を安定して統治するための行政基盤を築いた。", skill: { name: "農耕の保護", desc: "相手から最大HPの15%を吸収", type: "absorb_hp", value: 0.15, rate: 0.6 } },
  { id: 373, name: "劉基", power: 108, hp: 92, attribute: "STRATEGY", desc: "明の太祖（朱元璋）の建国を補佐した軍師・政治家。字は伯温。朱元璋に天下取りの戦略を授け、元を北へ追い払う作戦を立案。建国後は衛所制や科挙の整備など制度構築に尽力したが、朱元璋の猜疑心を恐れ引退した。", skill: { name: "明の建国構想", desc: "2戦目配置時、歴史力+45%", type: "cond_pos_buff", pos: 2, value: 0.45, rate: 0.8 } },
  { id: 374, name: "曾国藩", power: 115, hp: 85, attribute: "STRATEGY", desc: "清末の漢人官僚。太平天国の乱の勃発に対し、正規軍に代わって郷里の湖南省で義勇軍「湘軍」を組織。近代兵器も導入して太平天国を鎮圧した。のちの洋務運動の先駆者となり、李鴻章らの優秀な人材を育成した。", skill: { name: "湘軍の組織", desc: "3戦目配置時、これまでの負け数\xD735%歴史力UP", type: "cond_pos_revenge", pos: 3, value: 0.35, rate: 0.9 } },
  { id: 375, name: "李鴻章", power: 118, hp: 82, attribute: "STRATEGY", desc: "清末の政治家。「淮軍」を組織して太平天国を鎮圧。「中体西用」を掲げる洋務運動の中心となり、北洋艦隊の創設など近代化を推進した。しかし日清戦争で敗北し下関条約に調印、義和団事件の事後処理も担った。", skill: { name: "洋務運動と外交", desc: "相手に最大HPの25%ダメージ", type: "fixed_damage", value: 0.25, rate: 0.6 } },
  { id: 376, name: "左宗棠", power: 106, hp: 94, attribute: "STRATEGY", desc: "清末の政治家。曾国藩と共に太平天国の鎮圧に貢献し洋務運動を推進。ヤクブ・ベクの反乱により独立状態となっていた新疆へ遠征し、イリ地方を占領していたロシアを退けて清の領土として完全に奪還した功臣。", skill: { name: "新疆の奪還", desc: "相手の歴史力を-30%", type: "debuff_enemy", value: 0.3, rate: 0.7 } },
  { id: 377, name: "梁啓超", power: 96, hp: 104, attribute: "STRATEGY", desc: "清末のジャーナリスト・思想家。康有為と共に変法自強運動を推進。政変で日本へ亡命後も『新民叢報』を発行し、立憲思想やナショナリズムを啓蒙。新しい国民のあり方を説き、中国近代化に多大な思想的影響を与えた。", skill: { name: "新民の啓蒙", desc: "超低確率(10%)で相手のHPを1にする", type: "hp_to_one", rate: 0.1 } },
  { id: 378, name: "ハルシャ・ヴァルダナ", power: 100, hp: 100, attribute: "STRATEGY", desc: "7世紀インドのヴァルダナ朝の建国者。グプタ朝滅亡後の北インドの混乱を収拾し、カナウジを都として統一。仏教を厚く保護し、訪印した唐の玄奘を優遇した。彼が死ぬと王国は急速に崩壊し、ラージプート時代へ突入した。", skill: { name: "北インドの再統一", desc: "自軍のHPを最大HPの20%回復", type: "heal_hp", value: 0.2, rate: 0.5 } },
  { id: 379, name: "シャー・ジャハーン", power: 105, hp: 95, attribute: "STRATEGY", desc: "ムガル帝国の第5代皇帝。デカン高原を平定して帝国の領土を拡大し、首都をデリーへ遷した。愛妃のために巨大な大理石の墓廟「タージ・マハル」を建造するなど、インド・イスラーム文化の絶頂期を演出した。", skill: { name: "建築の情熱", desc: "相手が【文化】なら自身の歴史力+50%", type: "cond_buff_self", target: "CULTURE", value: 0.5, rate: 0.8 } },
  { id: 380, name: "タフマースプ1世", power: 102, hp: 98, attribute: "STRATEGY", desc: "サファヴィー朝の第2代王。即位初期はオスマン帝国のスレイマン1世の度重なる侵攻を受けたが、都をガズヴィーンへ遷して粘り強く防衛。国家体制を再編し、ペルシア絨毯の生産などを奨励して文化を発展させた。", skill: { name: "焦土と遷都", desc: "自軍HP半分以下なら敵全体-30%", type: "cond_pinch_debuff_all", value: 0.3, rate: 0.8 } },
  { id: 381, name: "セリム3世", power: 90, hp: 110, attribute: "STRATEGY", desc: "オスマン帝国末期のスルタン。西洋式の新軍（ニザーム・ジェディード）を創設して軍隊や行政の近代化を試みた。しかし、特権を失うことを恐れた旧軍のイェニチェリや保守派の激しい反乱に遭い、廃位・暗殺された。", skill: { name: "新軍の創設", desc: "HP10%消費して相手を25%弱体化", type: "sacrifice_debuff", cost: 0.1, value: 0.25, rate: 0.7 } },
  { id: 382, name: "アブデュルメジト1世", power: 98, hp: 102, attribute: "STRATEGY", desc: "オスマン帝国のスルタン。1839年にギュルハネ勅令を発布し、法の下の平等や近代的な諸制度の確立を目指す「タンジマート（恩恵的改革）」を開始した。クリミア戦争では英仏の支援を得てロシアに勝利した。", skill: { name: "ギュルハネ勅令", desc: "味方全体の歴史力+20%", type: "buff_all", value: 0.2, rate: 0.6 } },
  { id: 383, name: "ミドハト・パシャ", power: 110, hp: 90, attribute: "STRATEGY", desc: "オスマン帝国の宰相。タンジマートの総決算として、1876年にアジア初の近代的な憲法「ミドハト憲法」の制定を主導。二院制や信教の自由を定めたが、露土戦争の勃発を理由に皇帝によって憲法は停止され、追放された。", skill: { name: "アジア初の憲法", desc: "次のラウンドの相手を-30%弱体化", type: "inherit_debuff", value: 0.3, rate: 0.7 } },
  { id: 384, name: "ヘンリ2世", power: 104, hp: 96, attribute: "STRATEGY", desc: "イギリス・プランタジネット朝の初代国王。フランス国内に広大なアンジュー帝国を保有。巡回裁判所を設けてコモン・ロー（イギリス慣習法）の基礎を築いた。トマス・ベケットを暗殺して教会への統制を強めようとした。", skill: { name: "コモン・ロー", desc: "被ダメージを80%カット", type: "damage_cut", value: 0.8, rate: 0.5 } },
  { id: 385, name: "エドワード1世", power: 108, hp: 92, attribute: "STRATEGY", desc: "イギリスの国王。ウェールズを征服し、スコットランドへも侵攻。1295年、大貴族や高位聖職者に加え、各州の騎士と各都市の市民の代表を招集した「模範議会」を開き、イギリス身分制議会の完全な原型を作り上げた。", skill: { name: "模範議会", desc: "相手から最大HPの15%を吸収", type: "absorb_hp", value: 0.15, rate: 0.6 } },
  { id: 386, name: "アンリ4世", power: 112, hp: 88, attribute: "STRATEGY", desc: "フランス・ブルボン朝の初代国王。自身はユグノーの指導者であったが、即位にあたりカトリックに改宗。1598年にナントの王令を発布してユグノーの信仰の自由を認め、長きにわたる凄惨なユグノー戦争を終結させた。", skill: { name: "ナントの王令", desc: "自軍のHPを最大HPの25%回復", type: "heal_hp", value: 0.25, rate: 0.6 } },
  { id: 387, name: "フーシェ", power: 116, hp: 84, attribute: "STRATEGY", desc: "フランスの冷徹な政治家。警察長官として秘密警察やスパイ網を張り巡らせ、ロベスピエールの処刑やナポレオンの台頭など全ての政変を裏で操った。革命から帝政、王政復古までどんな体制下でも生き延びた「カメレオン」。", skill: { name: "秘密警察の暗躍", desc: "相手に最大HPの20%ダメージ", type: "fixed_damage", value: 0.2, rate: 0.7 } },
  { id: 388, name: "ティエール", power: 100, hp: 100, attribute: "STRATEGY", desc: "19世紀フランスの政治家。普仏戦争で敗北し崩壊した第二帝政ののち、臨時政府の行政長官となりドイツと講和条約を結ぶ。これに反対して蜂起した史上初の労働者政権「パリ・コミューン」を武力で冷酷に鎮圧した。", skill: { name: "コミューン鎮圧", desc: "敵全員の歴史力-15%", type: "debuff_all", value: 0.15, rate: 0.6 } },
  { id: 389, name: "クレマンソー", power: 114, hp: 86, attribute: "STRATEGY", desc: "第一次大戦期のフランス首相。「虎」の異名を持つ。パリ講和会議においてはドイツに対する徹底的な報復と弱体化を強硬に主張し、巨額の賠償金と領土の割譲を定めた過酷なヴェルサイユ条約を主導した。", skill: { name: "対独報復の虎", desc: "HP15%消費して自身の歴史力+70%", type: "sacrifice_buff", cost: 0.15, value: 0.7, rate: 0.8 } },
  { id: 390, name: "ロイド・ジョージ", power: 108, hp: 92, attribute: "STRATEGY", desc: "第一次大戦期のイギリス首相。総力戦体制を構築して戦争を指導。パリ講和会議ではイギリスの国益（艦隊削減や植民地）を確保しつつ、フランスの過度な復讐要求を抑えようと努め、ヴェルサイユ体制の形成に貢献した。", skill: { name: "総力戦の指導", desc: "自軍HP半分以下なら自身の歴史力+50%", type: "cond_pinch_buff", value: 0.5, rate: 0.8 } },
  { id: 391, name: "イソップ", power: 85, hp: 115, attribute: "CULTURE", desc: "古代ギリシアの寓話作家。もとはサモス島の奴隷であったと伝えられる。動物を擬人化して人間の愚かさや教訓を風刺的に描いた『イソップ寓話』（「ウサギとカメ」など）の作者とされ、世界中で現在も読み継がれている。", skill: { name: "動物たちの寓話", desc: "次のラウンドの相手を-25%弱体化", type: "inherit_debuff", value: 0.25, rate: 0.8 } },
  { id: 392, name: "サッフォー", power: 82, hp: 118, attribute: "CULTURE", desc: "古代ギリシアのレスボス島出身の女性叙情詩人。恋愛や女性の美しい感情を、神話にとらわれない個人の率直な言葉で詠い上げた。プラトンからは「十番目のムーサ（芸術の女神）」と絶賛された偉大な詩人。", skill: { name: "十番目のムーサ", desc: "自軍のHPを最大HPの20%回復", type: "heal_hp", value: 0.2, rate: 0.6 } },
  { id: 393, name: "ディオゲネス", power: 88, hp: 112, attribute: "CULTURE", desc: "ヘレニズム時代のキュニコス派（犬儒学派）の哲学者。富や名誉、社会的慣習を完全に否定し、樽の中に住んで乞食生活を送った。アレクサンドロス大王の訪問に対し「日陰になるからそこをどいてくれ」と言い放った。", skill: { name: "樽の中の犬", desc: "超低確率(10%)で相手のHPを1にする", type: "hp_to_one", rate: 0.1 } },
  { id: 394, name: "プロタゴラス", power: 96, hp: 104, attribute: "CULTURE", desc: "古代アテネで活躍したソフィスト。「人間は万物の尺度である」と説き、真理や道徳は絶対的なものではなく、個人や社会によって異なるという「相対主義」を主張した。この思想はのちにソクラテスの批判を浴びることになる。", skill: { name: "万物の尺度", desc: "相手が【政治】なら相手を-45%弱体化", type: "cond_debuff_enemy", target: "STRATEGY", value: 0.45, rate: 0.8 } },
  { id: 395, name: "ヒポクラテス", power: 92, hp: 108, attribute: "CULTURE", desc: "古代ギリシアの医師。「医学の父」と呼ばれる。病気を神々の罰とする迷信を排し、食事や環境といった自然科学的な原因に基づいて診断と治療を行った。医師の職業倫理を定めた「ヒポクラテスの誓い」でも知られる。", skill: { name: "医学の父", desc: "相手から最大HPの15%を吸収", type: "absorb_hp", value: 0.15, rate: 0.6 } },
  { id: 396, name: "ピンダロス", power: 90, hp: 110, attribute: "CULTURE", desc: "古代ギリシア最大の叙情詩人。オリンピアの祭典などで優勝した競技者や出身ポリスの栄光を、格調高く荘厳な合唱隊の祝勝歌として詠い上げた。ペルシア戦争期のギリシア人の誇りと神々への畏敬を見事に表現した。", skill: { name: "荘厳な祝勝歌", desc: "味方全体の歴史力+20%", type: "buff_all", value: 0.2, rate: 0.5 } },
  { id: 397, name: "クインティリアヌス", power: 98, hp: 102, attribute: "CULTURE", desc: "ローマ帝国時代の修辞学者。ローマ初の公立学校の教師となる。名著『弁論家教育』を著し、単なる弁論の技術にとどまらず、幼少期からの道徳的・全人的な教育の重要性を説き、ルネサンス期の教育思想に多大な影響を与えた。", skill: { name: "弁論家教育", desc: "次の味方の歴史力を+35%強化", type: "inherit_buff", value: 0.35, rate: 0.7 } },
  { id: 398, name: "ユウェナリス", power: 94, hp: 106, attribute: "CULTURE", desc: "ローマ帝国時代の風刺詩人。繁栄の裏で退廃するローマ社会の現実や、堕落した貴族を痛烈に批判した。「パンと見世物」という言葉を残し、ローマ市民が政治的権利を放棄して娯楽に溺れる様を嘆いた。", skill: { name: "パンと見世物", desc: "HP10%消費して相手を25%弱体化", type: "sacrifice_debuff", cost: 0.1, value: 0.25, rate: 0.8 } },
  { id: 399, name: "荘子", power: 75, hp: 125, attribute: "CULTURE", desc: "戦国時代の道家思想の代表的な思想家。人為的な道徳や制度を否定。「万物斉同」を唱え、すべての価値基準を超越して、無為自然のままに宇宙の絶対的な道（タオ）と一体化する絶対的自由の境地を説いた。", skill: { name: "胡蝶の夢", desc: "5戦目配置時、これまでの負け数\xD740%歴史力UP", type: "cond_pos_revenge", pos: 5, value: 0.4, rate: 0.9 } },
  { id: 400, name: "孟子", power: 110, hp: 90, attribute: "CULTURE", desc: "戦国時代の儒家の思想家。人間の本性は善であるとする「性善説」を主張。君主は仁義に基づく王道政治を行うべきだと説き、君主が人民を苦しめれば天命が革まるという「易姓革命」の理論を展開した。", skill: { name: "王道と性善説", desc: "相手が【軍事】なら自身の歴史力+50%", type: "cond_buff_self", target: "VALOR", value: 0.5, rate: 0.8 } },
  { id: 401, name: "荀子", power: 108, hp: 92, attribute: "CULTURE", desc: "戦国時代の儒家。孟子を批判し、人間の本性は悪であり、欲望のままに行動すれば争いが起きるとする「性悪説」を主張。そのため、後天的な学習や「礼」という外的規範によって人間を教化すべきだと説いた。", skill: { name: "性悪説の教化", desc: "被ダメージを80%カット", type: "damage_cut", value: 0.8, rate: 0.5 } },
  { id: 402, name: "韓非", power: 115, hp: 85, attribute: "CULTURE", desc: "戦国時代の法家の集大成者。荀子の性悪説の影響を受け、儒家の道徳による統治を否定。君主は厳格な法律（法）と、臣下を操る権謀術数（術）によってのみ国家を統治すべきであると主張し、始皇帝に絶賛された。", skill: { name: "法と術の支配", desc: "相手に最大HPの20%ダメージ", type: "fixed_damage", value: 0.2, rate: 0.7 } },
  { id: 403, name: "墨子", power: 61, hp: 139, attribute: "CULTURE", desc: "戦国時代の思想家で墨家の祖。儒家の家族愛を差別的として批判し、無差別の博愛「兼愛」と、相互利益「交利」を説いた。また侵略戦争を絶対悪として否定する「非攻」を掲げ、強力な防衛集団を組織して平和を訴えた。", skill: { name: "兼愛交利・非攻", desc: "敵全員の歴史力-20%", type: "debuff_all", value: 0.2, rate: 0.6 } },
  { id: 404, name: "屈原", power: 96, hp: 104, attribute: "CULTURE", desc: "戦国時代の楚の悲劇の詩人。王に忠誠を尽くしたが追放された。国の行く末を憂いて詠んだ長編詩「離騒」は中国文学の源流である『楚辞』の代表作。楚の首都が秦に陥落したことを悲しみ汨羅の淵に入水自殺した。", skill: { name: "楚辞の悲哀", desc: "HP15%消費して自身の歴史力+60%", type: "sacrifice_buff", cost: 0.15, value: 0.6, rate: 0.8 } },
  { id: 405, name: "左思", power: 86, hp: 114, attribute: "CULTURE", desc: "西晋の文学者。三国時代の各首都の繁栄を描いた『三都賦』を著した。この作品が優れていたため、都の洛陽で人々がこぞって紙に書き写した結果、「洛陽の紙価を高める」というベストセラーを意味する言葉の語源となった。", skill: { name: "洛陽の紙価", desc: "2戦目配置時、歴史力+40%", type: "cond_pos_buff", pos: 2, value: 0.4, rate: 0.8 } },
  { id: 406, name: "謝霊運", power: 92, hp: 108, attribute: "CULTURE", desc: "南朝宋の時代の貴族・詩人。政治的な不遇から山水に心を寄せ、自然の美しさや旅の情景を華麗な言葉で詠んだ。中国文学における「山水詩」の分野を確立し、唐代の自然詩人に決定的な影響を与えた。", skill: { name: "山水詩の開拓", desc: "自軍のHPを最大HPの25%回復", type: "heal_hp", value: 0.25, rate: 0.6 } },
  { id: 407, name: "昭明太子", power: 100, hp: 100, attribute: "CULTURE", desc: "南朝梁の武帝の長子。周代から梁の時代に至るまでの優れた詩文を、美しく華麗な四六駢儷体を中心に厳選して編纂したアンソロジー『文選（もんぜん）』を残した。日本にも伝わり平安貴族の必読書となった。", skill: { name: "文選の編纂", desc: "自身の歴史力+35%", type: "buff_self", value: 0.35, rate: 0.7 } },
  { id: 408, name: "呉道玄", power: 110, hp: 90, attribute: "CULTURE", desc: "唐代の「画聖」。躍動感あふれる筆致で人物画や仏画を描き、独自の線描（呉装）を完成させた。長安の寺院に描いた『地獄変相図』はその恐ろしさで罪人を改心させたと伝わる。後世の中国絵画の手本とされた。", skill: { name: "画聖の筆致", desc: "自軍HP半分以下なら敵全体-35%", type: "cond_pinch_debuff_all", value: 0.35, rate: 0.8 } },
  { id: 409, name: "顔真卿", power: 126, hp: 74, attribute: "CULTURE", desc: "唐代の書家。王羲之の優美な書風に対し、力強く剛健で堂々とした革新的な書風（顔法）を確立し、後の書道史に多大な影響を与えた。安史の乱において義勇軍を率いて徹底抗戦し、唐王朝への忠誠を貫いた忠臣。", skill: { name: "剛健なる顔法", desc: "相手の歴史力を-30%", type: "debuff_enemy", value: 0.3, rate: 0.7 } },
  { id: 410, name: "周敦頤", power: 106, hp: 94, attribute: "CULTURE", desc: "北宋の儒学者。『太極図説』を著し、道教の宇宙生成論を取り入れて、万物の生成と人間の道徳の根源を哲学的に説明しようとした。彼の思想は、のちの朱熹によって体系化される「宋学（朱子学）」の事実上の開祖とされる。", skill: { name: "太極の探求", desc: "自軍HP半分以下なら自身の歴史力+60%", type: "cond_pinch_buff", value: 0.6, rate: 0.8 } },
  { id: 411, name: "郭守敬", power: 112, hp: 88, attribute: "CULTURE", desc: "元のフビライ・ハンに仕えた天文学者。イスラーム天文学の進んだ観測技術を取り入れ、一年の長さを365.2425日とする極めて精緻な「授時暦」を作成した。これは後に江戸時代の貞享暦のモデルとなった。", skill: { name: "精緻なる授時暦", desc: "次の味方の歴史力を+40%強化", type: "inherit_buff", value: 0.4, rate: 0.8 } },
  { id: 412, name: "フィルドゥーシー", power: 98, hp: 102, attribute: "CULTURE", desc: "ガズナ朝のマフムードに仕えたイランの国民的詩人。アラビア語の影響を排し、純粋な近世ペルシア語を用いて、イラン建国からササン朝滅亡までの歴史と神話を描いた壮大な民族叙事詩『シャー・ナーメ（王書）』を完成させた。", skill: { name: "王書の叙事詩", desc: "味方全体の歴史力+20%", type: "buff_all", value: 0.2, rate: 0.6 } },
  { id: 413, name: "ウマル・ハイヤーム", power: 108, hp: 92, attribute: "CULTURE", desc: "セルジューク朝の天才的な数学者・天文学者。極めて正確な太陽暦（ジャラーリー暦）の制定に貢献した。また、人生の無常や酒の楽しみを詠んだ四行詩集『ルバイヤート』の作者としても世界的に知られる。", skill: { name: "ルバイヤート", desc: "相手から最大HPの15%を吸収", type: "absorb_hp", value: 0.15, rate: 0.6 } },
  { id: 414, name: "サアディー", power: 102, hp: 98, attribute: "CULTURE", desc: "イルハン朝支配下のイラン出身の詩人。モンゴルの侵略を逃れてイスラーム世界を広く旅した経験をもとに、道徳的な教訓を美しい散文と詩で綴った『薔薇園（ゴレスターン）』と『果樹園』を著した。", skill: { name: "薔薇園の教訓", desc: "被ダメージを75%カット", type: "damage_cut", value: 0.75, rate: 0.55 } },
  { id: 415, name: "ジョット", power: 114, hp: 86, attribute: "CULTURE", desc: "14世紀初頭のイタリアの画家。ルネサンス美術の真の先駆者。ビザンツ様式の平面的表現から脱却し、フレスコ画において人物の立体感や人間らしい自然な感情表現を描き出し、近代絵画の扉を開いた。", skill: { name: "ルネサンスの曙", desc: "次のラウンドの相手を-30%弱体化", type: "inherit_debuff", value: 0.3, rate: 0.7 } },
  { id: 416, name: "ドナテルロ", power: 104, hp: 96, attribute: "CULTURE", desc: "15世紀フィレンツェの天才彫刻家。古代ローマの彫刻を深く研究し、中世以来初となる等身大の裸体丸彫り彫刻『ダヴィデ像』を制作。さらに遠近法を用いた浅浮き彫りを考案し、彫刻に劇的なリアリズムをもたらした。", skill: { name: "リアリズム彫刻", desc: "相手に最大HPの20%ダメージ", type: "fixed_damage", value: 0.2, rate: 0.6 } },
  { id: 417, name: "ボッティチェリ", power: 110, hp: 90, attribute: "CULTURE", desc: "15世紀後半フィレンツェのルネサンスの画家。新プラトン主義の思想に影響を受け、キリスト教の主題だけでなく、神話を題材とした優美で神秘的な『ヴィーナスの誕生』や『春（プリマヴェーラ）』を描いた。", skill: { name: "ヴィーナスの誕生", desc: "HP15%消費して自身の歴史力+60%", type: "sacrifice_buff", cost: 0.15, value: 0.6, rate: 0.8 } },
  { id: 418, name: "ブルネレスキ", power: 115, hp: 85, attribute: "CULTURE", desc: "15世紀フィレンツェのルネサンス初期を代表する建築家。ローマのパンテオンなどの古代建築を研究。フィレンツェ大聖堂において、巨大な八角形のドーム（大円蓋）を足場なしで建造する画期的な工法を成し遂げた。", skill: { name: "大円蓋の奇跡", desc: "自軍のHPを最大HPの25%回復", type: "heal_hp", value: 0.25, rate: 0.6 } },
  { id: 419, name: "ファン・アイク", power: 105, hp: 95, attribute: "CULTURE", desc: "15世紀フランドルの画家。油彩画（油絵）の技法を完成させた。代表作『ゲントの祭壇画』や『アルノルフィーニ夫妻の肖像』に見られるように、北欧特有の極めて細密な写実主義と鮮やかな色彩表現で描いた。", skill: { name: "油彩画の完成", desc: "敵全員の歴史力-20%", type: "debuff_all", value: 0.2, rate: 0.6 } },
  { id: 420, name: "デューラー", power: 118, hp: 82, attribute: "CULTURE", desc: "16世紀ドイツのルネサンスを代表する画家・版画家。イタリアへ遊学して遠近法などの最先端理論を学び、ドイツの伝統的な精密さと融合させた。卓越した技術で『四人の使徒』などの油彩画や、数多くの優れた版画を残した。", skill: { name: "精密なる版画", desc: "3戦目配置時、歴史力+50%", type: "cond_pos_buff", pos: 3, value: 0.5, rate: 0.8 } },
  { id: 421, name: "ハミルカル・バルカ", power: 110, hp: 90, attribute: "VALOR", desc: "カルタゴの将軍で名将ハンニバルの父。第一次ポエニ戦争においてシチリア島でローマ軍と激闘を展開。敗戦後、イベリア半島（ヒスパニア）へ渡って新カルタゴ（カルタゴ・ノウァ）を建設。豊かな銀山を開発してカルタゴの国力と軍事力を再建し、のちの第二次ポエニ戦争の強固な基盤を作った。", skill: { name: "ヒスパニアの銀", desc: "味方全体の歴史力+20%", type: "buff_all", value: 0.2, rate: 0.6 } },
  { id: 422, name: "アルキビアデス", power: 104, hp: 96, attribute: "VALOR", desc: "古代アテネの政治家・将軍。ソクラテスの弟子。ペロポネソス戦争においてシチリア遠征を主導したが、冒涜事件の嫌疑でスパルタへ亡命しアテネの弱点を密告。その後ペルシアに逃れ、再びアテネ軍の指揮官に返り咲くなど、類まれな才能と裏切りでギリシア世界を翻弄した。", skill: { name: "裏切りの策謀", desc: "敵全員の歴史力-15%", type: "debuff_all", value: 0.15, rate: 0.6 } },
  { id: 423, name: "ペロピダス", power: 108, hp: 92, attribute: "VALOR", desc: "古代ギリシア・テーベの将軍。エパメイノンダスと共に活躍。スパルタの占領下にあったテーベを奇襲によって解放し、精鋭部隊「神聖隊」を組織して軍備を強化。レウクトラの戦いにおいて斜線陣を指揮してスパルタ軍を大破し、テーベの覇権を確立した立役者。", skill: { name: "神聖隊の突撃", desc: "自身の歴史力+35%", type: "buff_self", value: 0.35, rate: 0.7 } },
  { id: 424, name: "フラミニヌス", power: 106, hp: 94, attribute: "VALOR", desc: "共和政ローマの将軍。第二次マケドニア戦争においてキュノスケファライの戦いでマケドニアのファランクス（密集陣形）をローマのレギオン（軍団）で打ち破る。イストミア大祭で「ギリシアの自由」を宣言し、ローマによるギリシア世界の保護（実質的支配）を開始した。", skill: { name: "ギリシアの解放者", desc: "相手の歴史力を-25%", type: "debuff_enemy", value: 0.25, rate: 0.7 } },
  { id: 425, name: "アグリコラ", power: 105, hp: 95, attribute: "VALOR", desc: "ローマ帝国初期の将軍。歴史家タキトゥスの義父。ブリタニア（現在のイギリス）総督として遠征軍を指揮し、ウェールズやスコットランドの奥深くまで進軍してローマの支配領域を大幅に拡大。また、要塞やローマ風の都市を建設して属州のローマ化を力強く推進した。", skill: { name: "ブリタニア征服", desc: "相手が【政治】なら自身の歴史力+50%", type: "cond_buff_self", target: "STRATEGY", value: 0.5, rate: 0.8 } },
  { id: 426, name: "マクシミヌス・トラクス", power: 112, hp: 88, attribute: "VALOR", desc: "ローマ帝国の最初の「軍人皇帝」。トラキアの農民出身の一介の兵士から、その並外れた体格と武勇で軍団の支持を集め、セウェルス・アレクサンデル帝を暗殺して即位。元老院を無視して軍事費を搾り取りゲルマン人と戦ったが、内乱を招き部下に暗殺された。", skill: { name: "軍団の推戴", desc: "相手が【文化】なら相手を-40%弱体化", type: "cond_debuff_enemy", target: "CULTURE", value: 0.4, rate: 0.9 } },
  { id: 427, name: "ヌールッディーン", power: 108, hp: 92, attribute: "VALOR", desc: "ザンギー朝の君主。十字軍国家であるエデッサ伯国を滅ぼした父の遺志を継ぎ、ダマスクスを併合してシリアを統一。部下のシルクーフとサラディンを派遣してエジプトを影響下に置き、第2回十字軍を撃退してイスラーム世界の大反攻の強固な基礎を築き上げた。", skill: { name: "シリア統一", desc: "自軍のHPを最大HPの20%回復", type: "heal_hp", value: 0.2, rate: 0.6 } },
  { id: 428, name: "イスマーイール1世", power: 114, hp: 86, attribute: "VALOR", desc: "サファヴィー朝の初代シャー（王）。神秘主義教団の長としてトルコ系遊牧民の軍事集団クズルバシュ（紅頭）を率いてイランを統一。十二イマーム派（シーア派）を国教と定めて国民の結束を図ったが、チャルディラーンの戦いでオスマン帝国に敗北した。", skill: { name: "クズルバシュの突撃", desc: "1戦目配置時、歴史力+45%", type: "cond_pos_buff", pos: 1, value: 0.45, rate: 0.8 } },
  { id: 429, name: "鄭和", power: 100, hp: 100, attribute: "VALOR", desc: "明の永楽帝に仕えたイスラーム教徒の宦官。巨大な宝船（ほうせん）からなる大艦隊を率いて、東南アジアからインド洋、アフリカ東岸（マリンディ）に至るまで計7回の大遠征を指揮。諸国に明の威信を示して朝貢を促し、華僑進出の契機を作った偉大な提督。", skill: { name: "南海の大遠征", desc: "5戦目配置時、負け数\xD735%歴史力UP", type: "cond_pos_revenge", pos: 5, value: 0.35, rate: 0.9 } },
  { id: 430, name: "戚継光", power: 106, hp: 94, attribute: "VALOR", desc: "明代後期の卓越した武将。当時、中国沿岸部を荒らしまわっていた後期倭寇（密貿易を行う海賊）の討伐を命じられる。農民を訓練して「戚家軍」と呼ばれる規律正しい精鋭部隊を編制し、兵法を駆使して倭寇を完全に平定し、沿岸部に平和を取り戻した。", skill: { name: "倭寇討伐", desc: "自軍HP半分以下なら自身の歴史力+60%", type: "cond_pinch_buff", value: 0.6, rate: 0.8 } },
  { id: 431, name: "鄭成功", power: 115, hp: 85, attribute: "VALOR", desc: "明末清初の軍人。「国姓爺」と呼ばれる。滅亡した明の復興（反清復明）を掲げて清軍と激しく抗戦。オランダ東インド会社を台湾から駆逐して拠点を築き、台湾独自の政権を樹立した。のちに日本の近松門左衛門の人形浄瑠璃『国性爺合戦』のモデルとなった。", skill: { name: "反清復明", desc: "自軍HP半分以下なら敵全体-35%", type: "cond_pinch_debuff_all", value: 0.35, rate: 0.8 } },
  { id: 432, name: "カール10世", power: 110, hp: 90, attribute: "VALOR", desc: "17世紀スウェーデンの国王。「北方戦争」を引き起こし、バルト海覇権を目指す。真冬の凍結した海峡を軍隊を率いて渡るという神業的な「氷上侵攻」を成功させてデンマークの首都コペンハーゲンを急襲し、ロスキレ条約で領土を割譲させた猛将。", skill: { name: "氷海越えの奇襲", desc: "HP15%消費して自身の歴史力+60%", type: "sacrifice_buff", cost: 0.15, value: 0.6, rate: 0.8 } },
  { id: 433, name: "スヴォーロフ", power: 118, hp: 82, attribute: "VALOR", desc: "18世紀ロシアの伝説的な常勝将軍。エカチェリーナ2世に仕え、露土戦争やプガチョフの乱の鎮圧、ポーランド分割におけるワルシャワ制圧などで圧倒的な戦功を挙げた。厳しい訓練と機動力を重んじ、生涯において一度も戦闘で敗北しなかったとされる。", skill: { name: "常勝の用兵", desc: "HP10%消費して相手を25%弱体化", type: "sacrifice_debuff", cost: 0.1, value: 0.25, rate: 0.8 } },
  { id: 434, name: "バグラチオン", power: 108, hp: 92, attribute: "VALOR", desc: "ロシア帝国の勇猛な将軍。ナポレオン戦争において、アウステルリッツの戦いやボロディノの戦いで前線を指揮。ボロディノではフランス軍の猛攻を身を挺して防ぎ致命傷を負ったが、ロシア軍主力の撤退を成功させ、後の冬将軍による勝利の礎となった。", skill: { name: "ボロディノの盾", desc: "相手に最大HPの20%ダメージ", type: "fixed_damage", value: 0.2, rate: 0.6 } },
  { id: 435, name: "コリン・キャンベル", power: 104, hp: 96, attribute: "VALOR", desc: "19世紀イギリスの将軍。クリミア戦争のバラクラヴァの戦いにおいて、スコットランド歩兵を横隊に薄く展開させる「シン・レッド・ライン」戦術でロシアの騎兵突撃を撃退。その後、インド大反乱（セポイの乱）の総司令官として反乱を完全に鎮圧した。", skill: { name: "シン・レッド・ライン", desc: "相手から最大HPの15%を吸収", type: "absorb_hp", value: 0.15, rate: 0.6 } },
  { id: 436, name: "ホレイショ・ゲイツ", power: 98, hp: 102, attribute: "VALOR", desc: "アメリカ独立戦争における大陸軍の将軍。1777年のサラトガの戦いにおいて、イギリス軍のバーゴイン将軍を包囲して降伏させるという歴史的勝利を収めた。この大勝利が、フランス（ルイ16世）のアメリカ側での参戦を決定づける重要な転機となった。", skill: { name: "サラトガの勝利", desc: "次の味方の歴史力を+35%強化", type: "inherit_buff", value: 0.35, rate: 0.7 } },
  { id: 437, name: "トゥサン・ルヴェルチュール", power: 112, hp: 88, attribute: "VALOR", desc: "ハイチ独立運動の指導者。「黒いジャコバン」と呼ばれる。フランス革命の影響を受け、黒人奴隷の反乱軍を組織して卓越した軍事力でサン・ドマングを制圧。ナポレオンが派遣した鎮圧軍に捕らえられ獄死したが、世界初の黒人共和国誕生の道を開いた。", skill: { name: "黒いジャコバン", desc: "次のラウンドの相手を-30%弱体化", type: "inherit_debuff", value: 0.3, rate: 0.7 } },
  { id: 438, name: "ミゲル・イダルゴ", power: 95, hp: 105, attribute: "VALOR", desc: "メキシコ独立運動の先駆者となったクリオーリョ（現地生まれの白人）の司祭。1810年、「ドロレスの叫び」を発して先住民やメスティーソを率いてスペインの植民地支配に対して蜂起した。志半ばで捕らえられ処刑されたが、メキシコ独立の父と仰がれる。", skill: { name: "ドロレスの叫び", desc: "被ダメージを85%カット", type: "damage_cut", value: 0.85, rate: 0.45 } },
  { id: 439, name: "ベルナルド・オイギンス", power: 102, hp: 98, attribute: "VALOR", desc: "南米チリの独立運動の英雄。サン・マルティンが率いるアンデス山脈越えの遠征軍に合流し、チャカブコの戦いなどでスペイン王党派軍を打ち破った。チリ独立宣言後に初代の最高執政官に就任し、強固な独裁体制で新国家の基礎を固めた。", skill: { name: "チリの解放", desc: "超低確率(10%)で相手のHPを1にする", type: "hp_to_one", rate: 0.1 } },
  { id: 440, name: "エミリアーノ・サパタ", power: 118, hp: 82, attribute: "VALOR", desc: "メキシコ革命における農民軍の指導者。南部を中心に「土地と自由」をスローガンとするアヤラ計画を発表し、ディアス独裁政権やその後の地主寄りな政権に対して徹底したゲリラ戦を展開。暗殺されたが、農地改革を求める彼の思想は現代にも影響を与える。", skill: { name: "土地と自由", desc: "味方全体の歴史力+15%", type: "buff_all", value: 0.15, rate: 0.6 } },
  { id: 441, name: "トゥルイ", power: 115, hp: 85, attribute: "VALOR", desc: "モンゴル帝国初代皇帝チンギス・ハンの四男。末子相続の慣習に従い、父の死後にモンゴル本土の広大な遊牧地と軍隊の主力を継承した。金王朝との最終決戦（三峰山の戦い）で大勝し、モンゴル軍の最強の主力として一族の繁栄を確固たるものにした。", skill: { name: "三峰山の大勝", desc: "敵全員の歴史力-20%", type: "debuff_all", value: 0.2, rate: 0.6 } },
  { id: 442, name: "ボオルチュ", power: 110, hp: 90, attribute: "VALOR", desc: "チンギス・ハンがまだテムジンと呼ばれていた不遇の時代からの最古参の盟友にして腹心。「四駿」の筆頭としてモンゴル帝国の建国を軍事的・政治的に支え、常に右翼軍の司令官として活躍。チンギス・ハンから絶対的な信頼を受けた忠義の将。", skill: { name: "四駿の筆頭", desc: "自身の歴史力+40%", type: "buff_self", value: 0.4, rate: 0.7 } },
  { id: 443, name: "シャー・ルフ", power: 106, hp: 94, attribute: "VALOR", desc: "ティムール朝の第4代君主。父ティムールの死後の激しい後継者争いを制して帝国を再統一し、首都をヘラートへ遷都。明の永楽帝との間に使節を交歓するなど平和外交を展開し、細密画（ミニアチュール）などのイスラーム文化が栄える最盛期を現出した。", skill: { name: "ヘラートの繁栄", desc: "相手の歴史力を-25%", type: "debuff_enemy", value: 0.25, rate: 0.7 } },
  { id: 444, name: "スカンダグプタ", power: 114, hp: 86, attribute: "VALOR", desc: "古代インド・グプタ朝の第8代国王。遊牧民族エフタル（白フン）の激しいインド侵攻に対し、皇太子の時代から軍を率いてこれを完全に撃退。帝国の崩壊を防ぎグプタ朝の最後の輝きを維持した救国の王であるが、度重なる戦争で財政は悪化した。", skill: { name: "エフタル撃退", desc: "相手が【政治】なら自身の歴史力+50%", type: "cond_buff_self", target: "STRATEGY", value: 0.5, rate: 0.8 } },
  { id: 445, name: "チャン・フンダオ", power: 120, hp: 80, attribute: "VALOR", desc: "ベトナム・陳朝の王族・名将。フビライ・ハンの命で三度にわたり侵攻してきた元（モンゴル帝国）の圧倒的な大軍に対し、焦土作戦と白藤江（バクダン河）の戦いにおける見事な水攻めの奇策を用いて撃退。ベトナムの独立を守り抜いた最大の国民的英雄。", skill: { name: "白藤江の奇策", desc: "相手が【文化】なら相手を-45%弱体化", type: "cond_debuff_enemy", target: "CULTURE", value: 0.45, rate: 0.9 } },
  { id: 446, name: "レー・ロイ", power: 108, hp: 92, attribute: "VALOR", desc: "ベトナム・黎朝（前期黎朝）の建国者。明の永楽帝によるベトナム支配に対し、藍山（ラムソン）で農民を率いて蜂起。10年以上に及ぶ過酷なゲリラ戦の末に明軍を完全に撤退させ、大越国を再興してベトナムの独立を回復した。", skill: { name: "藍山蜂起", desc: "自軍のHPを最大HPの20%回復", type: "heal_hp", value: 0.2, rate: 0.6 } },
  { id: 447, name: "アフマド・シャー・ドゥッラーニー", power: 112, hp: 88, attribute: "VALOR", desc: "アフガニスタンのドゥッラーニー朝の建国者。ナーディル・シャーの死後に独立。優れた騎兵部隊を率いてインド北部に幾度も侵攻し、第三次パーニーパットの戦いで強大なマラーター同盟の軍を壊滅させ、ムガル帝国の衰退を決定づけた。", skill: { name: "アフガンの建国", desc: "3戦目配置時、歴史力+45%", type: "cond_pos_buff", pos: 3, value: 0.45, rate: 0.8 } },
  { id: 448, name: "ジョージ・パットン", power: 116, hp: 84, attribute: "VALOR", desc: "第二次世界大戦におけるアメリカ陸軍の猛将。北アフリカ戦線やシチリア島上陸作戦で戦功を挙げ、ヨーロッパ戦線では第3軍を率いてバルジの戦いで苦境の味方を救出。戦車を用いた圧倒的な機動戦を得意とし「血と度胸」と称された。", skill: { name: "血と度胸の機動戦", desc: "5戦目配置時、負け数\xD735%歴史力UP", type: "cond_pos_revenge", pos: 5, value: 0.35, rate: 0.9 } },
  { id: 449, name: "カルロ・アルベルト", power: 98, hp: 102, attribute: "VALOR", desc: "サルデーニャ王国の国王。1848年の諸国民の春に呼応して自由主義的な憲法（アルベルト憲法）を制定し、イタリア統一を目指してオーストリア軍に宣戦布告（第1次イタリア独立戦争）。しかしラデツキー将軍に敗北し、息子のヴィットーリオ・エマヌエーレ2世に譲位した。", skill: { name: "独立の宣戦", desc: "自軍HP半分以下なら自身の歴史力+50%", type: "cond_pinch_buff", value: 0.5, rate: 0.8 } },
  { id: 450, name: "ヘンリ5世", power: 114, hp: 86, attribute: "VALOR", desc: "イギリス・ランカスター朝の国王。百年戦争を再開し、アザンクールの戦いでフランスの重装騎士軍を長弓隊で完全に殲滅。フランス王位継承権を獲得し、イギリス中世における軍事的栄光の頂点を極めたが、若くして病死した。", skill: { name: "アザンクールの圧勝", desc: "自軍HP半分以下なら敵全体-35%", type: "cond_pinch_debuff_all", value: 0.35, rate: 0.8 } },
  { id: 451, name: "ガイウス・グラックス", power: 104, hp: 96, attribute: "STRATEGY", desc: "ローマの護民官。兄ティベリウスの遺志を継ぎ、貧民への安価な穀物配給（穀物法）や、騎士（エクイテス）階級を陪審員に登用する裁判法を制定して元老院体制の打破を目指した。しかしイタリア同盟市への市民権付与を巡り反対に遭い、追い詰められ自刃した。", skill: { name: "穀物法と裁判法", desc: "HP15%消費して自身の歴史力+60%", type: "sacrifice_buff", cost: 0.15, value: 0.6, rate: 0.8 } },
  { id: 452, name: "カティリナ", power: 95, hp: 105, attribute: "STRATEGY", desc: "共和政末期ローマの政治家。没落した平民や退役軍人の負債帳消しを掲げて執政官選挙に立候補するも落選。武力による国家転覆と政権奪取（カティリナの陰謀）を企てたが、執政官キケロの弾劾演説で暴露され、元老院の討伐軍に敗れて戦死した。", skill: { name: "カティリナの陰謀", desc: "HP10%消費して相手を25%弱体化", type: "sacrifice_debuff", cost: 0.1, value: 0.25, rate: 0.7 } },
  { id: 453, name: "クラッスス", power: 110, hp: 90, attribute: "STRATEGY", desc: "ローマの富豪・政治家。スッラの下で財を成し、スパルタクスの乱を容赦なく鎮圧。カエサル、ポンペイウスと共に第1回三頭政治を結成して権力を握る。軍事的な名声を求めてパルティアへ遠征したが、カルラエの戦いでパルティアの弓馬兵に大敗し戦死した。", skill: { name: "三頭政治の富", desc: "相手に最大HPの20%ダメージ", type: "fixed_damage", value: 0.2, rate: 0.6 } },
  { id: 454, name: "レピドゥス", power: 82, hp: 118, attribute: "STRATEGY", desc: "ローマの政治家。カエサルの暗殺後、オクタウィアヌス、アントニウスと共に第2回三頭政治を結成し、北アフリカを統治した。しかし政治的・軍事的な実力に乏しく、後にオクタウィアヌスによって三頭政治から失脚させられ、最高神祇官の地位のみを残された。", skill: { name: "第2回三頭政治", desc: "相手から最大HPの15%を吸収", type: "absorb_hp", value: 0.15, rate: 0.5 } },
  { id: 455, name: "ティベリウス", power: 102, hp: 98, attribute: "STRATEGY", desc: "ローマ帝国の第2代皇帝。アウグストゥスの養子。財政の引き締めや辺境防衛の強化など極めて堅実で優れた行政能力を発揮した。しかし、疑い深い性格から不敬罪を濫用して元老院議員を次々と処刑し、カプリ島に隠遁して恐怖政治を敷いた暗君とも評される。", skill: { name: "カプリ島の猜疑", desc: "次の味方の歴史力を+30%強化", type: "inherit_buff", value: 0.3, rate: 0.7 } },
  { id: 456, name: "クラウディウス", power: 98, hp: 102, attribute: "STRATEGY", desc: "ローマ帝国の第4代皇帝。カリグラ暗殺後に近衛軍団に推戴されて即位。身体に障害があり愚鈍と見られていたが、実際には有能な官僚を重用して属州のローマ化を進め、ブリタニア（イギリス）の本格的な征服を成功させた有能な皇帝。", skill: { name: "有能なる愚者", desc: "次のラウンドの相手を-25%弱体化", type: "inherit_debuff", value: 0.25, rate: 0.7 } },
  { id: 457, name: "テオドシウス1世", power: 72, hp: 128, attribute: "STRATEGY", desc: "ローマ皇帝。392年にキリスト教（アタナシウス派）をローマ帝国の国教に定め、異教の祭典であったオリンピアの競技会を禁止。死に際して帝国を東西に分割し二人の子に与えたため、これ以降ローマ帝国が再び統一されることはなかった。", skill: { name: "キリスト教の国教化", desc: "被ダメージを75%カット", type: "damage_cut", value: 0.75, rate: 0.55 } },
  { id: 458, name: "テオドラ", power: 105, hp: 95, attribute: "STRATEGY", desc: "ビザンツ帝国のユスティニアヌス帝の皇妃。踊り子から皇后に昇り詰める。ニカの乱で暴徒が宮殿に迫り、皇帝が逃亡を考えた際、「帝衣は最高の死装束である」と言い放って皇帝を鼓舞し、暴動を鎮圧させて帝国を危機から救った芯の強い女性。", skill: { name: "ニカの乱鎮圧", desc: "超低確率(10%)で相手のHPを1にする", type: "hp_to_one", rate: 0.1 } },
  { id: 459, name: "ルートヴィヒ敬虔王", power: 94, hp: 106, attribute: "STRATEGY", desc: "フランク王国の国王。カール大帝の子。教会や修道院を厚く保護し「敬虔王」と呼ばれた。しかし、生前に帝国を息子たちに分割相続させる法（帝国整序令）を定めたことが原因で激しい骨肉の争いが起き、結果的にヴェルダン条約による帝国の三分裂を招いた。", skill: { name: "帝国整序令", desc: "味方全体の歴史力+15%", type: "buff_all", value: 0.15, rate: 0.6 } },
  { id: 460, name: "ハインリヒ4世", power: 106, hp: 94, attribute: "STRATEGY", desc: "神聖ローマ皇帝。聖職叙任権を巡って教皇グレゴリウス7世と激しく対立し、破門・廃位の宣告を受けた。諸侯の反乱を恐れ、雪の降るカノッサ城で教皇に三日間裸足で許しを乞うた（カノッサの屈辱）。のちに勢力を盛り返し、逆に教皇をローマから追放した。", skill: { name: "叙任権闘争", desc: "敵全員の歴史力-15%", type: "debuff_all", value: 0.15, rate: 0.6 } },
  { id: 461, name: "ルイ9世", power: 110, hp: 90, attribute: "STRATEGY", desc: "フランス・カペー朝の国王。「聖王」と呼ばれる。敬虔なキリスト教徒であり、第6回・第7回十字軍を主導したが、エジプトで捕虜となり、最後はチュニスで病死した。国内では高等法院（パルルマン）を整え、王の正義によって封建諸侯を抑え王権を高めた。", skill: { name: "聖王の正義", desc: "自身の歴史力+35%", type: "buff_self", value: 0.35, rate: 0.7 } },
  { id: 462, name: "ジョン欠地王", power: 68, hp: 132, attribute: "STRATEGY", desc: "イギリス・プランタジネット朝の国王。フランス王フィリップ2世に敗れて大陸の領土を喪失し、教皇インノケンティウス3世に破門され屈服。さらに重税に怒った貴族たちから「大憲章（マグナ・カルタ）」を突きつけられ、王権を大きく制限された暗君。", skill: { name: "大憲章の承認", desc: "相手の歴史力を-25%", type: "debuff_enemy", value: 0.25, rate: 0.7 } },
  { id: 463, name: "ヘンリ8世", power: 115, hp: 85, attribute: "STRATEGY", desc: "イギリス・テューダー朝の国王。スペイン王女カザリンとの離婚問題を機にローマ教皇と断絶。「首長法」を発布して自らイギリス国教会の最高の首長となり、修道院の莫大な財産を没収して王室財政を潤し、絶対王政の基礎を強固なものにした。", skill: { name: "首長法と国教会", desc: "相手が【文化】なら自身の歴史力+50%", type: "cond_buff_self", target: "CULTURE", value: 0.5, rate: 0.8 } },
  { id: 464, name: "ジェームズ1世", power: 96, hp: 104, attribute: "STRATEGY", desc: "イギリス・ステュアート朝断絶後、スコットランド王から招かれて初代国王となる。「王権神授説」を強く信奉し、議会の伝統を無視して専制政治を強行。また国教会を強制してピューリタン（清教徒）を弾圧したため、のちのピューリタン革命の火種を作った。", skill: { name: "王権神授の専制", desc: "相手が【軍事】なら相手を-40%弱体化", type: "cond_debuff_enemy", target: "VALOR", value: 0.4, rate: 0.8 } },
  { id: 465, name: "チャールズ1世", power: 92, hp: 108, attribute: "STRATEGY", desc: "イギリス国王。ジェームズ1世の専制を受け継ぐ。議会から「権利の請願」を提出されると、一度は承認するが直後に議会を解散し、11年間にわたり無議会政治を強行。スコットランドの反乱からピューリタン革命を招き、クロムウェル軍に敗れて処刑された。", skill: { name: "無議会政治の強行", desc: "自軍のHPを最大HPの20%回復", type: "heal_hp", value: 0.2, rate: 0.5 } },
  { id: 466, name: "チャールズ・グレイ", power: 104, hp: 96, attribute: "STRATEGY", desc: "19世紀イギリスのホイッグ党の首相。産業革命による社会の変化に対応し、1832年に「第1回選挙法改正」を断行。腐敗選挙区を廃止して新興の産業資本家（ブルジョワジー）に選挙権を付与し、イギリスの平和的な議会制民主主義の発展を決定づけた。", skill: { name: "第1回選挙法改正", desc: "4戦目配置時、歴史力+40%", type: "cond_pos_buff", pos: 4, value: 0.4, rate: 0.8 } },
  { id: 467, name: "ルイ15世", power: 98, hp: 102, attribute: "STRATEGY", desc: "フランス・ブルボン朝の国王。曾祖父ルイ14世の跡を継ぐ。オーストリア継承戦争や七年戦争に介入したが、北米やインドの植民地をイギリスに奪われ国家財政は破綻。「わが亡き後に洪水よ来たれ」という言葉を残した通り、フランス革命の要因を作った。", skill: { name: "外交革命の転換", desc: "5戦目配置時、負け数\xD735%歴史力UP", type: "cond_pos_revenge", pos: 5, value: 0.35, rate: 0.9 } },
  { id: 468, name: "ルイ16世", power: 60, hp: 140, attribute: "STRATEGY", desc: "フランス・ブルボン朝最後の絶対君主。温厚な性格で、アメリカ独立戦争への援助などで破綻した財政を再建すべくテュルゴーやネッケルを登用したが特権身分の反対で失敗。フランス革命が勃発し、ヴァレンヌ逃亡事件で国民の信頼を完全に失いギロチンで処刑された。", skill: { name: "三部会の波乱", desc: "自軍HP半分以下なら自身の歴史力+60%", type: "cond_pinch_buff", value: 0.6, rate: 0.8 } },
  { id: 469, name: "ダントン", power: 106, hp: 94, attribute: "STRATEGY", desc: "フランス革命の急進派指導者。「大胆さ、さらに大胆さ、つねに大胆さを！」の演説で国民を鼓舞し、外国軍の侵攻から革命を防衛した。のちに恐怖政治の行き過ぎを懸念して寛容を説いたため、かつての盟友ロベスピエールと対立し、断頭台へ送られた。", skill: { name: "大胆なる演説", desc: "自軍HP半分以下なら敵全体-35%", type: "cond_pinch_debuff_all", value: 0.35, rate: 0.8 } },
  { id: 470, name: "カースルレー", power: 102, hp: 98, attribute: "STRATEGY", desc: "ナポレオン戦争後のイギリスの外相。ウィーン会議においてメッテルニヒらと協力し、勢力均衡の原則に基づきヨーロッパの新しい保守的秩序を構築した。のちに国内の自由主義運動の高まりと外交方針への批判に苦しみ、自ら命を絶った。", skill: { name: "勢力均衡の外交", desc: "HP15%消費して自身の歴史力+60%", type: "sacrifice_buff", cost: 0.15, value: 0.6, rate: 0.8 } },
  { id: 471, name: "カプリヴィ", power: 100, hp: 100, attribute: "STRATEGY", desc: "ドイツ帝国第2代宰相。ビスマルク辞任後の「新航路」政策を担当。ロシアとの再保障条約の更新を拒否してフランスとロシアの接近（露仏同盟）を招く一方、イギリスとザンジバル条約を結ぶなど、より攻撃的な帝国主義外交へと舵を切った。", skill: { name: "新航路への転換", desc: "HP10%消費して相手を25%弱体化", type: "sacrifice_debuff", cost: 0.1, value: 0.25, rate: 0.7 } },
  { id: 472, name: "アンドリュー・ジョンソン", power: 94, hp: 106, attribute: "STRATEGY", desc: "アメリカ第17代大統領。リンカン暗殺後に昇格。南部に対して寛大な再建策をとろうとしたため、黒人の権利を徹底して守ろうとする議会の急進派共和党と激しく対立。アメリカ史上初となる大統領の弾劾裁判を受けた（1票差で無罪）。", skill: { name: "再建の対立", desc: "相手に最大HPの20%ダメージ", type: "fixed_damage", value: 0.2, rate: 0.6 } },
  { id: 473, name: "蔣介石", power: 114, hp: 86, attribute: "STRATEGY", desc: "中国国民党の指導者。孫文の後継者として北伐を完了し中国を統一（南京国民政府）。上海クーデターで共産党を弾圧したが、西安事件を機に抗日民族統一戦線（第2次国共合作）を結成して日中戦争を戦う。戦後は国共内戦に敗れ、台湾へ逃れた。", skill: { name: "北伐と統一戦線", desc: "相手から最大HPの15%を吸収", type: "absorb_hp", value: 0.15, rate: 0.7 } },
  { id: 474, name: "趙高", power: 85, hp: 115, attribute: "STRATEGY", desc: "秦の始皇帝に仕えた宦官。始皇帝の死後、李斯と結託して遺詔を偽造し、有能な皇太子・扶蘇を自害させて愚鈍な胡亥（二世皇帝）を即位させた。その後李斯をも陥れて実権を完全に掌握し、苛政によって秦をあっという間に滅亡へと導いた奸臣。", skill: { name: "指鹿為馬の奸計", desc: "次の味方の歴史力を+35%強化", type: "inherit_buff", value: 0.35, rate: 0.7 } },
  { id: 475, name: "文帝（前漢）", power: 112, hp: 88, attribute: "STRATEGY", desc: "前漢の第5代皇帝。高祖（劉邦）の子。呂后一族の専横ののちに即位し、老荘思想（黄老の治）に基づき、刑罰や田租を極限まで軽減して民衆を休ませる無為自然の善政を行った。次代の景帝と合わせて「文景の治」と称される安定期を築いた。", skill: { name: "文景の治", desc: "次のラウンドの相手を-30%弱体化", type: "inherit_debuff", value: 0.3, rate: 0.7 } },
  { id: 476, name: "蘇轍", power: 98, hp: 102, attribute: "STRATEGY", desc: "北宋の政治家・文人。唐宋八大家の一人。蘇軾の弟。兄と共に科挙に合格して名を馳せ、王安石の急進的な新法に対しては、司馬光らと共に旧法党として強く反対の立場をとった。兄弟の深い絆と優れた文章で宋代の士大夫文化を彩った。", skill: { name: "旧法党の連携", desc: "被ダメージを75%カット", type: "damage_cut", value: 0.75, rate: 0.55 } },
  { id: 477, name: "リー・クアンユー", power: 116, hp: 84, attribute: "STRATEGY", desc: "シンガポールの初代首相。「建国の父」。マレーシアからの独立後、資源を持たない小国を生き残らせるため、外資導入による徹底した工業化と、厳格な法治主義（開発独裁）を強力に推し進め、シンガポールをアジア屈指の経済大国へと押し上げた。", skill: { name: "開発独裁の奇跡", desc: "超低確率(10%)で相手のHPを1にする", type: "hp_to_one", rate: 0.1 } },
  { id: 478, name: "ネルー", power: 110, hp: 90, attribute: "STRATEGY", desc: "インドの初代首相。ガンディーの後継者として国民会議派を率い独立を達成。冷戦下において、アメリカ・ソ連のどちらにも属さない「非同盟中立」の外交路線を主導し、第三世界（アジア・アフリカ諸国）の連帯と地位向上に多大な貢献を果たした。", skill: { name: "非同盟中立", desc: "味方全体の歴史力+20%", type: "buff_all", value: 0.2, rate: 0.6 } },
  { id: 479, name: "スハルト", power: 106, hp: 94, attribute: "STRATEGY", desc: "インドネシアの第2代大統領。九・三〇事件の混乱を収拾して実権を握り、スカルノを退陣させて「新体制」を樹立。西側陣営と協調して外資を導入し、開発独裁によって高度経済成長を実現したが、アジア通貨危機ののちに民主化運動により退陣した。", skill: { name: "新体制の開発", desc: "敵全員の歴史力-20%", type: "debuff_all", value: 0.2, rate: 0.6 } },
  { id: 481, name: "ヘシオドス", power: 90, hp: 110, attribute: "CULTURE", desc: "古代ギリシアの叙事詩人。ホメロスと並び称される。著書『神統記』でギリシア神話の神々の系譜を体系的にまとめ、『労働と日々』では農民の過酷な日常と労働の尊さを教訓的に詠み、貴族の専横を批判して正義の重要性を説いた。", skill: { name: "神統記の系譜", desc: "相手の歴史力を-30%", type: "debuff_enemy", value: 0.3, rate: 0.7 } },
  { id: 482, name: "アッリアノス", power: 94, hp: 106, attribute: "CULTURE", desc: "ローマ帝国時代（五賢帝期）のギリシア人政治家・歴史家。ストア派の哲学者エピクテトスに師事。最も信頼性の高いとされるアレクサンドロス大王の伝記『アレクサンドロス東征記（アナバシス）』を著述し、ヘレニズム研究に多大な貢献をした。", skill: { name: "東征記の記録", desc: "相手が【軍事】なら自身の歴史力+50%", type: "cond_buff_self", target: "VALOR", value: 0.5, rate: 0.8 } },
  { id: 483, name: "カッシウス・ディオ", power: 96, hp: 104, attribute: "CULTURE", desc: "ローマ帝国時代（セウェルス朝期）のギリシア人政治家・歴史家。元老院議員や執政官を歴任し、その実務経験に基づき、伝説的な王政期から自身の同時代に至るまでの広範な『ローマ史』をギリシア語で著述し、貴重な史料を残した。", skill: { name: "ローマ史の編纂", desc: "相手が【政治】なら相手を-45%弱体化", type: "cond_debuff_enemy", target: "STRATEGY", value: 0.45, rate: 0.8 } },
  { id: 484, name: "メナンドロス", power: 88, hp: 112, attribute: "CULTURE", desc: "ヘレニズム時代の新喜劇を代表する古代ギリシアの劇作家。アリストファネスのような政治的風刺（古喜劇）ではなく、市民の日常生活や恋愛、家族のいざこざなどを洗練された言葉で描き、ローマの喜劇作家（プラウトゥスら）に多大な影響を与えた。", skill: { name: "新喜劇の洗練", desc: "自軍のHPを最大HPの20%回復", type: "heal_hp", value: 0.2, rate: 0.6 } },
  { id: 485, name: "エンペドクレス", power: 98, hp: 102, attribute: "CULTURE", desc: "古代ギリシア・シチリア島の自然哲学者。万物の根源（アルケー）は、火・空気・水・土の「四元素」であるとし、それらが愛によって結合し、争いによって分離することで世界が構成されると説いた。エトナ山の火口に身を投げて死んだという伝説がある。", skill: { name: "四元素の愛と争い", desc: "3戦目配置時、歴史力+45%", type: "cond_pos_buff", pos: 3, value: 0.45, rate: 0.8 } },
  { id: 486, name: "ピュロン", power: 92, hp: 108, attribute: "CULTURE", desc: "ヘレニズム時代の哲学者。懐疑派（エポケー）の創始者。アレクサンドロス大王の東方遠征に従軍してインドの思想に触れた。人間には物事の真の姿を知ることは不可能であるため、一切の判断を停止（エポケー）することで心の平静を得られると説いた。", skill: { name: "判断停止（エポケー）", desc: "5戦目配置時、負け数\xD735%歴史力UP", type: "cond_pos_revenge", pos: 5, value: 0.35, rate: 0.9 } },
  { id: 487, name: "プロティノス", power: 102, hp: 98, attribute: "CULTURE", desc: "ローマ帝国時代のエジプト出身の哲学者。「新プラトン主義（ネオプラトニズム）」の創始者。万物は究極的な絶対者である「一者（ト・ヘン）」から流出（エマネーション）して生じると説き、この神秘主義的な思想はキリスト教神学やイスラーム哲学に絶大な影響を与えた。", skill: { name: "一者からの流出", desc: "自軍HP半分以下なら自身の歴史力+60%", type: "cond_pinch_buff", value: 0.6, rate: 0.8 } },
  { id: 488, name: "マルティアリス", power: 86, hp: 114, attribute: "CULTURE", desc: "ローマ帝国時代（フラウィウス朝期）の詩人。短い行数で鋭く機知に富んだ「エピグラム（エピグラマタ）」を完成させた。当時のローマ市民の日常生活や奴隷・貴族の風俗、偽善などを軽妙に風刺し、ローマ社会の実態を生き生きと後世に伝えている。", skill: { name: "エピグラムの風刺", desc: "自軍HP半分以下なら敵全体-35%", type: "cond_pinch_debuff_all", value: 0.35, rate: 0.8 } },
  { id: 489, name: "タッソ", power: 94, hp: 106, attribute: "CULTURE", desc: "16世紀イタリアの後期ルネサンスを代表する詩人。第1回十字軍によるエルサレム奪還を題材とし、キリスト教の信仰とルネサンス的な人間の恋愛や感情の葛藤を壮大に描いた叙事詩『エルサレム解放』を著し、のちのバロック芸術に多大な影響を与えた。", skill: { name: "エルサレム解放", desc: "HP15%消費して自身の歴史力+60%", type: "sacrifice_buff", cost: 0.15, value: 0.6, rate: 0.8 } },
  { id: 490, name: "マサッチョ", power: 100, hp: 100, attribute: "CULTURE", desc: "15世紀初期のフィレンツェの画家。わずか27歳で夭折したが、ブルネレスキの遠近法をいち早く絵画に取り入れ、『貢の銭（みつぎのぜに）』などのフレスコ画において、人物の圧倒的な量感と空間の深さを表現し、ルネサンス絵画の決定的な方向性を定めた。", skill: { name: "透視図法の絵画", desc: "HP10%消費して相手を25%弱体化", type: "sacrifice_debuff", cost: 0.1, value: 0.25, rate: 0.7 } },
  { id: 491, name: "ホルバイン", power: 108, hp: 92, attribute: "CULTURE", desc: "16世紀ドイツのルネサンス画家。イギリスに渡ってヘンリ8世の宮廷画家となり、トマス・モアやエラスムスなど当時の傑出した知識人や王族の肖像画を、極めて精緻かつ冷徹な写実主義で描き出した。また『死の舞踏』の版画でも知られる。", skill: { name: "冷徹なる肖像", desc: "相手に最大HPの20%ダメージ", type: "fixed_damage", value: 0.2, rate: 0.6 } },
  { id: 492, name: "フランソワ・ラブレー", power: 104, hp: 96, attribute: "CULTURE", desc: "フランス・ルネサンス前期の作家・医師。中世の禁欲主義を痛烈に批判し、人間の肉体的な欲望や自由な精神を大らかに肯定した。巨人の親子の荒唐無稽な冒険を通し、当時の教会や社会の権威を爆笑と共に風刺した『ガルガンチュアとパンタグリュエルの物語』の著者。", skill: { name: "ガルガンチュアの爆笑", desc: "相手から最大HPの15%を吸収", type: "absorb_hp", value: 0.15, rate: 0.6 } },
  { id: 493, name: "ボダン", power: 110, hp: 90, attribute: "CULTURE", desc: "16世紀フランスの法学者・政治思想家。凄惨なユグノー戦争の混乱を収拾するためには、宗教を超越した強力な国家権力が必要だと考え、著書『国家論』において、国王の権力は絶対で不可分であるとする「主権」の概念を史上初めて理論化し、絶対王政を擁護した。", skill: { name: "絶対主権の理論", desc: "次の味方の歴史力を+35%強化", type: "inherit_buff", value: 0.35, rate: 0.7 } },
  { id: 494, name: "ミルトン", power: 105, hp: 95, attribute: "CULTURE", desc: "17世紀イギリスのピューリタン（清教徒）の詩人。クロムウェルの下で共和政政府のラテン語書記官として活躍。王政復古後に失明と投獄の苦難の中で、旧約聖書を題材に神への反逆と人間の原罪を描いた壮大な大叙事詩『失楽園』を口述筆記で完成させた。", skill: { name: "失楽園", desc: "次のラウンドの相手を-30%弱体化", type: "inherit_debuff", value: 0.3, rate: 0.7 } },
  { id: 495, name: "ケプラー", power: 112, hp: 88, attribute: "CULTURE", desc: "17世紀ドイツの天文学者・数学者。ティコ・ブラーエの膨大な観測記録を解析し、惑星の軌道が円ではなく「楕円」であることなどを示す「ケプラーの法則」を発見。地動説を数学的・物理学的に完全に証明し、ニュートン力学への決定的な橋渡しをした。", skill: { name: "惑星の楕円軌道", desc: "被ダメージを70%カット", type: "damage_cut", value: 0.7, rate: 0.6 } },
  { id: 496, name: "フランシス・ベーコン", power: 108, hp: 92, attribute: "CULTURE", desc: "17世紀イギリスの哲学者・政治家。「知は力なり」と説き、スコラ学的な偏見（イドラ）を打破し、実験と観察を繰り返して個別の事実から一般的な法則を導き出す「帰納法」を提唱。イギリス経験論の祖となり、近代科学の方法論を決定づけた。", skill: { name: "知は力なり（帰納法）", desc: "超低確率(10%)で相手のHPを1にする", type: "hp_to_one", rate: 0.1 } },
  { id: 497, name: "アンセルムス", power: 98, hp: 102, attribute: "CULTURE", desc: "11世紀の神学者でカンタベリ大司教。「スコラ学の父」。理性によって神の存在証明を試み、普遍（神や概念）は個別の事物に先立って実在するという「実念論」を主張した。「知らんがために我信ず」と述べ、中世神学の基礎を築きアベラールらと普遍論争を展開。", skill: { name: "実念論の証明", desc: "味方全体の歴史力+20%", type: "buff_all", value: 0.2, rate: 0.6 } },
  { id: 498, name: "モリエール", power: 102, hp: 98, attribute: "CULTURE", desc: "17世紀フランスの古典主義喜劇の完成者。ルイ14世の保護を受け、『人間嫌い』『守銭奴』『タルチュフ』などの傑作喜劇を上演。貴族の偽善や成り上がり者の滑稽さ、人間の普遍的な弱さを鋭い観察眼と強烈な笑いで風刺し、フランス演劇の最高峰とされる。", skill: { name: "古典主義喜劇", desc: "敵全員の歴史力-20%", type: "debuff_all", value: 0.2, rate: 0.6 } },
  { id: 499, name: "ダランベール", power: 106, hp: 94, attribute: "CULTURE", desc: "18世紀フランスの啓蒙思想家・数学者。ディドロと共に『百科全書』の責任編集を務め、啓蒙思想の普及に多大な貢献をした。数学分野では微分方程式の研究や、力学におけるダランベールの原理の発見など、自然科学の発展においても優れた業績を残した。", skill: { name: "百科全書の編纂", desc: "自身の歴史力+40%", type: "buff_self", value: 0.4, rate: 0.7 } },
  { id: 500, name: "ヘーゲル", power: 116, hp: 84, attribute: "CULTURE", desc: "19世紀ドイツの哲学者。カントの哲学を発展させ、矛盾する命題（正・反）をより高い次元で統合（アウフヘーベン）して真理に至るという「弁証法」を確立し、ドイツ観念論を大成。歴史は絶対精神が自由を実現していく過程であると説き、マルクスにも多大な影響を与えた。", skill: { name: "弁証法（アウフヘーベン）", desc: "相手の歴史力を-35%", type: "debuff_enemy", value: 0.35, rate: 0.8 } },
  { id: 501, name: "アダム・スミス", power: 114, hp: 86, attribute: "CULTURE", desc: "18世紀イギリス（スコットランド）の経済学者・倫理学者。「経済学の父」。著書『諸国民の富（国富論）』において重商主義を批判し、個人の利己的な経済活動が「見えざる手」に導かれて社会全体の利益をもたらすと説き、自由主義経済学（古典派経済学）を創始した。", skill: { name: "見えざる手", desc: "相手が【政治】なら自身の歴史力+50%", type: "cond_buff_self", target: "STRATEGY", value: 0.5, rate: 0.8 } },
  { id: 502, name: "エンゲルス", power: 108, hp: 92, attribute: "CULTURE", desc: "19世紀ドイツの社会主義者・思想家。イギリスで紡績工場を経営しながら労働者の悲惨な実態を研究。マルクスの生涯の盟友にして最大のパトロンとなり、共に『共産党宣言』を起草。マルクスの死後は『資本論』の続巻を編集・出版し科学的社会主義を支えた。", skill: { name: "共産党宣言", desc: "相手が【軍事】なら相手を-40%弱体化", type: "cond_debuff_enemy", target: "VALOR", value: 0.4, rate: 0.8 } },
  { id: 503, name: "シラー", power: 96, hp: 104, attribute: "CULTURE", desc: "18世紀ドイツの劇作家・詩人。ゲーテと共に疾風怒濤（シュトゥルム・ウント・ドラング）運動の中心となる。スイス独立の英雄を描いた『ヴィルヘルム・テル』や『群盗』など、自由を熱烈に求める情熱的な戯曲を創作し、ベートーヴェンの「第九」の合唱（歓喜に寄す）の作詞者でもある。", skill: { name: "歓喜の歌（自由の情熱）", desc: "自軍のHPを最大HPの25%回復", type: "heal_hp", value: 0.25, rate: 0.6 } },
  { id: 504, name: "スタンダール", power: 94, hp: 106, attribute: "CULTURE", desc: "19世紀フランスの写実主義（リアリズム）の小説家。代表作『赤と黒』において、ナポレオン失脚後の王政復古期の腐敗した社会を背景に、野心に燃える青年ジュリアン・ソレルの恋愛と破滅の心理を鋭く分析的に描き、近代小説の基礎を確立した。", skill: { name: "赤と黒の野心", desc: "2戦目配置時、歴史力+40%", type: "cond_pos_buff", pos: 2, value: 0.4, rate: 0.7 } },
  { id: 505, name: "チェーホフ", power: 92, hp: 108, attribute: "CULTURE", desc: "19世紀末から20世紀初頭のロシアの劇作家・短編小説家。モスクワ芸術座で上演された『桜の園』『かもめ』などの戯曲で知られる。劇的な事件を排し、没落する地主貴族や知識人の日常の哀哀や閉塞感を、静かな抒情とユーモアを交えて描き近代演劇に革命を起こした。", skill: { name: "桜の園の哀愁", desc: "5戦目配置時、負け数\xD735%歴史力UP", type: "cond_pos_revenge", pos: 5, value: 0.35, rate: 0.9 } },
  { id: 506, name: "ダヴィッド", power: 100, hp: 100, attribute: "CULTURE", desc: "18世紀末から19世紀初頭のフランス新古典主義の代表的画家。フランス革命にジャコバン派として参加し、『マラーの死』などを描く。のちにナポレオンの首席宮廷画家となり、『ナポレオンの戴冠式』などの壮麗な歴史画で帝国の栄光を視覚的に演出した。", skill: { name: "新古典主義の戴冠", desc: "自軍HP半分以下なら自身の歴史力+60%", type: "cond_pinch_buff", value: 0.6, rate: 0.8 } },
  { id: 507, name: "モーツァルト", power: 118, hp: 82, attribute: "CULTURE", desc: "18世紀オーストリアの天才的作曲家。ウィーン古典派の巨星。幼少期から神童としてヨーロッパ中を巡り、ハイドンやイタリア音楽の影響を吸収。交響曲、協奏曲、そして『フィガロの結婚』や『魔笛』などのオペラにおいて、優美で完璧な調和をもつ無数の傑作を残した。", skill: { name: "魔笛の調べ", desc: "自軍HP半分以下なら敵全体-35%", type: "cond_pinch_debuff_all", value: 0.35, rate: 0.9 } },
  { id: 508, name: "陳寿", power: 102, hp: 98, attribute: "CULTURE", desc: "西晋の歴史家。三国時代の魏・蜀・呉の歴史をそれぞれ紀伝体で記述した正史『三国志』の著者。晋の正統性を重んじて魏を正統としつつも、簡潔で正確な記述に努めた。のちに裴松之が詳細な注を付け加え、後世に三国志の物語が広まる最大の源泉となった。", skill: { name: "正史・三国志", desc: "HP15%消費して自身の歴史力+60%", type: "sacrifice_buff", cost: 0.15, value: 0.6, rate: 0.8 } },
  { id: 509, name: "孟浩然", power: 84, hp: 116, attribute: "CULTURE", desc: "中国・盛唐の代表的な自然詩人。王維と共に「王孟」と並び称される。科挙に及第できず生涯を在野の隠者として過ごしたが、春の夜明けを詠んだ「春暁（春眠暁を覚えず）」など、田園の情景や悠々自適の隠遁生活を清らかで平易な言葉で詠い、李白らにも深く敬愛された。", skill: { name: "春暁の目覚め", desc: "HP10%消費して相手を25%弱体化", type: "sacrifice_debuff", cost: 0.1, value: 0.25, rate: 0.7 } },
  { id: 510, name: "カミュ", power: 105, hp: 95, attribute: "CULTURE", desc: "20世紀フランスの作家・哲学者。アルジェリア出身。サルトルと共に実存主義の代表的作家とされる。代表作『異邦人』や『ペスト』を通じ、人生の不条理（意味の無さ）を見据えながらも、それに屈せず反抗して生きる人間の連帯と尊厳の重要性を強烈に描き出した。", skill: { name: "不条理への反抗", desc: "相手に最大HPの20%ダメージ", type: "fixed_damage", value: 0.2, rate: 0.6 } },
  { id: 511, name: "サルゴン2世", power: 110, hp: 90, attribute: "VALOR", desc: "アッシリア帝国の最盛期を築いた王。北イスラエル王国を滅ぼしてサマリアを占領し、十部族を強制移住させた。強力な軍備と駅伝制による中央集権化を進め、広大なオリエント世界を支配する強固な帝国を建設した。", skill: { name: "アッシリアの威光", desc: "自身の歴史力+35%", type: "buff_self", value: 0.35, rate: 0.7 } },
  { id: 512, name: "アエティウス", power: 104, hp: 96, attribute: "VALOR", desc: "西ローマ帝国の将軍。カタラウヌムの戦いにおいて、ゲルマン諸族との連合軍を巧みに指揮してアッティラ率いるフン族の大軍を撃退し、西ヨーロッパを異民族の圧倒的な脅威から救い出した救国の英雄。", skill: { name: "西欧防衛の盾", desc: "味方全体の歴史力+20%", type: "buff_all", value: 0.2, rate: 0.6 } },
  { id: 513, name: "テオドリック大王", power: 132, hp: 68, attribute: "VALOR", desc: "東ゴート王国の建国者。フン族の支配から自立し、イタリアに侵攻してオドアケルを討つ。ラヴェンナを都に定め、ローマの法と文化を尊重しつつゲルマン人を統治する二重統治体制でイタリアに平和をもたらした。", skill: { name: "東ゴートの覇権", desc: "敵全員の歴史力-20%", type: "debuff_all", value: 0.2, rate: 0.6 } },
  { id: 514, name: "エグバート", power: 95, hp: 105, attribute: "VALOR", desc: "ウェセックス王国の王。マーシアやノーサンブリアなどのアングロ＝サクソン七王国（ヘプターキー）を次々と服属させ、9世紀前半に事実上初めてイングランドを統一し、のちの国家の基礎を固めた。", skill: { name: "七王国統一", desc: "相手が【政治】なら自身の歴史力+50%", type: "cond_buff_self", target: "STRATEGY", value: 0.5, rate: 0.8 } },
  { id: 515, name: "アルフレッド大王", power: 108, hp: 92, attribute: "VALOR", desc: "イングランドのウェセックス王。侵攻してきたデーン人（ノルマン人）の軍勢をウェドモアの和議で退け、ロンドンを奪還。またラテン語文献の翻訳や法典編纂を行い、イギリスの軍事・文化の基盤を築いた。", skill: { name: "デーン人撃退", desc: "相手に最大HPの20%ダメージ", type: "fixed_damage", value: 0.2, rate: 0.6 } },
  { id: 516, name: "リューリク", power: 100, hp: 100, attribute: "VALOR", desc: "スウェーデン地方のノルマン人（ヴァリャーグ）の首領。スラヴ人の招きに応じて862年にノヴゴロド国を建国したとされる。これがのちのキエフ公国やロシアの起源となり、ロシア史の始まりを告げる存在。", skill: { name: "ノヴゴロド建国", desc: "自軍のHPを最大HPの20%回復", type: "heal_hp", value: 0.2, rate: 0.6 } },
  { id: 517, name: "イーゴリ", power: 98, hp: 102, attribute: "VALOR", desc: "キエフ公国の大公。リューリクの後継者として、コンスタンティノープルへの遠征を行いビザンツ帝国に軍事的圧力をかけた。通商条約を結んで交易の利益を得たが、従属部族から過酷な税を徴収しようとして殺害された。", skill: { name: "ビザンツ遠征", desc: "相手が【政治】なら相手を-40%弱体化", type: "cond_debuff_enemy", target: "STRATEGY", value: 0.4, rate: 0.8 } },
  { id: 518, name: "ロベルト・ギスカール", power: 106, hp: 94, attribute: "VALOR", desc: "ノルマン人の騎士。南イタリアへ進出し、教皇の支持を得てビザンツ帝国やイスラーム勢力を駆逐。ナポリやシチリアを制圧し、のちの両シチリア王国（ノルマン・シチリア王国）の基礎を築き上げた猛将。", skill: { name: "ノルマンの猛突進", desc: "被ダメージを70%カット", type: "damage_cut", value: 0.7, rate: 0.6 } },
  { id: 519, name: "ムラト1世", power: 114, hp: 86, attribute: "VALOR", desc: "オスマン帝国の第3代スルタン。アドリアノープル（エディルネ）を占領して遷都し、コソヴォの戦いでセルビアなどのバルカン半島のキリスト教諸国連合軍を大破。バルカン支配を決定づけたが戦場で暗殺された。", skill: { name: "コソヴォの勝利", desc: "1戦目配置時、歴史力+45%", type: "cond_pos_buff", pos: 1, value: 0.45, rate: 0.8 } },
  { id: 520, name: "ホスロー1世", power: 127, hp: 72, attribute: "VALOR", desc: "ササン朝ペルシアの最盛期の王。突厥と同盟を結んで中央アジアの遊牧民エフタルを挟撃して滅ぼした。またユスティニアヌス帝率いるビザンツ帝国とも互角に戦い、国内では税制改革を行い国力を充実させた。", skill: { name: "エフタル挟撃", desc: "相手から最大HPの15%を吸収", type: "absorb_hp", value: 0.15, rate: 0.6 } },
  { id: 521, name: "シャープール1世", power: 126, hp: 74, attribute: "VALOR", desc: "ササン朝の第2代国王。東方でクシャーナ朝を圧迫し、西方ではエデッサの戦いでローマの軍人皇帝ウァレリアヌスを捕虜にするという前代未聞の勝利を収め、ペルシアの威信をオリエント世界に知らしめた。", skill: { name: "ローマ皇帝捕縛", desc: "HP15%消費して自身の歴史力+60%", type: "sacrifice_buff", cost: 0.15, value: 0.6, rate: 0.8 } },
  { id: 522, name: "李広利", power: 96, hp: 104, attribute: "VALOR", desc: "前漢の武帝に仕えた将軍。武帝の命を受け、良馬である「汗血馬」を獲得するために遥か遠方の西域・大宛（フェルガナ）へ過酷な遠征を行い、これを屈服させた。シルクロードを通じた東西交渉を軍事的に支えた。", skill: { name: "大宛遠征", desc: "自軍HP半分以下なら自身の歴史力+60%", type: "cond_pinch_buff", value: 0.6, rate: 0.8 } },
  { id: 523, name: "甘英", power: 92, hp: 108, attribute: "VALOR", desc: "後漢の西域都護・班超の部下。班超の命を受けて大秦国（ローマ帝国）を目指して派遣された。パルティア（安息）の妨害にあってシリア方面（条支）で引き返したが、中国史上で最も西へ進んだ探検家の一人。", skill: { name: "西域の果てへ", desc: "相手の歴史力を-25%", type: "debuff_enemy", value: 0.25, rate: 0.7 } },
  { id: 524, name: "周瑜", power: 112, hp: 88, attribute: "VALOR", desc: "三国時代の孫呉の天才的な将軍。赤壁の戦いにおいて、圧倒的な兵力を誇る曹操の水軍に対し、火攻めなどの知略を用いて大打撃を与え、天下三分の計を決定づけた。知勇兼備の武将として後世に語り継がれる。", skill: { name: "赤壁の火攻め", desc: "次の味方の歴史力を+35%強化", type: "inherit_buff", value: 0.35, rate: 0.8 } },
  { id: 525, name: "関羽", power: 120, hp: 80, attribute: "VALOR", desc: "三国時代の蜀の武将。劉備に絶対的な忠誠を誓い、数々の戦場で無双の武勇を誇った。荊州の防衛を任されたが、呉の呂蒙の奇襲により敗死。後世、義理と武勇の象徴として神格化され「関帝」として信仰を集めた。", skill: { name: "武神の忠義", desc: "5戦目配置時、負け数\xD740%歴史力UP", type: "cond_pos_revenge", pos: 5, value: 0.4, rate: 0.9 } },

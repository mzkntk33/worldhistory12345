  { id: 526, name: "司馬炎", power: 118, hp: 82, attribute: "VALOR", desc: "西晋の初代皇帝（武帝）。魏の権臣・司馬昭の子。魏の元帝から禅譲を受けて皇帝となり、280年に呉を滅ぼして後漢末以来の分裂状態を収拾し中国を再統一。占田・課田法を定めて財政再建を図った。", skill: { name: "三国統一の覇業", desc: "超低確率(10%)で相手のHPを1にする", type: "hp_to_one", rate: 0.1 } },
  { id: 527, name: "拓跋珪", power: 115, hp: 85, attribute: "VALOR", desc: "鮮卑の拓跋部の首長。五胡十六国時代の混乱に乗じて代を建国し、のちに国号を魏（北魏）と定めた（道武帝）。華北において諸部族を次々と平定し、遊牧制から中国的な国家体制への移行の基礎を築いた。", skill: { name: "北魏の創始", desc: "HP10%消費して相手を25%弱体化", type: "sacrifice_debuff", cost: 0.1, value: 0.25, rate: 0.8 } },
  { id: 528, name: "太武帝", power: 115, hp: 85, attribute: "VALOR", desc: "北魏の第3代皇帝。柔然を討って北方を安定させ、439年に華北を完全に統一して五胡十六国時代を終結させた。寇謙之の新天師道（道教）を保護する一方で、仏教を激しく弾圧（廃仏）したことでも知られる。", skill: { name: "華北統一の軍略", desc: "自軍HP半分以下なら敵全体-35%", type: "cond_pinch_debuff_all", value: 0.35, rate: 0.8 } },
  { id: 529, name: "李淵", power: 104, hp: 96, attribute: "VALOR", desc: "唐の初代皇帝（高祖）。隋末の動乱期に太原で挙兵し、大興城（長安）を占領して618年に唐王朝を建国した。次男の李世民らの活躍により群雄を平定し、中国統一への確固たる道筋をつけ、唐の三百年の基礎を置いた。", skill: { name: "唐王朝の建国", desc: "次のラウンドの相手を-25%弱体化", type: "inherit_debuff", value: 0.25, rate: 0.7 } },
  { id: 530, name: "安禄山", power: 110, hp: 90, attribute: "VALOR", desc: "唐の玄宗時代に台頭したソグド系の節度使。平盧・范陽・河東の三節度使を兼任して絶大な軍事力を握り、755年に大燕皇帝を名乗って反乱（安史の乱）を起こした。洛陽と長安を陥落させたが息子に暗殺された。", skill: { name: "節度使の反乱", desc: "自身の歴史力+35%", type: "buff_self", value: 0.35, rate: 0.7 } },
  { id: 531, name: "黄巣", power: 106, hp: 94, attribute: "VALOR", desc: "唐末の塩の密売商人。重税と飢饉に苦しむ農民を率いて大反乱（黄巣の乱）を起こした。広州を略奪して北上し長安を占領、大斉皇帝を名乗ったが、内紛や唐軍の反撃に遭い敗死。唐の滅亡を決定づけた。", skill: { name: "塩商人の大乱", desc: "味方全体の歴史力+15%", type: "buff_all", value: 0.15, rate: 0.6 } },
  { id: 532, name: "朱全忠", power: 98, hp: 102, attribute: "VALOR", desc: "五代十国時代の後梁の建国者。もとは黄巣の乱の反乱軍の将であったが、唐に寝返って鎮圧に貢献し節度使となる。907年に唐の哀帝から禅譲を受けて唐を完全に滅ぼし、開封を都として武断政治を行った。", skill: { name: "後梁の武断政治", desc: "敵全員の歴史力-20%", type: "debuff_all", value: 0.2, rate: 0.6 } },
  { id: 533, name: "耶律徳光", power: 105, hp: 95, attribute: "VALOR", desc: "遼の第2代皇帝（太宗）。後晋の建国を軍事的に支援した代償として、中国本土の一部である「燕雲十六州」を獲得し、国号を遼と定めた。遊牧民の中国支配の先駆けとなり、二重統治体制を整備した。", skill: { name: "燕雲十六州の獲得", desc: "相手が【文化】なら自身の歴史力+50%", type: "cond_buff_self", target: "CULTURE", value: 0.5, rate: 0.8 } },
  { id: 534, name: "完顔旻", power: 112, hp: 88, attribute: "VALOR", desc: "ツングース系女真族の首長・完顔阿骨打。遼の過酷な支配に対して蜂起し、1115年に金王朝を建国した（太祖）。猛安・謀克の軍事行政制度を用いて強力な軍隊を組織し、北宋と結んで遼を滅亡に追い込んだ。", skill: { name: "猛安・謀克の猛威", desc: "相手に最大HPの20%ダメージ", type: "fixed_damage", value: 0.2, rate: 0.7 } },
  { id: 535, name: "李元昊", power: 102, hp: 98, attribute: "VALOR", desc: "タングート族を統一して1038年に西夏（大夏）を建国した初代皇帝。宋や遼と激しく抗争しつつ、独自の西夏文字を制定し、仏教を保護するなど民族文化の独自性を強く主張し、シルクロードの要衝を支配した。", skill: { name: "タングートの誇り", desc: "自軍のHPを最大HPの25%回復", type: "heal_hp", value: 0.25, rate: 0.6 } },
  { id: 536, name: "イェルマーク", power: 98, hp: 102, attribute: "VALOR", desc: "16世紀後半に活躍したロシアのコサックの首領。ストロガノフ家の援助を受けてウラル山脈を越え、シビル・ハン国を征服。この広大なシベリアの地を雷帝イヴァン4世に献上し、ロシアの東方進出の道を切り開いた。", skill: { name: "シベリア征服", desc: "相手が【政治】なら相手を-40%弱体化", type: "cond_debuff_enemy", target: "STRATEGY", value: 0.4, rate: 0.8 } },
  { id: 537, name: "ステンカ・ラージン", power: 135, hp: 65, attribute: "VALOR", desc: "17世紀後半のロシアのコサックの指導者。農奴制の強化（再版農奴制）に苦しむ逃亡農民を率いて、ヴォルガ川流域で大規模な反乱を起こした。モスクワを目指したがツァーリの正規軍に敗れ、処刑された。", skill: { name: "逃亡農民の蜂起", desc: "被ダメージを70%カット", type: "damage_cut", value: 0.7, rate: 0.6 } },
  { id: 538, name: "プガチョフ", power: 96, hp: 104, attribute: "VALOR", desc: "18世紀後半、エカチェリーナ2世の治世下のロシアで、自らを暗殺されたピョートル3世と偽って大農民反乱を主導したコサック。農奴制の廃止を掲げて広範な支持を得たが、鎮圧され皇帝の反動化を招いた。", skill: { name: "偽ツァーリの反乱", desc: "3戦目配置時、歴史力+45%", type: "cond_pos_buff", pos: 3, value: 0.45, rate: 0.8 } },
  { id: 539, name: "コシューシコ", power: 104, hp: 96, attribute: "VALOR", desc: "ポーランドの愛国者・軍人。アメリカ独立戦争に義勇兵として参加して活躍。帰国後、第2回ポーランド分割に対して祖国解放の義勇軍を率いて蜂起したが、ロシア・プロイセンの圧倒的な軍事力の前に敗れ去った。", skill: { name: "祖国解放の義勇戦", desc: "相手から最大HPの15%を吸収", type: "absorb_hp", value: 0.15, rate: 0.6 } },
  { id: 540, name: "ウラービー", power: 90, hp: 110, attribute: "VALOR", desc: "19世紀後半のエジプトの軍人。「エジプト人のためのエジプト」を掲げ、列強による財政支配や専制政治に反対してウラービー運動（革命）を主導。立憲制の確立を求めたが、イギリス軍の軍事介入により鎮圧された。", skill: { name: "反英民族運動", desc: "HP15%消費して自身の歴史力+60%", type: "sacrifice_buff", cost: 0.15, value: 0.6, rate: 0.8 } },
  { id: 541, name: "ドラコン", power: 92, hp: 108, attribute: "STRATEGY", desc: "前7世紀後半の古代アテネの立法者。貴族の恣意的な裁判を防ぐため、それまでの慣習法を初めて成文化（ドラコンの法）した。極めて厳格で刑罰が重かったが、アテネにおける法治主義と民主化の第一歩となった。", skill: { name: "厳格なる成文化", desc: "自軍HP半分以下なら自身の歴史力+50%", type: "cond_pinch_buff", value: 0.5, rate: 0.8 } },
  { id: 542, name: "カラカラ帝", power: 95, hp: 105, attribute: "STRATEGY", desc: "ローマ帝国のセウェルス朝の皇帝。212年に「アントニヌス勅令」を発布し、帝国内のすべての自由民にローマ市民権を付与した。税収の拡大を狙ったものだが、ローマ人と属州民の区別をなくし帝国を均質化した。", skill: { name: "アントニヌス勅令", desc: "相手の歴史力を-25%", type: "debuff_enemy", value: 0.25, rate: 0.7 } },
  { id: 543, name: "ウァレリアヌス", power: 85, hp: 115, attribute: "STRATEGY", desc: "3世紀の危機の時代に即位したローマの軍人皇帝。キリスト教徒を迫害。東方国境の防衛のためササン朝ペルシアのシャープール1世とエデッサの戦いで激突したが、敗北して捕虜となり、ローマの威信を大きく失墜させた。", skill: { name: "捕囚の軍人皇帝", desc: "次の味方の歴史力を+30%強化", type: "inherit_buff", value: 0.3, rate: 0.6 } },
  { id: 544, name: "レオ1世", power: 98, hp: 102, attribute: "STRATEGY", desc: "5世紀中頃のローマ教皇。「大教皇」と呼ばれる。452年、イタリア北部に侵攻してきたフン族の王アッティラと会見し、ローマ進軍を思いとどまらせて撤退させ、教皇の政治的権威とキリスト教会の威信を大いに高めた。", skill: { name: "教皇の説得", desc: "4戦目配置時、負け数\xD735%歴史力UP", type: "cond_pos_revenge", pos: 4, value: 0.35, rate: 0.9 } },
  { id: 545, name: "レオ3世", power: 104, hp: 96, attribute: "STRATEGY", desc: "8世紀末から9世紀初頭のローマ教皇。東ローマ帝国に対抗する政治的保護者を求め、800年のクリスマスの日にフランク王国のカール大帝に「西ローマ皇帝」の冠を授け、西欧キリスト教世界の独立と結束を象徴づけた。", skill: { name: "西ローマ皇帝戴冠", desc: "超低確率(10%)で相手のHPを1にする", type: "hp_to_one", rate: 0.1 } },
  { id: 546, name: "グレゴリウス7世", power: 110, hp: 90, attribute: "STRATEGY", desc: "11世紀後半のローマ教皇。クリュニー修道院の改革運動に影響を受け、聖職売買や妻帯を厳禁。聖職叙任権をめぐって神聖ローマ皇帝ハインリヒ4世と激しく争い、彼を破門してカノッサの屈辱で屈服させた。", skill: { name: "破門の宣告", desc: "HP15%消費して相手を30%弱体化", type: "sacrifice_debuff", cost: 0.15, value: 0.3, rate: 0.8 } },
  { id: 547, name: "インノケンティウス3世", power: 118, hp: 82, attribute: "STRATEGY", desc: "13世紀初頭のローマ教皇。「教皇は太陽、皇帝は月」と豪語し教皇権の絶頂期を現出。第4回十字軍やアルビジョワ十字軍を提唱し、イギリス王ジョンを破門して屈服させるなど、ヨーロッパの君主たちを圧倒した。", skill: { name: "教皇権の絶頂", desc: "自軍HP半分以下なら敵全体-35%", type: "cond_pinch_debuff_all", value: 0.35, rate: 0.9 } },
  { id: 548, name: "ボニファティウス8世", power: 62, hp: 138, attribute: "STRATEGY", desc: "13世紀末から14世紀初頭のローマ教皇。聖職者への課税権をめぐってフランス王フィリップ4世と激しく対立。1303年のアナーニ事件でフランス軍に捕縛されて屈辱を受け、憤死。教皇権の没落を決定づけた。", skill: { name: "アナーニの屈辱", desc: "次のラウンドの相手を-30%弱体化", type: "inherit_debuff", value: 0.3, rate: 0.7 } },
  { id: 549, name: "カール4世", power: 106, hp: 94, attribute: "STRATEGY", desc: "ルクセンブルク家出身の神聖ローマ皇帝にしてベーメン王。1356年に「金印勅書」を発布し、皇帝選出権を七選帝侯に限定することで帝国の分裂を固定化する一方、プラハ大学を創設しボヘミアの繁栄を築いた。", skill: { name: "金印勅書", desc: "自身の歴史力+35%", type: "buff_self", value: 0.35, rate: 0.7 } },
  { id: 550, name: "マクシミリアン1世", power: 105, hp: 95, attribute: "STRATEGY", desc: "ハプスブルク家出身の神聖ローマ皇帝。ブルゴーニュ公女との結婚や、子や孫の政略結婚を通じてスペインやネーデルラントなど広大な領土をハプスブルク家にもたらし、「幸いなるオーストリアよ結婚せよ」を体現した。", skill: { name: "政略結婚の網", desc: "味方全体の歴史力+20%", type: "buff_all", value: 0.2, rate: 0.6 } },
  { id: 551, name: "カール5世", power: 116, hp: 84, attribute: "STRATEGY", desc: "ハプスブルク家出身の神聖ローマ皇帝にしてスペイン国王（カルロス1世）。フランスのフランソワ1世とイタリア戦争で激突し、国内ではルターの宗教改革に直面してアウクスブルクの和議を結ぶなど、多難な帝国を統治した。", skill: { name: "日没なき帝国の苦悩", desc: "敵全員の歴史力-15%", type: "debuff_all", value: 0.15, rate: 0.6 } },
  { id: 552, name: "フェリペ2世", power: 115, hp: 85, attribute: "STRATEGY", desc: "16世紀後半のスペイン国王。ポルトガルを併合して「太陽の沈まぬ国」と呼ばれる絶対王政の最盛期を築く。レパントの海戦でオスマン軍を破るが、オランダ独立戦争や無敵艦隊の敗北により帝国の衰退を招いた。", skill: { name: "無敵艦隊の威容", desc: "相手が【軍事】なら自身の歴史力+45%", type: "cond_buff_self", target: "VALOR", value: 0.45, rate: 0.8 } },
  { id: 553, name: "ジョアン2世", power: 108, hp: 92, attribute: "STRATEGY", desc: "15世紀後半のポルトガル国王。貴族の力を抑えて強力な王権を確立し、海外探検を積極的に後援。バルトロメウ・ディアスにアフリカ南端の喜望峰を発見させ、インド航路開拓の決定的な基礎を築き上げた。", skill: { name: "航海事業の保護", desc: "相手に最大HPの20%ダメージ", type: "fixed_damage", value: 0.2, rate: 0.6 } },
  { id: 554, name: "マヌエル1世", power: 112, hp: 88, attribute: "STRATEGY", desc: "16世紀初頭のポルトガル国王。ヴァスコ・ダ・ガマのインド到達やカブラルのブラジル発見を支援し、香辛料貿易による莫大な富でリスボンを繁栄させた。独特の装飾的なマヌエル様式の建築でも知られる。", skill: { name: "香辛料の富", desc: "自軍のHPを最大HPの25%回復", type: "heal_hp", value: 0.25, rate: 0.6 } },
  { id: 555, name: "チャールズ2世", power: 96, hp: 104, attribute: "STRATEGY", desc: "ピューリタン革命後の王政復古で即位したイギリス国王。専制を復活させ、親カトリック政策をとったため議会と激しく対立。議会は審査法や人身保護法を制定して王権を牽制し、後の名誉革命の火種となった。", skill: { name: "王政復古の反動", desc: "相手が【文化】なら相手を-40%弱体化", type: "cond_debuff_enemy", target: "CULTURE", value: 0.4, rate: 0.8 } },
  { id: 556, name: "ジェームズ2世", power: 90, hp: 110, attribute: "STRATEGY", desc: "チャールズ2世の弟でイギリス国王。熱心なカトリック教徒であり、審査法を無視してカトリックを重用し絶対王政の復活を企てた。これに反発した議会により、1688年の名誉革命で王位を追放されフランスへ亡命した。", skill: { name: "親カトリック政策", desc: "被ダメージを80%カット", type: "damage_cut", value: 0.8, rate: 0.5 } },
  { id: 557, name: "ウィリアム3世", power: 105, hp: 95, attribute: "STRATEGY", desc: "オランダ総督（オラニエ公ウィレム）。名誉革命で議会の要請を受けて妻メアリとともにイギリスに上陸し、共同統治の国王として即位。「権利の宣言（権利の章典）」を承認し、イギリスにおける立憲君主制を確立した。", skill: { name: "権利の章典の承認", desc: "2戦目配置時、歴史力+45%", type: "cond_pos_buff", pos: 2, value: 0.45, rate: 0.8 } },
  { id: 558, name: "メアリ2世", power: 95, hp: 105, attribute: "STRATEGY", desc: "ジェームズ2世の娘でありながら新教徒。名誉革命の際、夫のウィリアム3世とともにイギリスの共同統治者（女王）として迎えられた。「権利の章典」を受け入れ、議会主権の原則に基づく議会政治の発展を支えた。", skill: { name: "名誉革命の共同統治", desc: "相手から最大HPの15%を吸収", type: "absorb_hp", value: 0.15, rate: 0.6 } },
  { id: 559, name: "ディズレーリ", power: 112, hp: 88, attribute: "STRATEGY", desc: "19世紀後半のイギリス保守党を代表する首相。スエズ運河会社株の買収やヴィクトリア女王のインド女帝推戴など、積極的な帝国主義外交を推進し、大英帝国の威信を世界に誇示した。第2回選挙法改正も行った。", skill: { name: "大英帝国の演出", desc: "HP10%消費して自身の歴史力+50%", type: "sacrifice_buff", cost: 0.1, value: 0.5, rate: 0.8 } },
  { id: 560, name: "グラッドストン", power: 110, hp: 90, attribute: "STRATEGY", desc: "19世紀後半のイギリス自由党を代表する首相。内政の自由主義的改革を重視し、教育法や労働組合法を制定、第3回選挙法改正で農民に選挙権を拡大。アイルランドの自治法案の成立に生涯を捧げた平和外交の政治家。", skill: { name: "自由党の良心", desc: "自軍HP半分以下なら自身の歴史力+60%", type: "cond_pinch_buff", value: 0.6, rate: 0.8 } },
  { id: 561, name: "フランクリン・ローズヴェルト", power: 118, hp: 82, attribute: "STRATEGY", desc: "アメリカ第32代大統領。世界恐慌に対し、TVA設立やワグナー法制定などの政府介入による「ニューディール政策」を断行。第二次大戦では連合国を指導し、恐慌からの脱却と世界の反ファシズムの勝利を導いた。", skill: { name: "ニューディール政策", desc: "相手の歴史力を-30%", type: "debuff_enemy", value: 0.3, rate: 0.7 } },
  { id: 562, name: "ウィルソン", power: 114, hp: 86, attribute: "STRATEGY", desc: "アメリカ第28代大統領。第一次大戦に参戦し、「十四カ条の平和原則」を発表して秘密外交の廃止や民族自決を提唱。国際連盟の創設を主導したが、議会の孤立主義によりアメリカ自身の加盟は実現できなかった。", skill: { name: "十四カ条の平和原則", desc: "次の味方の歴史力を+35%強化", type: "inherit_buff", value: 0.35, rate: 0.8 } },
  { id: 563, name: "ヴィルヘルム2世", power: 106, hp: 94, attribute: "STRATEGY", desc: "ドイツ帝国の第3代皇帝。ビスマルクを引退させ、親政を開始。帝国主義的な膨張政策である「世界政策」を掲げて3B政策や建艦競争を強行し、イギリスやロシアとの対立を深め、第一次世界大戦の最大の要因を作った。", skill: { name: "世界政策の強行", desc: "5戦目配置時、負け数\xD735%歴史力UP", type: "cond_pos_revenge", pos: 5, value: 0.35, rate: 0.9 } },
  { id: 564, name: "ニコライ1世", power: 102, hp: 98, attribute: "STRATEGY", desc: "19世紀のロシア皇帝。デカブリストの乱を鎮圧して即位し、厳格な専制政治（ツァーリズム）を敷いた。ポーランドの反乱やハンガリー独立運動を弾圧して「ヨーロッパの憲兵」と呼ばれ、クリミア戦争を引き起こした。", skill: { name: "ヨーロッパの憲兵", desc: "超低確率(10%)で相手のHPを1にする", type: "hp_to_one", rate: 0.1 } },
  { id: 565, name: "ニコライ2世", power: 94, hp: 106, attribute: "STRATEGY", desc: "ロマノフ朝最後のロシア皇帝。日露戦争中の血の日曜日事件から1905年革命に直面し、十月宣言で国会（ドゥーマ）開設を約束。第一次大戦での敗退と食糧難から1917年の二月革命で退位させられ、一家ともに処刑された。", skill: { name: "崩れゆく帝政", desc: "HP10%消費して相手を25%弱体化", type: "sacrifice_debuff", cost: 0.1, value: 0.25, rate: 0.7 } },
  { id: 566, name: "ウィッテ", power: 108, hp: 92, attribute: "STRATEGY", desc: "19世紀末から20世紀初頭のロシアの蔵相・首相。フランス資本を導入してシベリア鉄道の建設を推進し、ロシアの資本主義化と東方への帝国主義的進出を牽引。日露戦争後のポーツマス条約では全権として講和交渉にあたった。", skill: { name: "シベリア鉄道建設", desc: "自軍HP半分以下なら敵全体-35%", type: "cond_pinch_debuff_all", value: 0.35, rate: 0.8 } },
  { id: 567, name: "ストルイピン", power: 100, hp: 100, attribute: "STRATEGY", desc: "1905年革命後のロシアの首相。革命運動やテロを極めて徹底的に弾圧する反動政治を行う一方で、ミール（農村共同体）を解体して独立自営農民を育成しようとする強引な農業改革を進めたが、暗殺された。", skill: { name: "反動と農地改革", desc: "次のラウンドの相手を-30%弱体化", type: "inherit_debuff", value: 0.3, rate: 0.7 } },
  { id: 568, name: "マデロ", power: 95, hp: 105, attribute: "STRATEGY", desc: "メキシコ革命の口火を切った自由主義的な政治家。1910年に「再選反対」を掲げて長年のディアス独裁政権の打倒を訴え、サパタやビリャの蜂起を誘発して革命を成功させ大統領となったが、軍部の裏切りで暗殺された。", skill: { name: "革命の口火", desc: "自身の歴史力+35%", type: "buff_self", value: 0.35, rate: 0.7 } },
  { id: 569, name: "ビリャ", power: 124, hp: 76, attribute: "STRATEGY", desc: "メキシコ革命において、北部を中心に私兵（北部軍）を率いて大活躍した農民指導者。サパタとともに農地改革と貧民の救済を主張し、親米的な政権や軍部と激しく戦い続けた、民衆の英雄的ゲリラ。", skill: { name: "北部軍の疾駆", desc: "味方全体の歴史力+15%", type: "buff_all", value: 0.15, rate: 0.6 } },
  { id: 570, name: "アジェンデ", power: 98, hp: 102, attribute: "STRATEGY", desc: "チリの政治家。1970年の選挙で世界初の自由選挙による社会主義政権を樹立。銅山や外国企業の国有化など急進的な改革を進めたが、アメリカの支援を受けたピノチェト将軍の軍部クーデターにより政権を打倒され自決した。", skill: { name: "人民の連合", desc: "敵全員の歴史力-15%", type: "debuff_all", value: 0.15, rate: 0.6 } },
  { id: 571, name: "アナクシマンドロス", power: 85, hp: 115, attribute: "CULTURE", desc: "古代ギリシアのミレトス学派の自然哲学者。タレスの弟子。万物の根源（アルケー）は水や火などの特定の物質ではなく、無限で規定できない「ト・アペイロン（無限者）」であると論じ、抽象的な哲学的思考を深めた。", skill: { name: "無限者（アペイロン）", desc: "相手が【軍事】なら自身の歴史力+45%", type: "cond_buff_self", target: "VALOR", value: 0.45, rate: 0.8 } },
  { id: 572, name: "アナクシメネス", power: 82, hp: 118, attribute: "CULTURE", desc: "古代ギリシアのミレトス学派の自然哲学者。万物の根源（アルケー）を「空気（息）」であるとし、空気の希薄化と濃密化によって、火や風、雲、水、土といったあらゆる形態の事物が生成されると合理的に説明した。", skill: { name: "空気の希薄と濃密", desc: "相手に最大HPの20%ダメージ", type: "fixed_damage", value: 0.2, rate: 0.6 } },
  { id: 573, name: "ゼノン（エレア派）", power: 88, hp: 112, attribute: "CULTURE", desc: "古代ギリシアのエレア派の哲学者。「アキレウスと亀」や「飛んでいる矢は止まっている」などのパラドックス（逆理）を提起し、感覚による運動や多の存在を論理的に否定して、師パルメニデスの存在一元論を擁護した。", skill: { name: "アキレウスと亀", desc: "自軍のHPを最大HPの20%回復", type: "heal_hp", value: 0.2, rate: 0.6 } },
  { id: 574, name: "パルメニデス", power: 90, hp: 110, attribute: "CULTURE", desc: "古代ギリシアのエレア派の祖。「在るものは在り、在らぬものは在らない」と説き、生成や消滅、運動といった感覚的な変化は幻影にすぎず、真の存在は永遠不変で不可分な「一」であると主張し、存在論の基礎を築いた。", skill: { name: "永遠不変の存在", desc: "相手が【政治】なら相手を-40%弱体化", type: "cond_debuff_enemy", target: "STRATEGY", value: 0.4, rate: 0.8 } },
  { id: 575, name: "レウキッポス", power: 86, hp: 114, attribute: "CULTURE", desc: "古代ギリシアの哲学者。弟子のデモクリトスとともに、万物は分割不可能な微小な実体である「原子（アトム）」と「虚空（ケノン）」から構成されているとする原子論を初めて提唱し、自然現象の唯物論的な解明の道を拓いた。", skill: { name: "原子論の源流", desc: "被ダメージを70%カット", type: "damage_cut", value: 0.7, rate: 0.6 } },
  { id: 576, name: "テオフラストス", power: 92, hp: 108, attribute: "CULTURE", desc: "古代ギリシアの哲学者で、アリストテレスの最も優秀な弟子。師の後を継いでリュケイオン（逍遥学派）の学頭となる。植物の分類や生態を詳細に研究した『植物誌』を著し、「植物学の父」として後世の科学に貢献した。", skill: { name: "植物学の父", desc: "1戦目配置時、歴史力+45%", type: "cond_pos_buff", pos: 1, value: 0.45, rate: 0.8 } },
  { id: 577, name: "アポロニオス", power: 94, hp: 106, attribute: "CULTURE", desc: "ヘレニズム時代のアレクサンドリアで活躍したギリシアの数学者。円錐を様々な角度で切断した切り口に現れる曲線（楕円、放物線、双曲線）の性質を体系的に研究した『円錐曲線論』を著し、のちの天文学や近代数学に大きな影響を与えた。", skill: { name: "円錐曲線の幾何学", desc: "相手から最大HPの15%を吸収", type: "absorb_hp", value: 0.15, rate: 0.6 } },
  { id: 578, name: "ポリュクレイトス", power: 96, hp: 104, attribute: "CULTURE", desc: "前5世紀の古代ギリシアの彫刻家。人体の理想的な比率（カノン）を探求し、頭部が全身の7分の1であるとする理論を確立。その理論を体現した『槍を持つ青年（ドリュフォロス）』の像は、古典期彫刻の完璧な模範とされた。", skill: { name: "人体のカノン", desc: "HP10%消費して自身の歴史力+50%", type: "sacrifice_buff", cost: 0.1, value: 0.5, rate: 0.7 } },
  { id: 579, name: "ミュロン", power: 98, hp: 102, attribute: "CULTURE", desc: "前5世紀のアテネで活躍した彫刻家。競技者がまさに円盤を投げようとする一瞬の極度の緊張感と躍動感を見事に捉えた青銅像『円盤投げ（ディスコボロス）』を制作し、古代ギリシアの肉体美と運動の表現の頂点を示した。", skill: { name: "円盤投げの躍動", desc: "自軍HP半分以下なら自身の歴史力+50%", type: "cond_pinch_buff", value: 0.5, rate: 0.8 } },
  { id: 580, name: "スコパス", power: 75, hp: 125, attribute: "CULTURE", desc: "前4世紀の古代ギリシアの彫刻家・建築家。前世紀の調和や静寂を重んじた様式に対し、深く窪んだ目や身をよじるようなポーズによって、人間の激しい感情（パトス）や苦悩を表現する劇的な様式を確立し、ヘレニズム美術を先取りした。", skill: { name: "パトスの表現", desc: "相手の歴史力を-25%", type: "debuff_enemy", value: 0.25, rate: 0.7 } },
  { id: 581, name: "ディオスコリデス", power: 100, hp: 100, attribute: "CULTURE", desc: "ローマ帝国時代のギリシア人医師・薬物学者。皇帝ネロの軍隊に従軍し、地中海各地の数百種に及ぶ薬用植物や鉱物に関する知識を集大成した『薬物誌（マテリア・メディカ）』を著述。イスラームや中世ヨーロッパの薬学の絶対的権威となった。", skill: { name: "マテリア・メディカ", desc: "次の味方の歴史力を+35%強化", type: "inherit_buff", value: 0.35, rate: 0.7 } },
  { id: 582, name: "トスカネリ", power: 102, hp: 98, attribute: "CULTURE", desc: "15世紀フィレンツェの天文学者・地理学者。プトレマイオスの地理学を研究し、地球球体説に基づく新しい世界地図を作成。「西へ向かえばアジア（インディアス）に到達できる」と主張し、コロンブスの歴史的な大西洋横断の強力な論拠となった。", skill: { name: "地球球体説の証明", desc: "3戦目配置時、負け数\xD735%歴史力UP", type: "cond_pos_revenge", pos: 3, value: 0.35, rate: 0.9 } },
  { id: 583, name: "ブラマンテ", power: 68, hp: 132, attribute: "CULTURE", desc: "盛期ルネサンスの偉大な建築家。ミラノで活躍したのちローマへ移り、教皇ユリウス2世の命を受けてサン・ピエトロ大聖堂の改築の最初の主任建築家となった。古代ローマの調和と威厳を取り入れた集中式平面の壮大な設計構想を立てた。", skill: { name: "大聖堂の設計", desc: "超低確率(10%)で相手のHPを1にする", type: "hp_to_one", rate: 0.1 } },
  { id: 584, name: "ギベルティ", power: 104, hp: 96, attribute: "CULTURE", desc: "15世紀初期フィレンツェの彫刻家・金細工師。サン・ジョヴァンニ洗礼堂の青銅製門扉のコンクールでブルネレスキを破って優勝。のちにミケランジェロが「天国への門」と絶賛した、透視図法を駆使した極めて精緻で美しい浮き彫り作品を完成させた。", skill: { name: "天国への門", desc: "HP10%消費して相手を25%弱体化", type: "sacrifice_debuff", cost: 0.1, value: 0.25, rate: 0.7 } },
  { id: 585, name: "ファン・ダイク", power: 106, hp: 94, attribute: "CULTURE", desc: "17世紀のフランドル派の画家。ルーベンスの最も優秀な弟子。のちにイギリスに渡りチャールズ1世の首席宮廷画家として活躍。気品と優雅さに満ちた洗練された貴族の肖像画を数多く残し、イギリスの肖像画の伝統を確立した。", skill: { name: "気品ある肖像", desc: "自軍HP半分以下なら敵全体-30%", type: "cond_pinch_debuff_all", value: 0.3, rate: 0.8 } },
  { id: 586, name: "ワトー", power: 95, hp: 105, attribute: "CULTURE", desc: "18世紀前半のフランスの画家。ロココ美術の先駆者。「シテール島の巡礼」などに代表されるように、貴族たちの優雅で甘美な恋愛遊戯（雅宴画）を、繊細な色彩と軽やかな筆致で描き、絶対王政末期の宮廷文化の爛熟を表現した。", skill: { name: "雅宴画の色彩", desc: "次のラウンドの相手を-25%弱体化", type: "inherit_debuff", value: 0.25, rate: 0.7 } },
  { id: 587, name: "ブーシェ", power: 92, hp: 108, attribute: "CULTURE", desc: "18世紀フランスのロココ美術を代表する画家。ルイ15世の愛妾ポンパドゥール夫人の厚い庇護を受け、宮廷の首席画家となる。神話や牧歌的な風景を題材とし、官能的で華麗な装飾性に富む甘美な作品を量産し、ロココ趣味の頂点を極めた。", skill: { name: "ロココの装飾", desc: "自身の歴史力+35%", type: "buff_self", value: 0.35, rate: 0.7 } },
  { id: 588, name: "フラゴナール", power: 90, hp: 110, attribute: "CULTURE", desc: "18世紀後半のフランスのロココ画家。ブーシェの弟子。代表作「ぶらんこ」に見られるように、貴族の享楽的で軽薄な恋愛遊戯を、流麗な筆致と明るく魅惑的な色彩で描き出し、フランス革命前夜の華やかな貴族文化の最後を飾った。", skill: { name: "享楽のぶらんこ", desc: "味方全体の歴史力+15%", type: "buff_all", value: 0.15, rate: 0.6 } },
  { id: 589, name: "コルネイユ", power: 105, hp: 95, attribute: "CULTURE", desc: "17世紀フランスの劇作家。フランス古典主義悲劇の創始者。代表作『ル・シッド』において、個人の情熱的な恋愛と、国家や名誉に対する義務との間の激しい葛藤を崇高な韻文で描き出し、理性を重んじる古典演劇の基礎を築いた。", skill: { name: "ル・シッドの葛藤", desc: "敵全員の歴史力-15%", type: "debuff_all", value: 0.15, rate: 0.6 } },
  { id: 590, name: "ラシーヌ", power: 108, hp: 92, attribute: "CULTURE", desc: "17世紀フランス古典主義文学の頂点を極めた悲劇作家。ルイ14世の宮廷で活躍し、代表作『アンドロマック』や『フェードル』において、人間の抑えがたい情念や運命の残酷さを、極めて洗練された厳格な形式と美しい詩行で描き出した。", skill: { name: "情念の悲劇", desc: "相手が【軍事】なら自身の歴史力+45%", type: "cond_buff_self", target: "VALOR", value: 0.45, rate: 0.8 } },
  { id: 591, name: "ラ・フォンテーヌ", power: 96, hp: 104, attribute: "CULTURE", desc: "17世紀フランス古典主義の詩人・モラリスト。イソップ寓話などに着想を得て、動物たちを主人公とした『寓話詩』を執筆。軽妙なユーモアと鋭い人間観察を通じて、当時の社会の偽善や人間の愚かさを風刺し、広く親しまれた。", skill: { name: "寓話の風刺", desc: "相手に最大HPの20%ダメージ", type: "fixed_damage", value: 0.2, rate: 0.6 } },
  { id: 592, name: "ヘンデル", power: 112, hp: 88, attribute: "CULTURE", desc: "18世紀のバロック音楽を代表するドイツ生まれの作曲家。のちにイギリスに帰化し、ハノーヴァー朝の宮廷で活躍。「水上の音楽」や、壮大なオラトリオ『メサイア』（「ハレルヤ・コーラス」を含む）を作曲し、劇的で華麗な音楽様式を確立した。", skill: { name: "ハレルヤ・コーラス", desc: "自軍のHPを最大HPの25%回復", type: "heal_hp", value: 0.25, rate: 0.6 } },
  { id: 593, name: "バッハ", power: 118, hp: 82, attribute: "CULTURE", desc: "18世紀ドイツの偉大な作曲家・オルガン奏者。対位法を極め、「マタイ受難曲」や「ブランデンブルク協奏曲」などの不朽の名作を残し、バロック音楽の最高峰として「音楽の父」と称される。その精緻な構築美は近代西洋音楽の基礎となった。", skill: { name: "対位法の極致", desc: "相手が【政治】なら相手を-40%弱体化", type: "cond_debuff_enemy", target: "STRATEGY", value: 0.4, rate: 0.8 } },
  { id: 594, name: "ハイドン", power: 110, hp: 90, attribute: "CULTURE", desc: "18世紀後半のオーストリアの作曲家。エステルハージ家の宮廷楽長として長年仕える。ソナタ形式を確立し、100曲以上の交響曲や多数の弦楽四重奏曲を作曲してウィーン古典派の様式を完成させ、「交響曲の父」と敬愛される。", skill: { name: "ソナタ形式の完成", desc: "被ダメージを80%カット", type: "damage_cut", value: 0.8, rate: 0.5 } },
  { id: 595, name: "シューベルト", power: 106, hp: 94, attribute: "CULTURE", desc: "19世紀オーストリアのロマン派初期の作曲家。わずか31年の生涯の中で、「魔王」や連作歌曲「冬の旅」など、詩の文学的な情景を美しい旋律とピアノの伴奏で劇的に表現した600曲以上の芸術歌曲（リート）を創作し、「歌曲の王」と呼ばれる。", skill: { name: "魔王の旋律", desc: "2戦目配置時、歴史力+45%", type: "cond_pos_buff", pos: 2, value: 0.45, rate: 0.8 } },
  { id: 596, name: "ショパン", power: 108, hp: 92, attribute: "CULTURE", desc: "19世紀前半にパリで活躍したポーランド出身のロマン派の作曲家・ピアニスト。祖国の滅亡を嘆く「革命のエチュード」やマズルカなど、ピアノの表現の限界を広げる優美で詩的な数々の名曲を残し、「ピアノの詩人」と称される。", skill: { name: "革命のエチュード", desc: "相手から最大HPの15%を吸収", type: "absorb_hp", value: 0.15, rate: 0.6 } },
  { id: 597, name: "ヴァーグナー", power: 115, hp: 85, attribute: "CULTURE", desc: "19世紀ドイツのロマン派音楽の巨匠。音楽、演劇、舞台美術を完全に統合した「総合芸術」としての楽劇（ムジークドラーマ）を創始。ゲルマン神話を題材とした壮大な『ニーベルングの指環』や『トリスタンとイゾルデ』を作曲し、後世に絶大な影響を与えた。", skill: { name: "総合芸術の楽劇", desc: "HP15%消費して自身の歴史力+60%", type: "sacrifice_buff", cost: 0.15, value: 0.6, rate: 0.8 } },
  { id: 598, name: "プッチーニ", power: 104, hp: 96, attribute: "CULTURE", desc: "19世紀末から20世紀初頭のイタリアのオペラ作曲家。ヴェルディの後継者。甘美で叙情的な旋律と劇的な管弦楽法を駆使し、日本の長崎を舞台にした『蝶々夫人』や『ラ・ボエーム』『トスカ』など、世界中で愛される傑作オペラを生み出した。", skill: { name: "蝶々夫人の哀歌", desc: "自軍HP半分以下なら自身の歴史力+60%", type: "cond_pinch_buff", value: 0.6, rate: 0.8 } },
  { id: 599, name: "ヴェルディ", power: 112, hp: 88, attribute: "CULTURE", desc: "19世紀イタリアを代表するロマン派のオペラ作曲家。『椿姫』『アイーダ』『ナブッコ』など、人間の熱い感情と劇的なドラマを力強い旋律で描き出した。彼の音楽はイタリア統一運動（リソルジメント）の愛国的な象徴としても熱狂的に支持された。", skill: { name: "アイーダの凱旋", desc: "相手の歴史力を-30%", type: "debuff_enemy", value: 0.3, rate: 0.7 } },
  { id: 600, name: "ドヴォルザーク", power: 102, hp: 98, attribute: "CULTURE", desc: "19世紀後半のチェコの作曲家。スメタナの志を継ぐ国民楽派の代表。ボヘミアの豊かな民俗音楽の要素を古典的な交響曲の形式に見事に融合させた。渡米中に故郷への郷愁を込めて作曲した交響曲第9番『新世界より』は世界的名作。", skill: { name: "新世界より", desc: "次の味方の歴史力を+35%強化", type: "inherit_buff", value: 0.35, rate: 0.8 } },
  { id: 601, name: "ピピン（小ピピン）", power: 118, hp: 82, attribute: "VALOR", desc: "カロリング朝の創始者。宮宰として実権を握り、教皇の支持を得てメロヴィング朝を廃し王位に就く。ランゴバルド王国を討ち、獲得したラヴェンナ地方を教皇に寄進（ピピンの寄進）し、教皇領の起源を作ったフランク王国の名君。", skill: { name: "教皇への寄進", desc: "味方全体の歴史力+20%", type: "buff_all", value: 0.2, rate: 0.6 } },
  { id: 602, name: "ティリー", power: 106, hp: 94, attribute: "VALOR", desc: "三十年戦争期の神聖ローマ帝国軍（カトリック連盟軍）の司令官。白山の戦いでベーメンの新教徒軍を破り、デンマーク軍も撃退して皇帝軍を優位に導いた。しかし、のちにスウェーデン王グスタフ・アドルフの軍に敗れ戦死した。", skill: { name: "旧教軍の指揮", desc: "敵全員の歴史力-20%", type: "debuff_all", value: 0.2, rate: 0.6 } },
  { id: 603, name: "シャルル7世", power: 102, hp: 98, attribute: "VALOR", desc: "百年戦争後期のフランス国王。イギリス軍に追いつめられていたが、ジャンヌ・ダルクの助けでオルレアン包囲を解き、ランスで正式に戴冠。軍制改革で常備軍を創設し、カレーを除くフランス全土からイギリス軍を駆逐した。", skill: { name: "常備軍の創設", desc: "自身の歴史力+40%", type: "buff_self", value: 0.4, rate: 0.7 } },
  { id: 604, name: "トロツキー", power: 114, hp: 86, attribute: "VALOR", desc: "ロシア革命の指導者。十月革命において軍事革命委員会を率いて武装蜂起を指揮。ブレスト・リトフスク条約の交渉にあたり、内戦期には赤軍を創設して白軍を撃破した。レーニン死後、世界革命論を唱えたがスターリンに敗れた。", skill: { name: "赤軍の創設", desc: "相手の歴史力を-30%", type: "debuff_enemy", value: 0.3, rate: 0.7 } },
  { id: 605, name: "ヴォー・グエン・ザップ", power: 116, hp: 84, attribute: "VALOR", desc: "ベトナムの軍人・政治家。ホー・チ・ミンの右腕としてベトミンの軍事部門を指揮。第一次インドシナ戦争のディエンビエンフーの戦いでフランス軍を降伏させ、ベトナム戦争でも対米軍事戦略を主導した救国の名将。", skill: { name: "人民戦争の軍略", desc: "相手が【政治】なら自身の歴史力+50%", type: "cond_buff_self", target: "STRATEGY", value: 0.5, rate: 0.8 } },
  { id: 606, name: "スバス・チャンドラ・ボース", power: 105, hp: 95, attribute: "VALOR", desc: "インドの独立運動指導者。国民会議派急進派としてガンディーの非暴力主義と対立。第二次世界大戦中、枢軸国側の支援を受けシンガポールで自由インド仮政府を樹立。インド国民軍（INA）を組織してイギリス軍と武力で戦った。", skill: { name: "インド国民軍", desc: "相手が【文化】なら相手を-40%弱体化", type: "cond_debuff_enemy", target: "CULTURE", value: 0.4, rate: 0.8 } },
  { id: 607, name: "ラクシュミー・バーイー", power: 100, hp: 100, attribute: "VALOR", desc: "インド大反乱（セポイの乱）における指導者の一人。ジャーンシーの王妃。イギリスの藩王国併合政策（失権の原則）に反発し、自ら男装して剣を振るい、反乱軍を率いてイギリス軍と勇猛に戦い戦死した「インドのジャンヌ・ダルク」。", skill: { name: "ジャーンシーの誇り", desc: "自軍のHPを最大HPの20%回復", type: "heal_hp", value: 0.2, rate: 0.6 } },
  { id: 608, name: "アギナルド", power: 104, hp: 96, attribute: "VALOR", desc: "フィリピンの独立運動指導者。秘密結社カティプーナンの武装蜂起に参加し、米西戦争の際にアメリカの支援でスペイン軍を撃破。1899年にフィリピン第一共和国の大統領となったが、のちにアメリカの植民地化に抵抗し戦った。", skill: { name: "フィリピン革命", desc: "1戦目配置時、歴史力+45%", type: "cond_pos_buff", pos: 1, value: 0.45, rate: 0.8 } },
  { id: 609, name: "アウン・サン", power: 110, hp: 90, attribute: "VALOR", desc: "ビルマ（ミャンマー）独立運動の指導者。タキン党書記長。「ビルマ建国の父」。第二次大戦中は日本の支援でビルマ独立義勇軍を創設したが、のち抗日武装蜂起に転じた。戦後、イギリスと独立協定を結んだ直後に暗殺された。", skill: { name: "独立義勇軍の決起", desc: "5戦目配置時、負け数\xD735%歴史力UP", type: "cond_pos_revenge", pos: 5, value: 0.35, rate: 0.9 } },
  { id: 610, name: "モントゴメリー", power: 112, hp: 88, attribute: "VALOR", desc: "第二次世界大戦におけるイギリス陸軍の名将。北アフリカ戦線のエル・アラメインの戦いにおいて、ロンメル率いるドイツ・イタリア軍団を激戦の末に撃破し、反攻の転機を作った。のちノルマンディー上陸作戦でも陸軍を指揮した。", skill: { name: "反攻の指揮", desc: "自軍HP半分以下なら自身の歴史力+60%", type: "cond_pinch_buff", value: 0.6, rate: 0.8 } },
  { id: 611, name: "ロンメル", power: 138, hp: 62, attribute: "VALOR", desc: "第二次世界大戦におけるドイツの軍人。「砂漠の狐」と恐れられた。北アフリカ戦線において劣勢な戦力を巧みな機動戦で覆し、イギリス軍をたびたび破ってエジプト国境まで迫った。のちにヒトラー暗殺計画に関与したとされ自殺した。", skill: { name: "砂漠の狐", desc: "自軍HP半分以下なら敵全体-35%", type: "cond_pinch_debuff_all", value: 0.35, rate: 0.8 } },
  { id: 612, name: "アイゼンハワー", power: 115, hp: 85, attribute: "VALOR", desc: "アメリカの軍人、のち大統領。第二次世界大戦においてヨーロッパ戦域の連合国軍最高司令官を務め、史上最大の水陸両用作戦であるノルマンディー上陸作戦を成功に導き、ナチス・ドイツを降伏させた。のち朝鮮戦争を休戦に導いた。", skill: { name: "史上最大の作戦", desc: "HP15%消費して自身の歴史力+60%", type: "sacrifice_buff", cost: 0.15, value: 0.6, rate: 0.8 } },
  { id: 613, name: "ヒンデンブルク", power: 108, hp: 92, attribute: "VALOR", desc: "第一次世界大戦におけるドイツの将軍、のちヴァイマル共和国大統領。大戦初期のタンネンベルクの戦いにおいてロシアの大軍を包囲殲滅する歴史的勝利を収めた。大統領時代は保守派を代表し、のちにヒトラーを首相に任命した。", skill: { name: "タンネンベルクの勝利", desc: "HP15%消費して相手を30%弱体化", type: "sacrifice_debuff", cost: 0.15, value: 0.3, rate: 0.7 } },
  { id: 614, name: "セシル・ローズ", power: 105, hp: 95, attribute: "VALOR", desc: "イギリスの帝国主義を象徴する政治家・実業家。ケープ植民地首相。南アフリカでダイヤモンドと金の採掘を独占。アフリカ縦断政策を強力に推進し、私兵を用いて内陸部を征服して自らの名を冠した「ローデシア」植民地を建設した。", skill: { name: "縦断政策の野望", desc: "相手に最大HPの20%ダメージ", type: "fixed_damage", value: 0.2, rate: 0.6 } },
  { id: 615, name: "李成桂", power: 124, hp: 76, attribute: "VALOR", desc: "朝鮮王朝（李氏朝鮮）の初代国王（太祖）。高麗の武将として紅巾の乱や倭寇の撃退で名声を高める。親明派として威化島回軍でクーデタを起こして実権を握り、1392年に王朝を建国。漢城（ソウル）に遷都し、朱子学を統治理念とした。", skill: { name: "威化島回軍", desc: "相手から最大HPの15%を吸収", type: "absorb_hp", value: 0.15, rate: 0.6 } },
  { id: 616, name: "崔武宣", power: 98, hp: 102, attribute: "VALOR", desc: "高麗末期から朝鮮王朝初期にかけての武将・発明家。中国から火薬製造の知識を持ち帰り、高麗で初めて火器局を設置。独自に大砲などの火器を開発・量産し、艦船に搭載することで沿岸を荒らしていた倭寇の大船団を壊滅させた。", skill: { name: "火器の独自開発", desc: "次の味方の歴史力を+35%強化", type: "inherit_buff", value: 0.35, rate: 0.7 } },
  { id: 617, name: "東郷平八郎", power: 137, hp: 63, attribute: "VALOR", desc: "日本の海軍軍人。日露戦争において連合艦隊司令長官を務める。日本海海戦において、地球を半周してやってきたロシアのバルチック艦隊を「丁字戦法」を用いて迎撃し、世界海戦史に残る完全な勝利を収め、列強に衝撃を与えた。", skill: { name: "丁字戦法", desc: "次のラウンドの相手を-30%弱体化", type: "inherit_debuff", value: 0.3, rate: 0.8 } },
  { id: 618, name: "クロパトキン", power: 124, hp: 76, attribute: "VALOR", desc: "ロシア帝国の軍人。日露戦争におけるロシア満州軍総司令官。遼陽会戦や奉天会戦で日本軍と激戦を展開。シベリア鉄道による増援を待つ持久戦で日本軍の国力を消耗させたが、国内の第一革命（血の日曜日事件）の勃発もあり敗退した。", skill: { name: "満州での遅滞戦術", desc: "被ダメージを75%カット", type: "damage_cut", value: 0.75, rate: 0.55 } },
  { id: 619, name: "アイバク", power: 128, hp: 72, attribute: "VALOR", desc: "インド初のイスラーム王朝である奴隷王朝の創始者。ゴール朝のマムルーク出身の武将として北インド平定に活躍。ゴール朝君主の暗殺後にデリーで自立してスルタンを称し、デリー・スルタン朝の時代を切り開いた。", skill: { name: "奴隷王朝創始", desc: "超低確率(10%)で相手のHPを1にする", type: "hp_to_one", rate: 0.1 } },
  { id: 620, name: "シヴァージー", power: 110, hp: 90, attribute: "VALOR", desc: "17世紀後半のインドにおけるマラーター王国の建国者。ヒンドゥー教徒のカースト集団であるマラーターを率い、ムガル帝国のアウラングゼーブのイスラーム至上主義的政策に抵抗。ゲリラ戦を用いてデカン高原に強固な勢力を築いた。", skill: { name: "マラーターの蜂起", desc: "味方全体の歴史力+20%", type: "buff_all", value: 0.2, rate: 0.6 } },
  { id: 621, name: "ティプー・スルターン", power: 105, hp: 95, attribute: "VALOR", desc: "18世紀後半、南インドのマイソール王国の支配者。「マイソールの虎」。フランスの軍事顧問を迎えて近代的な軍隊を編成しロケット兵器を実戦投入。イギリスのインド侵略（マイソール戦争）に対して最後まで抗戦したが戦死した。", skill: { name: "マイソールの虎", desc: "敵全員の歴史力-15%", type: "debuff_all", value: 0.15, rate: 0.6 } },
  { id: 622, name: "アラウンパヤー", power: 112, hp: 88, attribute: "VALOR", desc: "18世紀半ば、ビルマ（ミャンマー）最後の統一王朝であるコンバウン朝の創始者。モン人の反乱で滅亡したタウングー朝の混乱を収め、ビルマ人を結集して全土を再統一。タイのアユタヤ朝へも侵攻しインドシナ半島の覇権を握った。", skill: { name: "コンバウン朝建国", desc: "自身の歴史力+35%", type: "buff_self", value: 0.35, rate: 0.7 } },
  { id: 623, name: "マクシミリアン", power: 85, hp: 115, attribute: "VALOR", desc: "メキシコ帝国の皇帝。オーストリア皇帝の弟。メキシコ大統領フアレスの債務不履行宣言に乗じ、フランスのナポレオン3世の武力干渉によって傀儡皇帝に擁立された。しかしフランス軍の撤退後に捕らえられ処刑された悲劇の君主。", skill: { name: "フランスの傀儡", desc: "相手の歴史力を-25%", type: "debuff_enemy", value: 0.25, rate: 0.6 } },
  { id: 624, name: "ベルナドット", power: 102, hp: 98, attribute: "VALOR", desc: "フランス革命期の軍人でナポレオンの元帥。のちにスウェーデン王に推戴される。ナポレオンの没落を見越して反仏大同盟に参加し、ライプツィヒの戦いで祖国フランス軍を撃破。ウィーン会議でノルウェーを獲得し、現在の王家の祖となった。", skill: { name: "スウェーデン王位獲得", desc: "相手が【文化】なら自身の歴史力+45%", type: "cond_buff_self", target: "CULTURE", value: 0.45, rate: 0.8 } },
  { id: 625, name: "リュクサンブール公", power: 115, hp: 85, attribute: "VALOR", desc: "17世紀後半、フランス王ルイ14世の侵略戦争で活躍した最も優秀な将軍。オランダ侵略戦争などで、迅速な機動と奇襲によりオランダやスペインの同盟軍を圧倒し、フランス絶対王政の軍事的優位を決定づけた不敗の猛将。", skill: { name: "不敗の野戦指揮", desc: "相手が【政治】なら相手を-40%弱体化", type: "cond_debuff_enemy", target: "STRATEGY", value: 0.4, rate: 0.8 } },
  { id: 626, name: "コンデ公ルイ2世", power: 110, hp: 90, attribute: "VALOR", desc: "17世紀フランスの王族・名将。三十年戦争のロクロワの戦いで無敵を誇ったスペインのテルシオ（方陣）を壊滅させた。のちに王権の強化に反発してフロンドの乱を指導したが、恩赦を受けて復帰し、ルイ14世の将軍として再び活躍した。", skill: { name: "テルシオ粉砕", desc: "自軍のHPを最大HPの20%回復", type: "heal_hp", value: 0.2, rate: 0.6 } },
  { id: 627, name: "コリニー", power: 98, hp: 102, attribute: "VALOR", desc: "16世紀フランスの貴族・提督。ユグノー（カルヴァン派）の指導的立場に立ち、ユグノー戦争において新教徒軍を率いてカトリック側と戦った。国王の信任を得たが、それを恐れたカトリーヌ・ド・メディシスの陰謀で暗殺された。", skill: { name: "ユグノーの軍事指導", desc: "2戦目配置時、歴史力+40%", type: "cond_pos_buff", pos: 2, value: 0.4, rate: 0.7 } },
  { id: 628, name: "ギーズ公", power: 104, hp: 96, attribute: "VALOR", desc: "16世紀フランスの有力貴族。熱烈なカトリックの指導者としてユグノーを弾圧。ヴァシーの虐殺を引き起こしてユグノー戦争の直接の引き金を引き、カトリック同盟を結成してスペインの支援を得て王権をも脅かしたが、暗殺された。", skill: { name: "カトリック同盟", desc: "3戦目配置時、負け数\xD735%歴史力UP", type: "cond_pos_revenge", pos: 3, value: 0.35, rate: 0.8 } },
  { id: 629, name: "ブーランジェ", power: 95, hp: 105, attribute: "VALOR", desc: "19世紀後半のフランスの軍人。元陸相。対独復讐と第三共和政打倒を叫んで大衆の熱狂的な支持を集め、1889年にクーデタ（ブーランジェ事件）を期待されたが、決断できずにベルギーへ逃亡。ポピュリズムとナショナリズムの象徴。", skill: { name: "復讐主義の扇動", desc: "自軍HP半分以下なら自身の歴史力+50%", type: "cond_pinch_buff", value: 0.5, rate: 0.7 } },
  { id: 630, name: "マフディー", power: 100, hp: 100, attribute: "VALOR", desc: "19世紀後半、エジプトとイギリスの支配下にあったスーダンで、自らを救世主「マフディー」と称して反乱を起こした指導者。厳しい税と搾取に苦しむ民衆を率いて聖戦を展開し、ハルツームでイギリスのゴードン将軍を戦死させた。", skill: { name: "マフディーの聖戦", desc: "自軍HP半分以下なら敵全体-30%", type: "cond_pinch_debuff_all", value: 0.3, rate: 0.8 } },
  { id: 631, name: "プトレマイオス1世", power: 105, hp: 95, attribute: "STRATEGY", desc: "アレクサンドロス大王に仕えたマケドニアの将軍。大王死後のディアドコイ戦争を勝ち抜き、エジプトを支配してプトレマイオス朝を創始。首都アレクサンドリアに王立研究所や大図書館を建設し、ヘレニズム文化の学術的中心地とした。", skill: { name: "ムセイオンの建設", desc: "HP15%消費して自身の歴史力+60%", type: "sacrifice_buff", cost: 0.15, value: 0.6, rate: 0.8 } },
  { id: 632, name: "セレウコス1世", power: 106, hp: 94, attribute: "STRATEGY", desc: "アレクサンドロス大王の武将で、ディアドコイの一人。シリア、メソポタミアからイラン高原に至る広大な帝国東半分の領土を確保し、セレウコス朝シリアを建国。アンティオキアを首都とし、ヘレニズム世界の最大の領域を支配した。", skill: { name: "帝国東方の継承", desc: "HP15%消費して相手を30%弱体化", type: "sacrifice_debuff", cost: 0.15, value: 0.3, rate: 0.8 } },
  { id: 633, name: "アンティゴノス1世", power: 108, hp: 92, attribute: "STRATEGY", desc: "アレクサンドロス大王の武将。大王死後、帝国の再統一を目指して小アジアを中心に最強の勢力を築いたが、イプソスの戦いで他のディアドコイ連合軍に敗れ戦死した。のちにその孫がマケドニア本国を支配し王朝を確立した。", skill: { name: "帝国再統一の野望", desc: "相手に最大HPの20%ダメージ", type: "fixed_damage", value: 0.2, rate: 0.6 } },
  { id: 634, name: "ユリアヌス", power: 95, hp: 105, attribute: "STRATEGY", desc: "4世紀のローマ皇帝。コンスタンティヌス帝の甥。「背教者」と呼ばれる。キリスト教が国教化へと向かう中、新プラトン主義などの哲学やミトラ教に心酔し、伝統的な多神教の復興を企てたが、ササン朝との戦いで陣没し失敗した。", skill: { name: "異教の復興", desc: "相手から最大HPの15%を吸収", type: "absorb_hp", value: 0.15, rate: 0.6 } },
  { id: 635, name: "リキニウス", power: 98, hp: 102, attribute: "STRATEGY", desc: "4世紀初頭のローマ皇帝。ディオクレティアヌスの四帝分治制が崩壊する中、コンスタンティヌス1世とともに313年にミラノ勅令を発布し、キリスト教の信仰を公認した。東半分の帝国を統治したが、のちにコンスタンティヌスと対立し処刑された。", skill: { name: "ミラノ勅令の共同発布", desc: "次の味方の歴史力を+35%強化", type: "inherit_buff", value: 0.35, rate: 0.7 } },
  { id: 636, name: "オドアケル", power: 102, hp: 98, attribute: "STRATEGY", desc: "ゲルマン人の傭兵隊長。476年、西ローマ帝国の最後の皇帝ロムルス・アウグストゥルスを廃位し、西ローマ帝国を滅亡させた。自らは皇帝を名乗らず、東ローマ皇帝の宗主権を認める形でイタリアを統治したが、東ゴート族に滅ぼされた。", skill: { name: "西ローマ帝国の滅亡", desc: "次のラウンドの相手を-30%弱体化", type: "inherit_debuff", value: 0.3, rate: 0.7 } },
  { id: 637, name: "アブド・アッラフマーン3世", power: 121, hp: 79, attribute: "STRATEGY", desc: "10世紀前半、イベリア半島の後ウマイヤ朝の君主。アッバース朝やファーティマ朝に対抗して自ら「カリフ」の称号を採用し、王朝の最盛期を現出させた。首都コルドバは西ヨーロッパ最大の都市として発展し、イスラーム文化の中心となった。", skill: { name: "コルドバの繁栄", desc: "被ダメージを75%カット", type: "damage_cut", value: 0.75, rate: 0.55 } },
  { id: 638, name: "イルトゥトゥミシュ", power: 108, hp: 92, attribute: "STRATEGY", desc: "13世紀初頭、インドの奴隷王朝第2代スルタン。建国者アイバクの娘婿。モンゴル帝国の脅威を巧みな外交で回避しつつ、ベンガル地方などを平定してインドのイスラーム支配の基礎を強固に確立した。クトゥブ・ミナールを完成させた。", skill: { name: "スルタン権威の確立", desc: "超低確率(10%)で相手のHPを1にする", type: "hp_to_one", rate: 0.1 } },
  { id: 639, name: "バルバン", power: 112, hp: 88, attribute: "STRATEGY", desc: "13世紀後半、インド奴隷王朝の第9代スルタン。自身もマムルーク出身でありながら、君主権の神聖性を唱えて「王の影」を自称し、厳格な儀礼を導入。モンゴルの侵入を防衛しつつ、強力な専制政治を敷いてイスラーム国家の権威を高めた。", skill: { name: "王の影", desc: "味方全体の歴史力+15%", type: "buff_all", value: 0.15, rate: 0.6 } },
  { id: 640, name: "アラー・ウッディーン・ハルジー", power: 115, hp: 85, attribute: "STRATEGY", desc: "13世紀末、デリー・スルタン朝のハルジー朝第2代スルタン。強力な中央集権体制を築き、軍事費を賄うために厳格な物価統制と重税を実施。デカン高原から南インドへの大規模な遠征軍を派遣し、帝国の領土を最大に広げた。", skill: { name: "南インド大遠征", desc: "敵全員の歴史力-20%", type: "debuff_all", value: 0.2, rate: 0.6 } },
  { id: 641, name: "フィーローズ・シャー・トゥグルク", power: 106, hp: 94, attribute: "STRATEGY", desc: "14世紀後半、トゥグルク朝のスルタン。前代の急進的な政策で混乱した帝国を立て直すため、灌漑運河や病院の建設などの公共事業を熱心に行い民衆の支持を得た。しかし、非イスラーム教徒に対するジズヤの厳格な徴収など不寛容な政策もとった。", skill: { name: "運河と公共事業", desc: "自身の歴史力+40%", type: "buff_self", value: 0.4, rate: 0.7 } },
  { id: 650, name: "ペロン", power: 105, hp: 95, attribute: "STRATEGY", desc: "アルゼンチンの大統領。軍人出身。労働者の保護や外国企業の国有化など、国家社会主義的でポピュリズム的な政策を実施。労働者階級から熱狂的な支持を集めたが、経済の悪化と独裁的傾向により軍部のクーデタで追放・復帰を繰り返した。", skill: { name: "労働者保護のポピュリズム", desc: "HP10%消費して自身の歴史力+50%", type: "sacrifice_buff", cost: 0.1, value: 0.5, rate: 0.8 } },
  { id: 651, name: "ヴァルガス", power: 104, hp: 96, attribute: "STRATEGY", desc: "ブラジルの政治家。1930年の革命で実権を握り、独裁的な権力をもってコーヒー農園主を中心とする旧体制を打破。労働法制の整備や輸入代替工業化を推進し、経済の近代化と中央集権化を図る民族主義政治を展開し、「民衆の父」と呼ばれた。", skill: { name: "民衆の父", desc: "HP10%消費して相手を25%弱体化", type: "sacrifice_debuff", cost: 0.1, value: 0.25, rate: 0.7 } },
  { id: 652, name: "カルデナス", power: 108, hp: 92, attribute: "STRATEGY", desc: "メキシコの大統領。メキシコ革命の理念を継承し、大規模な農地改革を実行して農民に土地を分配。また、1938年にはアメリカ・イギリス系の外国資本が支配していた石油産業を完全に国有化し、民族資本の自立と経済的独立を推し進めた。", skill: { name: "石油産業の国有化", desc: "相手に最大HPの20%ダメージ", type: "fixed_damage", value: 0.2, rate: 0.6 } },
  { id: 653, name: "クーリッジ", power: 98, hp: 102, attribute: "STRATEGY", desc: "アメリカ第30代大統領（共和党）。ハーディングの急死で昇格。第一次大戦後の「黄金の20年代」と呼ばれる好景気の中、「アメリカのビジネスはビジネスである」と述べて伝統的な自由放任主義（レッセ・フェール）と親企業的な政策を貫いた。", skill: { name: "永遠の繁栄", desc: "相手から最大HPの15%を吸収", type: "absorb_hp", value: 0.15, rate: 0.5 } },
  { id: 654, name: "フーヴァー", power: 92, hp: 108, attribute: "STRATEGY", desc: "アメリカ第31代大統領（共和党）。就任直後の1929年にウォール街で株価大暴落が発生し世界恐慌に直面。自助努力と自由市場を信頼し、政府による直接的な経済介入には消極的であったため事態を悪化させ、次期選挙で大敗した。", skill: { name: "自由放任の限界", desc: "次の味方の歴史力を+30%強化", type: "inherit_buff", value: 0.3, rate: 0.6 } },
  { id: 655, name: "ケネディ", power: 114, hp: 86, attribute: "STRATEGY", desc: "アメリカ第35代大統領（民主党）。初のカトリック教徒。「ニューフロンティア」を掲げる。キューバ危機においてソ連のミサイル基地撤去を勝ち取り核戦争の危機を回避し、部分的核実験禁止条約（PTBT）を締結したが暗殺された。", skill: { name: "ニューフロンティア", desc: "次のラウンドの相手を-30%弱体化", type: "inherit_debuff", value: 0.3, rate: 0.8 } },
  { id: 656, name: "ジョンソン", power: 106, hp: 94, attribute: "STRATEGY", desc: "アメリカ第36代大統領（民主党）。ケネディ暗殺で昇格。「偉大な社会」を掲げ、公民権法や投票権法を成立させて黒人差別撤廃に尽力したが、ベトナム戦争への本格的な軍事介入（北爆）により激しい反戦運動を招き退陣した。", skill: { name: "偉大な社会計画", desc: "被ダメージを75%カット", type: "damage_cut", value: 0.75, rate: 0.55 } },
  { id: 657, name: "ニクソン", power: 120, hp: 80, attribute: "STRATEGY", desc: "アメリカ第37代大統領（共和党）。ベトナムからの米軍完全撤退を実現。1971年に金とドルの交換停止（ニクソン・ショック）を発表し国際通貨体制を変容させた。電撃的な中国訪問を果たして米中関係を正常化したが、ウォーターゲート事件で辞任。", skill: { name: "ニクソン・ドクトリン", desc: "超低確率(10%)で相手のHPを1にする", type: "hp_to_one", rate: 0.1 } },
  { id: 658, name: "サッチャー", power: 116, hp: 84, attribute: "STRATEGY", desc: "イギリス初の女性首相。「鉄の女」。過剰な福祉で停滞した「イギリス病」を克服するため、国営企業の民営化、規制緩和、減税など新自由主義的な改革を断行。対外的にはフォークランド戦争に勝利して強いイギリスを誇示した。", skill: { name: "新自由主義の鉄の女", desc: "味方全体の歴史力+20%", type: "buff_all", value: 0.2, rate: 0.7 } },
  { id: 659, name: "マクドナルド", power: 68, hp: 132, attribute: "STRATEGY", desc: "イギリスの労働党の政治家。1924年に初の労働党内閣を組閣。1929年に第2次内閣を組閣したが世界恐慌に直面し、失業保険削減をめぐり党と対立。党を離脱して保守党などと協力し、金本位制停止などを行う挙国一致内閣を組織した。", skill: { name: "挙国一致の妥協", desc: "敵全員の歴史力-15%", type: "debuff_all", value: 0.15, rate: 0.6 } },
  { id: 660, name: "アトリー", power: 104, hp: 96, attribute: "STRATEGY", desc: "イギリスの労働党首相。1945年の総選挙で政権を獲得。「ゆりかごから墓場まで」のベヴァリッジ報告に基づき、国民保健サービスの創設など福祉国家体制を確立。またインドやビルマなどの重要な植民地の独立を承認した。", skill: { name: "ゆりかごから墓場まで", desc: "自身の歴史力+35%", type: "buff_self", value: 0.35, rate: 0.7 } },
  { id: 661, name: "アナクレオン", power: 85, hp: 115, attribute: "CULTURE", desc: "前6世紀の古代ギリシアの抒情詩人。各地の僭主の宮廷で保護されて活躍した。酒と恋愛、青春の喜びを軽快で洗練された優美な韻律で詠う「アナクレオン風」の詩歌は、後世のヨーロッパ文学やルネサンスの詩人たちに愛され模倣された。", skill: { name: "優美なる抒情詩", desc: "相手の歴史力を-25%", type: "debuff_enemy", value: 0.25, rate: 0.7 } },
  { id: 662, name: "プラウトゥス", power: 88, hp: 112, attribute: "CULTURE", desc: "前3〜前2世紀の共和政ローマの喜劇作家。ギリシアのメナンドロスらの新喜劇を翻案・脚色し、奴隷の機知や恋愛のドタバタ劇など、ローマの庶民の日常をユーモアと活気に満ちたラテン語の口語で描き出し、モリエールらに影響を与えた。", skill: { name: "ローマの庶民喜劇", desc: "相手が【政治】なら自身の歴史力+45%", type: "cond_buff_self", target: "STRATEGY", value: 0.45, rate: 0.8 } },
  { id: 663, name: "テレンティウス", power: 86, hp: 114, attribute: "CULTURE", desc: "前2世紀の共和政ローマの喜劇作家。カルタゴの奴隷出身だが才能を認められ解放された。プラウトゥスの庶民的な笑いに対し、より洗練された優雅なラテン語表現と洗練された心理描写によるギリシア風の喜劇を書き、上流階級に好まれた。", skill: { name: "洗練された喜劇", desc: "相手が【軍事】なら相手を-40%弱体化", type: "cond_debuff_enemy", target: "VALOR", value: 0.4, rate: 0.8 } },
  { id: 664, name: "スエトニウス", power: 92, hp: 108, attribute: "CULTURE", desc: "後1〜2世紀の帝政ローマの歴史家。ハドリアヌス帝の書記長を務めた。カエサルからドミティアヌスまでの12人の皇帝の生涯を、私生活のスキャンダルや逸話を豊富に交えて描いた『皇帝伝』を著し、初期帝政の実態を後世に伝えた。", skill: { name: "皇帝伝の暴露", desc: "自軍のHPを最大HPの20%回復", type: "heal_hp", value: 0.2, rate: 0.5 } },
  { id: 665, name: "ヘロフィロス", power: 94, hp: 106, attribute: "CULTURE", desc: "前3世紀、エジプトのアレクサンドリアで活躍したギリシア人医学者・解剖学者。ムセイオンで研究を行い、史上初めて人体解剖を系統的に実施して、脳が神経と知性の中心であることや、動脈と静脈の違いなどを発見し医学の基礎を築いた。", skill: { name: "人体解剖の先駆", desc: "2戦目配置時、歴史力+40%", type: "cond_pos_buff", pos: 2, value: 0.4, rate: 0.7 } },
  { id: 666, name: "ヒッパルコス", power: 100, hp: 100, attribute: "CULTURE", desc: "前2世紀のギリシアの天文学者・数学者。肉眼による精密な天体観測を行い、恒星の明るさを6等級に分類する等級法を考案。また、球面三角法の基礎を確立し、春分点歳差を発見するなど、古代天文学の最高峰の学者。", skill: { name: "恒星の等級法", desc: "3戦目配置時、負け数\xD735%歴史力UP", type: "cond_pos_revenge", pos: 3, value: 0.35, rate: 0.9 } },
  { id: 667, name: "鄭玄", power: 105, hp: 95, attribute: "CULTURE", desc: "後漢の学者。古文と今文を統合し、様々な学説が乱立していた経書（五経）に対する注釈を統一的・体系的に整理して「訓詁学」を大成した。彼の解釈は後漢以降の儒学の絶対的な権威となり、唐の『五経正義』の基礎となった。", skill: { name: "訓詁学の大成", desc: "自軍HP半分以下なら自身の歴史力+60%", type: "cond_pinch_buff", value: 0.6, rate: 0.8 } },
  { id: 668, name: "馬融", power: 98, hp: 102, attribute: "CULTURE", desc: "後漢の学者。数千人の弟子を抱え、鄭玄の師としても知られる。古文経学を重んじつつも今文の説も取り入れ、儒学の経典に対して広く注釈を施し、後漢における訓詁学の発展の基礎を築いた。豪放磊落な性格で教養豊かな士大夫。", skill: { name: "経書の広範な注釈", desc: "自軍HP半分以下なら敵全体-30%", type: "cond_pinch_debuff_all", value: 0.3, rate: 0.8 } },
  { id: 669, name: "孔穎達", power: 102, hp: 98, attribute: "CULTURE", desc: "唐の太宗の勅命を受けて編纂事業を主導した儒学者。鄭玄らの訓詁学をベースとして、五経の解釈を政府として公式に統一した『五経正義』を完成させた。これは唐代以降の科挙における明経科の標準テキストとして用いられた。", skill: { name: "五経正義の編纂", desc: "HP15%消費して自身の歴史力+60%", type: "sacrifice_buff", cost: 0.15, value: 0.6, rate: 0.8 } },
  { id: 670, name: "沈括", power: 108, hp: 92, attribute: "CULTURE", desc: "北宋の科学者・政治家。退隠後に著した『夢渓筆談』は、当時の数学、天文学、地質学、さらには磁石の指極性（羅針盤の原理）や膠泥活字（活版印刷）の発明など、中国の最高水準の自然科学技術を網羅的に記録した貴重な百科全書的随筆。", skill: { name: "夢渓筆談の記録", desc: "HP10%消費して相手を25%弱体化", type: "sacrifice_debuff", cost: 0.1, value: 0.25, rate: 0.7 } },
  { id: 671, name: "宋応星", power: 96, hp: 104, attribute: "CULTURE", desc: "明代末期の科学者。中国の伝統的な産業技術に関する百科事典である『天工開物』を著した。農業、陶磁器、製紙、火器、冶金など、民衆の生活を支える実用的な技術を豊富な図解とともに記録し、江戸時代の日本にも伝わり影響を与えた。", skill: { name: "天工開物の実学", desc: "相手に最大HPの20%ダメージ", type: "fixed_damage", value: 0.2, rate: 0.6 } },
  { id: 672, name: "李時珍", power: 110, hp: 90, attribute: "CULTURE", desc: "明代の医師・本草学者。約30年かけて中国各地で薬草や鉱物などの実地調査を行い、1892種類の薬物と1万以上の処方を分類・体系化した薬物学の集大成『本草綱目』を完成させた。この書は近代医学・植物学にも大きな貢献をした。", skill: { name: "本草綱目の集大成", desc: "相手から最大HPの15%を吸収", type: "absorb_hp", value: 0.15, rate: 0.6 } },
  { id: 673, name: "徐光啓", power: 112, hp: 88, attribute: "CULTURE", desc: "明代末期の政治家・学者。イエズス会宣教師マテオ・リッチと交友。西洋の科学技術を積極的に導入し、リッチとともにユークリッド幾何学を『幾何原本』として漢訳。またアダム・シャールと暦の編纂を行い、『農政全書』を著した。", skill: { name: "西洋科学の導入", desc: "次の味方の歴史力を+35%強化", type: "inherit_buff", value: 0.35, rate: 0.8 } },
  { id: 674, name: "ルーベンス", power: 115, hp: 85, attribute: "CULTURE", desc: "17世紀フランドル派最大のバロック画家。外交官としても各国宮廷で活躍。豊満な肉体表現とダイナミックな構図、鮮やかな色彩を用いて、宗教画や神話画、マリー・ド・メディシスの生涯を描いた連作など、生命力あふれる大作を残した。", skill: { name: "バロックの生命力", desc: "次のラウンドの相手を-30%弱体化", type: "inherit_debuff", value: 0.3, rate: 0.8 } },
  { id: 675, name: "ベラスケス", power: 114, hp: 86, attribute: "CULTURE", desc: "17世紀スペインのバロック美術を代表する天才的な宮廷画家。国王フェリペ4世に仕えた。代表作『ブレダの開城』や、王女と女官たちを描きつつ画家自身も画面に描き込んだ複雑な構図の『ラス・メニーナス』は西洋美術史の最高傑作。", skill: { name: "宮廷の写実", desc: "被ダメージを65%カット", type: "damage_cut", value: 0.65, rate: 0.65 } },
  { id: 676, name: "ムリリョ", power: 95, hp: 105, attribute: "CULTURE", desc: "17世紀スペインのバロック画家。セビリアを中心に活躍。ベラスケスの写実性とは異なり、甘美で柔らかな色彩と光を用いて、『無原罪の御宿り』など優美で親しみやすい聖母画を数多く描き、熱狂的な信仰を集めた。", skill: { name: "無原罪の御宿り", desc: "超低確率(10%)で相手のHPを1にする", type: "hp_to_one", rate: 0.1 } },
  { id: 677, name: "エル・グレコ", power: 106, hp: 94, attribute: "CULTURE", desc: "16世紀後半にスペインのトレドで活躍したクレタ島出身の画家。極端に引き伸ばされた人体や特異な色彩、強烈な明暗法を用いる「マニエリスム」の代表的画家。『オルガス伯の埋葬』など、神秘的で宗教的な情熱に満ちた画風を確立した。", skill: { name: "神秘のマニエリスム", desc: "味方全体の歴史力+15%", type: "buff_all", value: 0.15, rate: 0.6 } },
  { id: 678, name: "レンブラント", power: 118, hp: 82, attribute: "CULTURE", desc: "17世紀オランダ黄金時代を代表する最大の画家。「光と影の魔術師」。市民階級の注文を受け、代表作『夜警』などの集団肖像画において、劇的な明暗法を駆使して人物の深い内面や魂のドラマを圧倒的な写実性で描き出した。", skill: { name: "光と影の魔術", desc: "敵全員の歴史力-20%", type: "debuff_all", value: 0.2, rate: 0.7 } },
  { id: 679, name: "フェルメール", power: 104, hp: 96, attribute: "CULTURE", desc: "17世紀オランダの画家。デルフトで活躍。現存する作品は極めて少ないが、『真珠の耳飾りの少女』や『牛乳を注ぐ女』などに見られるように、市民の日常的な室内空間に差し込む柔らかな光の反射を、写真のように緻密な構図で静謐に描いた。", skill: { name: "静謐なる光の粒子", desc: "自身の歴史力+35%", type: "buff_self", value: 0.35, rate: 0.7 } },
  { id: 680, name: "ミレー", power: 102, hp: 98, attribute: "CULTURE", desc: "19世紀フランスのバルビゾン派の画家。自然とともにある農民の過酷な労働や敬虔な日常を、深い共感と宗教的な崇高さを込めて描いた。『晩鐘』、『落穂拾い』、『種まく人』などの風景画・風俗画で世界的に親しまれている。", skill: { name: "農民への深い共感", desc: "相手の歴史力を-25%", type: "debuff_enemy", value: 0.25, rate: 0.6 } },
  { id: 681, name: "コロー", power: 90, hp: 110, attribute: "CULTURE", desc: "19世紀フランスのバルビゾン派を代表する風景画家。イタリアやフランス各地の自然を写生し、銀灰色を帯びた淡く詩的で叙情的な風景画を数多く残した。自然そのものの美しさを描く近代風景画の確立に貢献し、印象派への橋渡しとなった。", skill: { name: "銀灰色の叙情", desc: "相手が【政治】なら自身の歴史力+45%", type: "cond_buff_self", target: "STRATEGY", value: 0.45, rate: 0.8 } },
  { id: 682, name: "クールベ", power: 108, hp: 92, attribute: "CULTURE", desc: "19世紀フランスの写実主義の巨匠。「私に天使を見せてくれれば、それを描いて見せよう」と語り、ロマン主義の空想を否定。名もなき労働者や農民の現実の過酷な姿をありのままに描いた『石割り』などで旧来の芸術的権威に挑戦した。", skill: { name: "徹底した写実主義", desc: "相手が【軍事】なら相手を-40%弱体化", type: "cond_debuff_enemy", target: "VALOR", value: 0.4, rate: 0.8 } },
  { id: 683, name: "ドーミエ", power: 98, hp: 102, attribute: "CULTURE", desc: "19世紀フランスの版画家・風刺画家。七月王政や第二帝政の権力者、腐敗したブルジョワ社会を辛辣なカリカチュア（風刺画）で容赦なく批判し、国王を揶揄して投獄されたこともある。油彩画で民衆の日常を描く写実主義の先駆者でもあった。", skill: { name: "痛烈なカリカチュア", desc: "自軍のHPを最大HPの25%回復", type: "heal_hp", value: 0.25, rate: 0.6 } },
  { id: 684, name: "マネ", power: 112, hp: 88, attribute: "CULTURE", desc: "19世紀フランスの画家。「印象派の父」。神話や歴史ではなく現代の都市風俗を題材とし、伝統的な遠近法や陰影を無視して平面的で明るい色彩を用いた『草上の昼食』や『オランピア』を発表し、近代絵画の扉を開いた。", skill: { name: "近代絵画の扉", desc: "1戦目配置時、歴史力+45%", type: "cond_pos_buff", pos: 1, value: 0.45, rate: 0.8 } },
  { id: 685, name: "モネ", power: 116, hp: 84, attribute: "CULTURE", desc: "19世紀フランスの印象派を代表する画家。戸外での制作を徹底し、刻々と変化する光と空気の「印象」を明るい色彩の分割された筆致でカンヴァスに定着させた。彼の作品『印象・日の出』が「印象派」という名称の由来となった。", skill: { name: "印象・日の出", desc: "4戦目配置時、負け数\xD735%歴史力UP", type: "cond_pos_revenge", pos: 4, value: 0.35, rate: 0.9 } },
  { id: 686, name: "ルノワール", power: 104, hp: 96, attribute: "CULTURE", desc: "19世紀フランスの印象派の画家。モネらとともに光の効果を追求したが、風景よりも人物像を好んだ。『ムーラン・ド・ラ・ギャレットの舞踏会』など、パリの市民の歓楽や女性の姿を、幸福感あふれる暖かく輝くような色彩で描き出した。", skill: { name: "光と色彩の歓楽", desc: "自軍HP半分以下なら自身の歴史力+50%", type: "cond_pinch_buff", value: 0.5, rate: 0.8 } },
  { id: 687, name: "ドガ", power: 80, hp: 120, attribute: "CULTURE", desc: "19世紀フランスの印象派の画家。戸外の風景よりも人工的な光に照らされた室内の情景や都市風俗を好んだ。オペラ座のバレエの踊り子たちの一瞬の複雑な動きや、競馬場での馬の姿を、斬新な構図と正確なデッサン力で捉えた。", skill: { name: "踊り子の一瞬", desc: "自軍HP半分以下なら敵全体-30%", type: "cond_pinch_debuff_all", value: 0.3, rate: 0.8 } },
  { id: 688, name: "セザンヌ", power: 118, hp: 82, attribute: "CULTURE", desc: "19世紀末フランスのポスト印象派の巨匠。「近代絵画の父」。印象派の光の表現を継承しつつ、事物の永遠の形態と堅固な構造を追求し、「自然を円柱、球、円錐によって処理する」と語り、のちのキュビスムに決定的な影響を与えた。", skill: { name: "堅固なる構造への還元", desc: "HP15%消費して自身の歴史力+60%", type: "sacrifice_buff", cost: 0.15, value: 0.6, rate: 0.8 } },
  { id: 689, name: "ゴーガン", power: 106, hp: 94, attribute: "CULTURE", desc: "19世紀末フランスのポスト印象派の画家。近代西洋の物質文明に絶望し、純粋な自然と原始的な生命力を求めてタヒチ島に移住。平面的で強烈な色彩と、象徴的・神秘的なテーマを用いた『我々はどこから来たのか…』などを描いた。", skill: { name: "野生と神秘の色彩", desc: "HP10%消費して相手を25%弱体化", type: "sacrifice_debuff", cost: 0.1, value: 0.25, rate: 0.7 } },
  { id: 690, name: "ゴッホ", power: 114, hp: 86, attribute: "CULTURE", desc: "19世紀末オランダ出身のポスト印象派の画家。強烈な原色の対比と、うねるような荒々しい厚塗りのタッチで、『ひまわり』や『糸杉』など、自らの激しい内面的感情と生命力をキャンバスに爆発させ、表現主義の源流となった。", skill: { name: "激情の厚塗り", desc: "相手に最大HPの25%ダメージ", type: "fixed_damage", value: 0.25, rate: 0.7 } },
  { id: 691, name: "カンビュセス2世", power: 118, hp: 82, attribute: "VALOR", desc: "アケメネス朝ペルシアの第2代の王。建国者キュロス2世の息子。強力な軍勢を率いてエジプト第26王朝を滅ぼし、古代オリエントの全域を統一する偉業を成し遂げた。しかし、遠征中に本国で発生した反乱の知らせを受け、帰還の途上で不慮の死を遂げた。", skill: { name: "オリエントの完全制覇", desc: "味方全体の歴史力+20%", type: "buff_all", value: 0.2, rate: 0.6 } },
  { id: 692, name: "スティリコ", power: 114, hp: 86, attribute: "VALOR", desc: "西ローマ帝国末期の将軍。ヴァンダル族出身の半ゲルマン人ながら、テオドシウス帝の信任を受け軍司令官となる。アラリック率いる西ゴート族のイタリア侵攻を幾度も撃退し、滅亡寸前の帝国を一身で支えたが、のちに暗殺されローマ略奪の悲劇を招いた。", skill: { name: "帝国防衛の巨壁", desc: "被ダメージを80%カット", type: "damage_cut", value: 0.8, rate: 0.5 } },
  { id: 693, name: "アラリック", power: 112, hp: 88, attribute: "VALOR", desc: "西ゴート族の王。ゲルマン民族の大移動の先陣を切る。バルカン半島を荒らしたのちイタリア半島へ侵攻。名将スティリコの死後にローマを包囲し、410年に「ローマの劫掠（略奪）」を行い、永遠の都を蹂躙してヨーロッパ中に計り知れない衝撃を与えた。", skill: { name: "永遠の都の略奪", desc: "敵全員の歴史力-20%", type: "debuff_all", value: 0.2, rate: 0.6 } },
  { id: 694, name: "オレグ", power: 104, hp: 96, attribute: "VALOR", desc: "リューリクの後継者とされるノルマン人（ヴァリャーグ）の公。ノヴゴロドから南下してドニエプル川流域のキエフを占領し、キエフ公国を建てて初代大公となる。ビザンツ帝国へ遠征して有利な通商条約を結び、黒海交易ルート（ヴァリャーグからギリシアへの道）を確立した。", skill: { name: "水路の覇権", desc: "自軍のHPを最大HPの20%回復", type: "heal_hp", value: 0.2, rate: 0.5 } },
  { id: 695, name: "ヤン・ジシュカ", power: 110, hp: 90, attribute: "VALOR", desc: "15世紀のボヘミア（チェコ）におけるフス戦争の英雄的将軍。盲目でありながら卓越した軍略を発揮し、装甲馬車（戦車）や火器を用いた革新的な戦術で、十字軍を名乗る神聖ローマ皇帝側の重装騎士軍を何度も打ち破り、チェコの民族的独立を守り抜いた。", skill: { name: "装甲馬車の陣", desc: "相手が【政治】なら自身の歴史力+50%", type: "cond_buff_self", target: "STRATEGY", value: 0.5, rate: 0.8 } },
  { id: 696, name: "マールバラ公", power: 116, hp: 84, attribute: "VALOR", desc: "イギリスの将軍・政治家（ジョン・チャーチル）。スペイン継承戦争においてイギリス・オランダ連合軍の総司令官を務める。ブレンハイムの戦いでプリンツ・オイゲンと共にフランス軍を大破し、ルイ14世の覇権の野望を完全に打ち砕いた不世出の名将。", skill: { name: "無敵の野戦指揮", desc: "相手に最大HPの20%ダメージ", type: "fixed_damage", value: 0.2, rate: 0.6 } },
  { id: 697, name: "フランシス・ドレーク", power: 115, hp: 85, attribute: "VALOR", desc: "エリザベス1世に仕えたイギリスの航海者・私掠船の船長（海賊）。マゼランに次ぐ世界周航を達成。アルマダ海戦では副司令官として活躍し、火船攻撃などでスペインの「無敵艦隊」を撃滅。イギリスが海洋帝国へと飛躍する決定的な契機を作った。", skill: { name: "火船の奇襲", desc: "相手の歴史力を-30%", type: "debuff_enemy", value: 0.3, rate: 0.7 } },
  { id: 698, name: "ジョン・ホーキンス", power: 102, hp: 98, attribute: "VALOR", desc: "イギリスの航海者で、ドレークの従兄。西アフリカから黒人奴隷を獲得して新大陸のスペイン領に密輸する三角貿易をイギリスで初めて組織的に行った。アルマダ海戦でも艦隊の指揮を執り、イギリス海軍の軍艦の近代化に大きく貢献した実務家。", skill: { name: "海軍の近代化", desc: "次の味方の歴史力を+35%強化", type: "inherit_buff", value: 0.35, rate: 0.7 } },
  { id: 699, name: "ウォルター・ローリー", power: 100, hp: 100, attribute: "VALOR", desc: "エリザベス1世の寵臣であるイギリスの探検家。北米東海岸を探検し、処女王にちなんで「ヴァージニア」と名付け最初の植民地建設を試みた（ロアノーク植民地）。また南米の黄金郷（エル・ドラード）探検も行ったが、のちに反逆罪で処刑された。", skill: { name: "ヴァージニア探検", desc: "HP10%消費して相手を25%弱体化", type: "sacrifice_debuff", cost: 0.1, value: 0.25, rate: 0.7 } },
  { id: 700, name: "アルマグロ", power: 105, hp: 95, attribute: "VALOR", desc: "スペインのコンキスタドール。ピサロと共にインカ帝国の征服に参画。その後、さらなる富を求めて南下し、現在のチリ方面へ最初の遠征を行った。しかし恩賞の分配を巡ってピサロと激しく対立し、内戦の末に敗れて処刑された。", skill: { name: "チリへの遠征", desc: "相手から最大HPの15%を吸収", type: "absorb_hp", value: 0.15, rate: 0.6 } },
  { id: 701, name: "アイル・クート", power: 106, hp: 94, attribute: "VALOR", desc: "イギリス東インド会社の将軍。七年戦争に連動したインドでの第3次カーナティック戦争において、ヴァンディヴァッシュの戦いでフランス軍を決定的に打ち破った。これによりフランスのインド植民地帝国の夢は潰え、イギリスの覇権が確定した。", skill: { name: "覇権決定の勝利", desc: "次のラウンドの相手を-30%弱体化", type: "inherit_debuff", value: 0.3, rate: 0.8 } },
  { id: 702, name: "コルニロフ", power: 98, hp: 102, attribute: "VALOR", desc: "ロシア革命期の軍人。二月革命後にケレンスキー臨時政府の軍最高司令官となる。しかしボリシェヴィキなど左派の台頭を嫌い、右派による軍事独裁を目指してクーデター（コルニロフの反乱）を起こしたが失敗。結果的にボリシェヴィキの武装化を招いた。", skill: { name: "反乱の鎮圧失敗", desc: "HP15%消費して自身の歴史力+60%", type: "sacrifice_buff", cost: 0.15, value: 0.6, rate: 0.8 } },
  { id: 703, name: "ロジェストヴェンスキー", power: 95, hp: 105, attribute: "VALOR", desc: "日露戦争におけるロシアのバルチック艦隊の司令長官。ヨーロッパから喜望峰を回る過酷な大航海を経て極東に到達したが、日本海海戦で東郷平八郎率いる連合艦隊に完璧な包囲攻撃を受け、自身も重傷を負い捕虜となった悲劇の提督。", skill: { name: "地球半周の苦難", desc: "自軍HP半分以下なら自身の歴史力+60%", type: "cond_pinch_buff", value: 0.6, rate: 0.9 } },
  { id: 704, name: "ブルシーロフ", power: 110, hp: 90, attribute: "VALOR", desc: "第一次世界大戦のロシア帝国軍の将軍。1916年、東部戦線において「ブルシーロフ攻勢」と呼ばれる大規模な反撃を立案・指揮し、オーストリア軍に壊滅的な打撃を与えた。大戦中のロシア軍による唯一の成功した大攻勢であり、戦術的にも極めて高く評価される。", skill: { name: "大攻勢の衝撃", desc: "自軍HP半分以下なら敵全体-35%", type: "cond_pinch_debuff_all", value: 0.35, rate: 0.8 } },
  { id: 705, name: "デーニッツ", power: 108, hp: 92, attribute: "VALOR", desc: "第二次世界大戦におけるドイツの海軍元帥。Uボート（潜水艦）を用いた「群狼作戦」を考案・指揮し、大西洋の連合国輸送船団に甚大な被害を与えた。ヒトラーの自殺後、遺言によりドイツ国の最後の大統領（後継者）に指名され、無条件降伏の処理を行った。", skill: { name: "群狼作戦", desc: "2戦目配置時、歴史力+45%", type: "cond_pos_buff", pos: 2, value: 0.45, rate: 0.8 } },
  { id: 706, name: "チュイコフ", power: 112, hp: 88, attribute: "VALOR", desc: "第二次世界大戦のソ連赤軍の将軍。スターリングラード攻防戦において第62軍を指揮。廃墟となった市街地でドイツ軍との壮絶な接近戦・白兵戦を戦い抜き、最終的にパウルス元帥の第6軍を包囲・降伏させ、独ソ戦の歴史的な転換点を作った。", skill: { name: "廃墟の死闘", desc: "5戦目配置時、負け数\xD735%歴史力UP", type: "cond_pos_revenge", pos: 5, value: 0.35, rate: 0.9 } },
  { id: 707, name: "ジョージ・マーシャル", power: 105, hp: 95, attribute: "VALOR", desc: "アメリカの軍人・政治家。第二次大戦中は陸軍参謀総長として連合軍の全戦略を立案した「勝利の建築家」。戦後は国務長官として、西欧の経済復興と共産主義封じ込めを目的とした巨額の援助計画（マーシャル・プラン）を推進し、ノーベル平和賞を受賞。", skill: { name: "勝利の建築と復興", desc: "相手が【文化】なら相手を-40%弱体化", type: "cond_debuff_enemy", target: "CULTURE", value: 0.4, rate: 0.8 } },
  { id: 708, name: "ド・ゴール", power: 137, hp: 63, attribute: "VALOR", desc: "フランスの軍人・政治家。第二次大戦中、ペタンの降伏に反対してロンドンへ逃れ「自由フランス」を組織して抗戦を呼びかけた。戦後は第五共和政の初代大統領となり、アルジェリア独立承認やNATO軍事機構からの離脱など独自の独自外交を展開した。", skill: { name: "自由フランスの抗戦", desc: "自身の歴史力+40%", type: "buff_self", value: 0.4, rate: 0.7 } },
  { id: 709, name: "彭徳懐", power: 108, hp: 92, attribute: "VALOR", desc: "中国共産党の軍事指導者（元帥）。長征や日中戦争（百団大戦）で活躍し、朝鮮戦争では中国人民志願軍の総司令官として国連軍（米軍）を38度線まで押し返した。しかしのちの大躍進政策の失敗を毛沢東に直言（盧山会議）したため失脚し、文革で迫害死した。", skill: { name: "人民志願軍の指揮", desc: "相手に最大HPの20%ダメージ", type: "fixed_damage", value: 0.2, rate: 0.6 } },
  { id: 710, name: "林彪", power: 80, hp: 120, attribute: "VALOR", desc: "中国人民解放軍の卓越した軍事戦術家（元帥）。国共内戦の三大戦役（遼瀋戦役など）で国民党軍を壊滅させる。文化大革命では毛沢東の絶対的後継者に指名され『毛主席語録』を編纂したが、のちにクーデターを企てたとして逃亡中に墜落死した。", skill: { name: "殲滅の戦術", desc: "超低確率(10%)で相手のHPを1にする", type: "hp_to_one", rate: 0.1 } },
  { id: 711, name: "張作霖", power: 86, hp: 114, attribute: "VALOR", desc: "民国初期の奉天派軍閥の指導者。馬賊から身を起こし、日本の支援を受けて満洲（中国東北部）に強大な独立勢力を築き、北京政府の実権を握った。しかし蔣介石の北伐軍に敗れて満洲へ引き揚げる際、利用価値がないと判断した関東軍により爆殺された。", skill: { name: "奉天の覇者", desc: "HP15%消費して相手を30%弱体化", type: "sacrifice_debuff", cost: 0.15, value: 0.3, rate: 0.7 } },
  { id: 712, name: "呉佩孚", power: 102, hp: 98, attribute: "VALOR", desc: "民国初期の直隷派軍閥の代表的指導者。「秀才将軍」と呼ばれた。英米の支援を受け、一時北京政府を掌握して軍閥間の抗争（奉直戦争など）を勝ち抜いた。しかし国民革命軍の北伐によって決定的な打撃を受け、のちの満洲事変後も日本の誘いを拒否し続けた。", skill: { name: "直隷派の覇権", desc: "相手から最大HPの15%を吸収", type: "absorb_hp", value: 0.15, rate: 0.6 } },
  { id: 713, name: "段祺瑞", power: 100, hp: 100, attribute: "VALOR", desc: "袁世凱の後継者である安徽派軍閥の指導者。日本の寺内正毅内閣から巨額の借款（西原借款）を引き出し、第一次世界大戦に中国を参戦させた。その親日的な政策は民衆の怒りを買い、五・四運動を引き起こす原因となり、軍閥抗争に敗れて失脚した。", skill: { name: "西原借款と参戦", desc: "敵全員の歴史力-15%", type: "debuff_all", value: 0.15, rate: 0.6 } },
  { id: 714, name: "馮玉祥", power: 104, hp: 96, attribute: "VALOR", desc: "中国の軍閥指導者。「クリスチャン・将軍」と呼ばれ、部下に洗礼を受けさせた。ソ連の支援を受けて国民軍を組織し、北京政変を起こして溥儀を紫禁城から追放。のちに蔣介石の北伐に協力するが対立し、反蔣介石運動を展開した。", skill: { name: "北京政変", desc: "味方全体の歴史力+15%", type: "buff_all", value: 0.15, rate: 0.6 } },
  { id: 715, name: "バルディビア", power: 96, hp: 104, attribute: "VALOR", desc: "スペインのコンキスタドール。ピサロの部下としてペルー征服に参加後、南下してチリの征服を開始。サンティアゴ市を建設し、チリ総督となったが、マプチェ族の激しい抵抗に遭い、捕らえられて処刑された。", skill: { name: "チリの開拓", desc: "自軍のHPを最大HPの25%回復", type: "heal_hp", value: 0.25, rate: 0.5 } },
  { id: 716, name: "トゥパク・アマル", power: 98, hp: 102, attribute: "VALOR", desc: "インカ帝国の最後の皇帝（サパ・インカ）。スペインの苛酷な植民地支配に対し、ビルカバンバを拠点に長年にわたりゲリラ戦を展開して抵抗した。1572年に捕らえられ処刑され、インカ帝国は完全に滅亡した。のちの先住民反乱の精神的象徴となる。", skill: { name: "ビルカバンバの抵抗", desc: "被ダメージを75%カット", type: "damage_cut", value: 0.75, rate: 0.55 } },
  { id: 717, name: "ダヴィデ王", power: 136, hp: 64, attribute: "VALOR", desc: "古代イスラエル王国の第2代国王。ペリシテ人の巨人ゴリアテを投石で倒した逸話で知られる。イェルサレムを征服して都とし、周辺の諸民族を討って領土を拡大し、イスラエル王国の全盛期の基礎を築いた偉大な戦士にして詩人。", skill: { name: "巨人の打倒", desc: "3戦目配置時、歴史力+45%", type: "cond_pos_buff", pos: 3, value: 0.45, rate: 0.8 } },
  { id: 718, name: "ユダ・マカバイ", power: 105, hp: 95, attribute: "VALOR", desc: "セレウコス朝シリアのアンティオコス4世による、エルサレム神殿の汚しとユダヤ教弾圧に対して蜂起したユダヤ人の軍事的指導者。マカバイ戦争と呼ばれるゲリラ戦を指揮して神殿を奪還・浄め、のちのハスモン朝（独立国家）成立の英雄となった。", skill: { name: "神殿の奪還", desc: "相手が【政治】なら相手を-40%弱体化", type: "cond_debuff_enemy", target: "STRATEGY", value: 0.4, rate: 0.8 } },
  { id: 719, name: "ティグラネス2世", power: 108, hp: 92, attribute: "VALOR", desc: "古代アルメニア王国の最盛期の王。「大王」と称される。セレウコス朝やパルティアの領土を奪い、カスピ海から地中海に至る広大な帝国を築いた。しかし義父であるポントス王ミトリダテスと同盟してローマ（ルクッルスやポンペイウス）と戦い敗北した。", skill: { name: "大アルメニアの栄光", desc: "次の味方の歴史力を+35%強化", type: "inherit_buff", value: 0.35, rate: 0.7 } },
  { id: 720, name: "ミトリダテス6世", power: 112, hp: 88, attribute: "VALOR", desc: "小アジアのポントス王国の王。卓越した語学力と毒物への耐性を持っていたとされる。ローマの東方進出に強硬に抵抗し、ギリシア諸都市を味方につけて3度にわたる「ミトリダテス戦争」を引き起こしたが、スッラやポンペイウスに敗れ自刃した。", skill: { name: "反ローマの執念", desc: "次のラウンドの相手を-30%弱体化", type: "inherit_debuff", value: 0.3, rate: 0.8 } },
  { id: 721, name: "クフ王", power: 128, hp: 72, attribute: "STRATEGY", desc: "古代エジプト古王国第4王朝のファラオ。首都メンフィス近郊のギザに、エジプト史上最大規模のピラミッドを建造した。これは王の絶対的な神権的専制政治と、高度な測量・土木技術、そして莫大な労働力を動員できる国家体制の完成を示す。", skill: { name: "大ピラミッドの威容", desc: "自軍のHPを最大HPの20%回復", type: "heal_hp", value: 0.2, rate: 0.6 } },
  { id: 722, name: "テラメネス", power: 95, hp: 105, attribute: "STRATEGY", desc: "ペロポネソス戦争末期の古代アテネの政治家。極端な民主政と寡頭政の間で揺れ動き、「長靴（どちらの足にも合う）」と揶揄された。アテネ敗北後、スパルタの支援で成立した「三十人政権」に参加したが、急進派のクリティアスと対立し処刑された。", skill: { name: "中道の妥協", desc: "HP10%消費して相手を25%弱体化", type: "sacrifice_debuff", cost: 0.1, value: 0.25, rate: 0.7 } },
  { id: 723, name: "ウェスパシアヌス", power: 108, hp: 92, attribute: "STRATEGY", desc: "ローマ帝国のフラウィウス朝の初代皇帝。ユダヤ戦争を鎮圧中に「四皇帝の年」の内乱を制して即位。財政再建に尽力し、ネロの黄金宮殿の跡地に巨大な円形闘技場（コロッセウム）の建設を開始し、市民の支持を集めて帝国の基盤を立て直した。", skill: { name: "コロッセウムの建設", desc: "味方全体の歴史力+20%", type: "buff_all", value: 0.2, rate: 0.6 } },
  { id: 724, name: "ティトゥス", power: 106, hp: 94, attribute: "STRATEGY", desc: "ローマ皇帝。ウェスパシアヌスの子。将軍としてエルサレムを完全に包囲・陥落させ、ユダヤ教の第二神殿を破壊した。皇帝としては温厚で「人類の歓喜」と呼ばれたが、在位中にヴェスヴィオ火山の噴火（ポンペイ滅亡）などの災害対応に追われた。", skill: { name: "人類の歓喜", desc: "相手から最大HPの15%を吸収", type: "absorb_hp", value: 0.15, rate: 0.6 } },
  { id: 725, name: "ドミティアヌス", power: 104, hp: 96, attribute: "STRATEGY", desc: "フラウィウス朝最後のローマ皇帝。ティトゥスの弟。属州の防衛や内政に実績を上げたが、自らを「主にして神」と呼ばせるなど専制的な傾向を強めた。元老院議員やキリスト教徒を厳しく弾圧する恐怖政治を敷いたため、暗殺されて記録抹殺刑を受けた。", skill: { name: "主にして神", desc: "敵全員の歴史力-15%", type: "debuff_all", value: 0.15, rate: 0.6 } },
  { id: 726, name: "アブド・アッラフマーン1世", power: 110, hp: 90, attribute: "STRATEGY", desc: "後ウマイヤ朝の建国者。アッバース朝によるウマイヤ家一族の虐殺から奇跡的に逃れ、遠く離れたイベリア半島に渡り、コルドバを都として独立王朝を建てた。「アンダルスの鷹」と称され、西方におけるイスラーム文化の独自の発展の礎を築いた。", skill: { name: "アンダルスの鷹", desc: "1戦目配置時、歴史力+45%", type: "cond_pos_buff", pos: 1, value: 0.45, rate: 0.8 } },
  { id: 729, name: "ニザーム・アルムルク", power: 82, hp: 118, attribute: "STRATEGY", desc: "セルジューク朝の最盛期を支えたイラン人の名宰相。バグダードなどに「ニザーミーヤ学院」というマドラサ（高等教育機関）を設立し、スンナ派正統の官僚やウラマーを育成。イクター制の整備も行い、君主の暗殺劇（暗殺教団）によって倒れた。", skill: { name: "ニザーミーヤ学院", desc: "次の味方の歴史力を+35%強化", type: "inherit_buff", value: 0.35, rate: 0.8 } },
  { id: 730, name: "シャルル8世", power: 100, hp: 100, attribute: "STRATEGY", desc: "フランス・ヴァロワ朝の国王。百年戦争後のフランスの国力回復を背景に、ナポリ王国の王位継承権を主張して1494年にイタリア半島へ侵攻（イタリア戦争の開始）。この行動が、ハプスブルク家との長きにわたるヨーロッパ覇権争いの火蓋を切った。", skill: { name: "イタリア戦争勃発", desc: "HP15%消費して自身の歴史力+60%", type: "sacrifice_buff", cost: 0.15, value: 0.6, rate: 0.8 } },
  { id: 731, name: "ルイ11世", power: 105, hp: 95, attribute: "STRATEGY", desc: "フランス・ヴァロワ朝の国王。「普遍の蜘蛛」と呼ばれるほどの陰謀家。ブルゴーニュ公などの有力な封建諸侯を外交的策略と軍事力で次々と打倒・併合し、百年戦争後のフランスにおける中央集権化と絶対王政の基礎を冷格に築き上げた。", skill: { name: "普遍の蜘蛛の罠", desc: "次のラウンドの相手を-30%弱体化", type: "inherit_debuff", value: 0.3, rate: 0.7 } },
  { id: 732, name: "メアリ1世", power: 102, hp: 98, attribute: "STRATEGY", desc: "イングランド・テューダー朝の初の女王。ヘンリ8世とカザリンの娘。熱烈なカトリック教徒であり、父が定めた国教会を否定してローマ教皇の権威を復活させた。多数のプロテスタントを処刑したため「ブラッディ・メアリ（血まみれメアリ）」と呼ばれた。", skill: { name: "カトリックの反動", desc: "相手が【文化】なら相手を-40%弱体化", type: "cond_debuff_enemy", target: "CULTURE", value: 0.4, rate: 0.8 } },
  { id: 733, name: "アン女王", power: 98, hp: 102, attribute: "STRATEGY", desc: "ステュアート朝最後のイギリス国王。1707年の合同法によってイングランドとスコットランドを統合し「グレートブリテン王国（大英帝国）」を成立させた。またスペイン継承戦争をユトレヒト条約で終結させ、イギリスの海外覇権を拡大させた。", skill: { name: "大英帝国の合同法", desc: "被ダメージを75%カット", type: "damage_cut", value: 0.75, rate: 0.55 } },
  { id: 734, name: "フランツ・ヨーゼフ1世", power: 110, hp: 90, attribute: "STRATEGY", desc: "ハプスブルク家のオーストリア皇帝。1848年革命の混乱の中で即位。普墺戦争敗北後に「アウスグライヒ（妥協）」を行い、オーストリア＝ハンガリー二重帝国を成立させた。長きにわたり多民族帝国の維持に苦心し、第一次大戦中に没した。", skill: { name: "アウスグライヒの妥協", desc: "相手に最大HPの20%ダメージ", type: "fixed_damage", value: 0.2, rate: 0.6 } },
  { id: 735, name: "ビューロー", power: 104, hp: 96, attribute: "STRATEGY", desc: "20世紀初頭のドイツ帝国宰相。ヴィルヘルム2世の「世界政策」を積極的に推進し、「我々も太陽の当たる場所を求める」と豪語した。艦隊法の制定やモロッコ事件（タンジール事件など）を引き起こし、イギリス・フランスとの対立を決定的にした。", skill: { name: "太陽の当たる場所", desc: "相手が【軍事】なら自身の歴史力+50%", type: "cond_buff_self", target: "VALOR", value: 0.5, rate: 0.8 } },
  { id: 736, name: "ホルヴェーク", power: 96, hp: 104, attribute: "STRATEGY", desc: "第一次世界大戦開戦時のドイツ帝国宰相。オーストリアのセルビアへの強硬姿勢を白紙委任で支持し、シュリーフェン・プランに基づくベルギー侵攻を承認。「国際条約などただの紙切れだ」と発言し、イギリスの参戦を招いて大戦を勃発させた。", skill: { name: "白紙委任と紙切れ", desc: "超低確率(10%)で相手のHPを1にする", type: "hp_to_one", rate: 0.1 } },
  { id: 737, name: "スターリン", power: 122, hp: 78, attribute: "STRATEGY", desc: "ソヴィエト連邦の最高指導者。一国社会主義論を掲げてトロツキーらを追放し、五カ年計画による強引な重工業化と農業の集団化を強行。大粛清によって党や軍の反対派を大量に抹殺し、個人崇拝に基づく極めて強力な全体主義独裁体制を築き上げた。", skill: { name: "大粛清の恐怖", desc: "自軍HP半分以下なら敵全体-35%", type: "cond_pinch_debuff_all", value: 0.35, rate: 0.9 } },
  { id: 738, name: "フルシチョフ", power: 108, hp: 92, attribute: "STRATEGY", desc: "スターリン死後のソ連最高指導者。第20回党大会で「スターリン批判」を突然行い、東側諸国に激震（雪どけ）と動揺（ハンガリー暴動など）をもたらした。アメリカとの「平和共存」を模索したが、キューバ危機を引き起こし失脚に追い込まれた。", skill: { name: "スターリン批判と雪どけ", desc: "自軍HP半分以下なら自身の歴史力+60%", type: "cond_pinch_buff", value: 0.6, rate: 0.8 } },
  { id: 739, name: "ブレジネフ", power: 102, hp: 98, attribute: "STRATEGY", desc: "ソ連の最高指導者。フルシチョフ失脚後に実権を握る。プラハの春に対してワルシャワ条約機構軍を軍事介入させ、「制限主権論（ブレジネフ・ドクトリン）」を主張。デタント（緊張緩和）を進める一方で、アフガニスタン侵攻で新冷戦を招き体制を停滞させた。", skill: { name: "制限主権論", desc: "5戦目配置時、負け数\xD735%歴史力UP", type: "cond_pos_revenge", pos: 5, value: 0.35, rate: 0.9 } },
  { id: 740, name: "エリツィン", power: 105, hp: 95, attribute: "STRATEGY", desc: "ロシア連邦の初代大統領。ソ連の保守派によるクーデターを戦車の上で演説して阻止し、英雄となる。ゴルバチョフを排除して独立国家共同体（CIS）を創設しソヴィエト連邦を解体。急激な市場経済化（ショック療法）を強行したが、経済混乱と新興財閥の台頭を招いた。", skill: { name: "ソ連邦の解体", desc: "相手の歴史力を-30%", type: "debuff_enemy", value: 0.3, rate: 0.7 } },
  { id: 741, name: "呂后", power: 114, hp: 86, attribute: "STRATEGY", desc: "前漢の高祖（劉邦）の皇后。劉邦の死後、幼い皇帝を擁立して実権を掌握。建国の功臣（韓信など）や劉一族、さらには夫の寵姫を極めて残酷な手段で粛清し、自らの一族（呂氏）を諸侯王に封じて絶対的な権力を振るった中国史を代表する女帝的存在。", skill: { name: "外戚の粛清", desc: "相手に最大HPの20%ダメージ", type: "fixed_damage", value: 0.2, rate: 0.7 } },
  { id: 742, name: "景帝", power: 106, hp: 94, attribute: "STRATEGY", desc: "前漢の第6代皇帝。父・文帝の路線（黄老の治）を受け継ぎ、減税と農農奨励の善政を行った。一方で、諸侯王の領土削減を強行して呉楚七国の乱を引き起こしたが、これを鎮圧して実質的に郡県制を全国に及ぼし、武帝の最盛期の完全な下地を作った。", skill: { name: "呉楚七国の平定", desc: "自軍のHPを最大HPの20%回復", type: "heal_hp", value: 0.2, rate: 0.6 } },
  { id: 743, name: "徽宗", power: 65, hp: 135, attribute: "STRATEGY", desc: "北宋の第8代皇帝。政治家としては極めて無能であり、新法党と旧法党の政争を放置して国政を混乱させ、金と結んで遼を滅ぼしたのち、逆に金に首都・開封を攻め落とされ捕虜となった（靖康の変）。しかし画家・書家としては「風流天子」と呼ばれる超一流の天才。", skill: { name: "風流天子の悲劇", desc: "HP10%消費して相手を25%弱体化", type: "sacrifice_debuff", cost: 0.1, value: 0.25, rate: 0.7 } },
  { id: 744, name: "万暦帝", power: 68, hp: 132, attribute: "STRATEGY", desc: "明の第13代皇帝。治世初期は名宰相・張居正の補佐で国勢が回復したが、親政後は長期間にわたり政務を完全に放棄（怠政）。さらに豊臣秀吉の朝鮮出兵への援軍などで国家財政を破綻させ、東林党と非東林党の激しい党争を招いて明の滅亡を決定づけた暗君。", skill: { name: "万暦の怠政", desc: "敵全員の歴史力-15%", type: "debuff_all", value: 0.15, rate: 0.6 } },
  { id: 745, name: "光緒帝", power: 94, hp: 106, attribute: "STRATEGY", desc: "清の第11代皇帝。日清戦争の敗北後、康有為や梁啓超らを登用して、日本の明治維新をモデルとした上からの急進的な近代化改革（戊戌の変法）を断行。しかし西太后ら保守派によるクーデター（戊戌の政変）により幽閉され、志半ばで毒殺されたとされる。", skill: { name: "変法の挫折", desc: "次のラウンドの相手を-25%弱体化", type: "inherit_debuff", value: 0.25, rate: 0.7 } },
  { id: 746, name: "西太后", power: 112, hp: 88, attribute: "STRATEGY", desc: "清末の事実上の最高権力者。同治帝と光緒帝の背後で約半世紀にわたり垂簾聴政を行った。戊戌の政変で近代化改革を弾圧し、義和団事件では排外主義を利用しようとして八カ国連合軍に敗北。光緒新政を始めるも手遅れであり、清朝滅亡の象徴となった。", skill: { name: "垂簾聴政の専横", desc: "相手から最大HPの15%を吸収", type: "absorb_hp", value: 0.15, rate: 0.7 } },
  { id: 747, name: "チャーチル", power: 120, hp: 80, attribute: "STRATEGY", desc: "イギリスの首相。第二次世界大戦中、ナチス・ドイツの猛攻に対して「血と汗と涙」の徹底抗戦を国民に呼びかけ、強力な指導力でイギリスを救い、連合国を勝利に導いた。戦後は「鉄のカーテン」演説を行い、冷戦の到来をいち早く警告した。", skill: { name: "血と汗と涙", desc: "味方全体の歴史力+20%", type: "buff_all", value: 0.2, rate: 0.7 } },
  { id: 748, name: "アデナウアー", power: 110, hp: 90, attribute: "STRATEGY", desc: "西ドイツ（ドイツ連邦共和国）の初代首相。キリスト教民主同盟（CDU）。冷戦下の過酷な分断国家において西側陣営への帰属を明確にし、主権の回復、再軍備（NATO加盟）、そしてフランスのド・ゴールと和解しEEC結成など欧州統合の基礎を築いた。", skill: { name: "西側への統合", desc: "被ダメージを75%カット", type: "damage_cut", value: 0.75, rate: 0.55 } },
  { id: 749, name: "ブラント", power: 105, hp: 95, attribute: "STRATEGY", desc: "西ドイツの社会民主党（SPD）の首相。ソ連やポーランドと関係正常化条約を結び、東ドイツとの基本条約で二つのドイツの存在を認める「東方外交」を展開し、冷戦の緊張緩和（デタント）に多大な貢献をした。ワルシャワのゲットー記念碑で跪き謝罪した。", skill: { name: "東方外交と謝罪", desc: "3戦目配置時、歴史力+45%", type: "cond_pos_buff", pos: 3, value: 0.45, rate: 0.8 } },
  { id: 750, name: "コール", power: 108, hp: 92, attribute: "STRATEGY", desc: "西ドイツ、および統一ドイツの首相。ベルリンの壁崩壊という歴史的チャンスを逃さず、ソ連のゴルバチョフや関係諸国を説得して、1990年に西ドイツが東ドイツを吸収する形での悲願の「ドイツ再統一」を成し遂げた。マーストリヒト条約も推進した。", skill: { name: "ドイツ再統一", desc: "次の味方の歴史力を+35%強化", type: "inherit_buff", value: 0.35, rate: 0.8 } },
  { id: 751, name: "アルカイオス", power: 86, hp: 114, attribute: "CULTURE", desc: "前7〜前6世紀、古代ギリシアのレスボス島出身の叙情詩人。サッフォーと同時代人。貴族派としてポリスの政争に敗れて亡命生活を送り、その怒りや政治闘争、また酒や戦いの歌を詠んだ。彼の用いた詩形（アルカイオス風詩体）はホラティウスらに影響を与えた。", skill: { name: "レスボスの詩歌", desc: "自軍HP半分以下なら敵全体-30%", type: "cond_pinch_debuff_all", value: 0.3, rate: 0.7 } },
  { id: 752, name: "アナクサゴラス", power: 94, hp: 106, attribute: "CULTURE", desc: "前5世紀のイオニア出身の自然哲学者。ペリクレスの招きでアテネに哲学をもたらした。万物は無数の「種子（スペルマタ）」からなり、それを秩序立てて運動させる理性的な力「ヌース（知性）」が存在すると説いたが、太陽を灼熱の石だと言って不敬罪で追放された。", skill: { name: "ヌース（知性）", desc: "次の味方の歴史力を+30%強化", type: "inherit_buff", value: 0.3, rate: 0.8 } },
  { id: 753, name: "ゴルギアス", power: 90, hp: 110, attribute: "CULTURE", desc: "前5世紀のシチリア島出身の代表的なソフィスト。「何も存在しない。存在しても認識できない。認識できても他人に伝えられない」と説き、絶対的な真理を否定。法廷や民会で相手を説破するための弁論術（レトリック）の教師としてアテネで巨富を得た。", skill: { name: "懐疑の弁論術", desc: "相手の歴史力を-30%", type: "debuff_enemy", value: 0.3, rate: 0.7 } },
  { id: 754, name: "エウスタティオス", power: 85, hp: 115, attribute: "CULTURE", desc: "12世紀ビザンツ帝国の大主教・古典学者。ホメロスの『イリアス』や『オデュッセイア』に対する極めて詳細で膨大な注釈書を著した。古代ギリシアの学問的遺産を保存し、のちの西欧ルネサンスにおけるギリシア語研究の発展に貴重な貢献をした。", skill: { name: "古典文献の保存", desc: "被ダメージを70%カット", type: "damage_cut", value: 0.7, rate: 0.6 } },
  { id: 755, name: "アミアヌス・マルケリヌス", power: 92, hp: 108, attribute: "CULTURE", desc: "4世紀ローマ帝国の歴史家。ギリシア人でありながらラテン語で執筆した。タキトゥスの著作を継ぐ形で、96年から378年のハドリアノポリスの戦い（ゴート族への大敗）までの歴史を、自らの従軍経験に基づき極めて客観的かつ公平な視点で記録した。", skill: { name: "公正なる歴史記述", desc: "相手が【政治】なら自身の歴史力+45%", type: "cond_buff_self", target: "STRATEGY", value: 0.45, rate: 0.8 } },
  { id: 756, name: "ペトロニウス", power: 88, hp: 112, attribute: "CULTURE", desc: "1世紀ローマ帝国の作家・政治家。ネロ帝の側近で「優雅の審判者」と呼ばれたが、陰謀に巻き込まれ自刃した。代表作『サテュリコン』は、成り上がり者の解放奴隷トリマルキオの滑稽で悪趣味な大宴会を描き、当時のローマ社会の退廃と俗物性を鮮烈に風刺した。", skill: { name: "サテュリコンの饗宴", desc: "相手に最大HPの20%ダメージ", type: "fixed_damage", value: 0.2, rate: 0.6 } },
  { id: 757, name: "ヒュパティア", power: 96, hp: 104, attribute: "CULTURE", desc: "4世紀末から5世紀初頭、エジプトのアレクサンドリアで活躍した新プラトン主義の女性哲学者・数学者・天文学者。その類まれな知性と美貌で名声を博したが、異教の学問を憎むキリスト教の狂信的な暴徒（パラバラニ）によって惨殺された悲劇の天才。", skill: { name: "異教の知性", desc: "HP10%消費して相手を25%弱体化", type: "sacrifice_debuff", cost: 0.1, value: 0.25, rate: 0.7 } },
  { id: 758, name: "ケルスス", power: 95, hp: 105, attribute: "CULTURE", desc: "1世紀ローマ帝国初期の学者。農業・軍事・法律・医学など広範な分野を網羅した百科全書を著した。そのうち現存する『医学論』は、ヒポクラテス以来のギリシア医学とローマの実践的医療をラテン語で体系化し、ルネサンス期に高く再評価された。", skill: { name: "医学全書の体系", desc: "自軍のHPを最大HPの20%回復", type: "heal_hp", value: 0.2, rate: 0.5 } },
  { id: 759, name: "アウグスティヌス", power: 110, hp: 90, attribute: "CULTURE", desc: "4〜5世紀の最大の教父。マニ教や新プラトン主義を経てキリスト教に回心。『告白録』で自らの罪を懺悔し、『神の国』において、地上の国家（ローマ）の滅亡は必然であり、神の国こそが永遠であるという歴史哲学を樹立し、カトリック神学を決定づけた。", skill: { name: "神の国", desc: "味方全体の歴史力+20%", type: "buff_all", value: 0.2, rate: 0.6 } },
  { id: 760, name: "ヒエロニムス", power: 105, hp: 95, attribute: "CULTURE", desc: "4〜5世紀の教父・聖職者。教皇の命を受け、ベツレヘムの修道院でヘブライ語やギリシア語の原典から聖書をラテン語の日常語に翻訳。この『ウルガタ（標準ラテン語訳聖書）』は、その後の中世カトリック教会の絶対的かつ公式な聖書として千年以上にわたり用いられた。", skill: { name: "ウルガタ訳の権威", desc: "次のラウンドの相手を-30%弱体化", type: "inherit_debuff", value: 0.3, rate: 0.7 } },
  { id: 761, name: "エウセビオス", power: 102, hp: 98, attribute: "CULTURE", desc: "4世紀のキリスト教の教父・歴史家。コンスタンティヌス帝の厚い信任を受け、ニケーア公会議でも活躍。イエスの時代からキリスト教公認までの教会の苦難と勝利の歴史を編纂した『教会史』を著し、「教会史の父」と称される。", skill: { name: "教会史の父", desc: "1戦目配置時、歴史力+45%", type: "cond_pos_buff", pos: 1, value: 0.45, rate: 0.8 } },
  { id: 762, name: "グレゴリウス・トゥルネンシス", power: 94, hp: 106, attribute: "CULTURE", desc: "6世紀のトゥール司教。メロヴィング朝フランク王国の歴史と宮廷の残酷な権力闘争、そして諸王の残虐な行為や教会の奇跡をラテン語で記録した『フランク史』を著述。暗黒時代と呼ばれる初期中世ヨーロッパの社会を知るための唯一無二の根本史料。", skill: { name: "フランク史の記録", desc: "相手から最大HPの15%を吸収", type: "absorb_hp", value: 0.15, rate: 0.6 } },
  { id: 763, name: "ベーダ", power: 98, hp: 102, attribute: "CULTURE", desc: "8世紀のイングランドの修道士・学者。「尊者」と呼ばれる。アングロ・サクソン人の建国からローマ・カトリック教会の布教の歴史をラテン語で記した『イギリス教会史』を著し、キリストの生誕を基準とする「西暦（紀元）」の年代決定法を初めて歴史記述に普及させた。", skill: { name: "西暦の普及", desc: "敵全員の歴史力-15%", type: "debuff_all", value: 0.15, rate: 0.6 } },
  { id: 764, name: "アベラール", power: 106, hp: 94, attribute: "CULTURE", desc: "12世紀フランスのスコラ学者。教え子のエロイーズとの悲恋で知られる。理性的な論理学を神学に導入し、「理解せんがために我信ず」と主張して、普遍論争においては実念論と唯名論を調和させようとする概念論を唱え、中世の知的探求を大きく前進させた。", skill: { name: "理性と信仰の葛藤", desc: "HP15%消費して自身の歴史力+60%", type: "sacrifice_buff", cost: 0.15, value: 0.6, rate: 0.8 } },
  { id: 765, name: "アルベルトゥス・マグヌス", power: 108, hp: 92, attribute: "CULTURE", desc: "13世紀のドミニコ会修道士。トマス・アクィナスの師であり「大アルベルトゥス」と呼ばれる。イスラーム世界を経由して流入したアリストテレスの哲学と自然科学の全貌を、キリスト教神学と矛盾しない形で西洋世界に初めて体系的に紹介した偉大な万能学者。", skill: { name: "万能の学識", desc: "自軍HP半分以下なら自身の歴史力+60%", type: "cond_pinch_buff", value: 0.6, rate: 0.8 } },
  { id: 766, name: "ハーフィズ", power: 100, hp: 100, attribute: "CULTURE", desc: "14世紀イラン・シーラーズの詩人。ペルシア文学における抒情詩（ガザル）の最高峰。恋愛、ワイン、青春の喜びを詠うと同時に、その言葉の中にイスラーム神秘主義（スーフィズム）の神への絶対的な愛や合一の境地を隠喩として込め、現代のイラン人にも熱狂的に愛唱される。", skill: { name: "神秘の抒情詩", desc: "自軍のHPを最大HPの25%回復", type: "heal_hp", value: 0.25, rate: 0.6 } },
  { id: 767, name: "フワーリズミー", power: 112, hp: 88, attribute: "CULTURE", desc: "9世紀アッバース朝の「知恵の館」で活躍した大数学者・天文学者。インドのゼロの概念や数字（アラビア数字）を導入し、著書『代数学』において方程式の解法を体系化した。彼の名は「アルゴリズム」の語源となり、アラビア数学を近代科学の礎とした。", skill: { name: "代数学（アルゴリズム）", desc: "超低確率(10%)で相手のHPを1にする", type: "hp_to_one", rate: 0.1 } },
  { id: 768, name: "ガザーリー", power: 105, hp: 95, attribute: "CULTURE", desc: "11〜12世紀のセルジューク朝のイスラーム神学者。ニザーミーヤ学院の教授。正統的なスンナ派の神学や法学の限界に悩み、修行の末にイスラーム神秘主義（スーフィズム）の体験を正統教義に見事に統合し、イスラーム思想の決定的な枠組みを完成させた。", skill: { name: "神学と神秘主義の統合", desc: "被ダメージを75%カット", type: "damage_cut", value: 0.75, rate: 0.55 } },
  { id: 769, name: "范曄", power: 96, hp: 104, attribute: "CULTURE", desc: "南朝宋の歴史家。死刑となる前に獄中で、後漢一代の歴史を紀伝体で編纂した正史『後漢書』を完成させた。文章が優雅で美しく、『史記』『漢書』『三国志』とともに「四史」と称される。日本の倭の奴国に関する重要な記述が含まれている。", skill: { name: "後漢書の編纂", desc: "相手が【軍事】なら相手を-40%弱体化", type: "cond_debuff_enemy", target: "VALOR", value: 0.4, rate: 0.8 } },
  { id: 770, name: "曾鞏", power: 94, hp: 106, attribute: "CULTURE", desc: "北宋の散文家・政治家。王安石の親友であったが新法には反対した。唐宋八大家の一人に数えられ、欧陽脩の門下として古文復興運動を推進。派手さはないが、極めて論理的で厳密、かつ平易な「本色」と評される質実剛健な名文を数多く残した。", skill: { name: "質実剛健の古文", desc: "5戦目配置時、負け数\xD735%歴史力UP", type: "cond_pos_revenge", pos: 5, value: 0.35, rate: 0.9 } },
  { id: 771, name: "顧炎武", power: 108, hp: 92, attribute: "CULTURE", desc: "明末清初の思想家。「天下興亡、匹夫の責あり」と唱え、明の滅亡を深く反省。朱子学や陽明学の空理空論を排し、実生活に役立つ実学である「経世致用」を提唱。確実な証拠に基づく古典の文献学的な研究を重んじ、清代における考証学の事実上の開祖となった。", skill: { name: "経世致用と考証", desc: "相手の歴史力を-30%", type: "debuff_enemy", value: 0.3, rate: 0.8 } },
  { id: 772, name: "王夫之", power: 102, hp: 98, attribute: "CULTURE", desc: "明末清初の思想家。明の滅亡後、清への仕官を生涯拒否し山中に隠遁して著述に専念した。独自の唯物論的な哲学を展開し、理（精神）よりも気（物質）を重視。歴史は必然法則に従って発展するという進歩史観を唱え、清末の民族主義革命運動に多大な影響を与えた。", skill: { name: "唯物史観の先駆", desc: "4戦目配置時、歴史力+45%", type: "cond_pos_buff", pos: 4, value: 0.45, rate: 0.8 } },
  { id: 773, name: "曹植", power: 110, hp: 90, attribute: "CULTURE", desc: "三国時代の魏の皇族。曹操の三男で曹丕の弟。政治的野心に敗れ不遇な生涯を送ったが、文学的才能は群を抜いており、「七歩の才」の逸話で知られる。戦乱の悲哀や個人の深い抒情を詠んだ五言詩の芸術性を高め、「建安文学」の最高峰として後世に仰がれた。", skill: { name: "七歩の才（建安文学）", desc: "相手に最大HPの20%ダメージ", type: "fixed_damage", value: 0.2, rate: 0.7 } },
  { id: 774, name: "岑参", power: 92, hp: 108, attribute: "CULTURE", desc: "中国・盛唐の詩人。高仙芝の幕僚として西域（タリム盆地やトルファン）に赴任。砂漠の過酷な自然、異国情緒あふれる風俗、そして兵士たちの悲哀や望郷の念を力強い筆致で詠んだ「辺塞詩」の代表的作者であり、唐帝国の広大な広がりを文学的に表現した。", skill: { name: "辺塞の望郷", desc: "相手から最大HPの15%を吸収", type: "absorb_hp", value: 0.15, rate: 0.6 } },
  { id: 775, name: "羅貫中", power: 104, hp: 96, attribute: "CULTURE", desc: "元末から明初にかけての小説家。陳寿の正史『三国志』や民間伝承、講談などを元に、劉備を善、曹操を悪とする蜀漢正統論の劇的な脚色を加え、中国四大奇書の一つ『三国志演義』を完成させた。彼の作品は東アジアの民衆の歴史観を決定づけた。", skill: { name: "三国志演義", desc: "味方全体の歴史力+15%", type: "buff_all", value: 0.15, rate: 0.6 } },
  { id: 776, name: "呉承恩", power: 100, hp: 100, attribute: "CULTURE", desc: "明代の小説家。玄奘のインドへの旅をモデルとした民間伝承を集大成し、孫悟空、猪八戒、沙悟浄らが妖怪と戦う奇想天外な伝奇小説『西遊記』を完成させたとされる。道教や仏教の要素を織り交ぜつつ、権威に対する反抗とユーモアを庶民に提供した四大奇書の一つ。", skill: { name: "西遊記の奇想", desc: "次の味方の歴史力を+30%強化", type: "inherit_buff", value: 0.3, rate: 0.7 } },
  { id: 777, name: "蒲松齢", power: 98, hp: 102, attribute: "CULTURE", desc: "清代の小説家。科挙に合格できず不遇な生涯を送った。妖怪や狐の精、幽霊と人間の交わりを描いた怪異短編小説集『聊斎志異』を著した。幻想的な物語の背後に、当時の腐敗した官僚社会や不正な科挙制度に対する鋭い風刺と悲哀を込めた傑作。", skill: { name: "聊斎志異の怪異", desc: "敵全員の歴史力-15%", type: "debuff_all", value: 0.15, rate: 0.6 } },
  { id: 778, name: "呉敬梓", power: 96, hp: 104, attribute: "CULTURE", desc: "清代の長編小説家。八股文という形式的な文章しか問わない科挙制度によって、知識人（士大夫）がいかに堕落し、偽善と名利に走っているかを痛烈に風刺した長編小説『儒林外史』を著した。清代社会の知識人階層の精神的退廃を描いた写実主義の金字塔。", skill: { name: "儒林外史の風刺", desc: "HP10%消費して相手を25%弱体化", type: "sacrifice_debuff", cost: 0.1, value: 0.25, rate: 0.7 } },
  { id: 779, name: "トマス・ア・ケンピス", power: 90, hp: 110, attribute: "CULTURE", desc: "15世紀ドイツの神秘主義の修道士。「新しいディヴォーション（敬虔）」運動の中心人物。『キリストのまねび（イミタツィオ・クリスティ）』を著し、外面的な儀式や神学の知識ではなく、内面的なキリストへの愛と謙譲の生活を説き、宗教改革以前の民衆の信仰を育んだ。", skill: { name: "キリストのまねび", desc: "自軍HP半分以下なら敵全体-30%", type: "cond_pinch_debuff_all", value: 0.3, rate: 0.8 } },
  { id: 780, name: "フランソワ・ヴィヨン", power: 88, hp: 112, attribute: "CULTURE", desc: "15世紀フランスの中世最後にして最大の抒情詩人。パリ大学に学ぶが、殺人や強盗を働き投獄や放浪を繰り返す無頼の生涯を送った。『遺言詩集』において、死の恐怖、肉体の衰え、悲惨な現実などを赤裸々で力強い言葉で詠い、近代詩の先駆となった。", skill: { name: "無頼と遺言の詩", desc: "3戦目配置時、負け数\xD735%歴史力UP", type: "cond_pos_revenge", pos: 3, value: 0.35, rate: 0.9 } },
  { id: 781, name: "王翦", power: 116, hp: 84, attribute: "VALOR", desc: "秦の始皇帝に仕え、中国統一に最大の貢献を果たした名将。楚の項燕を破るなど、六国のうち趙・燕・楚を次々と滅ぼした。統一後は権力から身を引き、始皇帝の猜疑心を避けて天寿を全うした、処世術にも長けた武将。", skill: { name: "統一の布石", desc: "HP15%消費して自身の歴史力+60%", type: "sacrifice_buff", cost: 0.15, value: 0.6, rate: 0.8 } },
  { id: 782, name: "徐達", power: 112, hp: 88, attribute: "VALOR", desc: "明の建国者・朱元璋（洪武帝）に仕えた最大の功臣。北伐軍の総司令官として元の大都（北京）を攻略し、モンゴル人を万里の長城の北へ駆逐（北元）して、漢民族による中国支配の回復を決定づけた不敗の猛将。", skill: { name: "北元の駆逐", desc: "味方全体の歴史力+20%", type: "buff_all", value: 0.2, rate: 0.6 } },
  { id: 783, name: "クラウゼヴィッツ", power: 126, hp: 84, attribute: "VALOR", desc: "19世紀プロイセンの軍人・軍事学者。ナポレオン戦争に従軍した経験を基に『戦争論』を執筆。「戦争は他の手段をもってする政治の延長である」と定義し、近代の総力戦や国家戦略のあり方に決定的な影響を与えた。", skill: { name: "戦争論の極意", desc: "次の味方の歴史力を+35%強化", type: "inherit_buff", value: 0.35, rate: 0.8 } },
  { id: 784, name: "シュリーフェン", power: 110, hp: 90, attribute: "VALOR", desc: "20世紀初頭のドイツ帝国の参謀総長。露仏同盟による二正面作戦の危機に対し、ロシアの動員完了前に全軍で中立国ベルギーを突破してフランスを短期撃破し、その後ロシアに向かうという「シュリーフェン・プラン」を立案した。", skill: { name: "短期決戦プラン", desc: "相手に最大HPの20%ダメージ", type: "fixed_damage", value: 0.2, rate: 0.7 } },
  { id: 785, name: "バルバロス・ハイレッディン", power: 114, hp: 86, attribute: "VALOR", desc: "オスマン帝国のスレイマン1世に仕えたアルジェリア出身の海軍提督（カプダン・パシャ）。1538年のプレヴェザの海戦において、スペイン・ヴェネツィア・教皇のキリスト教連合艦隊を撃破し、地中海の覇権を確立した。", skill: { name: "プレヴェザの海賊", desc: "敵全員の歴史力-20%", type: "debuff_all", value: 0.2, rate: 0.6 } },
  { id: 786, name: "サモリ・トゥーレ", power: 108, hp: 92, attribute: "VALOR", desc: "19世紀末、西アフリカ内陸部のサハラ以南においてサモリ帝国を建国したイスラーム教徒の指導者。フランスのアフリカ横断政策による侵略に対し、近代兵器を用いた巧みなゲリラ戦で10年以上にわたり激しく抵抗した。", skill: { name: "内陸のゲリラ戦", desc: "被ダメージを80%カット", type: "damage_cut", value: 0.8, rate: 0.5 } },
  { id: 787, name: "アブド・アルカーディル", power: 104, hp: 96, attribute: "VALOR", desc: "19世紀前半、フランスのアルジェリア侵略に対して徹底抗戦を指導したイスラームの指導者。諸部族を統合して民族的抵抗運動を展開し、「アルジェリア民族主義の父」と呼ばれるが、激戦の末に降伏しダマスクスへ亡命した。", skill: { name: "アルジェリアの抵抗", desc: "自軍のHPを最大HPの25%回復", type: "heal_hp", value: 0.25, rate: 0.6 } },
  { id: 788, name: "サンディーノ", power: 102, hp: 98, attribute: "VALOR", desc: "20世紀前半のニカラグアにおける反米ゲリラの指導者。「自由の戦士」と呼ばれ、アメリカ海兵隊の軍事介入や親米独裁政権に対して激しい抵抗運動を展開した。のちにソモサ一族によって暗殺されたが、反帝国主義の象徴となった。", skill: { name: "自由の戦士", desc: "自軍HP半分以下なら自身の歴史力+60%", type: "cond_pinch_buff", value: 0.6, rate: 0.8 } },
  { id: 789, name: "ボードゥアン1世", power: 115, hp: 85, attribute: "VALOR", desc: "第1回十字軍に参加したフランク族の騎士。十字軍によるエルサレム占領後、初代の「エルサレム王」として即位。十字軍国家の防衛線を固め、イスラーム勢力やビザンツ帝国との複雑な関係の中で王国の基礎を築いた。", skill: { name: "エルサレムの王座", desc: "自身の歴史力+40%", type: "buff_self", value: 0.4, rate: 0.7 } },
  { id: 790, name: "ペルシング", power: 110, hp: 90, attribute: "VALOR", desc: "第一次世界大戦におけるアメリカ合衆国ヨーロッパ派遣軍の総司令官。1917年のアメリカ参戦後、連合国軍の独立した指揮権を保ちつつ、西部戦線においてドイツ軍の春季大攻勢を食い止め、最終的なドイツ降伏に貢献した。", skill: { name: "派遣軍の総指揮", desc: "4戦目配置時、歴史力+45%", type: "cond_pos_buff", pos: 4, value: 0.45, rate: 0.8 } },
  { id: 791, name: "アブド・アルカリーム", power: 100, hp: 100, attribute: "VALOR", desc: "1920年代、モロッコ北部のリーフ地方でベルベル人諸部族を率いてスペインとフランスの帝国主義支配に対して蜂起した指導者。「リーフ共和国」の独立を宣言して大国軍を苦しめたが、最終的に両国の連合軍に敗れ去った。", skill: { name: "リーフ共和国の独立", desc: "自軍HP半分以下なら敵全体-35%", type: "cond_pinch_debuff_all", value: 0.35, rate: 0.8 } },
  { id: 792, name: "ジョン・カボット", power: 98, hp: 102, attribute: "VALOR", desc: "大航海時代、イギリス王ヘンリ7世の特許状を得て北アメリカ大陸東岸を探検したイタリア出身の航海者。彼のニューファンドランド到達は、のちのイギリスによる広大な北米植民地領有の法的な根拠となった。", skill: { name: "北米沿岸の開拓", desc: "相手から最大HPの15%を吸収", type: "absorb_hp", value: 0.15, rate: 0.6 } },
  { id: 793, name: "ポチョムキン", power: 126, hp: 74, attribute: "VALOR", desc: "18世紀ロシアの政治家・軍人。エカチェリーナ2世の寵臣として絶大な権力を握り、露土戦争を指導。オスマン帝国からクリミア半島を奪取して黒海艦隊を創設し、ロシアの悲願である南下政策を軍事面から強力に推し進めた。", skill: { name: "黒海艦隊の創設", desc: "相手が【政治】なら自身の歴史力+50%", type: "cond_buff_self", target: "STRATEGY", value: 0.5, rate: 0.8 } },
  { id: 794, name: "ダヤン・ハーン", power: 122, hp: 78, attribute: "VALOR", desc: "16世紀初頭、分裂していたモンゴル諸部族を再統一した中興の英主。オイラトの支配を脱し、タタール（韃靼）を率いて明の北辺に多大な脅威を与えた。彼の死後、孫のアルタン・ハーンのもとでモンゴルは再び最盛期を迎える。", skill: { name: "モンゴル再統一", desc: "次のラウンドの相手を-30%弱体化", type: "inherit_debuff", value: 0.3, rate: 0.7 } },
  { id: 795, name: "アルタン・ハーン", power: 134, hp: 66, attribute: "VALOR", desc: "16世紀後半のモンゴルの指導者。明に侵攻して北京を包囲し（庚戌の変）、国境貿易（互市）を認めさせた。またチベット仏教黄帽派のツォンカパの教えに帰依し、教主に「ダライ・ラマ」の称号を授け、モンゴルの仏教化を決定づけた。", skill: { name: "北京包囲の威力", desc: "相手が【文化】なら相手を-45%弱体化", type: "cond_debuff_enemy", target: "CULTURE", value: 0.45, rate: 0.9 } },
  { id: 796, name: "周恩来", power: 116, hp: 84, attribute: "STRATEGY", desc: "中華人民共和国の初代国務院総理（首相）。毛沢東の右腕として国内政治を調整し、外交面では平和五原則の提唱、アジア・アフリカ会議の成功、ニクソン訪中と日中共同声明による国交正常化など、中国の国際的地位を確立した。", skill: { name: "平和五原則の提唱", desc: "味方全体の歴史力+20%", type: "buff_all", value: 0.2, rate: 0.6 } },
  { id: 797, name: "ホルティ", power: 104, hp: 96, attribute: "STRATEGY", desc: "第一次世界大戦後のハンガリー王国で、国王不在のまま摂政として実権を握った提督。ハンガリー革命（クン・ベーラ政権）を弾圧して右派の権威主義体制を敷き、第二次大戦では失地回復を狙って枢軸国側で参戦したが敗れた。", skill: { name: "摂政の権威主義", desc: "HP10%消費して相手を25%弱体化", type: "sacrifice_debuff", cost: 0.1, value: 0.25, rate: 0.7 } },
  { id: 798, name: "ピウスツキ", power: 108, hp: 92, attribute: "STRATEGY", desc: "第一次世界大戦後、ロシア支配からのポーランド独立を達成した「建国の父」。ポーランド・ソヴィエト戦争で赤軍を撃退し、東方へ領土を拡大。1926年のクーデタで軍事独裁体制（サナツィア体制）を確立し、国家の安定を図った。", skill: { name: "サナツィアの独裁", desc: "3戦目配置時、負け数\xD735%歴史力UP", type: "cond_pos_revenge", pos: 3, value: 0.35, rate: 0.9 } },
  { id: 799, name: "チェーザレ・ボルジア", power: 130, hp: 70, attribute: "STRATEGY", desc: "ルネサンス期イタリアの武将・政治家。教皇アレクサンデル6世の庶子。権謀術数を駆使して中部イタリア（ロマーニャ）を統一し、マキァヴェリの『君主論』において、イタリア統一の理想的な君主モデルとして絶賛された。", skill: { name: "君主論の体現者", desc: "超低確率(10%)で相手のHPを1にする", type: "hp_to_one", rate: 0.1 } },
  { id: 800, name: "ドプチェク", power: 72, hp: 128, attribute: "STRATEGY", desc: "1968年、チェコスロヴァキアの共産党第一書記に就任し、「人間の顔をした社会主義」を掲げて検閲の廃止など自由化・民主化の改革（プラハの春）を主導。しかしソ連率いるワルシャワ条約機構軍の軍事介入によって失脚した。", skill: { name: "プラハの春", desc: "自軍のHPを最大HPの20%回復", type: "heal_hp", value: 0.2, rate: 0.6 } },
  { id: 801, name: "ナジ・イムレ", power: 70, hp: 130, attribute: "STRATEGY", desc: "1956年、フルシチョフのスターリン批判に触発されて発生したハンガリーの反ソ暴動（ハンガリー事件）の際、民衆に推されて首相に就任。ワルシャワ条約機構からの脱退を宣言したが、ソ連軍の軍事介入で鎮圧され処刑された。", skill: { name: "ハンガリー動乱の決起", desc: "自軍HP半分以下なら自身の歴史力+60%", type: "cond_pinch_buff", value: 0.6, rate: 0.8 } },
  { id: 802, name: "ティトー", power: 114, hp: 86, attribute: "STRATEGY", desc: "第二次大戦中、ユーゴスラヴィアのパルチザン闘争を指導して自力でナチスから解放。戦後は独自の自主管理社会主義を敷き、ソ連（コミンフォルム）と決別。第三世界を主導し、非同盟諸国首脳会議をベオグラードで開催した。", skill: { name: "非同盟の連帯", desc: "被ダメージを80%カット", type: "damage_cut", value: 0.8, rate: 0.5 } },
  { id: 803, name: "エンクルマ（ンクルマ）", power: 106, hp: 94, attribute: "STRATEGY", desc: "1957年、サハラ以南のアフリカで初の独立を果たしたガーナの初代大統領。パン・アフリカニズム（全アフリカ主義）を熱烈に提唱し、アフリカの政治的統一と非同盟運動を指導したが、急進的な社会主義政策が行き詰まりクーデタで失脚した。", skill: { name: "パン・アフリカニズム", desc: "次の味方の歴史力を+35%強化", type: "inherit_buff", value: 0.35, rate: 0.8 } },
  { id: 804, name: "ルムンバ", power: 85, hp: 115, attribute: "STRATEGY", desc: "1960年、ベルギーからの独立を果たしたコンゴ共和国の初代首相。豊かな地下資源を狙う旧宗主国や欧米資本が裏で糸を引く分離独立運動（コンゴ動乱）に直面し、ソ連に支援を求めたためアメリカに警戒され、暗殺された悲劇の指導者。", skill: { name: "コンゴ動乱の悲劇", desc: "敵全員の歴史力-20%", type: "debuff_all", value: 0.2, rate: 0.6 } },
  { id: 805, name: "ベン・グリオン", power: 112, hp: 88, attribute: "STRATEGY", desc: "シオニズム運動の指導者。1948年にパレスチナにおいてイスラエル国（ユダヤ人国家）の建国を宣言し、初代首相に就任。直後に勃発した第1次中東戦争（パレスチナ戦争）でアラブ連合軍を撃退し、国家の存立を確固たるものにした。", skill: { name: "イスラエル建国", desc: "自身の歴史力+35%", type: "buff_self", value: 0.35, rate: 0.7 } },
  { id: 806, name: "サラザール", power: 104, hp: 96, attribute: "STRATEGY", desc: "20世紀のポルトガルの独裁者。1932年に首相となり、「エスタド・ノヴォ（新国家）」と呼ばれるファシズム的・コーポラティズム的な権威主義体制を構築。第二次大戦中は中立を保ち、戦後も長期にわたり植民地支配を強硬に維持した。", skill: { name: "エスタド・ノヴォ", desc: "5戦目配置時、歴史力+45%", type: "cond_pos_buff", pos: 5, value: 0.45, rate: 0.8 } },
  { id: 807, name: "リヴォフ", power: 96, hp: 104, attribute: "STRATEGY", desc: "1917年のロシア二月革命直後、国会（ドゥーマ）のブルジョワジーや自由主義貴族を中心に樹立された臨時政府の初代首相。戦争の継続を決定し、平和とパンを求めるソヴィエトの民衆と乖離したため、七月暴動ののちに辞任した。", skill: { name: "臨時政府のジレンマ", desc: "HP15%消費して自身の歴史力+60%", type: "sacrifice_buff", cost: 0.15, value: 0.6, rate: 0.7 } },
  { id: 808, name: "ケレンスキー", power: 98, hp: 102, attribute: "STRATEGY", desc: "ロシア革命における社会革命党（エスエル）右派の指導者。リヴォフの後を継いで臨時政府の首相となるが、第一次世界大戦の継続を強行し、コルニロフ将軍の反乱に直面。最終的にレーニン率いる十月革命の武装蜂起によって政権を打倒された。", skill: { name: "戦争継続の誤算", desc: "自軍HP半分以下なら敵全体-35%", type: "cond_pinch_debuff_all", value: 0.35, rate: 0.8 } },
